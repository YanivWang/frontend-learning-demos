<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .loading {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #ddd;
        }

        .loading .loadWrap {
            position: relative;
            height: 70px;
            width: 100px;
            justify-content: space-around;
            align-items: center;
            display: flex;
        }


        .loadWrap span {
            display: inline-block;
            width: 8px;
            height: 100%;
            border-radius: 4px;
            background: lightgreen;
            -webkit-animation: load 1s ease infinite;
        }

        @-webkit-keyframes load {
            0%, 100% {
                height: 40px;
                background: lightgreen;
            }
            50% {
                height: 70px;
                margin: -15px 0;
                background: lightblue;
            }
        }

        .loadWrap span:nth-child(2) {
            -webkit-animation-delay: 0.2s;
        }

        .loadWrap span:nth-child(3) {
            -webkit-animation-delay: 0.4s;
        }

        .loadWrap span:nth-child(4) {
            -webkit-animation-delay: 0.6s;
        }

        .loadWrap span:nth-child(5) {
            -webkit-animation-delay: 0.8s;
        }


        @keyframes loadAni {
            from {
                background-color: lightgreen;
                height: 40px;
            }

            to {
                background-color: lightblue;
                margin: -15px 0;
                height: 70px;
            }
        }
    </style>
</head>
<body>

<div class="loading">
    <div class="loadWrap">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>


</body>
</html>
