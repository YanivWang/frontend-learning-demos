<!--
  分类: javascript / 07-进阶 / 内存泄漏
  主题: 用 Performance 面板观察 DOM 节点 + 内存增长
  要点:
    - 不断 appendChild 但不清理，DOM 节点数会线性增长（Detached 节点）
    - Array.concat + 大数据反复合并会触发频繁 GC
    - 现代 DevTools Performance Monitor 可实时跟踪 JS heap / DOM nodes
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内存泄漏 - timeline 观察</title>
  </head>
  <body>
    <button id="grow">增长</button>
    <script>
      var x = [];

      function grow() {
        for (var i = 0; i < 10000; i++) {
          document.body.appendChild(document.createElement("p"));
        }
        x = x.concat(new Array(1000 * 1000).fill("11111111"))
      }

      document.getElementById("grow").addEventListener("click", grow);
    </script>
  </body>
</html>
