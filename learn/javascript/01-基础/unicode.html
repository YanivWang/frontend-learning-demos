<!--
  分类: javascript / 01-基础
  主题: Unicode 码点与字符串互转
  要点:
    - JS 字符串以 UTF-16 存储；BMP 用 charCodeAt，超出 BMP（emoji）用 codePointAt
    - for...of 与展开运算符按「字符」遍历；length/for...in 按 UTF-16 单元会拆 emoji
    - Object.prototype 上挂方法会污染所有对象的 for...in 遍历
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unicode 与字符串互转</title>
</head>
<body>
  <h1>Unicode 编码与字符串互转</h1>
  <p>JS 字符串以 UTF-16 编码存储；对于 BMP（基本多文种平面）字符，<code>charCodeAt</code> 即可，对于 4 字节字符（如 emoji）应使用 <code>codePointAt</code>。</p>

  <script>
    // ============ 1. 字符 → unicode 码点 ============
    const str = "ABC";
    console.log("A:", str.codePointAt(0)); // 65
    console.log("B:", str.codePointAt(1)); // 66
    console.log("C:", str.codePointAt(2)); // 67
    console.log("A 16 进制:", str.codePointAt(0).toString(16)); // '41'

    // ============ 2. unicode 码点 → 字符 ============
    console.log(String.fromCharCode(65));        // 'A'
    console.log(String.fromCodePoint(0x1F600));   // '😀'

    // ============ 3. unicode 转义序列字符串 ↔ 字符 ============
    // \uXXXX 在源码中即被解析；通过 escape/unescape 也能转回（不推荐，已废弃）
    const cn = "\u4e2d\u56fd";
    console.log("\\u4e2d\\u56fd =", cn); // '中国'

    // 字符串 → "\\uXXXX\\uXXXX" 形式
    function charToUnicode(str) {
      let r = "";
      for (const ch of str) {
        let hex = ch.codePointAt(0).toString(16);
        while (hex.length < 4) hex = "0" + hex;
        r += "\\u" + hex;
      }
      return r;
    }
    console.log("'中国' →", charToUnicode("中国"));
    console.log("' ' →", charToUnicode(" "));

    // ============ 4. for...of 能正确遍历 emoji，for...in/length 不行 ============
    const emoji = "a😀b";
    console.log("length 错觉:", emoji.length); // 4 —— 😀 占 2 个 UTF-16 单元
    console.log("for-of 正确:");
    for (const ch of emoji) console.log(ch);
    console.log("[...emoji]:", [...emoji]);

    // ============ 5. for-in vs for-of vs hasOwnProperty ============
    // 在原型上挂一个方法
    Object.prototype.printName = function () { console.log(this); };
    const person = { name: "wc", age: 23 };

    console.log("for in（含原型）:");
    for (const key in person) {
      console.log(key, "isOwn:", person.hasOwnProperty(key));
    }
    console.log("Object.keys 只返回自身可枚举属性:", Object.keys(person));

    // 清理掉刚才挂的原型方法，避免污染
    delete Object.prototype.printName;
  </script>
