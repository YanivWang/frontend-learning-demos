<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // undefined，变量还没声明和赋值就行访问，这就是变量提升，提升到最上面了，并且浏览器
      // 会自动给变量初始化赋值为 undefined
      console.log('a:', a);
      var a = 1;

      /* 等价于
        var a = undefined; //声明提升并赋值为 undefined
        console.log('a:', a);
        a = 1; //赋值语句不提升留在原地
      */

      try {
        // ReferenceError - Cannot access 'b' before initialization
        // 报错: 报的错是 无法访问 b 变量，因为 b 变量还没有初始化，说明 b 变量被提升了，但是
        // 还没有被浏览器初始化赋值，所以报错
        // 称之为 TDZ，暂时性死区
        console.log('b:', b);
        let b = 2;
      } catch (error) {
        console.log('b:', error.name, '-', error.message);
      }

      try {
        // ReferenceError - Cannot access 'c' before initialization
        // 报错: 报的错是 无法访问 c 变量，因为 c 变量还没有初始化，说明 c 变量被提升了，但是
        // 还没有被浏览器初始化赋值，所以报错
        // 称之为 TDZ，暂时性死区
        console.log('c:', c);
        const c = 2;
      } catch (error) {
        console.log('c:', error.name, '-', error.message);
      }

      //Uncaught ReferenceError: d is not defined
      //报错: 报的错事 d 没定义
      try {
        console.log(d);
      } catch (error) {
        console.log('d:', error.name, '-', error.message);
      }
    </script>
  </body>
</html>
