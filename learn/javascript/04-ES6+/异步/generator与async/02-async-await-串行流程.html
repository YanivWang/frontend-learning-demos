<!--
  分类: javascript / 04-ES6+ / 异步 / generator与async
  主题: async/await 串行流程最小演示
  要点:
    - await 暂停当前 async 函数，等待右侧 Promise 决议
    - async 函数自身返回的也是一个 Promise
    - 把回调地狱写成顺序代码，但底层依旧基于微任务
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>async/await 串行流程</title>
</head>
<body>

<script>
    //async 函数是 generator 函数的语法糖
    function timeout(ms) {
        return new Promise(function (resolve, reject) {
            setTimeout(resolve,ms)
        })
    }

    async function asyncPrint(value,ms) {
        await timeout(ms);
        console.log(value);
    }

    //async函数，本身也是返回Promise
    asyncPrint("print", 3000)
</script>

</body>
</html>
