<!--
  分类: javascript / 04-ES6+ / 异步 / generator与async
  主题: async 是 generator + 自动执行器的语法糖
  要点:
    - generator + co/自执行器即可模拟 async/await
    - await 等价于 yield 后跟一个 Promise；async 函数自带「驱动器」
    - 函数体内多个 await 串行执行；并发应该用 Promise.all
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>async 是 generator 语法糖</title>
</head>
<body>

<script>
    let timeStamp = Math.round(Date.parse(new Date) / 1000);
    console.log("timeStamp:" + timeStamp);

    function timeOut() {
        return new Promise(function (resolve) {
            setTimeout(resolve, 1000)
        });
    }

    async function getData() {
        await timeOut();
        console.log(111);
        if (true) {
            await timeOut();

            console.log(222);

            return "444";
        } else {
            return "333";
        }
    }

    async function setData() {
        let data = await getData();
        console.log(data);

        await timeOut();
        console.log(555);
        if (true) {
            await timeOut();

            console.log(666);

            return "777";
        } else {
            return "888";
        }
    }

    setData();
</script>

</body>
</html>
