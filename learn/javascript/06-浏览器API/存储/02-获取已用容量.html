<!--
  分类: javascript / 06-浏览器API / 存储
  主题: 通过 iterate 统计已用容量
  要点:
    - iterate 回调中累计 key.length + JSON.stringify(value).length 估算字节数
    - 估算并非物理字节，但够用作业务粗略容量提示
    - 注意：JSON.stringify 不能正确序列化 Date/Blob 等，需要特殊处理
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>获取已用容量</title>
    <script src="lib/localforage.js"></script>
</head>
<body>

<script>
    console.log("进入..");
    /*
    async function testRemainCap() {
        await localforage.setItem("name", "Join");
        for (let i = 0; i < 10000; i++) {
            await localforage.setItem("key_" + i, Math.random().toFixed(5));
        }
    }
    testRemainCap().then(function () {
        console.log("写入完毕..");
    });*/

    var time1 = new Date().getTime();

    let totalSize = 0;
    let iterNumber1 = 0;
    localforage.iterate(function (value, key, iterNumber) {
        totalSize = totalSize + key.length + JSON.stringify(value).length;
        //iterNumber1 = iterNumber;
        //console.log(iterNumber + " : " + totalSize);
    }).then(function () {
        var time2 = new Date().getTime();

        console.log("用时：" + (time2 - time1)/1000 + "s");

        //console.log("iterNumber:" + iterNumber1);
        console.log("totalSize:" + totalSize/1024/1024 + "M");
    }).catch(function (err) {
        console.log("err:" + err);
    })
</script>

</body>
</html>
