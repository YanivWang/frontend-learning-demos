<!--
  分类: javascript / 01-基础
  主题: 函数声明、函数表达式、Function 构造器、严格模式 this
  要点:
    - 三种函数定义：函数声明 / 函数表达式 / new Function 动态构造
    - 函数即对象，函数名只是指向函数对象的指针；置 null 不影响已复制的指针
    - 严格模式下，独立调用的函数中 this 为 undefined
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>函数进阶</title>
</head>
<body>

<script>
    // 严格模式必须写在脚本/函数第一行才会生效
    'use strict';

    // 1.函数声明
    function sum(a, b) {
        return a + b;
    }

    // 2.函数表达式
    let mins = function (a, b) {
        return a - b;
    };

    // 3.Function 构造器：把字符串当函数体（基本不用，仅作演示）
    //    修正：变量名是 devide，实现也应是除法
    let devide = new Function("num1", "num2", "return num1 / num2");
    console.log("old fn: " + devide(6, 3));

    // 4.函数也是对象，函数名只是指针，可以赋值给其他变量
    let devideNew = devide;
    console.log("new fn: " + devideNew(10, 5));

    // 5.将原指针置 null，devideNew 依旧持有函数对象引用
    devide = null;
    console.log("new fn2: " + devideNew(20, 4));

    // 6.函数内部的特殊对象：arguments（类数组）与 this（动态绑定）
    //   arguments.callee 指向函数对象本身（严格模式禁用）

    // 7.函数的属性：length 表示形参个数
    console.log(devideNew.length);

    // 8.严格模式下独立调用的函数 this 是 undefined
    window.color = 'red';
    let fun1 = function () {
        // 易错点：严格模式 this 为 undefined，访问属性会报错
        // 这里只打印 this 本身，避免直接抛 TypeError
        console.log('strict this =', this);
    };
    fun1();
</script>

</body>
</html>
