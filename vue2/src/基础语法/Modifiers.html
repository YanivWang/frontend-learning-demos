<!--
  分类: vue2 / 基础语法
  主题: 事件修饰符 @event.modifier
  要点:
    - .prevent ≡ e.preventDefault()；.stop ≡ e.stopPropagation()
    - .once 只触发一次；.capture 用捕获模式；.self 仅当 target 是元素自身时触发
    - 链式可叠加：@click.stop.prevent；按键修饰符如 @keyup.enter 同理
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>事件修饰符 @click.prevent / .stop</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app1">
    <!--这里的修饰符类似于在 onSubmit中调用e.preventDefault();-->
    <form v-on:submit.prevent="onSubmit">
        <button type="submit">提交</button>
    </form>
</div>


<script>
    var vm = new Vue({
        el: '#app1',
        data: {

        },
        methods: {
            onSubmit: function (e) {
                //e.preventDefault();

                console.log(e);
                console.log("表单提交");
            }
        }
    });

</script>

</body>
</html>
