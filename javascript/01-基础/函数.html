<!--
  分类: javascript / 01-基础
  主题: 函数声明的最小可运行示例
  要点:
    - 函数声明会被整体提升，可在声明前调用
    - return 语句决定返回值，没有 return 时返回 undefined
    - 形参个数和实参个数可以不一致
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>函数声明</title>
  </head>
  <body>
    <script>
      // 函数声明会被「整体提升」，所以下面调用可以放在声明前后任意位置
      function sayHi(name, message) {
        console.log("Hello " + name + ", " + message);
      }

      sayHi("Nicholas", "how are you today?");

      // 有 return 的函数：把结果传回调用处
      function sum(num1, num2) {
        return num1 + num2;
      }
      console.log("sum(1,2) =", sum(1, 2));
    </script>
  </body>
</html>
