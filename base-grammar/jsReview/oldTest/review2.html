<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    //1.基于Object的对象
    var person = new Object();
    person.name = "王成";
    person.age = "18";

    person.getName = function () {
      return this.name;
    };

    console.log(person.getName());

    //2.对象字面量方式(这种方式，能够很清楚的知道对象拥有的属性和方法)
    var pig = {
        name:"佩奇",
        age: 10,
        getName: function () {
            return this.name;
        }
    };

    //js对象可以使用 "."操作符动态的扩展属性
    pig.weight = "100kg";
    console.log(pig.getName());
    console.log(pig);

    pig.age = undefined;//通过将属性赋值为 undefined来删除属性，或者使用delete obj.xxx 来删除属性
    delete pig.weight;

    console.log(pig);

</script>
</body>
</html>
