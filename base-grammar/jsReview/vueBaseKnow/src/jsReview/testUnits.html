<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let random = Math.floor(Math.random() * 6);
    console.log("random:\n" + random);

    let a = parseInt("010abc");
    console.log("a: " + a);

    let b = parseInt(" 10 ");
    console.log("b: " + b);

    let c = parseInt("934");
    console.log("c: " + c);

    let d = parseInt("934vvv");
    console.log("d: " + d);

    //如果字符串中第一个数字以0-9开头，且不好radius参数的话，则会把解析成10进制整数
    let e = parseInt("78vv67v");//字符串中第一个数字会返回
    console.log("d: " + e);

    let f = parseInt("vv67v");//字符串中第一个字符不是数字，则返回NaN
    console.log("d: " + f);

    let g = parseInt("111", 10);
    console.log("g: " + g);
</script>


</body>
</html>
