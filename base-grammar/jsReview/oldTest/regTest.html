<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    var testStr = "gergre123MMffMmm \n 435g4y6gmmgg";
    console.log(testStr);

    //一个正则表达式的结构：  /正则表达式主体/修饰符(可选)  主题用来描述检索的规则

    var reg = /m/ig; //多个修饰符可以拼接

    var matResult = testStr.match(reg);
    console.log(matResult);

    var serResult = testStr.search(reg); //search用于在某个字符串中，检索指定的子串，或者是匹配指定的正则表达式的字符串
    console.log(serResult);

    var repResult = testStr.replace(/m/ig, "A");
    console.log(repResult);

    //?匹配前面的子表达式0次或者1次，最多1次，或者指定一个非贪婪限定符
    //()匹配一个子表达式的开始和结束
    //.匹配处理换行符之外的所以字符
    // + * ? {}限定符，用来指一个正则表达式的组件，必须出现多少次，才能满足

    var str = "zod";
    var reg1 = /zo*/;
    var mat1 = str.match(reg1);
    console.log("mat1:" + mat1);

    var reg2 = /zo{3,}/;
    var mat2 = str.match(reg2);
    console.log("mat2:" + mat2);

    var reg3 = /zo{1,3}/; //匹配至少1次，至多3次

    var str = "bagbhg";
    var reg = /b(a|h)g/g;
    console.log(str.match(reg));

    //* + 都是贪婪的会尽可能的匹配多的字符，如果在它们之后加上?,就能实现最小匹配

    var str = "<body><h1 style='font-size:20px' class='titleH1'><span>123</span></h1></body>";
    var reg = /<h1.*?>/;
    console.log(str.match(reg));

    var str = "abbo oodd";
    var reg = /^a.*d$/;
    console.log(str.match(reg));

    var str = "ab564ggb bfghb"; //\b字符边界，字与空格之间的位置,定位符和限定符，不能同时出现 ^*,^匹配一行文本开始处的文本
    var reg = /a.*\b/;
    console.log(str.match(reg));

    var str = "Chaptercha chafr";
    var reg = /\bCha/gi;
    console.log(str.match(reg));

    var reg = /cha\b/;
    console.log(str.match(reg));

    var str = "Chapter aptitude";
    var reg = /\Bapt/g; //\将下一个字符标记为特殊字符 \B
    console.log(str.match(reg));

    //()标记一个子表达式的开始和结束,就是说(partten)括号中的partten也是一个正则表达式，子表达式可以获取供以后使用
    var str = "abc aec adc";
    var reg = /a[bed]c/gi;
    console.log(str.match(reg));

    var text = "a|e|s|v-1234";//[]匹配字符组中的字符
    var reg = /[a|e|s-]/g; //结果是匹配 a e s |四个字符,[]中的字符都是普通字符，除非 - 用在0-9 a-z A-Z之间，表示范围元字符,在其它地方都是普通字符
    console.log(text.match(reg));

    var reg = /(a|e|s)/g;//小括号，匹配括号内的字符串，可以是一个或者多个，是个可选的结构
    console.log(text.match(reg));//()圆括号，会有一个副作用，会使相关的匹配被缓存，此时可?:放在第一个选择项前，来消除这种影响

    var str = "aoob aob aooob";
    var reg = /ao{3}b/g;//{}是限定符，匹配次数
    console.log(str.match(reg));

    //非捕获元 ?: ?= ?!
    //查找重复的单词
    var str = "Is is the cost of of gasoline going up up up";
    var patt1 = /\b([a-z]+) \1\b/ig;
    console.log(str.match(patt1));

    var str = /[^ab]/;

    //常用元字符
    //\d 匹配一个数字字符，等价于 [0-9]
    //\D 匹配一个非数字字符，等价于 [^0-9]
    //\w 匹配一个单词字符，等价于[0-9a-zA-Z_]，字母，数字，下划线
    //\W 匹配一个非字母数字下划线
    //. 匹配除了 \n 以外的任何字符   (.|\n)可以匹配任何字符
    //[\w\W]  [\s\S] .(不匹配换行)
    //匹配一个任意字符：1.[\w\W] 2.[\s\S] 3.(.|\n)
    //当^用到[^xxx]中的时候，表示排除的意思

    var str = "plain alin";
    var reg = /[an]/g;
    var reg1 = /[pan].*?\b/g;
    console.log(str.match(reg));
    console.log(str.match(reg1));
</script>

</body>
</html>
