name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run maintenance tests
        run: npm test

      - name: Validate demos, docs, coverage, and smoke checks
        run: npm run validate

      - name: Check working tree clean after scripts
        run: |
          git diff --exit-code index.html manifest.json learn/javascript/README.md learn/css/README.md learn/vue2/README.md learn/vue3/README.md learn/react/README.md learn/typescript/README.md || (
            echo "::error::index.html / manifest.json / 模块 README 与脚本输出不一致，请本地运行 npm run build:index && npm run sync:readmes"
            exit 1
          )

  playwright:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build index and inject nav
        run: npm run build:index

      - name: Start static server
        run: npx --yes serve . -p 4173 &
        
      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:4173/index.html

      - name: Playwright sample smoke
        run: npm run validate:playwright
        env:
          DEMO_BASE_URL: http://127.0.0.1:4173
