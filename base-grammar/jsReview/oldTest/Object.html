<script>
    //"use strict";

    //js中的原生引用类型
    //Object  Array  Date Function  Boolean Number String

    //js中的对象：无序属性的集合，属性可以包含基本值，对象或者函数。（就是一组键值对）

    //Global对象，web浏览器将Global对象作为 window对象的一部分，进行实现
    var a = 1;
    var b = 2;

    //eg1:
    var c = eval("a+b");//该方法就像一个script解析器
    //eval方法只接受一个参数，并会把该参数当做 script 表达式，去执行
    console.log(c);
    //eg2:
    eval("var p = {name:'张三',age:19};console.log('c111:' + c);");//在严格模式下 use strict 在eval中创建的变量，外边访问不到
    console.log("eval对象：" + p);

    //当解析器，遇到eval时，将传递给eval的参数，当做 js代码执行，然后将执行的结果插入到，原位置
    //通过eval执行的代码，被认为是包含本次eval调用的环境的一部分，因此被执行的代码，拥有和该执行环境一样的作用域链
    var person = {
        name: "wc",
        age: 20
    };
    var length = window.Object.keys(person).length;
    console.log("length:" + length);

    //所有的全局变量和函数，对象都是window对象的属性

    var a = undefined;
    console.log(String(a));
    //console.log(a.toString()); //相对于String的局限性，不能对null和undefined使用 toString

    window.Math.random();
</script>
