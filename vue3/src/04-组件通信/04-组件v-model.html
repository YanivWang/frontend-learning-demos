<!--
  分类: vue3 / 04-组件通信
  主题: 组件 v-model
  要点:
    - Vue3 组件 v-model 默认使用 modelValue / update:modelValue
    - 支持多个 v-model，如 v-model:title
    - 子组件仍然通过 emit 通知父组件更新
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · 组件 v-model</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      input { padding: 6px 10px; }
      code { background: #f6f8fa; padding: 2px 5px; border-radius: 6px; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>组件 v-model</h1>
      <div class="box">
        <smart-input v-model="title"></smart-input>
        <p>父组件 title：{{ title }}</p>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li><code>&lt;Child v-model="x" /&gt;</code> 等价于传入 <code>modelValue</code> 并监听 <code>update:modelValue</code>。</li>
        <li>Vue3 支持多个 v-model 参数，适合复杂表单组件。</li>
        <li>本质仍是 props + emit，只是语法更简洁。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      const SmartInput = {
        props: { modelValue: String },
        emits: ["update:modelValue"],
        template: `
          <label>
            子组件输入：
            <input
              :value="modelValue"
              @input="$emit('update:modelValue', $event.target.value)"
            />
          </label>
        `,
      };

      createApp({
        components: { SmartInput },
        setup() {
          const title = ref("Vue3 面试");
          return { title };
        },
      }).mount("#app");
    </script>
  </body>
</html>
