<!--
  分类: javascript / 07-进阶 / 内存泄漏
  主题: 全局大对象引用导致的内存占用
  要点:
    - var / const 在脚本顶层声明的变量会长期存活
    - 一个不再使用的大对象只要还被某个变量引用，就无法被 GC
    - DevTools Memory 面板的 Heap snapshot 可观察 Detached 节点与大对象
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内存泄漏 - 全局大对象</title>
  </head>
  <body>
    <div>111</div>
    <script>
      var arryVar = new Array(1000 * 1000).fill("1111111");
      const arryConst = new Array(1000 * 1000).fill("2222222");


      const dependArray = arryConst;
    </script>
  </body>
</html>
