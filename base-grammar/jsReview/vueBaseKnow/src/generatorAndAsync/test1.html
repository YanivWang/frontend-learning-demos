<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>


<script>
    //定义一个generate函数
    function* generator1() {
        //yield定义不同的内部状态
        yield 'wang';
        yield 'cheng';
        return 'ending';
    }

    //调用该函数后，函数并不会执行，返回的也不是函数运行结果，而是一个执行内部状态的指针对象
    //就是遍历器对象（代表generate函数的内部指针）
    //下一步调用遍历器对象的next方法，使得指针移向下一个状态


    var hw = generator1();

    console.log(hw.next());

    console.log(hw.next());

    console.log(hw.next());

    console.log(hw.next());

    //遍历器为js中不同的数据结构提供了一种统一的访问方式
    let a = {
        "key1": "nm1",
        "key2": "nm2"
    };

    var it = a.iterate;

    console.log(it.next());
    console.log(it.next());


</script>


</body>
</html>
