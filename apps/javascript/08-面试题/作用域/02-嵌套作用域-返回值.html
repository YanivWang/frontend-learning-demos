<!--
  分类: javascript / 08-面试题 / 作用域
  主题: 嵌套函数 - 返回内层函数执行结果
  要点:
    - f() 在 checkscope 内被执行，按作用域链取到 local 的 scope
    - 内层函数的作用域是「定义时」的词法作用域，而非执行时所在
    - 与下一题对比：直接返回 f vs 返回 f()
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试题 - 嵌套作用域返回值</title>
</head>
<body>

<script>
    //题目一
    var scope = "global";
    function checkscope(){
        var scope = "local";
        function f(){
            return scope;
        }
        return f();
    }

    console.log(checkscope());//local
</script>
