<!--
  分类: javascript / 02-函数与作用域 / this指向
  主题: this 的动态绑定
  要点:
    - 函数定义时 this 不确定，运行时由「调用方」决定
    - window.a() 中 this 指 window；window.a()() 第二次调用以 undefined/window 收尾
    - this 永远指向「最后调用它」的对象
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>this 动态绑定</title>
</head>
<body>

<script>
    //js中this的指向在函数定义的时候并不是确定的，而是在运行的时候，动态绑定
    //this绑定到谁，是由谁调用它决定的

    function a() {
        this.age = 14;
        console.log("this1: " + this);
        console.log("age1: " + this.age);

        //返回一个匿名函数
        return function () {
            console.log("this2: " + this);
            console.log("age2: " + this.age);
        }
    }

    window.a();
    window.a()();

    //this永远指向的是最后调用它的对象
</script>

</body>
</html>
