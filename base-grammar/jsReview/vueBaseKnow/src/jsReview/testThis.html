<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //js中this的指向在函数定义的时候并不是确定的，而是在运行的时候，动态绑定
    //this绑定到谁，是由谁调用它决定的

    function a() {
        this.age = 14;
        console.log("this1: " + this);
        console.log("age1: " + this.age);

        //返回一个匿名函数
        return function () {
            console.log("this2: " + this);
            console.log("age2: " + this.age);
        }
    }

    window.a();
    window.a()();

    //this永远指向的是最后调用它的对象
</script>

</body>
</html>
