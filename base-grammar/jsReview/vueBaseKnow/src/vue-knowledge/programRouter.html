<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>


    <script src="https://unpkg.com/vue/dist/vue.js"></script>
    <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>


</head>
<body>

<div id="app">
    <p>
        <router-link to="/user/foo">/user/foo</router-link>
        <router-link to="/user/foo/profile">/user/foo/profile</router-link>
        <router-link to="/user/foo/course">/user/foo/course</router-link>
    </p>
    <router-view></router-view>
</div>

<script>


    //1.定义路由组件
    const User = {
        template: `<div>
                      <div>user</div>
                      <div>{{$route.params.id}}</div>
                      <router-view></router-view>
                   </div>`
    };

    const UserProfile = {
        template: `<div>用户简介</div>`
    };

    const Course = {
        template: `<div>课程</div>`
    };

    //2.定义路由
    //component: 1.一个组件  2.Vue.extend()创建的组件构造器

    //有时候，同一个路径可以匹配到多个路由，此时，匹配的优先级就按照路由的定义顺序，谁先定义的，谁的优先级就最高
    const routes = [
        {
            path: "/user/:id",
            component: User,
            children: [
                {
                    path: '',
                    component: {
                        template:'<div>Hello</div>'
                    }
                },
                {
                    path: 'profile',
                    component: UserProfile
                },
                {
                    path: 'course',
                    component: Course
                }
            ]
        }
    ];

    //3.创建router实例，然后传入"router"配置
    const router = new VueRouter({
        routes
    });

    //4.创建和挂在根实例
    //通过为根实例注入路由器：我们可以在任何组件内通过this.$router访问路由器  this.$route访问当前的路由
    var wm = new Vue({
        router
    }).$mount('#app');


    //5.注意：当使用的路由参数，从/user/wangcheng/post/123  /user/wangcheng/post/456 原来的组件会被复用

    console.log(wm);
</script>

</body>
</html>
