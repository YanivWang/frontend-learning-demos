<!--
  分类: vue3 / 生命周期钩子
  主题: Composition API 中的全部生命周期钩子
  要点:
    - setup 替代 beforeCreate / created；钩子统一以 onXxx 形式注册
    - 关键钩子：onBeforeMount / onMounted / onBeforeUpdate / onUpdated / onBeforeUnmount / onUnmounted
    - keep-alive 专属：onActivated / onDeactivated
    - 须从 Vue 解构全部用到的 onXxx 钩子；正确拼写是 onUnmounted（非 onUnMounted）
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · Composition API 生命周期钩子</title>
    <script src="../libs/vue.global.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      // 从 Vue 解构本 demo 用到的全部 Composition API 钩子
      const {
        createApp, ref, shallowRef, computed,
        onBeforeMount, onMounted,
        onBeforeUpdate, onUpdated,
        onBeforeUnmount, onUnmounted,
        onActivated, onDeactivated
      } = Vue;

      const app = createApp({
        //特别注意: setup函数替代了之前的beforeCreate和created
        setup() {
          /*
          1.所有同步子组件都已经被挂载(不包含异步组件)
          2.组件自身的DOM树已经创建完成并插入父容器
          3.作用: 在这个钩子中可以访问组件所渲染的dom树
          */
          const elRef = ref();

          //=========== AAAA挂载阶段AAAA ===========
          //组件被挂载之前调用(此时已经完成了响应式状态的设置，但是还没有创建DOM节点，它即将首次执行 DOM 渲染过程。)
          onBeforeMount(() => {});
          //挂载后执行（自身DOM树已经插入到容器中）
          //可以操作DOM
          //接口请求
          onMounted(() => {
            console.log("组件挂载...");
          });

          //=========== BBBB更新阶段BBBB ===========
          //因响应式状态变更而更新DOM树之前调用
          onBeforeUpdate(() => {});
          //在组件因为响应式状态变更而更新其DOM树之后调用，可以用 nextTick() 替代
          //访问更新后的DOM
          onUpdated(() => {});

          //=========== CCCC卸载阶段CCCC ===========
          //组件卸载前调用，此时组件实例依赖还保留全部功能
          onBeforeUnmount(() => {});
          /*
          1.调用时机: 组件被卸载后调用
          2.作用: 清理一些副作用(计时器，dom监听器，与服务器的连接)
          */
          // 正确拼写是 onUnmounted（非 onUnMounted）
          onUnmounted(() => {});

          //=========== DDDD keep-alive的组件激活 DDDD ===========
          // 调用时机为首次挂载
          // 以及每次从缓存中被重新插入时
          onActivated(() => {});

          //keep-alive的组件失去活性
          // 在从 DOM 上移除、进入缓存
          // 以及组件卸载时调用
          onDeactivated(() => {});

          //setup钩子的不便之处就是需要写大量返回的语句暴露api
          return {
            elRef,
          };
        },
      });

      //挂载应用到指定的dom节点
      app.mount("#app");
    </script>
  </body>
</html>
