<!--
  分类: javascript / 06-浏览器API / BOM
  主题: history pushState / replaceState 与 popstate
  要点:
    - pushState 在历史栈中追加一条记录，可后退；replaceState 替换当前条目
    - state 对象在 popstate 事件中可通过 event.state 取回
    - 前进/后退或 history.back/forward 触发 popstate；直接 pushState 不触发
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOM history pushState/replaceState</title>
  </head>
  <body>
    <div>
      <button onclick="jumpToPageA()">pushState 导航到A页面</button>
      <button onclick="jumpToPageB()">replaceState 导航到B页面</button>
    </div>
    <script>
      function jumpToPageA() {
        let stateObject = {
          name: "wangcheng"
        }
        let title = "我是A页面"
        let url = "page-aaa"

        history.pushState(stateObject, title, url) 
      }

      function jumpToPageB() {
        let stateObject = {
          name: "gaojie"
        }
        let title = "我是B页面"
        let url = "page-bbb"
        history.replaceState(stateObject, title, url) 
      }
      
      //监听 window 对象上的 popstate
      window.addEventListener("popstate", (event)=>{
         console.log("event", event);
      })
    </script>
  </body>
</html>
