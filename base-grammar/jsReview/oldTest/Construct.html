<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>


<script>
    //emca中的构造函数，可以用来创建
    function Person(name, age, job) {
        console.log(this);//this指向调用这个函数的对象
        //作用域，指的是所有可访问的变量，函数，对象的集合

        this.name = name;
        this.age = age;
        this.job = job;
        this.sayName = function () {
            alert(this.name);
        };

        console.log(this);
    }

    var person1 = new Person("Nicholas", 29, "Software Engineer");
    var person2 = new Person("Greg", 27, "Doctor");

    console.log(person1);


    function Panda() {
    }

    Panda.prototype.name = "熊猫";
    Panda.prototype.age = 20;
    Panda.prototype.eat = function () {
        console.log("I am eating!");
        console.log();
    };

    var panda1 = new Panda();
    panda1.eat();
    console.log(panda1.name);


    function Dog() {
        this.name = "熊猫";
        this.eat = function () {
            console.log(Math.random());
        }
    }

    var dog1 = new Dog();
    console.log(dog1.name);
    dog1.eat();

    var dog2 = new Dog();
    console.log(dog2.name);
    dog2.eat();

</script>

</body>
</html>
