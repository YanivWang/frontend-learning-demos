<!--
  分类: javascript / 02-函数与作用域 / this指向
  主题: new 调用构造函数时 this 的行为
  要点:
    - new 构造时 this 指向新创建的实例，绝不会污染外层作用域
    - 不加 new 直接调用，this 退化为 window（非严格）或 undefined（严格）
    - 推荐为构造函数加首字母大写规范，避免漏写 new
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>this · new 构造函数</title>
</head>
<body>
<script>
    //js函数中的this是动态绑定的
    function Person(name, age) {
        this.name1 = name;
        this.age1 = age;

        console.log("this: " + this);
    }

    //当使用new 操作符来调用函数，把函数当做类使用
    //此时this的作用域就是安全的，this始终指向新创建的Person实例对象

    var p1 = new Person("wc", 25);
    console.log(p1.name1);
    console.log(window.name1);//undefined
    console.log(window.age1);//undefined


    Person("wzl", 50);//直接调用该构造函数，不使用new操作符，则和调用普通的函数一样，函数内部的this，就是window对象

    console.log(window.name1);
    console.log(window.age1);


</script>
</body>
</html>
