<!--
  分类: css / 07-现代特性 / 06-subgrid
  主题: CSS Grid subgrid
  要点:
    - subgrid 让嵌套 grid 继承父 grid 的轨道尺寸，列对齐跨卡片
    - grid-template-columns: subgrid 用于列；行同理 subgrid / subgrid rows
    - 适合卡片列表标题/正文/按钮底对齐
    - 不支持时降级为普通 grid（布局仍可用，对齐略差）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS subgrid</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
    }
    @supports (grid-template-columns: subgrid) {
      .cards { grid-template-rows: auto 1fr auto; }
      .card {
        grid-row: span 3;
        grid-template-rows: subgrid;
      }
    }
    .card h3 { margin: 0; font-size: 1rem; }
    .card p { margin: 0; font-size: 0.875rem; color: #555; }
    .card button { justify-self: start; padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>subgrid 卡片对齐</h1>
  <p>三列卡片中，标题/正文/按钮行在支持 <code>subgrid</code> 的浏览器里会跨卡对齐。</p>

  <div class="cards">
    <article class="card">
      <h3>短标题</h3>
      <p>一行描述</p>
      <button type="button">操作</button>
    </article>
    <article class="card">
      <h3>较长的产品名称</h3>
      <p>多行描述：subgrid 让按钮行贴底对齐，不受中间正文高度影响。</p>
      <button type="button">操作</button>
    </article>
    <article class="card">
      <h3>中等标题</h3>
      <p>两行左右的说明文字。</p>
      <button type="button">操作</button>
    </article>
  </div>
