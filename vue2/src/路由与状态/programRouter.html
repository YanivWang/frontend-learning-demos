<!--
  分类: vue2 / 路由与状态
  主题: 编程式导航（push / replace / go / 命名路由）
  要点:
    - $router.push 向 history 栈追加记录，浏览器后退可返回
    - $router.replace 替换当前记录，不入栈
    - $router.go(n) / back() / forward() 在历史栈中移动
    - 命名路由：router.push({ name: 'user', params: { id: '1' }, query: { tab: 'profile' } })
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 编程式导航</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <p>
        <router-link to="/">Home</router-link>
        |
        <router-link to="/user/1">User 1</router-link>
        |
        <router-link to="/about">About</router-link>
    </p>

    <div>
        <button @click="pushPath('/user/2')">push('/user/2')</button>
        <button @click="replacePath('/user/3')">replace('/user/3')</button>
        <button @click="pushNamed">push({ name: 'user', params: { id: 'named' } })</button>
        <button @click="pushWithQuery">push({ path, query: { from: 'code' } })</button>
        <button @click="$router.back()">back()</button>
        <button @click="$router.forward()">forward()</button>
        <button @click="$router.go(-1)">go(-1)</button>
    </div>

    <p>当前路径: {{ $route.fullPath }}</p>
    <router-view></router-view>
</div>

<script>
    const Home = {
        template: `<div>Home Page</div>`
    };

    const User = {
        template: `<div>
            <div>User Page</div>
            <div>params.id: {{ $route.params.id }}</div>
            <div>query: {{ $route.query }}</div>
        </div>`
    };

    const About = {
        template: `<div>About Page</div>`
    };

    const routes = [
        { path: '/', component: Home },
        { path: '/user/:id', name: 'user', component: User },
        { path: '/about', component: About }
    ];

    const router = new VueRouter({ routes });

    new Vue({
        router,
        methods: {
            pushPath: function (path) {
                this.$router.push(path);
            },
            replacePath: function (path) {
                this.$router.replace(path);
            },
            pushNamed: function () {
                this.$router.push({ name: 'user', params: { id: 'named' } });
            },
            pushWithQuery: function () {
                this.$router.push({ path: '/about', query: { from: 'code' } });
            }
        }
    }).$mount('#app');

    // 同一路由不同 params（如 /user/1 → /user/2）会复用组件实例，
    // 生命周期钩子不会重新执行，需 watch $route 或 beforeRouteUpdate
</script>

</body>
</html>
