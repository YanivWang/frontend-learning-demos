<!--
  分类: javascript / 01-基础
  主题: var / let / const 变量提升与暂时性死区
  要点:
    - var 声明会被提升到函数顶部，访问得到 undefined（不报错）
    - let / const 也存在「提升」，但有暂时性死区，声明前访问抛 ReferenceError
    - 函数声明同样会被整体提升，可以在声明前调用
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>变量进阶</title>
  </head>
  <body>
 <script>
  var gVar = 0;
  const gConstVar = 1;

  function example() {
    // var 声明被提升，访问到 undefined（不抛错）
    console.log(varVar);
    var varVar = 1;

    // let 在暂时性死区内访问会抛 ReferenceError
    // console.log(letVar);
    let letVar = 2;

    // const 同样有暂时性死区
    // console.log(constVar);
    const constVar = 3;

    // 函数声明同样会被整体提升：在声明语句之前就可访问
    console.log(typeof example2); // 'function'

    function example2() {
      var varVar11 = 11;
      let letVar22 = 22;

      console.log(varVar11);
      console.log(letVar22);
    }
    example2();
}

example();
 </script>
