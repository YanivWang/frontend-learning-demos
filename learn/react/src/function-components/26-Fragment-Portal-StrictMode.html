<!--
  分类: react / 内置能力
  主题: Fragment、Portal 与 StrictMode
  要点:
    - Fragment 用于返回多个兄弟节点，不额外创建 DOM 包裹层
    - Portal 可以把子节点渲染到父组件 DOM 层级之外，常用于弹窗、浮层
    - StrictMode 只在开发环境生效，用来暴露副作用、废弃 API 等问题
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · Fragment Portal StrictMode</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    #modal-root { position: fixed; right: 20px; top: 20px; }
    .modal { border: 1px solid #999; background: #fff; padding: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="modal-root"></div>

  <script type="text/babel">
    const { Fragment, StrictMode, useState } = React;

    function Modal({ onClose }) {
      return ReactDOM.createPortal(
        <div className="modal">
          <strong>Portal 弹窗</strong>
          <p>我渲染在 #modal-root 中，不在 #root 内。</p>
          <button onClick={onClose}>关闭</button>
        </div>,
        document.getElementById("modal-root")
      );
    }

    function App() {
      const [open, setOpen] = useState(false);

      return (
        <Fragment>
          <section>
            <h1>Fragment、Portal、StrictMode</h1>
            <button onClick={() => setOpen(true)}>打开 Portal 弹窗</button>
            {open && <Modal onClose={() => setOpen(false)} />}
            <p>面试回答: Fragment 减少无意义 DOM；Portal 解决浮层挂载位置；StrictMode 帮助开发阶段发现潜在问题。</p>
          </section>
        </Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <StrictMode>
        <App />
      </StrictMode>
    );
  </script>
</body>
</html>
