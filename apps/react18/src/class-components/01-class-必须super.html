<!--
  分类: react18 / class 组件
  主题: class 组件 constructor 必须调用 super()
  要点:
    - class extends React.Component 时，一旦显式写了 constructor，必须先 super(props)
    - 否则会抛 ReferenceError；constructor 内不能在 super() 之前访问 this
    - class 组件必须实现 render()，否则抛 "No render method found"
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React · class 组件 super()</title>

    <!-- 引入 react 和 react-dom，这两个是react核心包 -->
    <script src="../../libs/react.development.js"></script>
    <script src="../../libs/react-dom.development.js"></script>

    <script src="../../libs/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      //定义类组件
      class App extends React.Component {
        //missing super() call in constructor
        //react类组件的constructor函数中必须调用 super(),实际上是调用父类的构造函数
        // constructor(){

        // }

        //可以没有 constructor 方法，但是一旦显式声明了constructor方法，就必须在其中调用super()方法
        constructor(props) {
          super(props)

          //'super' must be followed by an argument list or member access
          //console.log(super);
          
        }

        //App(...): No `render` method found on the returned component instance: you may have forgotten to define `render`.
        //一个class react组件，必须得有一个render方法
        render() {
          return <div>jsx</div>; //"" 0 "1" null undefined <div>jsx</div>
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
