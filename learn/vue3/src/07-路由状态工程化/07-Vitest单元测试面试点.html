<!--
  分类: vue3 / 07-路由状态工程化
  主题: Vitest 单元测试面试边界
  要点:
    - Vitest 与 Vite 配置共享，API 兼容 Jest（describe/it/expect）
    - 组件测试：@vue/test-utils + mount/shallowMount
    - mock：vi.fn()、vi.mock() 模块；定时器 vi.useFakeTimers()
    - 面试边界：测行为不测实现细节；E2E 用 Playwright 而非 Vitest
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue3 · Vitest 面试点</title>
  <script src="../../libs/vue.global.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 780px; line-height: 1.65; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; font-size: 0.82rem; overflow: auto; }
    button { padding: 8px 14px; cursor: pointer; margin: 8px 0; }
    #log { background: #f6f8fa; padding: 12px; border-radius: 8px; font-family: ui-monospace, monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Vitest 单元测试（概念 + 迷你 mock 演示）</h1>
    <pre>{{ configSnippet }}</pre>
    <button type="button" @click="runMockDemo">运行 vi.fn 风格 mock 演示</button>
    <div id="log">{{ log }}</div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    createApp({
      setup() {
        const log = ref("");
        const configSnippet = [
          "// vitest.config.ts",
          "export default defineConfig({",
          "  test: { environment: 'jsdom', globals: true },",
          "})",
          "",
          "it('increment', () => {",
          "  const fn = vi.fn()",
          "  fn(1)",
          "  expect(fn).toHaveBeenCalledWith(1)",
          "})",
        ].join("\n");
        function runMockDemo() {
          const calls = [];
          const fn = (...args) => { calls.push(args); };
          fn(1); fn(2, "x");
          log.value = "mock 调用记录:\n" + calls.map((a, i) => `#${i + 1} ${JSON.stringify(a)}`).join("\n") +
            "\n\n面试：Vitest 适合单测 composable/store；路由+Pinia 集成测可 mock router.push";
        }
        return { configSnippet, log, runMockDemo };
      },
    }).mount("#app");
  </script>
