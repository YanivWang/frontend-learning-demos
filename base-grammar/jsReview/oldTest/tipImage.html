<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../jsLibrary/jquery-3.1.0.min.js"></script>

    <style>
        .imageTipView {
            width: 30px;
            height: 30px;
            top: 50%;
            left: 50%;
            z-index: 2000;
            position: absolute;
            transform: translate(-50%, -50%);
        }

        .imageTipView.run {
            transform-origin: center center;
            animation: imageTipViewExtend 0.4s ease forwards, imageTipViewMove 0.4s ease forwards 0.5s;
            animation-play-state: running;
            -webkit-animation-play-state: running;
            animation-fill-mode: forwards;
        }

        .imageTipView.stop {
            animation-play-state: paused;
            -webkit-animation-play-state: paused;
            -webkit-animation-name: none;
            animation-name: none;
        }

        @keyframes imageTipViewExtend {
            0% {
                transform: scale(1, 1) translate(-50%, -50%);
            }

            100% {
                transform: scale(4, 4) translate(-50%, -50%);
            }
        }

        @keyframes imageTipViewMove {
            0% {
                transform: scale(4, 4) translate(-50%, -50%);
            }

            100% {
                bottom: 300px;
                left: 19%;
                transform: scale(4, 4) translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>

<script>
    $(function () {
        $(".clickBtn").unbind().click(function () {
            $(".imageTipView").addClass("run");
        });
    })
</script>

<button class="clickBtn">点击</button>
<div class="wrap" style="width: 320px;height: 512px;position: relative;border:1px solid grey">
    <div class="imageTipView">
        <img src="checkTip.png" style="width:90%;height:90%;position:relative;" class="tipImage">
    </div>
</div>

</body>
</html>
