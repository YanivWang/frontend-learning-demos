<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <script src="../libs/react18.js"></script>
    <script src="../libs/react-dom18.js"></script>
    <script src="../libs/babel.js"></script>
</head>
<body>

<div id="app"></div>

<script type="text/babel">
    //react class方式的组件
    class Person extends React.Component {
        //组件的属性会在构造函数中被传递过来
        constructor(props) {
            super(props);//调用super关键字来调用父类的构造函数，并将props传递到父类的构造器

            //构造函数是唯一可以给 this.state 直接赋值的地方
            //state的更新是异步的
            //处于性能考虑，react会把多个setState()调用合并成一个调用
            this.state = {
                count: 0,
            }
        }

        componentDidMount() {
            for (let i = 0; i < 10; i++) {
                this.setState({
                    count: this.state.count + 1
                });
                console.log(this.state.count);//10个0
            }

            setTimeout(()=>{
                console.log("2s后",this.state.count);//1
            },2000)
        }

        render() {
            //页面上展示的是1
            return (
                <div>{this.state.count}</div>
            )
        }
    }

    ReactDOM.render(<Person/>, document.getElementById("app"));
</script>

</body>
</html>
