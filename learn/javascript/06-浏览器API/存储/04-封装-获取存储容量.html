<!--
  分类: javascript / 06-浏览器API / 存储
  主题: 封装获取存储容量（已用 / 剩余）
  要点:
    - 把 iterate 的回调累加结果挂在对象上传递（闭包写法 + 引用传递）
    - 用 async/await 把异步流水线写成同步风格
    - 易错点：MAX_SIZE 仅是「业务约定」上限，并非浏览器真实配额
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>封装获取存储容量</title>
    <script src="lib/localforage.js"></script>
</head>
<body>


<script>
    console.log("进入...");

    function _getStorageSize(cSizeObj) {
        return localforage.iterate(function (value, key) {
            cSizeObj.currentSize = cSizeObj.currentSize + key.length + JSON.stringify(value).length;
        })
    }

    async function getStorageInfoSync() {
        const MAX_SIZE = 50;

        let cSizeObj = {
            currentSize: 0
        };
        await _getStorageSize(cSizeObj);

        let currentSize = cSizeObj.currentSize / 1024 / 1024;
        let remainSize = MAX_SIZE - currentSize;
        return {
            currentSize: currentSize,
            remainSize: remainSize
        }
    }

    async function test() {
        let currentSizeObj = await getStorageInfoSync();
        console.log("currentSizeObj:" + JSON.stringify(currentSizeObj));
    }

    test();
</script>
