<!--
  分类: javascript / 04-ES6+ / class详解
  主题: extends 继承与 super 调用
  要点:
    - 派生类的 constructor 必须先调用 super() 才能使用 this
    - 实例方法挂在 prototype 上，所有实例共享；实例字段每个实例各有一份
    - 易错点：在实例方法中读私有字段要用 this.#field，不能写死成具体实例名
-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>class extends</title>
  </head>
  <body>
    <script>
      class Person {
        // 静态字段
        static userType = "whitePerson";
        static #userTypeName = "wp";

        // 公有/私有 实例字段
        userAge = 18;
        #userAgeName = 18;

        constructor(userName, weight) {
          // 没有父类不能调用 super()：SyntaxError: 'super' keyword unexpected here
          // super(userName);

          // 普通公有属性可以通过赋值临时创建
          this.userName = userName;

          // 私有字段必须在类体中预先声明，不能通过 this.#x = v 直接创建
          // this.#weight = weight; // SyntaxError
        }

        // 实例方法存储在 prototype 上，由所有实例共享
        eat() {
          // 读私有字段须用 this.#field，不能写死具体实例名
          console.log("this.#userAgeName", this.#userAgeName);
          console.log("I am eatting!");
        }
      }

      console.log("================= Person =================")

      console.log(typeof Person);

      const p1 = new Person();
      p1.eat();

      console.log(typeof p1);

      console.log("Person.prototype === p1.__proto__", Person.prototype === p1.__proto__);

      class WhitePerson extends Person {
        skinColor = "white";

        constructor(userName){
          // 派生类必须在使用 this 前调用 super()
          super(userName);
        }
      }

      console.log("================= WhitePerson =================")
      const whitePerson1 = new WhitePerson("特朗普");
      whitePerson1.eat();
      console.log(whitePerson1.userName);
    </script>
  </body>
</html>
