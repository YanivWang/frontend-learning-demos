<!--
  分类: css / 07-现代特性 / 03-container-queries容器查询
  主题: container-type 与 @container 组件级响应式
  要点:
    - 媒体查询看视口宽度；容器查询看「父容器」宽度，适合卡片/侧边栏等可复用组件
    - 父元素设置 container-type: inline-size（或 size）并可选 container-name
    - @container (min-width: 400px) 在容器够宽时切换布局，与 viewport 无关
    - 面试对比：media query 全局断点 vs container query 组件自适配
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Container Queries</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
    h1 { font-size: 1.25rem; }
    .layout { display: flex; gap: 16px; flex-wrap: wrap; }
    .sidebar-wrap {
      flex: 1 1 200px;
      min-width: 180px;
      resize: horizontal;
      overflow: auto;
      padding: 8px;
      border: 2px dashed #ccc;
      border-radius: 10px;
    }
    .card-container {
      container-type: inline-size;
      container-name: card;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }
    .card h2 { margin: 0; font-size: 1rem; }
    .card p { margin: 0; color: #555; font-size: 0.9rem; }
    .card .actions { display: flex; flex-direction: column; gap: 6px; }
    .card button {
      padding: 6px 10px;
      border: 1px solid #0969da;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    @container card (min-width: 360px) {
      .card {
        flex-direction: row;
        align-items: center;
        background: #eef5ff;
      }
      .card .actions { flex-direction: row; margin-left: auto; }
    }
    .hint { color: #666; font-size: 0.875rem; margin-top: 1rem; max-width: 640px; }
  </style>
</head>
<body>
  <h1>Container Queries — 按父容器宽度自适应</h1>
  <p class="hint">拖动左侧虚线框改变容器宽度。容器 ≥ 360px 时卡片由纵向堆叠变为横向排列（与浏览器视口无关）。</p>

  <div class="layout">
    <div class="sidebar-wrap">
      <div class="card-container">
        <article class="card">
          <div>
            <h2>可复用卡片</h2>
            <p>@container card (min-width: 360px) 触发横向布局。</p>
          </div>
          <div class="actions">
            <button type="button">详情</button>
            <button type="button">收藏</button>
          </div>
        </article>
      </div>
    </div>
    <div class="sidebar-wrap" style="flex: 2 1 320px;">
      <div class="card-container">
        <article class="card">
          <div>
            <h2>宽容器中的同一组件</h2>
            <p>相同 HTML/CSS，仅因容器宽度不同而呈现不同布局。</p>
          </div>
          <div class="actions">
            <button type="button">详情</button>
            <button type="button">收藏</button>
          </div>
        </article>
      </div>
    </div>
  </div>
