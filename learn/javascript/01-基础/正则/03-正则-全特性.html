<!--
  分类: javascript / 01-基础 / 正则
  主题: 正则表达式全特性速查
  要点:
    - flags：i/g/m/s/u/y 各有用途；g 会维护 lastIndex，重复 test/exec 要注意
    - 量词默认贪婪，加 ? 变非贪婪；命名捕获 (?<name>…) 比数字索引更可读
    - 边界 \b/\B、断言 (?=)(?!)(?<=)(?<!) 都是「零宽」匹配，不消耗字符
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正则表达式全特性</title>
  <style>
    body { font-family: system-ui, monospace; margin: 1.5rem; line-height: 1.7; }
    code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>正则表达式全特性演示</h1>
  <p>结构：<code>/pattern/flags</code> 或 <code>new RegExp(pattern, flags)</code>。打开控制台查看每段输出。</p>
  <script>
    // ============ 1. 修饰符（flags）============
    // i 忽略大小写  g 全局  m 多行  s 让 . 匹配换行  u Unicode  y 粘性匹配
    const testStr = "gergre123MMffMmm \n 435g4y6gmmgg";
    const reg = /m/ig;
    console.log("match(/m/ig):", testStr.match(reg));   // 全部命中
    console.log("search(/m/ig):", testStr.search(reg));  // 第一个命中下标
    console.log("replace:", testStr.replace(/m/ig, "A"));

    // ============ 2. 量词 ============
    // ? 0~1 次   * 0~∞   + 1~∞   {n} 恰好 n 次   {n,m} n~m 次
    console.log("/zo*/ on 'zod':", "zod".match(/zo*/));      // ['zo']
    console.log("/zo{3,}/:", "zod".match(/zo{3,}/));         // null
    console.log("/zo{1,3}/:", "zoooooo".match(/zo{1,3}/));   // ['zooo']

    // ============ 3. 字符组 / 分组 / 选择 ============
    console.log("/b(a|h)g/g:", "bagbhg".match(/b(a|h)g/g)); // ['bag', 'bhg']
    console.log("/a[bed]c/:", "abc aec adc".match(/a[bed]c/gi));

    // ============ 4. 贪婪 vs 非贪婪 ============
    const html = "<h1 class='t'><span>hi</span></h1>";
    console.log("贪婪 <h1.*>:", html.match(/<h1.*>/)?.[0]);    // 整个
    console.log("非贪婪 <h1.*?>:", html.match(/<h1.*?>/)?.[0]); // 只到第一个 >

    // ============ 5. 边界 ============
    // ^ 行首  $ 行尾  \b 单词边界  \B 非单词边界
    console.log("/^a.*d$/:", "abbo oodd".match(/^a.*d$/)); // 匹配整串
    console.log("\\b 边界:", "Chaptercha chafr".match(/\bCha/gi));
    console.log("\\B 非边界:", "Chapter aptitude".match(/\Bapt/g));

    // ============ 6. 元字符 ============
    // \d 数字   \D 非数字   \w 字母数字下划线   \W 非\w
    // \s 空白   \S 非空白   .  除 \n 外任意字符
    // 想匹配"任意字符（含换行）"：[\s\S] 或 [\w\W] 或 (.|\n)
    console.log("\\d+:", "abc123def".match(/\d+/g));

    // ============ 7. 反向引用 \1 \2 ============
    // 查找重复单词
    const dup = "Is is the cost of of gasoline going up up up";
    console.log("重复单词:", dup.match(/\b([a-z]+) \1\b/ig));

    // ============ 8. exec / test 的游标问题 ============
    // 带 g 修饰符的正则会维护 lastIndex —— 多次调用 test/exec 时要小心
    const g = /\d+/g;
    console.log(g.test("abc123"), g.lastIndex); // true, 6
    console.log(g.test("abc123"), g.lastIndex); // false, 0 —— 第二次从 6 之后找不到
    console.log(g.test("abc123"), g.lastIndex); // true, 6

    // ============ 9. 命名捕获组（ES2018）============
    const date = "2025-12-31";
    const m = date.match(/(?<year>\d{4})-(?<month>\d{2})-(?<day>\d{2})/);
    console.log("命名捕获:", m.groups); // { year: '2025', month: '12', day: '31' }
  </script>
