<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    //定义一个person构造函数，或者一个Person类
    function Person() {
        this.name = "";
        this.age = 0;
    }

    var p1 = new Person();
    var p2 = new Person();
    console.log(p1);

    p1.salary = 10000;
    var flag1 = p1.hasOwnProperty("name");
    //用于检测一个对象是否拥有特定于自身的属性，忽略掉从原型对象上，继承的属性和方法
    //in操作符也可以检测一个对象是否包含某个属性，会检测其继承的原型的属性

    console.log(flag1);
    var flag2 = p1.hasOwnProperty("salary");
    console.log(flag2);
    var flag3 = p1.hasOwnProperty("toString");
    console.log(flag3);
    console.log(p2);

    //原型属性指的是不在构造函数中定义的属性，属性和方法都是一样的引用地址
    var flag = p1.toString == p2.toString
    console.log("abc:" + flag);

    //这个是使用对象字面量的方式，声明一个对象，而不是一个构造函数
    console.log("创建对象...");

    var a2 = new Animal();
    console.log(a1);
    console.log(a2);
    */
</script>

</body>
</html>
