<!--
  分类: javascript / 04-ES6+ / class详解
  主题: class 表达式（匿名/具名）
  要点:
    - 类表达式可以是匿名或具名，具名时类名只在类内部可见
    - 与函数表达式类似，类表达式不会进行声明提升
    - 没有 extends 的类，constructor 内不能调用 super()
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class 类表达式</title>
  </head>
  <body>
    <script>
      //类表达式
      //1.可以是匿名的类
      const Dog = class {
        //类的构造方法用于创建和初始化类的对象实例
        //一个类只有拥有一个constructor方法(是类的构造函数)
        constructor(name) {
          this.name = name;
        }
      };
      const dog1 = new Dog("dog111");
      console.log("我是dog1", dog1.name);

      //2.也可以是具名的类
      const Cat = class Cat1 {
        constructor(name) {
          //1.super方法只能在类的constructor方法中调用
          // super(name);
          this.name = name;
        }
      };
    </script>
