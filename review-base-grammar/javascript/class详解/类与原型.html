<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Class</title>
  </head>
  <body>
    <script>
      //除了 #修饰符 修饰的类字段属性是私有的，其他都是公有的，静态字段参与原型的继承
      class Person {
        //静态类属性
        static userType = "whitePerson";
        static #userTypeName = "wp";

        //公有实例属性（所有实例各有一份）
        userAge = 18;
        #userAgeName = 18;

        //方法名: constructor告诉js引擎在使用new操作符创建类实例的时候，必须调用这个函数
        //不定义构造函数，会使用默认的空构造函数

        //constructor为this.xxx赋值，都是添加类的实例的属性，是每个实例各自有一份
        //添加到 this 的所有内容都会存在于不同的实例上
        constructor(userName, weight) {
         // super(userName); //使用super访问父类构造函数

         //普通属性可以通过赋值创建
          this.userName = userName; //构造函数中创建 类 实例 的属性并初始化赋值

          //私有字段只能在字段声明中预先声明。它们不像普通属性那样可以通过赋值创建
          //this.#weight = weight;//Private field '#weight' must be declared in an enclosing class

          this.sayhello = function(){

          }
        }
       
        //类的实例方法存储在实例的 prototype 中，供所有实例共用，而不是每个实例各自拥有一份
        eat() {
          console.log("p1.#userAgeName", p1.#userAgeName);//类的私有属性，只能在内的内部访问
          console.log("I am eatting!");
        }
      }
      

      console.log(Person);
      console.log(typeof Person);


      const p1 = new Person();
      p1.eat();
      
      //实例访问类静态属性：undefined 无法访问do
      console.log("p1.userType", p1.userType);
      
      //无法访问实例私有属性，在类外部
      // console.log("p1.#userAgeName", p1.#userAgeName);

      console.log("Person.userType", Person.userType);//whitePerson
    </script>
  </body>
</html>
