<!--
  分类: vue2 / 基础语法
  主题: Vue 指令简写形式（: 与 @）
  要点:
    - v-bind:title 简写为 :title；v-on:click 简写为 @click
    - 易错点：写成 :bind:title 是无效写法，会被当作普通 attribute（不响应）
    - 修正：去掉多余的 bind:，改为 :title
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue 指令简写：: 与 @</title>
    <script src="../../libs/vue2.js"></script>
</head>
<body>

<div id="app1">
    <!-- 修正：原写法 :bind:title 是无效组合，正确写法是 :title（即 v-bind:title 简写） -->
    <div :title="msg">{{msg}}</div>

    <div @click="onClick">点我</div>
</div>


<script>
    var vm = new Vue({
        el: '#app1',
        data: {
            msg: '点击下边按钮'
        },
        methods: {
            onClick: function () {
                this.msg = "12444";
                console.log("onClick");
            }
        }
    });

</script>

</body>
</html>
