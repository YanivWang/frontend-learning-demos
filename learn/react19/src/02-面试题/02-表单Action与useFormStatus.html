<!--
  分类: react19 / 02-面试题
  主题: 表单 Action 与 useFormStatus
  要点:
    - 表单设置 action={serverAction} 后，子组件可用 useFormStatus 读 pending
    - useFormStatus 必须在 form 内部的函数组件中调用
    - 返回 pending、data、method、action 等，适合拆出 SubmitButton 子组件
    - ReactDOM.useFormStatus；与 useActionState 配合是 React 19 表单面试高频组合
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>面试 · useFormStatus</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 640px; line-height: 1.6; }
    .meta { font-family: ui-monospace, monospace; font-size: 0.85rem; background: #f6f8fa; padding: 0.75rem; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useActionState } = React;
    const { useFormStatus } = ReactDOM;

    async function submitComment(prev, formData) {
      await new Promise((r) => setTimeout(r, 800));
      const text = String(formData.get("comment") || "").trim();
      return text ? { ok: true, text } : { ok: false, error: "评论不能为空" };
    }

    function SubmitButton() {
      const { pending, data } = useFormStatus();
      return (
        <button type="submit" disabled={pending}>
          {pending ? "发布中…" : "发布评论"}
          {data && !pending ? "（含 FormData）" : ""}
        </button>
      );
    }

    function CommentForm() {
      const [result, formAction] = useActionState(submitComment, null);

      return (
        <form action={formAction}>
          <h2>useFormStatus 面试 demo</h2>
          <textarea name="comment" rows={3} placeholder="写点什么" style={{ width: "100%" }} />
          <div style={{ marginTop: "0.75rem" }}>
            <SubmitButton />
          </div>
          <p className="meta">
            pending 由 useFormStatus 提供，无需 props 下钻。
            {result?.ok && <span> 上次成功：{result.text}</span>}
            {result?.ok === false && <span> 错误：{result.error}</span>}
          </p>
        </form>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CommentForm />);
  </script>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">
  <style>
    .demo-nav { margin: 2.5rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e3e3e3; font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; }
    .demo-nav a { color: #0969da; text-decoration: none; }
  </style>
  <a href="/">目录</a>
</footer>
<!-- DEMO_NAV_END -->
</body>
</html>
