<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello React!</title>
    <script src="../jsLibrary/react.development.js"></script>
    <script src="../jsLibrary/react-dom.development.js"></script>

    <!-- 这里引入 babel.js 的目的是编译jsx语法,成javascript语法
     可以替换的库: browser.js (将 jsx 语法转为 javascript 语法)
     -->
    <script src="../jsLibrary/babel.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      /*
    React元素都是不可变的，当元素被创建之后，你是无法改变其内容和属性的
    更新界面的唯一方式，就是创建一个新的元素，然后把它传入ReactDOM.render()方法
    */

      let props = {};
      props.key1 = "1";
      props.key2 = "2";
      let ele = (
        <h1 {...props} key1="3">
          jianshu.com
        </h1>
      );
      console.log(ele);

      // 把元素封装成一个函数: 元素中的数据由函数的调用者传递过来
      //这个函数就是组件
      function Clock(props) {
        const element = (
          <div>
            <h1>当前的时间:</h1>
            <h2>{props.date.toLocaleTimeString()}</h2>
          </div>
        );

        return element;
      }

      function tick() {
        ReactDOM.render(<Clock date={new Date()} />, document.getElementById("root"));
      }

      setInterval(tick, 1000);
    </script>
  </body>
</html>
