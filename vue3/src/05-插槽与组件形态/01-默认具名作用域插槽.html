<!--
  分类: vue3 / 05-插槽与组件形态
  主题: 默认插槽 / 具名插槽 / 作用域插槽
  要点:
    - 插槽让父组件决定子组件某块区域渲染什么
    - 具名插槽用于多个插槽出口
    - 作用域插槽让子组件把数据传给插槽内容
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · 插槽</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      code { background: #f6f8fa; padding: 2px 5px; border-radius: 6px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
      .head { font-weight: 700; margin-bottom: 8px; }
      .foot { color: #666; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>默认插槽 / 具名插槽 / 作用域插槽</h1>
      <base-card>
        <template #header>文章列表</template>
        <template #default="{ item }">
          <strong>{{ item.title }}</strong>：{{ item.summary }}
        </template>
        <template #footer>共 {{ articles.length }} 篇</template>
      </base-card>

      <h2>面试回答</h2>
      <ul>
        <li>插槽是组件内容分发机制，子组件定义出口，父组件提供内容。</li>
        <li><code>#header</code> 是 <code>v-slot:header</code> 的缩写。</li>
        <li>作用域插槽常用于表格列、列表项、弹窗内容等需要父组件自定义渲染的场景。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      const BaseCard = {
        setup() {
          const articles = ref([
            { title: "响应式", summary: "Proxy + 依赖追踪" },
            { title: "组件通信", summary: "props / emit / provide" },
          ]);
          return { articles };
        },
        template: `
          <section class="card">
            <div class="head"><slot name="header"></slot></div>
            <div v-for="item in articles" :key="item.title">
              <slot :item="item"></slot>
            </div>
            <div class="foot"><slot name="footer"></slot></div>
          </section>
        `,
      };

      createApp({
        components: { BaseCard },
        setup() {
          const articles = ref([{ title: "x" }, { title: "y" }]);
          return { articles };
        },
      }).mount("#app");
    </script>
  </body>
</html>
