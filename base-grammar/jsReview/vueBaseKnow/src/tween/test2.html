<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/17.1.1/Tween.min.js"></script>
</head>
<body>

<script>
    let count = 0;
    animate();

    function animate() {
        console.log(count);
        count++;
        if (count < 10) {
            requestAnimationFrame(animate);//根据屏幕的刷新频率来执行回调函数
        }
    }
</script>

</body>
</html>
