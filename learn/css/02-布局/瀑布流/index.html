<!--
  分类: css / 02-布局 / 瀑布流
  主题: 用 column-count 实现纯 CSS 瀑布流
  要点:
    - column-count 把容器分成 N 列；column-gap 控制列间距
    - break-inside: avoid 防止单个 item 被强行截断到下一列
    - 配合 @media 在窄屏减少列数；缺点：从左到右逐列填充，与传统 JS 算法略不同
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS 瀑布流 · column-count</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; background: #f5f5f5; }
    h1 { font-size: 1.1rem; margin: 0 0 1rem; color: #333; }
    .masonry {
      column-count: 4;
      column-gap: 12px;
    }
    @media (max-width: 900px) { .masonry { column-count: 3; } }
    @media (max-width: 600px) { .masonry { column-count: 2; } }
    .item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 8px;
      padding: 1rem;
      color: #fff;
      font-size: 0.875rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }
    .h1 { height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); }
    .h2 { height: 120px; background: linear-gradient(135deg, #f093fb, #f5576c); }
    .h3 { height: 100px; background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .h4 { height: 140px; background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .h5 { height: 90px; background: linear-gradient(135deg, #fa709a, #fee140); }
    .h6 { height: 130px; background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
  </style>
</head>
<body>
  <h1>瀑布流布局（CSS column-count，无需 JS）</h1>
  <div class="masonry">
    <div class="item h1">卡片 1</div>
    <div class="item h2">卡片 2</div>
    <div class="item h3">卡片 3</div>
    <div class="item h4">卡片 4</div>
    <div class="item h5">卡片 5</div>
    <div class="item h6">卡片 6</div>
    <div class="item h2">卡片 7</div>
    <div class="item h3">卡片 8</div>
    <div class="item h1">卡片 9</div>
    <div class="item h4">卡片 10</div>
    <div class="item h5">卡片 11</div>
    <div class="item h6">卡片 12</div>
  </div>
