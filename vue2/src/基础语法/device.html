<!--
  分类: vue2 / 基础语法
  主题: 设备信息读取（与 Vue 无强关联，纯 BOM）
  要点:
    - devicePixelRatio：物理像素 / CSS 像素的比值，高清屏一般 ≥ 2
    - 易错点：window 没有 clientWidth；获取视口宽度用 window.innerWidth
    - window.screen 表示物理屏幕，与浏览器窗口/视口完全不同
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>设备信息：dpr / 视口 / 屏幕</title>
</head>
<body>

<script>
   let bt = window.devicePixelRatio;
   console.log("bt: " + bt);

   // window 上没有 clientWidth；获取视口宽度应使用 window.innerWidth
   let screenX = window.innerWidth;
   console.log("screenX: " + screenX);

   let screenY = window.screen;
   console.log("screenY: " + screenY);
</script>

</body>
</html>
