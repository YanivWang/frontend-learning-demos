<!--
  分类: javascript / 04-ES6+ / 集合
  主题: Map 键值对集合
  要点:
    - 与 Object 不同，Map 允许任意类型（包括对象、Symbol）作为键
    - 维护插入顺序，迭代时按插入顺序遍历
    - 常用 API：set/get/has/delete/size/forEach/entries/keys/values
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map</title>
</head>
<body>
  <script>
    let dog = {
      name: "豆豆",
      eat: ()=>{

      }
    }
    
    //Map类型让js语言真正拥有了存储键值对的数据结构，并且map的key可以任何类型
    //与 Object 只能使用数值、字符串或符号作为键不同,Map 可以使用任何 JavaScript 数据类型作为键
    //与 Object 类型的一个主要差异是，Map 实例会维护键值对的插入顺序，因此可以根据插入顺序执行迭代操作
    //Map的迭代顺序是按照插入顺序来的
    const map = new  Map();
    map.set("name", "wangcheng")
    map.set("age", 30)

    map.set(1, 123)
    map.set(Symbol("address"), {
      province: "湖北",
      city: "襄阳"
    })

    map.set(dog, "I am dog!");

    map.forEach((value,key)=>{
      console.log(value,"=",key);
    })

    map.entries()
  </script>
</body>
</html>
