<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>


    <style>
        .title {
            text-align: center;
        }

        .jsonEdit {
            max-width: 900px;
            margin: auto;
            height: 500px;
        }

        .jsonEdit .container {
            height: 100%;
            display: flex;
            justify-content: space-between;
        }

        .jsonEdit .container > div {
            border: 1px solid #ddd;
            flex: 1;
        }

        .inputArea textarea {
            height: 100%;
            width: 100%;
            border: none;
            background-color: transparent;
            outline: none;
        }

        .editArea {
        }

        pre {
            margin: 0;
        }

        .expanBtn {
            border: 1px solid #999;
            text-align: center;
            color: #999;
            display: inline-block;
            width: 15px;
            height: 15px;
            line-height: 15px;
            cursor: pointer;
        }

        .expanBtn:active {
            background-color: #999;
        }

        .panel.isClose {
            height: 0;
            overflow-y: hidden;
        }
    </style>
</head>

<body>
<h2 class="title">JSON 层级收缩和展示</h2>
<div>(大体上的思路已经实现, 细节需要再补充......)</div>
<div id="app">
    <div class="jsonEdit">
        <div class="container">
            <div class="inputArea">
                <textarea v-model="inputValue"></textarea>
            </div>
            <div class="editArea">
                <!--<pre>{{formatJson}}</pre>-->
                <div class="panel" v-if="formatJson">
                    {{"{"}}
                    <div class="expanBtn" @click="expanBtnHandle('root')">-</div>
                    <div class="panel" :class="{'isClose': isClose}">
                        <div v-for="(value, name) in formatJson">
                            <comp-item :itemkey="name" :itemvalue="value" :type="getDataType(value)"
                                       :ptype="JSON_OTHER">
                            </comp-item>
                        </div>
                    </div>
                    {{"}"}}
                </div>
            </div>
        </div>
        <div>
            <button @click="transformToJson">转json</button>
        </div>
    </div>
    <br><br><br><br>

</div>

<script>
    var JSON_OBJ = Symbol.for("json_object");
    var JSON_ARRAY = Symbol.for("json_array");
    var JSON_OTHER = Symbol.for("json_other");

    function getDataType(obj) {
        var tempStr = Object.prototype.toString.call(obj);
        if (tempStr === "[object Object]") {
            return JSON_OBJ;
        } else if (tempStr === "[object Array]") {
            return JSON_ARRAY;
        } else {
            return JSON_OTHER;
        }
    }

    //############################递归子组件############################

    Vue.component('comp-item', {
            data: function () {
                return {
                    space: " ",
                    JSON_OBJ: JSON_OBJ,
                    JSON_ARRAY: JSON_ARRAY,
                    JSON_OTHER: JSON_OTHER
                }
            },
            props: ['itemkey', 'itemvalue', 'type', 'ptype'],
            methods: {
                getDataType(obj) {
                    return getDataType(obj);
                },
                expanBtnHandle() {

                },
            },
            template: `
                <div>
                  <template v-if="ptype === JSON_OBJ">
                     &nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                  </template>
                  <template v-else-if="ptype === JSON_ARRAY">
                     &nbsp;&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                  </template>

                  {{'"' + itemkey + '"'}}:

                  <template v-if="type === JSON_OBJ">
                     {{"{"}}
                    <template v-for="(value, name) in itemvalue">
                      <comp-item :itemkey="name" :itemvalue="value" :type="getDataType(value)" :ptype="getDataType(itemvalue)">
                      </comp-item>
                    </template>
                     &nbsp;&nbsp; &nbsp;&nbsp;{{"}"}}
                  </template>

                  <template v-else-if="type === JSON_ARRAY">
                     to do: {{itemvalue}}
                  </template>

                  <template v-else>
                     {{'"' + itemvalue + '"'}}
                  </template>
                </div>
             `
        }
    );


    //############################根实例############################
    //测试数据
    let testJson = {
        "name": "百度",
        "age": 30,
        "address": {
            "province": "北京",
            "city": "北京",
            "country": "大兴"
        }
    };


    var app = new Vue({
        el: "#app",
        data: function () {
            return {
                inputValue: JSON.stringify(testJson, null, 2),
                formatJson: null,
                JSON_OBJ: JSON_OBJ,
                JSON_ARRAY: JSON_ARRAY,
                JSON_OTHER: JSON_OTHER,
                isClose: false
            }
        },
        methods: {
            getDataType(obj) {
                return getDataType(obj);
            },
            expanBtnHandle(type) {
                if (type === 'root') {
                    this.isClose = !this.isClose;
                }
            },
            transformToJson: function () {
                if (!this.inputValue.trim()) return;
                var tempJson;
                try {
                    tempJson = JSON.parse(this.inputValue)
                } catch (e) {
                    console.log(e);
                    alert("json格式不合法");
                    return;
                }
                //this.formatJson = JSON.stringify(tempContent, null, 4);
                this.formatJson = tempJson;
            }
        }
    })

</script>
</body>

</html>
