<!--
  分类: react / JSX
  主题: 条件渲染中的「短路求值」陷阱
  要点:
    - {falsyValue && <X/>} 只有当 falsyValue 为 false / null / undefined 时不渲染
    - 反面教材：{arr.length && <X/>} 当 arr.length === 0 时短路返回 0，会被渲染成「0」文本节点
    - 安全写法：{arr.length > 0 && <X/>} 或 {Boolean(arr.length) && <X/>}
    - React 18 统一用 createRoot(...).render(...)，ReactDOM.render 已废弃
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React · JSX 短路渲染陷阱</title>
    <script src="../../libs/react.development.js"></script>
    <script src="../../libs/react-dom.development.js"></script>
    <script src="../../libs/babel.min.js"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const arr = [];
    const element = (<div>
        {
            // 反面教材：arr.length 为 0 时，{0 && ...} 整体得 0，React 会把它当文本渲染出来
            arr.length && (<div>我是京东物流</div>)
        }
        {
            undefined && (<div>我是京东物流</div>)
        }
        {
            null && (<div>我是京东物流</div>)
        }
        {
            false && (<div>我是京东物流</div>)
        }

        {/* 推荐写法：用比较运算符把值显式转 boolean，避免 0 被渲染 */}
        { arr.length > 0 && (<div>正确写法：长度大于 0 才渲染</div>) }
    </div>)

    // React 18 使用 createRoot 渲染
    ReactDOM.createRoot(document.getElementById('root')).render(element);
</script>
