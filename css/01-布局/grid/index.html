<!--
  分类: css / 01-布局 / grid
  主题: Grid 二维布局系统集合演示
  要点:
    - grid1: 固定像素列；grid2: 百分比；grid3: repeat 简写
    - grid4: 用 grid-template-areas 把单元格命名，对比纯 repeat 列写法
    - grid5: auto-fill；grid6/7: fr & minmax；grid8: auto
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <title>Grid 布局练习</title>

    <style>
        /*grid1 start*/
        .grid1 {
            display: grid;
            grid-template-columns: 100px 200px 300px;
            grid-template-rows: 60px 60px 60px;
        }

        .grid1 > div {
            border: 1px solid #ddd;
        }

        /*grid1 end*/

        /*grid2 start*/
        .grid2 {
            display: grid;
            grid-template-columns: 33.33% 33.33% 33.33%;
            grid-template-rows: 60px 60px 60px;
        }

        .grid2 > div {
            border: 1px solid #ddd;
        }

        /*grid2 end*/


        /*grid3 start*/
        .grid3 {
            display: grid;
            grid-template-columns: repeat(3, 33.33%);
            grid-template-rows: repeat(3, 60px);
        }

        .grid3 > div {
            border: 1px solid #ddd;
        }

        /*grid3 end*/


        /*grid4 start：用 grid-template-areas 命名单元格，更适合语义化布局 */
        .grid4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(2, 60px);
            grid-template-areas:
                "age  name    address"
                "age2 name2   address2";
        }

        .grid4 > div {
            border: 1px solid #ddd;
        }

        .grid4 > div:nth-child(1) { grid-area: age; }
        .grid4 > div:nth-child(2) { grid-area: name; }
        .grid4 > div:nth-child(3) { grid-area: address; }
        .grid4 > div:nth-child(4) { grid-area: age2; }
        .grid4 > div:nth-child(5) { grid-area: name2; }
        .grid4 > div:nth-child(6) { grid-area: address2; }

        /*grid4 end*/

        /*grid5 start*/
        .grid5 {
            width: 400px;
            height: 400px;
            margin: auto;
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(3, 60px);
        }

        .grid5 > div {
            border: 1px solid #ddd;
        }

        /*grid5 end*/


        /*grid6 start*/
        .grid6 {
            border: 1px solid #ddd;
            width: 400px;
            height: 400px;
            margin: auto;
            margin-top: 50px;
            display: grid;
            grid-template-columns: 100px 1fr 2fr;
            grid-template-rows: repeat(3, 60px);
        }

        .grid6 > div {
            border: 1px solid #ddd;
        }

        /*grid6 end*/


        /*grid7 start*/
        .grid7 {
            border: 1px solid #ddd;
            width: 400px;
            height: 400px;
            margin: auto;
            margin-bottom: 50px;
            display: grid;
            grid-template-columns: 1fr 2fr minmax(90px, 0.9fr);
            grid-template-rows: repeat(3, 60px);
        }

        .grid7 > div {
            border: 1px solid #ddd;
        }

        /*grid7 end*/

        /*grid8 start*/
        .grid8 {
            border: 1px solid #ddd;
            width: 400px;
            height: 400px;
            margin: auto;
            margin-bottom: 50px;
            display: grid;
            grid-template-columns: auto auto auto auto;
            grid-template-rows: repeat(3, 60px);
        }

        .grid8 > div {
            border: 1px solid #ddd;
        }

        /*grid8 end*/
    </style>
</head>
<body>

<script>
    /*
    * flex布局是基于轴线的布局只能指定项目针对轴向的位置，可以看成是一维布局
    * grid布局将容器划分为行和列产生单元格，然后指定项目所在的单元格，可以看成是二维布局
    * 1.采用网格布局的区域叫做容器，内部的直接子元素叫做项目，布局只对顶级子元素有效
    * */
</script>

<div class="grid8">
    <div>age</div>
    <div>name</div>
    <div>address</div>
    <div>age</div>
    <div>name</div>
    <div>address</div>
</div>

<div class="grid7">
    <div>age</div>
    <div>name</div>
    <div>address</div>
    <div>age</div>
    <div>name</div>
    <div>address</div>
</div>

<div class="grid6">
    <div>age</div>
    <div>name</div>
    <div>address</div>
    <div>age</div>
    <div>name</div>
    <div>address</div>
</div>

<div class="grid5">
    <div>age</div>
    <div>name</div>
    <div>address</div>
    <div>age</div>
    <div>name</div>
    <div>address</div>
</div>

    <div>address</div>
</div>

<div class="grid2">

    <div>address</div>
</div>

<div class="grid3">

    <div>name</div>

</div>

<div class="grid4">

    <div>name</div>
    <div>address</div>

</div>


</body>
</html>
