<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="../../lib/vue.js"></script>
    <!--引入element组件库：样式和组件-->
    <link rel="stylesheet" href="../../lib/element/index.css">
    <script src="../../lib/element/index.js"></script>

    <style>
        .el-header{
            background-color: #B3C0D1;
            text-align: center;
            line-height: 40px;
        }

        .el-main{
            background-color: #E9EEF3;
            text-align: center;
            line-height: 160px;
        }

        .el-aside{
            background-color: #4f4f4f;
            text-align: center;
            line-height: 160px;
        }

        .el-footer{
            background-color: #B3C0D1;
            text-align: center;
            line-height: 40px;
        }
    </style>
</head>
<body>

<div id="app">
    <el-container>
        <el-header>Header</el-header>
        <el-main>Main</el-main>
        <el-footer>Footer</el-footer>
    </el-container>

    <br>
    <br>

    <el-container>
        <el-header>Header</el-header>

        <el-container>
            <el-aside>Aside</el-aside>
            <el-main>Main</el-main>
        </el-container>

        <el-footer>Footer</el-footer>
    </el-container>
</div>

<script>

    let comp = {
        data() {
            return {
                inputValue: "init value",
                visible: false
            }
        },
        methods: {}
    };

    let Ctor = Vue.extend(comp);
    new Ctor().$mount("#app");
</script>

</body>
</html>
