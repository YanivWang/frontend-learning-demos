name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run maintenance tests
        run: npm test

      - name: Validate demos, docs, coverage, and smoke checks
        run: npm run validate

      - name: Check working tree clean after scripts
        run: |
          git diff --exit-code manifest.json \
            docs/.vitepress/sidebar.generated.mts docs/demos/index.md docs/index.md docs/demos/search-index.md \
            apps/javascript/README.md apps/css/README.md apps/vue2/README.md apps/vue3/README.md \
            apps/react18/README.md apps/react19/README.md apps/typescript/README.md apps/demos/README.md || (
            echo "::error::manifest.json / VitePress 导航 / 模块 README 与脚本输出不一致，请本地运行 npm run build:index && npm run sync:readmes"
            exit 1
          )

      - name: Build VitePress docs site
        run: npm run docs:build

  playwright:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build docs site and inject nav
        run: npm run docs:build

      - name: Start static server
        run: npx --yes serve docs/.vitepress/dist -p 4173 &
        
      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:4173/

      - name: Playwright sample smoke
        run: npm run validate:playwright
        env:
          DEMO_BASE_URL: http://127.0.0.1:4173
