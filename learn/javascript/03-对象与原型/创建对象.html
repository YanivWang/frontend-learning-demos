<!--
  分类: javascript / 03-对象与原型
  主题: 创建对象的多种方式
  要点:
    - 原生构造函数（new Object/Array）vs 对象字面量 vs 自定义构造函数
    - 实例自带 constructor 指向其构造函数（实际在 __proto__ 上）
    - delete 删属性 vs 赋值 undefined：前者从对象上彻底移除键
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创建对象</title>
  </head>
  <body>
    <script>
      // 像 Object 和 Array 这样的原生构造函数，运行时可以直接在执行环境中使用。
      // 原生构造函数: Object Array

      //方式一: 创建对象的传统方式: new Object
      const o1 = new Object();
      console.log("Object>>>", Object);
      console.log("Object原生构造函数的实例>>>", typeof o1); //object
      console.log("typeof Object", typeof Object); //function

      //实例的constructor的属性(实际上存在于其__proto__属性上<就是其原型上>)，这个东西指向实例的构造函数(就是创建该实例的构造函数)
      //这就是判断实例类型的依据
      console.log(o1.constructor === o1.__proto__.constructor);

      console.log("o1.__proto__", typeof o1.__proto__);//object
      console.log("Object.prototype", typeof Object.prototype);

      const arr1 = new Array();
      console.log("Array>>>", Array);
      console.log("Array原生构造函数的实例>>>", typeof arr1); //object
      console.log("typeof Array", typeof Array); //function

      //方式二:
      let dog = {
        name: "Pipe",
        age: 3
      }
      console.log("dog", dog);
      console.log("typeof dog", typeof dog);
      console.log("dog.__proto__", dog.__proto__);


      //1.创建一个名为Person构造函数
      //1.1 构造函数是用来创建特定类型的对象的
      function Person(name, age) {
        this.name = name;
        this.age = age;
        this.sayHello = function () {
          console.log("Hello EveryOne!");
        };
      }
      const p1 = new Person("wangcheng", 30);
      console.log("Person自定义构造函数的实例>>>", typeof p1); //object
      console.log(p1.constructor === p1.__proto__.constructor);

      console.log(p1 instanceof Person); //通常用于判断某个对象是否是某个构造函数的实例

      // const typeFun = Object.prototype.toString.call;
      console.log(Object.prototype.toString.call(p1)); //[object Object]

      let date = new Date();
      let reg = /abc/;
      console.log("typeof date>>>", typeof date); //object
      console.log("typeof reg>>>", typeof reg); //object


      // ============ 动态扩展属性 ============
      // JS 对象可以随时用 "." 或 "[]" 加新属性
      let pig = {
        name: "佩奇",
        age: 10,
        getName: function () { return this.name; }
      };
      pig.weight = "100kg";          // 点号扩展
      pig["color"] = "粉色";          // 方括号扩展（适合属性名是变量/含特殊字符）
      console.log("扩展后:", pig);


      // ============ 删除属性的两种方式 ============
      // 方式 A: 赋值为 undefined  ❌ 只是把值清空，键还在
      pig.age = undefined;
      console.log("'age' in pig (赋 undefined 后):", "age" in pig); // true
      console.log("Object.keys(pig):", Object.keys(pig));            // 仍包含 'age'

      // 方式 B: delete 关键字  ✅ 真正从对象上删除这个键
      delete pig.weight;
      console.log("'weight' in pig (delete 后):", "weight" in pig); // false
      console.log("Object.keys(pig):", Object.keys(pig));            // 不再包含 'weight'

      // 总结：
      //   - 要"暂时清空但保留键" → 赋 undefined / null
      //   - 要"彻底删除键" → delete
      //   - delete 对用 var/let/const 声明的变量无效（严格模式还会报错）


      // ============ 对象字面量 vs new Object() ============
      // 两者等价，但字面量更直观、性能更好，是首选
      const a1 = new Object();
      a1.name = "A";
      const a2 = { name: "B" };
      console.log(a1, a2);
    </script>
  </body>
</html>
