<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Class</title>
  </head>
  <body>
    <script> 
      //1.静态初始化块
      //父类的任何静态初始化都是先进行的，然后才是子类的初始化
      //static变量声明，static静态初始化块逻辑, 会在类初始化的时候就执行，而不是new Pig()实例的时候
      //这些语句是同步执行的,按照顺序执行
      //静态代码块的作用域嵌套在类主体的词法作用域内，并且可以访问类内声明的私有名称，而不会导致语法错误。
      class Pig {
        //类静态属性
        static consoleP = console.log("consoleP");//类初始化的时候会执行
        static animalId = "10001";
        
        //类实例属性
        type = "animal"//类初始化的时候，不会执行

        static {
          console.log("type", this.type)//undefined

          var a = 1;
          console.log(a);

          console.log(this.animalId)

          //初始化块可以引用其上方的字段值，但不能引用其下方的字段值
          console.log(this.speciel)
        }

        static speciel = "pig";

        static {
          console.log(this.speciel)

          //静态代码块中的 this 是指 类的构造函数对象(class Pig)
          console.log(this)
        }

        static #privateId="privateId123"
        static {
          //可以访问类的静态私有属性
          console.log(this.#privateId);
        }

        constructor(name) {
          console.log("Pig 构造器>>", name);
          this.name = name;
        }
      }
    </script>
  </body>
</html>
