<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learn Korean, Japanese, Chinese and more languages - LingoDeer</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <style>
        /*toolbar start*/
        .w-e-toolbar {
            flex-wrap: wrap;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .w-e-text {
            padding: 0 10px;
            overflow-y: scroll;
            min-height: 300px;
        }

        .w-e-text-container {
            position: relative;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        /*toolbar end*/

        .postEditArea {
            width: 550px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            flex-direction: column;
        }

        .postEditArea > div {
            width: 100%;
        }

        .titleArea {

        }

        .contentArea {
            margin-top: 10px;
        }

        .toolbar {
            border: 1px solid #ccc;
        }

        .text {
            border: 1px solid #ccc;
            min-height: 300px;
        }

        textarea {
            width: 100%;
            resize: none !important;
            outline: none !important;
            box-shadow: none !important;
        }

        /* user show content */
        .userInputArea {
            width: 550px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div class="postEditArea">
    <div class="titleArea">
        <!--
            <input value="   "><script>alert('XSS');</script>   ">

            <input value=" "/><script>alert('xss 爸爸')</script> ">

            <a href="javascript:alert('哈哈哈哈')">点击我</a>

            <a href="javascript:alert('哈哈哈哈')">点击我</a>

            <a href="javAscRipt:alert('哈哈哈哈')">点击我</a>

            <a href=" javAscRipt:alert('哈哈哈哈')">点击我</a>

            //后端输入
            <a href="%20javAscRipt:alert('哈哈哈哈')">点击我</a>

            <textarea rows="1" cols="50" class="form-control title" placeholder="Title">
                 <script>alert("爸爸")</script>
            </textarea>
        -->
        <textarea rows="1" cols="50" class="form-control title" placeholder="Title"></textarea>
    </div>
    <div class="contentArea">
        <div id="div1" class="toolbar"></div>
        <div id="div2" class="text">
        </div>
    </div>
    <button class="submitBtn">提交</button>
</div>


<div class="userInputArea">
    <div class="userTitle"></div>
    <div class="userContent"></div>
</div>


<script src="./lib/wangEditor.js"></script>
<script>
    console.log("wangEditor....");

    let E = window.wangEditor;
    let editor = new E("#div1", "#div2");

    //menus
    editor.customConfig.menus = [
        'head',  // 标题
        'bold',  // 粗体
        'fontSize',  // 字号
        'fontName',  // 字体
        'italic',  // 斜体
        'underline',  // 下划线
        'foreColor',  // 文字颜色
        'backColor',  // 背景颜色
        'link',  // 插入链接
        'list',  // 列表
        'justify',  // 对齐方式
        'image',  // 插入图片
        'table',  // 表格
        'undo',  // 撤销
        'redo'  // 重复
    ];

    //lang
    editor.customConfig.lang = {
        "设置标题": "title",
        "字号": "font size",
        "正文": "content",
        "字体": "font famaily",
        "文字颜色": "font color",
        "背景色": "bg color",

        "图片链接": "picture link",
        "链接文字": "link text",
        "链接": "link",

        "设置列表": "set list",
        "无序列表": "un order list",
        "有序列表": "order list",
        "对齐方式": "align style",
        "靠左": "left",
        "居中": "center",
        "靠右": "right",

        "插入图片": "insert picture",
        "网络图片": "net picture",

        "插入表格": "insert table",
        "插入": "insert",

        "创建": "create",
        "行": "rows",
        "列的": "cols",
        "表格": " table"
    };
    editor.create();

    $(".submitBtn").unbind().bind("click", function () {
        //通过text html等方法明确告知浏览器当前要插入的是什么类型的内容

        //title
        let title = $("textarea.title").val();
        $(".userInputArea .userTitle").text(title);

        //content
        let htmlContent = editor.txt.html();
        $(".userInputArea .userContent").html(htmlContent);

        console.log(htmlContent);
    });


    //https://webjson.lingodeer.com/mediaSource/static/images/landPage/userHead/europe/a5.png
</script>

</body>
</html>
