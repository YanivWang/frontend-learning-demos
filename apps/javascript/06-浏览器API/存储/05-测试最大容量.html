<!--
  分类: javascript / 06-浏览器API / 存储
  主题: 测试 localforage 最大可写容量
  要点:
    - 不同浏览器、不同后端（IndexedDB/WebSQL/localStorage）限制差异巨大
    - 一次写入巨大数组可触发 QuotaExceededError，需要 try/catch
    - JS 字符串按 UTF-16 存储，一个字符约 2 字节（emoji 等更多）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试最大容量</title>
    <script src="lib/localforage.js"></script>
</head>
<body>

<script>
    // 压测：约 550 万次 push，每条 testStr 为 10 个字符，用于探测 IndexedDB 配额上限
    localforage.clear().then(function () {
        localforage.keys().then(function (keys) {
            console.log("keys:" + keys);

            //纯净版测试
            var startTime = new Date().getTime();
            var array = [];
            var testStr = "ABCDEFGEFG";
            for (var i = 0; i < 10000 * 100 * 5.5; i++) {
                array.push(testStr);
            }
            localforage.setItem("bigData", array).then(function (value) {
                // 粗估字符数：元素个数 × 每条字符串长度，再换算为 MB（非精确字节数）
                console.log(value.length * testStr.length / 1024 / 1024 + "m");

                var endTime = new Date().getTime();
                console.log("用时：" + (endTime - startTime) / 1000 + " s");
            }).catch(function (err) {
                console.log("存储错误：" + err);
            });
        });
    }).catch(function (err) {
        console.log("清空错误：" + err);
    });


</script>
