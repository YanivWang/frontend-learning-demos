<!--
  分类: css / 07-现代特性 / 01-has选择器
  主题: :has() 父选择器与条件样式
  要点:
    - :has() 根据子元素或后续兄弟是否存在来匹配祖先/自身，俗称「父选择器」
    - 卡片 :has(input:checked) 高亮选中项，无需 JS 切换 class
    - form :has(:invalid) 可在存在无效表单项时提示提交区
    - 浏览器支持已较广（Chrome 105+、Safari 15.4+、Firefox 121+），降级时样式不生效但不影响布局
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS :has() 选择器</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; max-width: 720px; }
    h1 { font-size: 1.25rem; }
    .cards { display: grid; gap: 12px; margin: 1.5rem 0; }
    .card {
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 14px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:has(input[type="radio"]:checked) {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
      background: #f6f8fa;
    }
    .card label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    form {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      padding: 16px;
      max-width: 420px;
    }
    form:has(:invalid) .submit-hint { color: #cf222e; }
    form:has(:valid) .submit-hint { color: #1a7f37; }
    input { padding: 6px 8px; margin: 6px 0 12px; width: 100%; box-sizing: border-box; }
    .submit-hint { font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>:has() — 根据子节点状态匹配父元素</h1>
  <p>选中下方卡片，观察 <code>.card:has(input:checked)</code> 如何高亮父级，无需 JavaScript。</p>

  <div class="cards">
    <div class="card">
      <label><input type="radio" name="plan" value="basic" checked /> 基础版</label>
    </div>
    <div class="card">
      <label><input type="radio" name="plan" value="pro" /> 专业版</label>
    </div>
    <div class="card">
      <label><input type="radio" name="plan" value="team" /> 团队版</label>
    </div>
  </div>

  <h2>表单校验提示</h2>
  <form>
    <label>邮箱（必填）</label>
    <input type="email" required placeholder="you@example.com" />
    <p class="submit-hint">form:has(:invalid) 时显示红色提示；全部合法时变绿。</p>
  </form>
