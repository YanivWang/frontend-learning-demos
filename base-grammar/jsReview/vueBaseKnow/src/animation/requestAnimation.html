<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let requestAnimation = window.requestAnimationFrame;

    //递归调用必须有一个明确的结束条件，否则会到导致堆栈溢出
    function animation1() {
        console.log("动画...");
        animation1();
    }

    //animation1(); //错误

    function animation2() {
        requestAnimation(animation2);
        console.log("动画...");
    }
    animation2();
</script>

</body>
</html>
