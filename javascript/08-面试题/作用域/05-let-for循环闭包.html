<!--
  分类: javascript / 08-面试题 / 作用域
  主题: let + for 循环的块作用域闭包
  要点:
    - let 让每次循环迭代创建独立的块作用域，i 各自独立
    - 输出 0..4；如果换成 var 则全是 5（共享同一个 i）
    - 现代代码优先用 let/const 取代 var
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>面试题 - let for 循环闭包</title>
</head>
<body>

<script>
    let retArray = [];
    for (let i = 0; i < 5; i++) {
        retArray[i] = function () {
            console.log(i);
        }
    }

    retArray.forEach((item) => {
        item();
    })
</script>

</body>
</html>
