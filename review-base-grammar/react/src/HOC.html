<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <script src="../libs/react18.js"></script>
    <script src="../libs/react-dom18.js"></script>
    <script src="../libs/babel.js"></script>
</head>
<body>

<script type="text/babel">
    //1.高阶组件HOC是用来复用组件的逻辑的一种设计模式。
    //2.高阶组件就是参数是组件，返回值是新组件的函数
    //3.高阶组件是将组件转换为一个新组件
    //4.react第三方库redux中常用HOC，比如redux的connect
    //5.高阶组件是参数为组件，返回值为新组件的一个函数
    // const EnhancedComponent = higherOrderComponent(WrappedComponent)
    class Person extends React.Component {
        constructor(props) {
            super(props);

            this.state = {
                name: "王成",
                age: 30
            };
        }

        componentDidMount() {
            console.log("componentDidMount...");
        }
    }

</script>

</body>
</html>
