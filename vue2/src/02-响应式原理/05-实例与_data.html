<!--
  分类: vue2 / 02-响应式原理
  主题: 实例 vm 与 _data 的关系
  要点:
    - data 中字段会被代理到 vm 上：vm.message === vm._data.message
    - vm.data 不存在；想拿原始 data 对象用 vm.$data 或 vm._data
    - mounted 时模板已渲染完毕，但子组件不一定完成挂载
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 实例与 _data</title>
    <script src="../../libs/vue.js"></script>
  </head>
  <body>
    <div id="app">{{ message }}</div>

    <script>
      new Vue({
        data() {
          return {
            message: "你好vue!",
          };
        },
        el: "#app",
        mounted(){
          console.log("组件挂载...");

          console.log(this);
          console.log(this.data);
          console.log(this._data);
        }
      });
    </script>
  </body>
</html>
