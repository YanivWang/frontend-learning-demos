<!--
  分类: javascript / 08-面试题 / 作用域
  主题: var 与 function 同名提升
  要点:
    - 预编译阶段：函数声明先提升、后者覆盖前者；var 提升但不覆盖已有值
    - 执行阶段：alert(a) 显示当前 a 的值（可能是函数或被 var 改写后的数字）
    - 输出顺序：function → 1 → 1 → 3 → 3
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>变量提升经典题 · var6</title>
</head>
<body>
  <h1>var + function 同名提升经典题</h1>
  <p>打开控制台查看输出，思考为什么是 4 → 1 → 1 → 3 → 3。</p>
  <script>
    /*
      预编译阶段：
        1. function 声明会被整体提升，且后者覆盖前者 → a = function a(){ alert(4) }
        2. var a 声明会被提升但不赋值，因变量已经存在 function 同名，所以不会覆盖

      执行阶段：
        alert(a)  → 此时 a 是后那个 function（alert 4 的那个）的引用，打印「函数定义」
                    （现代浏览器中实际显示 "function a() { alert(4); }"）
        var a = 1 → a 被重新赋值为 1
        function a(){ alert(2) }  → 函数声明已在预编译期处理，本语句执行期不再执行
        alert(a)  → 1
        var a = 3 → a 重新赋值为 3
        function a(){ alert(4) }  → 同上，执行期忽略
        alert(a)  → 3
    */
    alert(a);
    var a = 1;
    function a() { alert(2); }
    alert(a);
    var a = 3;
    alert(a);
    function a() { alert(4); }
    alert(a);
  </script>
</body>
</html>
