<!--
  分类: javascript / 06-浏览器API / 存储
  主题: FileReader 读取文件并存入 localforage
  要点:
    - readAsDataURL 把文件读成 base64 字符串；下方用 result.length×2 粗算 UTF-16 字符占用
    - 大文件直接读 dataURL 内存吃紧，更适合 readAsArrayBuffer / Blob 存储
    - 始终监听 onloadend / onerror，便于在异常时给出反馈
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FileReader 读取并存储文件</title>
    <script src="lib/localforage.js"></script>
</head>
<body>

<input onchange="readFile(this)" type="file">

<script>
    function readFile(input) {
        let file = input.files[0];
        let reader = new FileReader();
        reader.onloadend = function (e) {
            let fileData = e.target.result;

            _storeData(fileData);
        };
        reader.readAsDataURL(file);
    }

    function _storeData(fileData) {
        localforage.clear().then(function () {
            localforage.keys().then(function (keys) {
                console.log("keys:" + keys);

                console.log("file size: " + fileData.length * 2);
                let b = fileData.length * 2;
                let kb = b / 1024;
                console.log("b: " + b);
                console.log("kb: " + kb);

                localforage.setItem("bigData", fileData);
            });
        }).catch(function (err) {
            console.log(err);
        });
    }
</script>

</body>
</html>
