<!--
  分类: javascript / 06-浏览器API / 存储
  主题: localforage 基础 API
  要点:
    - localforage 是「IndexedDB / WebSQL / localStorage」的统一封装
    - 所有 API 返回 Promise；不会被同步阻塞
    - 常用方法：setItem/getItem/removeItem/clear/keys/length/iterate
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>localforage 基础 API</title>
    <script src="lib/localforage.js"></script>
</head>
<body>

<script>
    //set 是异步的
    localforage.setItem("key", {"name": "王成"}).then(function (value) {
        console.log("1:" + JSON.stringify(value));
    }).catch(function () {
        console.log("error");
    });

    localforage.getItem("key").then(function (value) {
        console.log("2:" + JSON.stringify(value));
    }).catch(function () {
        console.log("error");
    });

    //获取离线仓库的key的数量
    localforage.length().then(function (numberOfKeys) {
        console.log("5:" + numberOfKeys);
    }).catch(function (err) {
        console.log(err);
    });

    localforage.clear().then(function () {
        console.log("7:" + "empty");
    }).catch(function (err) {
        console.log(err);
    });

    localforage.removeItem("key").then(function () {
        console.log("8:" + "success");
    }).catch(function () {
        console.log("error");
    });

    //获取数据库中所有的key的名称
    localforage.keys().then(function (keys) {
        console.log("6:" + keys);
    }).catch(function (err) {
        console.log(err);
    });



</script>

</body>
</html>
