<script>
    function weightedRand(spec) {
        var i, j, table = [];
        for (i in spec) {
            for (j = 0; j < spec[i] * 100; j++) {
                table.push(i);
            }
        }
        return table[Math.floor(Math.random() * table.length)];
    }
    var res = weightedRand({10: 0.28, 5: 0.18, 2: 0.18, 3: 0.18, 8: 0.18});
</script>
