<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //事件
    var testDiv = document.getElementById("testDiv");
    console.log("1:" + testDiv);

    //网页加载完毕
    window.onload = function (ev) {
        testDiv = document.getElementById("testDiv");
        console.log("2:" + testDiv);

        var str = "wangcheng";

        var char = str[3];//字符串，也可以使用类似于数组的索引的方式访问
        console.log(char);

        //字符串的内置属性 length
        var length = str.length;
        console.log("长度：" + length);

        var arry = [];
        console.log(arry.length);

        //js中不管是数组长度，还是字符串长度，都使用length属性

        //如果字符串中包含双引号使用反斜杠 \ 转义字符，转义字符将特殊字符，转换成普通的字符
        var string = "we are the '哈哈' super \"star\"";
        console.log(string);

        var str1 = "123qwe";//javascript 是原始值
        var str2 = new String("123qwe");//javascript 对象


        console.log(typeof str1);
        console.log(typeof str2);

        console.log(str1 == str2);//js会强制转换成同类型的，然后进行比较(值)

        console.log(str1 === str2);// === 是绝对相等，不仅要求类型相等，还要求值相等

        console.log(str1.constructor);//返回创建字符串的函数
        console.log(str2.constructor);


        var strMe = "Abcdef";
        var ch1 = strMe.charAt(1);
        var ch2 = strMe[1];
        var code = strMe.charCodeAt(0);//返回指定索引位置字符的unicode

        //a 97  A 65
        var ch3 = String.fromCharCode(65);
        console.log(ch3);


        var sortArray = [3, 7, 9, 8, 4];

        //随机打乱数组
        sortArray.sort(function () {
            return Math.random() - 0.5;
        });

        //冒泡排序的方法
        sortArray.sort(function (a, b) {
            return a - b;
        });

        //会直接改变原始的数组
        console.log(sortArray);

        //字符串数组的排序
        var strArray = ["bd", "ab", "c", "aa", "be", "bf"];
        strArray.sort(function (a, b) {
            if (a.length === b.length) {
                return a.localeCompare(b);
            } else {
                return a.length - b.length;
            }
        });
        console.log(strArray.toString());

        var testStr1 = "abc";
        var testStr2 = "def";

        var resultStr = testStr1.concat(testStr2);//返回连接后的新串
        console.log(resultStr);

        //toString();将其它类型的变量转成字符串
        console.log(strArray.toString());

        var person = {
            "name": "zhang",
            "age": 23
        };
        console.log(person.toString());//不能转换 undefined null
        console.log(String(undefined));

        //将其它类型转成字符串
        console.log(true.toString());

        var strBlank = " ab ";
        console.log(strBlank.trim());


        var replaceStr = "123A456A789A";
        //replace会产生新的字符串(只有使用正则表达式，才能实现全局替换)
        var replaceStr1 = replaceStr.replace(/A/, "B");
        console.log(replaceStr1);
        var replaceStr2 = replaceStr.replace(/A/g, "B");
        console.log(replaceStr2);

        var matchArray = replaceStr.match(/.A./g);
        console.log(matchArray);

        var searchArray = replaceStr.search("A");//可以使用 字符串或者是正则表达式(第一个与 regexp 相匹配的子串的起始位置)
        console.log(searchArray);

        //replaceStr.indexOf(/a/); indexOf 不能使用正则表达式，只能是字符串，所以无法检索具有某些特征的字符串
    }
</script>

<div id="testDiv">

</div>

</body>
</html>
