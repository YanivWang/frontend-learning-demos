<!--
  分类: vue2 / 基础语法
  主题: Vue 指令简写形式（: 与 @）
  要点:
    - v-bind:title 简写为 :title；v-on:click 简写为 @click
    - 易错点：写成 :bind:title 是无效写法，会被当作普通 attribute（不响应）
    - 正确写法是 :title（即 v-bind:title 简写）
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue 指令简写：: 与 @</title>
    <script src="../../libs/vue.js"></script>
    <style>
        .demo { margin-bottom: 12px; padding: 8px; border: 1px solid #ddd; }
        .wrong { color: #999; }
    </style>
</head>
<body>

<div id="app1">
    <div class="demo">
        <h3>正确：:title 即 v-bind:title</h3>
        <div :title="msg">{{ msg }}</div>
        <div @click="onClick">点我更新 msg</div>
    </div>

    <div class="demo">
        <h3>错误：:bind:title 不是 v-bind 简写，不会响应式绑定</h3>
        <div :bind:title="msg" class="wrong">hover 看 title（会是字面量或无效）</div>
        <p>DOM 上实际 attribute 名是 bind:title，而非 title</p>
    </div>

    <div class="demo">
        <h3>对比：静态 title vs :title</h3>
        <div title="msg">静态 title="msg"（不会解析 msg）</div>
        <div :title="msg">动态 :title="msg"</div>
    </div>
</div>

<script>
    new Vue({
        el: '#app1',
        data: {
            msg: '悬浮提示来自 data'
        },
        methods: {
            onClick: function () {
                this.msg = '已更新 — ' + Date.now();
            }
        }
    });
</script>

</body>
</html>
