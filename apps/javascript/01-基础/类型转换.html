<!--
  分类: javascript / 01-基础
  主题: 类型转换、相等比较与浮点精度
  要点:
    - == 会触发隐式类型转换；=== 不转换类型，是业务判断的默认选择
    - ToPrimitive / ToNumber / ToString 是理解隐式转换的关键
    - NaN、Object.is、Number.EPSILON 是高频边界题
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>类型转换</title>
</head>
<body>
  <pre id="demo-output" class="demo-output" aria-live="polite"></pre>
  <h1>类型转换、相等比较与浮点精度</h1>
  <p>打开控制台查看输出。</p>

    <script src="../../../packages/shared/demo-log.js"></script>
<script>
    // ============ 1. == 与 === ============
    console.log("null == undefined:", null == undefined); // true
    console.log("null === undefined:", null === undefined); // false
    console.log("[] == false:", [] == false); // true，[] -> '' -> 0，false -> 0
    console.log("'' == 0:", "" == 0); // true，'' -> 0
    console.log("'0' == false:", "0" == false); // true，'0' -> 0，false -> 0
    console.log("'0' === false:", "0" === false); // false

    // ============ 2. ToPrimitive ============
    const user = {
      valueOf() {
        console.log("valueOf called");
        return 10;
      },
      toString() {
        console.log("toString called");
        return "20";
      }
    };
    console.log("user + 1:", user + 1); // valueOf 优先，结果 11

    const tag = {
      [Symbol.toPrimitive](hint) {
        console.log("hint:", hint);
        return hint === "string" ? "tag" : 100;
      }
    };
    console.log("String(tag):", String(tag));
    console.log("tag + 1:", tag + 1);

    // ============ 3. NaN 判断 ============
    console.log("NaN === NaN:", NaN === NaN); // false
    console.log("Number.isNaN(NaN):", Number.isNaN(NaN)); // true
    console.log("isNaN('abc'):", isNaN("abc")); // true，先把 'abc' 转数字得到 NaN
    console.log("Number.isNaN('abc'):", Number.isNaN("abc")); // false，不做隐式转换
    console.log("Object.is(NaN, NaN):", Object.is(NaN, NaN)); // true

    // ============ 4. 浮点精度 ============
    const sum = 0.1 + 0.2;
    console.log("0.1 + 0.2:", sum);
    console.log("sum === 0.3:", sum === 0.3);
    console.log("almost equal:", Math.abs(sum - 0.3) < Number.EPSILON);
    console.log("toFixed(2):", sum.toFixed(2)); // 字符串 '0.30'

    // ============ 5. 推荐实践 ============
    const count = 0;
    console.log("count || 10:", count || 10); // 10，0 被当作假值
    console.log("count ?? 10:", count ?? 10); // 0，只把 null/undefined 当作空
  </script>
