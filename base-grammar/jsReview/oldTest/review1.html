<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .testContent {
            text-align: center;
        }
    </style>
</head>
<!-- 属性的名称：大小写不敏感  推荐小写属性 -->
<body TITLE="i am body GGG">

<script>
    var person = new Object();
    person.name = "王成";
    person.age = "18";

    console.log(person);

    function clickMe() {
        //函数中，调用会覆盖当前的文档
        //document.write("我想覆盖你们");

        //获取的是一个dom对象集合
        var testDivs = document.getElementsByClassName("testContent");
        console.log(testDivs);

        testDivs[0].innerHTML = "小王";

        //获取的是单个的dom对象，dom用于访问html的一种模型
        var testDiv = document.getElementById("testA");
        console.log(testDiv);

        //通过 . 操作符可以直接访问其属性
        testDiv.width = "100";
       var dataset = testDiv.dataset;
       console.log("数据集合:" + dataset);

        //通过style来改变其css样式
        //testDiv.style.backgroundColor = "red";

        var name = testDiv.getAttribute("data-name");
        console.log("name:" + name);

        testDiv.setAttribute("age", "20");
    }
</script>


<div>
    js 复习

    <script>
        document.write("直接输出文档");
    </script>

    <button onclick="clickMe();">click me</button>

    <div>title规定元素的额外信息，可在工具提示中显示</div>
    <div>
        style 规定元素的行内样式
    </div>

    <!-- 属性值应该用引号括起来 -->
    <!-- data-* 属性名不能含有大写字母 属性值是任意的字符串  -->
    <!-- 赋予用户自定义html属性的能力 -->
    <div title="name" align="center" style="width: 100px"  name="{name:'wangcheng'}" id="testA" class="testContent">
    </div>

    <textarea accesskey="f"></textarea>

    <!-- 通过快捷键直接：访问指定的元素，使元素获取焦点 -->
    <a href="http://www.w3school.com.cn/html/" accesskey="h">HTML</a><br />

    <!--规定元素是否可以编辑-->
    <!-- 规定元素中内容的方向 -->
    <div contenteditable="true" dir="rtl">我是一个坏人</div>
</div>

</body>
</html>
