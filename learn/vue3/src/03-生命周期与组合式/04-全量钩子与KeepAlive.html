<!--
  分类: vue3 / 03-生命周期与组合式
  主题: Composition API 中的全部生命周期钩子
  要点:
    - setup 替代 beforeCreate / created；钩子统一以 onXxx 形式注册
    - 关键钩子：onBeforeMount / onMounted / onBeforeUpdate / onUpdated / onBeforeUnmount / onUnmounted
    - keep-alive 专属：onActivated / onDeactivated
    - 须从 Vue 解构全部用到的 onXxx 钩子；正确拼写是 onUnmounted（非 onUnMounted）
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · Composition API 生命周期钩子</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { margin-right: 8px; padding: 6px 12px; }
      pre { background: #f6f8fa; border-radius: 8px; padding: 12px; overflow: auto; max-height: 280px; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
      .dom-target { padding: 8px; background: #eef5ff; border-radius: 6px; margin: 8px 0; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Composition API 生命周期钩子</h1>
      <div class="box">
        <button @click="showChild = !showChild">显示/隐藏 KeepAlive 区域</button>
        <button @click="currentTab = currentTab === 'A' ? 'B' : 'A'" :disabled="!showChild">切换缓存页</button>
        <p ref="elRef" class="dom-target">根组件 DOM 节点（onMounted 后可访问）</p>
        <keep-alive v-if="showChild">
          <cached-panel :key="currentTab" :tab="currentTab"></cached-panel>
        </keep-alive>
        <pre>{{ logs.join("\n") }}</pre>
      </div>
    </div>

    <script>
      const {
        createApp, ref,
        onBeforeMount, onMounted,
        onBeforeUpdate, onUpdated,
        onBeforeUnmount, onUnmounted,
        onActivated, onDeactivated,
      } = Vue;

      const CachedPanel = {
        props: { tab: String },
        template: `
          <div>
            <p>KeepAlive 缓存页 {{ tab }}，count：{{ count }}
              <button @click="count++">+1</button>
            </p>
          </div>
        `,
        setup(props) {
          const count = ref(0);
          const logs = window.__lifecycleLogs;

          onBeforeMount(() => logs.value.push(`[${props.tab}] onBeforeMount`));
          onMounted(() => logs.value.push(`[${props.tab}] onMounted`));
          onBeforeUpdate(() => logs.value.push(`[${props.tab}] onBeforeUpdate`));
          onUpdated(() => logs.value.push(`[${props.tab}] onUpdated`));
          onBeforeUnmount(() => logs.value.push(`[${props.tab}] onBeforeUnmount`));
          onUnmounted(() => logs.value.push(`[${props.tab}] onUnmounted`));
          onActivated(() => logs.value.push(`[${props.tab}] onActivated（从缓存恢复）`));
          onDeactivated(() => logs.value.push(`[${props.tab}] onDeactivated（进入缓存）`));

          return { count };
        },
      };

      const app = createApp({
        components: { CachedPanel },
        setup() {
          const logs = ref([]);
          const showChild = ref(true);
          const currentTab = ref("A");
          const elRef = ref(null);
          window.__lifecycleLogs = logs;

          onBeforeMount(() => logs.value.push("根组件 onBeforeMount"));
          onMounted(() => {
            logs.value.push(`根组件 onMounted，elRef 已挂载：${!!elRef.value}`);
          });
          onBeforeUpdate(() => logs.value.push("根组件 onBeforeUpdate"));
          onUpdated(() => logs.value.push("根组件 onUpdated"));
          onBeforeUnmount(() => logs.value.push("根组件 onBeforeUnmount"));
          onUnmounted(() => logs.value.push("根组件 onUnmounted"));

          return { logs, showChild, currentTab, elRef };
        },
      });

      app.mount("#app");
    </script>
  <!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">

  </style>

</body>
</html>
