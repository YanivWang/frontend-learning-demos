  主题: NProgress 顶部进度条第三方库
  要点:
    - NProgress.start() 开启进度，NProgress.done() 完成
    - SPA 中可在路由切换前后调用 start/done
    - 第三方库源码在 lib/，按 CONVENTIONS §5 不修改
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NProgress 顶部进度条</title>

    <script src='lib/nprogress.js'></script>
    <link href="lib/nprogress.css" rel="stylesheet">
</head>
<body>

<script>
    NProgress.start();

    setTimeout(function () {
        NProgress.done();
    }, 3000);
</script>
