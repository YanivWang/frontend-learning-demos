<!--
  分类: javascript / 05-元编程
  主题: Object.defineProperty 数据属性
  要点:
    - 通过 defineProperty 添加的属性，writable / enumerable / configurable 默认都是 false
    - 字面量直接写的属性这三项默认为 true
    - getOwnPropertyDescriptor 可读取属性描述符，便于核对
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>defineProperty 数据属性</title>
  </head>
  <body>
    <script>
      let person = {
        age: 30
      };

      //动态给对象添加一个name属性，且它的值为 "wangcheng"
      //通过这种方式添加的数据属性，默认其它特性都是 false
      Object.defineProperty(person, "name", {
        value: "wangcheng",
      });

      console.log(person);

      //两个参数
      const descriptor1 = Object.getOwnPropertyDescriptor(person, "name");
      /*
      {
        "value": "wangcheng",
        "writable": false,
        "enumerable": false,
        "configurable": false
      }
      */
      console.log(JSON.stringify(descriptor1, null, 4));



      const descriptor2 = Object.getOwnPropertyDescriptor(person, "age");
      /*
      {
        "value": 30,
        "writable": true,
        "enumerable": true,
        "configurable": true
      }
      */
      console.log(JSON.stringify(descriptor2, null, 4));
    </script>
