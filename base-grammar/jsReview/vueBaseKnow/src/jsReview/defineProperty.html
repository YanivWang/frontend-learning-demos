<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let person = {
        name: "wc",
        age: 30
    };

    //1.通过赋值的方法为对象添加属性，这里添加的属性是可以被修改，删除，可枚举
    person.rank = "5";

    //2.通过Object.defineProperty(obj,prop,descriptor),方法为对象添加属性时，可以为添加的属性添加一些描述信息
    //Object.defineProperty(obj<要在其上定义或者修改属性的对象>,prop<定义或者修改的属性名称>,descriptor<新增属性或者对象的描述符>)
    //descriptor是要添加的属性的状态描述
    let person1 = Object.defineProperty(person, "address", {
        enumerable: true,//定义对象的属性是否可以在for...in 和 Object.keys()中被枚举,已经在JSON.stringify()中能否显示出来
        configurable: false,//表示对象属性是否能被删除
        writable: false,//表示属性是否能够被重新赋值
        value: "static"
    });
    console.log("person1: " + JSON.stringify(person1));
    person1.address = "beijing";
    console.log("person1: " + JSON.stringify(person1));

    //3.以person对象为__proto__创建新对象
    let person2 = Object.create(person);//以指定对象为原型，创建新对象，则新创建的对象，会继承原型对象的属性和方法
    console.log(person2);

    //4.为person对象添加一个属性,且该属性带有存取描述符
    let schValue;
    Object.defineProperty(person, "school", {
        get: function () {
            console.log("get");
            return schValue;
        },
        set: function (newValue) {
            console.log("set");
            schValue = newValue;
        },
        enumerable: true,
        configurable: true
    });

    person.school = 38;
    console.log(person.school);

    //5.typeof
    console.log("---test typeOf---");

    //object
    let People = {};
    let arr = [];
    let arr1 = new Array(2);
    let var_null = null;
    let reg = /wd$/;
    let reg1 = new RegExp('wd$');
    let date = new Date();

    //function
    let fn = function () {};

    //undefined
    let var_undef = undefined;
    console.log(typeof People);
    console.log(typeof arr);
    console.log(typeof arr1);
    console.log(typeof var_null);
    console.log(typeof reg);
    console.log(typeof reg1);
    console.log(typeof fn);
    console.log(typeof var_undef);
    //javascript的数字类型：Boolean Number String Object Null Undefined
</script>

</body>
</html>
