<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //正则表达式都有游标的问题
    let str = "123wc456wc";

    let regWord1 = new RegExp("\\d+", 'g');
    let regWord2 = /\d+/g;

    //注意游标的问题
    let res3_3 = regWord1.test("456");
    console.log("res3_1: " + res3_3);

    //RegExp 对象的方法
    //1.exec 检索字符串中指定的值，找到并返回这个值，注意是非贪婪的，值找到一个就停止
    let res1_1 = regWord1.exec(str);
    let res1_2 = regWord2.exec(str);
    console.log("res1_1: " + res1_1);
    console.log("res1_2: " + res1_2);

    //2.test 检索字符串中是否包含指定的值
    let res3_1 = regWord1.test("456");
    console.log("res3_1: " + res3_1);

    //String 对象的方法
    //1.match
    let res2_1 = str.match(regWord1);
    let reg2_2 = str.match(regWord2);

    console.log("res2_1: " + res2_1);
    console.log("reg2_2: " + reg2_2);
</script>

</body>
</html>
