<!--
  分类: typescript / 01-基础
  主题: 泛型函数与约束
  要点:
    - 泛型 &lt;T&gt; 让类型参数化：function identity&lt;T&gt;(x: T): T
    - extends 约束：&lt;T extends { id: number }&gt; 限制 T 必须有 id
    - 常考：泛型默认值、多个类型参数、keyof 与索引访问
    - 运行时泛型会被擦除，本 demo 用 JSDoc 模拟 TS 检查意图
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript · 泛型基础</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 760px; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 8px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>泛型基础</h1>
  <pre>function first&lt;T&gt;(arr: T[]): T | undefined {
  return arr[0];
}

function pluck&lt;T, K extends keyof T&gt;(obj: T, key: K): T[K] {
  return obj[key];
}</pre>
  <pre id="out"></pre>

  <script>
    /** @template T @param {T[]} arr @returns {T|undefined} */
    function first(arr) {
      return arr[0];
    }

    /** @template T @template {keyof T} K @param {T} obj @param {K} key */
    function pluck(obj, key) {
      return obj[key];
    }

    const nums = [10, 20, 30];
    const user = { id: 1, name: "Bob" };

    const lines = [
      `first(nums) = ${first(nums)}`,
      `first(['a','b']) = ${first(["a", "b"])}`,
      `pluck(user, 'name') = ${pluck(user, "name")}`,
      `pluck(user, 'id') = ${pluck(user, "id")}`,
    ];
    document.getElementById("out").textContent = lines.join("\n");
  </script>
</body>
</html>
