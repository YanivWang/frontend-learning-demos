<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/vue.js"></script>
    <script src="../../lib/vue-router.js"></script>
    <script src="../../lib/vuex.js"></script>

    <!--vuex依赖Promise。如果你支持的浏览器并没有实现Promise，那么你可以使用一个polyfill-->
    <script src="../../lib/es6-promise.auto.js"></script>
</head>
<body>

<div id="app">
</div>

<script>
    //1.定义同步组件
    //参数：组件名称 组件选项对象
    Vue.component('asyn-com', {
        template: `<div>同步组件</div>`
    });

    //参数：组件名称 一个工厂函数
    //这个工厂函数会异步的解析你的组件定义。Vue只有在这个组件需要被渲染的时候才会触发该工厂函数，且会把结果缓存起来
    //供未来重新渲染
    Vue.component('async-com', function (resolve, reject) {
        setTimeout(function () {
            //向'resolve'回调传递组件定义(组件选项对象)
            //这个回调函数，会在你从服务器得到组件定义的时候被调用
            //使用reject(reason)来表示加载失败。
            resolve({
                template: `<div>I am async!</div>`
            })
        }, 2000)
    });

</script>

</body>
</html>
