<!--
  分类: css / 03-动画 / loading
  主题: 文字逐字淡出的 loading 动画
  要点:
    - 通过 animation-delay 让每个字母错峰执行同一个 keyframes
    - 终态颜色为半透明灰 rgba(120,120,120,0.35)，形成逐字淡出效果
    - 想加强可见性，可加 box-shadow 文字描边或 background 衬底
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loading - 文字逐字淡出</title>

    <style>
        #inTurnFadingTextG {
            width: 234px;
            margin: auto;
        }

        .inTurnFadingTextG {
            color: #FF6A00;
            font-size: 18px;
            text-decoration: none;
            font-weight: normal;
            font-style: normal;
            float: left;
            animation-name: bounce_inTurnFadingTextG;
            animation-duration: 2.2s;
            animation-iteration-count: infinite;
            animation-direction: normal;
        }

        #inTurnFadingTextG_1 {
            animation-delay: 0.6s;
        }

        #inTurnFadingTextG_2 {
            animation-delay: 0.75s;
        }

        #inTurnFadingTextG_3 {
            animation-delay: 0.9s;
        }

        #inTurnFadingTextG_4 {
            animation-delay: 1.05s;
        }

        #inTurnFadingTextG_5 {
            animation-delay: 1.2s;
        }

        #inTurnFadingTextG_6 {
            animation-delay: 1.35s;
        }

        #inTurnFadingTextG_7 {
            animation-delay: 1.6s;
        }

        #inTurnFadingTextG_8 {
            animation-delay: 1.74s;
        }

        #inTurnFadingTextG_9 {
            animation-delay: 1.89s;

        }

        #inTurnFadingTextG_10 {
            animation-delay: 2.14s;

        }

        @keyframes bounce_inTurnFadingTextG {
            0% {
                color: #FF6A00;
            }

            100% {
                /* 半透明灰，形成淡出效果同时保持文字可见 */
                color: rgba(120, 120, 120, 0.35);
            }
        }
    </style>

</head>
<body>

<div id="inTurnFadingTextG">
    <div id="inTurnFadingTextG_1" class="inTurnFadingTextG">L</div>
    <div id="inTurnFadingTextG_2" class="inTurnFadingTextG">o</div>
    <div id="inTurnFadingTextG_3" class="inTurnFadingTextG">a</div>
    <div id="inTurnFadingTextG_4" class="inTurnFadingTextG">d</div>
    <div id="inTurnFadingTextG_5" class="inTurnFadingTextG">i</div>
    <div id="inTurnFadingTextG_6" class="inTurnFadingTextG">n</div>
    <div id="inTurnFadingTextG_7" class="inTurnFadingTextG">g</div>
    <div id="inTurnFadingTextG_8" class="inTurnFadingTextG">.</div>
    <div id="inTurnFadingTextG_9" class="inTurnFadingTextG">.</div>
    <div id="inTurnFadingTextG_10" class="inTurnFadingTextG">.</div>
</div>
