<!--
  分类: javascript / 07-进阶 / 手写Promise
  主题: 手写 Promise.all
  要点:
    - 全部 resolve 才整体 resolve；任一 reject 立刻整体 reject
    - 易错点：用 retArray.length 判断完成数会失败（稀疏数组的 length 是「最大索引+1」）
    - 用独立计数器 doneCount 判断完成数，避免稀疏数组 length 陷阱
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手写 Promise.all</title>
</head>
<body>

<script>
    let p1 = new Promise((resolve) => {
        setTimeout(() => resolve("p1 ok!"), 1500);
    });

    let p2 = new Promise((resolve) => {
        setTimeout(() => resolve("p2 ok!"), 2000);
    });

    let p3 = new Promise((resolve) => {
        setTimeout(() => resolve("p3 ok!"), 2000);
    });

    // 规则:
    //   1.有一个失败就 reject
    //   2.全部成功才 resolve
    Promise.myAll = function (...args) {
        return new Promise((resolve, reject) => {
            const retArray = new Array(args.length);

            // 边界：传空数组应立即 resolve([])
            if (args.length === 0) {
                resolve(retArray);
                return;
            }

            // 用计数器 doneCount 代替 retArray.length，避免稀疏数组 length 判断陷阱
            let doneCount = 0;
            args.forEach((tempPromise, index) => {
                // 包一层 Promise.resolve，容忍非 thenable 输入
                Promise.resolve(tempPromise).then((res) => {
                    retArray[index] = res;
                    doneCount++;
                    if (doneCount === args.length) {
                        resolve(retArray);
                    }
                }).catch(reject);
            });
        });
    };


    Promise.myAll(p1, p2, p3).then(res => {
        console.log("all resolved:", res);
    }).catch(err => {
        console.log("any rejected:", err);
    });
</script>
