<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let inputStr = "0:106:1;1;1#0:107:1;1;1#0:26:1;1;1#0:34:1;1;1#0:106:2;1;1#0:107:3;1;1#0:26:4;1;1#0:34:2;1;1#1:36:0;1;1#1:35:3;1;1#1:37:6;1;1#1:38:10;1;1#1:34:2;1;1#1:33:3;1;1#1:1366:10;1;1#1:1367:3;1;1#1:36:1;1;1#2:520:0;1;1#1:35:5;1;1#1:37:1;1;1#1:38:5;1;1#1:34:5;1;1#1:33:1;1;1#0:106:6-0:107:6-0:26:6-0:34:6;1;1#1:36:13;1;1#1:33:13;1;1#1:1367:13;1;1#1:35:13;1;1#1:38:13;1;1#1:1366:13;1;1";
    let regexList = [];
    let splitArray = inputStr.split("#");
    for (let i = 0; i < splitArray.length; i++) {
        let tempStr = splitArray[i];
        if (tempStr.indexOf("-") > 0) {
            // 1.判断是否是词汇的model6
            let reg = /0:\d+:[0,6]/g;
            let group = tempStr.match(reg);
            if (group.length >= 3) {

                //0:456:6-0:457:6-0:460:6-0:458:6;1;1
                let flagIndex = tempStr.indexOf(";");
                let resStr = tempStr.substring(0, flagIndex);
                let tempSplitArray = resStr.split("-");

                tempSplitArray.sort(function () {
                    return Math.random() - 0.5;
                });

                regexList.push(tempSplitArray[0] + ";1;1");
            } else {
                //2.普通的模式
                let knowCount = parseInt(tempStr.substring(tempStr.length - 1, tempStr.length));

                let flagIndex = tempStr.indexOf(";");
                let resStr = tempStr.substring(0, flagIndex);
                let tempSplitArray = resStr.split("-");

                tempSplitArray.sort(function () {
                    return Math.random() - 0.5;
                });

                if (knowCount < tempSplitArray.length) {
                    tempSplitArray = tempSplitArray.slice(0, knowCount);
                }

                for (let j = 0; j < tempSplitArray.length; j++) {
                    let kty = tempSplitArray[j].substring(0, 1);
                    if (kty === '2') {
                        continue;
                    }

                    let finalStr = tempSplitArray[j] + ";1;1";
                    regexList.push(finalStr);
                }
            }
        } else {
            let kty = tempStr.substring(0, 1);
            if (kty === '2') {
                continue;
            }

            regexList.push(tempStr);
        }
    }

    let finalStr = "";
    for (let i = 0; i < regexList.length; i++) {
        finalStr = finalStr + regexList[i] + "#";
    }
    finalStr = finalStr.substring(0, finalStr.length - 1);
    console.log(finalStr);
</script>

</body>
</html>
