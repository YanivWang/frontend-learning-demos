<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var a = 1;
      console.log('全局 a 1111:', a);

      function add() {
        var b = 2;
        console.log('add 函数 b 1111:', b);

        console.log('全局 a 2222:', a);
      }
      add();

      console.log('全局 a 3333:', a);
      console.log('函数 b 2222:', b); //Uncaught ReferenceError: b is not defined
    </script>
  </body>
</html>
