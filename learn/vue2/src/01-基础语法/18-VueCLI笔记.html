    //1. Vue CLI 就是通过 npm 安装的 @vue/cli 包
    //2 .Vue CLI 的功能
    //  (1) 通过 @vue/cli 搭建交互式的项目脚手架
    //  (2) 通过 @vue/cli + @vue/cli-service-global 快速开始零配置原型开发
    //  (3) 一个运行时依赖 (@vue/cli-service)
    //  (4) 一个丰富的官方插件集合
    //  (5) 一套完全图像化的创建和管理 Vue.js 项目的用户界面
    //  (6) 可以理解为一个仓库，存储了 vue 生态的众多工具
    //  (7) vue cli 是一个全局安装的 npm 包
    //  (8) CLI 服务是构建于 webpack 和 webpack-dev-server 之上的 (基于 webpack 和 webpack-dev-server)
    //  (9) 包含了： 1.加载其它 cli 插件的核心服务  2.提供了 webpack 的默认配置  3.使用 CLI 来在本地运行 vue 项目，需要安装
    //   vue-cli-service：该插件提供了 serve，build，inspect 供开发者快速开发原型项目
    //  (10) vue CLI 采用了基于插件的架构：需要什么功能，就下载对应的插件
    //  (11)在项目创建的过程中，绝大部分列出的特性都是通过插件来实现的
    //  (12)每个cli插件都会包含一个生成器(生成新文件)和一个运行时插件。
    //  (13)vue中的插件：就类似于java中的jar包
