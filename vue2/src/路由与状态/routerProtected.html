<!--
  分类: vue2 / 路由与状态
  主题: vue-router 全套导航守卫（全局 / 独享 / 组件内）
  要点:
    - 守卫执行顺序：全局 beforeEach → 路由独享 beforeEnter → 组件 beforeRouteEnter → 全局 beforeResolve → afterEach
    - 组件内 beforeRouteUpdate 必须调用 next()，否则导航卡死
    - 示例包含 Login 路由及完整的组件内守卫 next() 调用
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 守卫与受保护路由</title>
    <script src="../../libs/vue2.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <!--路由导航组件：相当于a标签-->
    <router-link to="/">Home</router-link>
    |
    <router-link to="/about">About</router-link>
    |
    <router-link to="/login">Login</router-link>

    <!--路由的出口：匹配到的路由将会被渲染到这里-->
    <router-view></router-view>
</div>

<script>
    //导航守卫：vue-router 提供的导航守卫，是通过跳转或者取消的方式来守卫导航
    //注意：参数或者查询的改变并不会触发进入、离开的导航守卫。1.通过观察 watch $route 对象来应对这些变化，或使用 beforeRouteUpdate 的组件内守卫
    const Home = {
        name: "home",
        template: `
        <div>Home Page</div>
        `,
        beforeRouteEnter: (to, from, next) => {
            console.log("home beforeRouteEnter");

            next(vm => {

            })
        },
        beforeRouteUpdate(to, from, next) {
            console.log("home beforeRouteUpdate");
            // 组件内守卫必须调用 next()，否则导航被永久挂起
            next();
        },
        beforeRouteLeave: function (to, from, next) {
            console.log("home beforeRouteLeave");

            next();
        }
    };


    //5.组件内守卫(定义路由导航守卫)
    const About = {
        name: "about",
        template: `
        <div>About Page</div>
        `,
        beforeRouteEnter: (to, from, next) => {
            //在渲染该组件的对应路由被confirm前调用
            //不能获取组件实例this
            //该守卫在执行前，组件实例还没创建

            console.log("about beforeRouteEnter");

            //通过传递一个回调给next来访问组件实例。在导航被确认的时候，执行回调，并且把组件实例，作为回调的参数
            next(vm => {
                console.log("next 回调被调用");
            })
        },
        beforeRouteUpdate(to, from, next) {
            //在当前的路由改变，但是该组件被复用时调用
            //可以访问组件实例this

            console.log("about beforeRouteUpdate");
            // 必须调用 next()，否则导航被挂起
            next();
        },
        beforeRouteLeave: function (to, from, next) {
            //导航离开该组件对应的路由时，被调用
            //可以访问组件实例

            console.log("about beforeRouteLeave");

            const answer = window.confirm('Do you want to leave?');
            if (answer) {
                next();

            } else {
                next(false);
            }
        }
    };

    const Login = {
        template: "<div>login</div>"
    };

    //4.路由独享守卫
    //称routes配置中的每个路由对象为 路由记录。路由记录可以是嵌套的
    //当一个路由匹配成功，它可能匹配多个路由记录
    const routes = [
        {
            path: "/",
            component: Home
        },
        {
            path: "/about",
            component: About,
            beforeEnter: (to, from, next) => {
                console.log("路由独享守卫");
                next();
            }
        },
        {
            path: "/login",
            component: Login
        }
    ];

    const router = new VueRouter({
        routes
    });

    //1.注册全局前置守卫
    //使用ES6的箭头函数
    //一个路由匹配到的所有路由记录会暴露为 $route 对象
    //还有在导航守卫中的路由对象的 $route.matched 数组。因此，我们需要遍历 $route.matched 来检查路由记录中的 meta 字段
    //to: Route 即将要进入的目标路由对象
    //from: Route 当前导航要离开的路由
    //next: Function:一定要调用该方法来resolve这个钩子。执行效果依赖next方法的参数
    //1.next():进入管道中的下一个钩子
    //2.next(false):中断当前的导航
    //3.next("/")或者next(path:'/')：跳转到一个不同的地址，当前的导航被中断，然后进行一个新的导航。
    //next的参数：1.router-link 的to属性的合法参数  2.router.push的参数
    //4.next(error) 如果传入的next参数的是一个Error实例，则导航会被终止，且该错误会被传递给router.onError()注册过的回调
    //一定要调用next(),否则钩子不会被解析
    router.beforeEach((to, from, next) => {
        console.log("全局前置守卫");

        next();
    });


    //2.注册全局解析守卫
    //调用时机：在导航被确认之前，同时在所有组件内守卫和异步路由组件被解析之后，全局解析守卫才会被调用
    router.beforeResolve((to, from, next) => {
        console.log("全局解析守卫");

        next();
    });


    //3.全局后置钩子
    //全局后置钩子不会接受next函数也不会改变导航本身
    router.afterEach((to, from) => {
        console.log("全局后置钩子");
    });


    new Vue({
        router,
        el: "#app"
    });
</script>

</body>
</html>
