<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //Symbol不是构造函数
      // const sym1 = new Symbol();//Uncaught TypeError: Symbol is not a constructor
      // console.log(sym1);

      //Symbol只是一个普通函数，创建Symbol类型实例，需要通过Symbol()函数实现
      const sym2 = Symbol();
      console.log("typeof Symbol>>>", typeof Symbol); //function

      //symbol,其他构造函数创建的实例，Object，Array或者自定义的构造函数实例，typeof 实例 是 object
      //而typeof Symbol类型实例，获取的类型是 symbol，因为symbol是原始数据类型
      console.log("typeof sym2>>>", typeof sym2);

      console.log("sym2.description", sym2.description);
      console.log("sym2.toString", sym2.toString());
      console.log("sym2.valueOf", sym2.valueOf());

      //仅仅用于调试的时候，标识 Symbol 是那个Symbol
      const sym3 = Symbol("AffressId");
      console.log("sym3.description", sym3.description); //AffressId
      console.log("sym3.toString", sym3.toString());
      console.log("sym3.valueOf", sym3.valueOf());

      const privateProp = Symbol("privateProp");
      let dog = {
        [privateProp]: "我是私有属性",
      };
      console.log(dog[privateProp]);
      
      //使用symbol模拟ts中的枚举
      const Direction = {
        UP: Symbol(),
        DOWN: Symbol(),
        LEFT: Symbol(),
        RIGHT: Symbol(),
      }
      console.log(Direction);
      console.log(Direction.UP);
    </script>
  </body>
</html>
