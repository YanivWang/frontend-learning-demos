<head>
    <meta charset="UTF-8">

<body>

<script>
    async function f1() {
        console.log("eee");
        return new Promise((resolve, reject) => {
            console.log("param111");
            resolve();
            console.log("param222");
        });
    }

    new Promise(()=>{
       console.log("5555");
    });

    console.log("ggg");

    setTimeout(() => {
        console.log("aaa");
    }, 0);

    async function test1() {
        console.log("bbb");
        let ret = await f1();//等待一个函数调用
        console.log("ccc");
    }

    test1();

    console.log("ddd");
</script>

</body>
