<!--
  分类: react18 / class 组件
  主题: class 组件 refs 访问 DOM 与实例
  要点:
    - React.createRef() 创建 ref，挂载后 ref.current 指向 DOM 或 class 实例
    - 回调 ref ref={(el) => ...} 在挂载/卸载时分别被调用
    - ref 改变不会触发 render；适合聚焦、测量 DOM、命令式操作
    - 字符串 ref 已废弃；函数组件 ref 需 forwardRef（见 function-components/27）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · class refs 与 DOM</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class Child extends React.Component {
      sayHello() {
        alert("Child 实例方法被父组件通过 ref 调用");
      }

      render() {
        return <p>我是子 class 组件，父组件可通过 ref 拿到我的实例。</p>;
      }
    }

    class FocusBox extends React.Component {
      constructor(props) {
        super(props);
        this.inputRef = React.createRef();
        this.childRef = React.createRef();
        this.clickCount = 0;
        this.state = { renderCount: 0 };
      }

      focusInput = () => {
        this.inputRef.current.focus();
      };

      callChild = () => {
        this.childRef.current.sayHello();
      };

      addCount = () => {
        this.clickCount += 1;
        console.log("实例字段 clickCount:", this.clickCount);
        // 改实例字段不触发 render，页面上的 renderCount 不会变
      };

      handleCallbackRef = (node) => {
        if (node) {
          console.log("回调 ref 挂载:", node.tagName);
        } else {
          console.log("回调 ref 卸载");
        }
      };

      render() {
        return (
          <section>
            <h1>class refs 与 DOM</h1>
            <input ref={this.inputRef} placeholder="createRef 聚焦到这里" />
            <button onClick={this.focusInput}>聚焦 input</button>
            <button onClick={this.addCount}>只改实例字段</button>
            <p>renderCount（state）: {this.state.renderCount}</p>
            <div ref={this.handleCallbackRef} style={{ marginTop: 12, padding: 8, border: "1px dashed #999" }}>
              回调 ref 绑定的 div
            </div>
            <Child ref={this.childRef} />
            <button onClick={this.callChild}>通过 ref 调用子组件方法</button>
            <p>面试回答: class 组件用 createRef/回调 ref；ref 不参与渲染流程，适合命令式 DOM 操作。</p>
          </section>
        );
      }

    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FocusBox />);
  </script>
