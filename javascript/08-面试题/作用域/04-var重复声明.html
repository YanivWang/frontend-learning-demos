<!--
  分类: javascript / 08-面试题 / 作用域
  主题: var 重复声明：后值覆盖前值
  要点:
    - var 允许重复声明；后一次声明不会清空，赋值覆盖
    - let/const 在同一作用域重复声明会抛 SyntaxError
    - 顶层 var a 会变成 window.a 的属性
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>面试题 - var 重复声明</title>
</head>
<body>

<script>
  var a = 1;
  var a = 234;
  console.log(a);

</script>

</body>
</html>
