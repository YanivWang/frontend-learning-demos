<!--
  分类: css / 03-动画 / 序列帧
  主题: 用 background-position + steps() 播放精灵图
  要点:
    - 精灵图（sprite）横向拼接多帧，background-size 设为完整长度
    - steps(5, end) 把 5 帧拆成 5 步离散跳变，配合 keyframes 从 0 到 -2000px
    - animation-play-state: paused/running 实现暂停/播放控制
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>背景图序列帧动画</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; text-align: center; }

    /* steps(5, end)：5 帧精灵图分 5 步跳变；keyframes 从首帧 0 到末帧 -2000px */
    @keyframes labaRun {
      from { background-position: 0 0; }
      to   { background-position: -2000px 0; }
    }

    .laba {
      width: 500px;
      height: 180px;
      margin: 0 auto;
      /* 2500×180 五帧精灵图占位：用 CSS linear-gradient 模拟横向拼接 */
      background-image:
        linear-gradient(90deg,
          #ffadad 0 500px,
          #ffd6a5 500px 1000px,
          #fdffb6 1000px 1500px,
          #caffbf 1500px 2000px,
          #9bf6ff 2000px 2500px);
      background-repeat: no-repeat;
      background-size: 2500px 180px;
      animation: labaRun 1.5s steps(5, end) infinite;
      border-radius: 8px;
      animation-play-state: paused;
    }
    .laba.run  { animation-play-state: running; }
    .laba.stop { animation-play-state: paused; }
    button { margin: 1rem 6px 0; padding: 6px 14px; }
  </style>
</head>
<body>
  <h1>序列帧动画（精灵图）</h1>
  <p>实战中常用：把多帧合成一张大图，用 <code>background-position</code> + <code>steps(5, end)</code> 跳变播放，比 GIF 可控性强、比 JS 性能好。</p>

  <div class="laba" id="laba"></div>

  <div>
    <button id="play">播放</button>
    <button id="pause">暂停</button>
  </div>

  <script>
    const laba = document.getElementById("laba");
    document.getElementById("play").onclick  = () => { laba.classList.add("run"); laba.classList.remove("stop"); };
    document.getElementById("pause").onclick = () => { laba.classList.add("stop"); laba.classList.remove("run"); };
  </script>
</body>
</html>
