<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let a = 1; //普通脚本顶层let const 声明的变量也是全局作用域，只是不挂在到 window对象上
      console.log('全局 a 1111:', a);

      function add() {
        let b = 2;
        console.log('add 函数 b 1111:', b);

        console.log('全局 a 2222:', a);
      }
      add();

      console.log('全局 a 3333:', a);
      //  console.log('函数 b 2222:', b); //Uncaught ReferenceError: b is not defined

      if (true) {
        let g = 3;
        console.log('if 块级 g 1111:', g);
      }
      console.log('if 块级 g 2222:', g); //Uncaught ReferenceError: g is not defined
    </script>
  </body>
</html>
