<!--
  分类: demos / drag
  主题: HTML5 拖放复制（带 UI 反馈）
  要点:
    - 拖动元素 dragstart 时 setData，目标区 dragover 必须 preventDefault 才能 drop
    - 用 cloneNode(true) 复制源节点；移除原 draggable / id，避免「副本也可拖」
    - 通过 setTimeout(0) 添加 dragging 类，绕过浏览器对源图像的截屏
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 拖放复制示例</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container { max-width: 960px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 32px; }
        header h1 { margin: 0 0 8px; font-size: 1.5rem; }
        header p { margin: 0; color: #666; font-size: 0.95rem; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }
        .panel h2 {
            margin: 0 0 16px;
            font-size: 1.1rem;
            color: #444;
        }

        .draggable-item {
            background: #4f46e5;
            color: #fff;
            padding: 12px 16px;
            border-radius: 6px;
            cursor: move;
            margin-bottom: 12px;
        }
        .draggable-item:last-child { margin-bottom: 0; }
        .draggable-item h3 { margin: 0; font-size: 1rem; font-weight: 600; }
        .draggable-item p { margin: 4px 0 0; font-size: 0.85rem; opacity: 0.9; }

        .dragging { opacity: 0.6; }

        .drop-area {
            border: 2px dashed #bbb;
            border-radius: 8px;
            min-height: 220px;
            padding: 16px;
        }
        .drop-area-active {
            border-color: #4f46e5;
            background: #eef2ff;
        }
        .drop-hint {
            text-align: center;
            color: #999;
            padding: 48px 16px;
        }

        .cloned-item {
            background: #10b981;
            color: #fff;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            transition: opacity 0.2s, transform 0.2s;
        }
        .cloned-item h3 { margin: 0; font-size: 1rem; font-weight: 600; }
        .cloned-item p { margin: 4px 0 0; font-size: 0.85rem; opacity: 0.9; }

        .delete-btn {
            margin-top: 8px;
            padding: 4px 8px;
            font-size: 0.75rem;
            border: none;
            border-radius: 4px;
            background: #fff;
            color: #10b981;
            cursor: pointer;
        }
        .delete-btn:hover { background: #f0f0f0; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HTML5 拖放复制示例</h1>
            <p>将左侧的元素拖动到右侧的放置区域，原始元素会保留，放置区域会创建一个副本</p>
        </header>

        <div class="grid">
            <div class="panel">
                <h2>可拖动元素</h2>
                <div id="draggables-container">
                    <div class="draggable-item" draggable="true" data-item-id="1">
                        <h3>元素 1</h3>
                        <p>这是可拖动的元素</p>
                    </div>
                    <div class="draggable-item" draggable="true" data-item-id="2">
                        <h3>元素 2</h3>
                        <p>拖到右侧区域复制</p>
                    </div>
                    <div class="draggable-item" draggable="true" data-item-id="3">
                        <h3>元素 3</h3>
                        <p>释放即可创建副本</p>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>放置区域</h2>
                <div id="drop-target" class="drop-area">
                    <div class="drop-hint">
                        <p>将元素拖放到这里</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const draggableItems = document.querySelectorAll('.draggable-item');
        const dropTarget = document.getElementById('drop-target');
        const dropHint = document.querySelector('.drop-hint');

        draggableItems.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', item.getAttribute('data-item-id'));
                e.dataTransfer.effectAllowed = 'copy';
                setTimeout(() => {
                    item.classList.add('dragging');
                }, 0);
            });

            item.addEventListener('dragend', () => {
                item.classList.remove('dragging');
            });
        });

        dropTarget.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            dropTarget.classList.add('drop-area-active');
        });

        dropTarget.addEventListener('dragleave', () => {
            dropTarget.classList.remove('drop-area-active');
        });

        dropTarget.addEventListener('drop', (e) => {
            e.preventDefault();
            dropTarget.classList.remove('drop-area-active');

            const itemId = e.dataTransfer.getData('text/plain');
            const originalItem = document.querySelector(`[data-item-id="${itemId}"]`);

            if (originalItem) {
                dropHint.classList.add('hidden');

                const clonedItem = originalItem.cloneNode(true);
                clonedItem.classList.remove('draggable-item');
                clonedItem.classList.add('cloned-item');
                clonedItem.removeAttribute('draggable');
                clonedItem.setAttribute('data-cloned', 'true');

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '删除副本';
                deleteBtn.addEventListener('click', () => {
                    clonedItem.remove();
                    if (dropTarget.querySelectorAll('[data-cloned="true"]').length === 0) {
                        dropHint.classList.remove('hidden');
                    }
                });
                clonedItem.appendChild(deleteBtn);

                dropTarget.appendChild(clonedItem);
                clonedItem.style.opacity = '0';
                clonedItem.style.transform = 'translateY(12px)';

                setTimeout(() => {
                    clonedItem.style.opacity = '1';
                    clonedItem.style.transform = 'translateY(0)';
                }, 50);
            }
        });
    </script>

</html>
