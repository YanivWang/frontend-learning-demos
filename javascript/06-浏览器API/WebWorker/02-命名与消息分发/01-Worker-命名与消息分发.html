<!--
  分类: javascript / 06-浏览器API / WebWorker / 02-命名与消息分发
  主题: 给 Worker 命名 + 用消息体分发不同任务
  要点:
    - new Worker(path, { name }) 可标识不同 worker，便于 DevTools 调试
    - 主线程发送 {task, data}，子线程依据 task 字段调用对应函数
    - 易错点：直接在主线程跑大循环（startCount）会卡死 UI，应放到 worker
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker 命名与消息分发</title>
</head>
<body>

<button onclick="startTaskA()">start</button>

<button onclick="stopTaskA()">stop</button>

<button onclick="pressHandle()">press</button>

<button onclick="startCount()">count</button>

<script>
    //javascript是单线程的，同一个时刻，只能做一件事
    //当进行密集型计算的时候，ui就无法响应
    function pressHandle() {
        console.log("press stat....");

        let sum = 0;
        for (let i = 0; i < 1000; i++) {
            sum = sum + i;
        }
        console.log("press end....");
    }

    function startCount() {
        console.log("count start....");
        let count = 0;
        for (let i = 0; i < 10000000000000; i++) {
            count = count + i;
        }
        console.log("count end...." + count);
    }

    //msg format to work: {task: "A", data: "xxx"}
    //msg format from work: {desc: "Task A finish...", data: data}
    let work = new Worker("work.js", {name: 'hardWork1'});

    function startTaskA() {
        let msg = {task: "A", data: "1000"};
        work.postMessage(msg);
    }

    function stopTaskA() {
        work.terminate();
    }

    work.onmessage = function (e) {
        let msg = e.data;
        console.log("work msg: " + JSON.stringify(msg));

        if (msg.task === 'A' && msg.state === 1) {
            let msg = {task: "B", data: "10000000000"};
            work.postMessage(msg);
        }
    }
</script>

</body>
</html>
