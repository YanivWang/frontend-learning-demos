<!--
  分类: vue2 / 05-路由与状态
  主题: 路由 props 解耦组件与 $route
  要点:
    - props: true → 把 route.params 注入组件 props，让组件不依赖 $route
    - props: { ... } → 静态对象方式，组件得到固定 props
    - props: (route) => ({ ... }) → 函数式，可计算/重命名 query / params
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · props 解耦</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <p>
        <router-link to="/">home</router-link>
        |
        <router-link to="/props-true/wangcheng/post/123">props: true</router-link>
        |
        <router-link to="/props-static/wangcheng/post/123">props: 静态对象</router-link>
        |
        <router-link to="/props-fn/wangcheng/post/456?q=vue">props: 函数式</router-link>
        |
        <router-link to="/props-named/wangcheng/post/789">props: 命名视图</router-link>
    </p>
    <router-view></router-view>
    <router-view name="sideBar"></router-view>
</div>

<script>
    const home = { template: "<div>home</div>" };

    const userPropsTrue = {
        props: ['id', 'postid'],
        watch: {
            $route: function () {
                console.log('[props: true] 路由变化', this.$route.fullPath);
            }
        },
        template: `<div>
            <div><strong>props: true</strong></div>
            <div>$route.params.id: {{ $route.params.id }}</div>
            <div>props id: {{ id }}</div>
            <div>props postid: {{ postid }}</div>
        </div>`
    };

    const userStaticProps = {
        props: ['newsletterPopup'],
        template: `<div>
            <div><strong>props: 静态对象</strong></div>
            <div>newsletterPopup（固定 false）: {{ newsletterPopup }}</div>
            <div>$route.params（静态 props 不会注入）: id={{ $route.params.id }}, postid={{ $route.params.postid }}</div>
        </div>`
    };

    const userQueryProps = {
        props: ['id', 'postid', 'keyword'],
        template: `<div>
            <div><strong>props: 函数式</strong></div>
            <div>props id: {{ id }}</div>
            <div>props postid: {{ postid }}</div>
            <div>keyword（来自 query.q）: {{ keyword }}</div>
        </div>`
    };

    const sideBar = {
        props: ['sidebarLabel'],
        template: "<div>sideBar — label: {{ sidebarLabel || 'default' }}</div>"
    };

    function calProps(route) {
        return {
            id: route.params.id,
            postid: route.params.postid,
            keyword: route.query.q
        };
    }

    const routes = [
        { path: "/", component: home },
        { path: "/props-true/:id/post/:postid", component: userPropsTrue, props: true },
        { path: "/props-static/:id/post/:postid", component: userStaticProps, props: { newsletterPopup: false } },
        { path: "/props-fn/:id/post/:postid", component: userQueryProps, props: calProps },
        {
            path: "/props-named/:id/post/:postid",
            components: { default: userPropsTrue, sideBar: sideBar },
            props: { default: true, sideBar: { sidebarLabel: '命名视图 sidebar' } }
        }
    ];

    const router = new VueRouter({ routes });
    var wm = new Vue({ router }).$mount('#app');

    // 同一路由不同 params 会复用组件，应 watch $route 或使用 beforeRouteUpdate
    console.log(wm);
</script>

</body>
</html>
