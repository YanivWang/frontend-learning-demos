<!--
  分类: react18 / hooks
  主题: useReducer 管理复杂状态
  要点:
    - useReducer 适合多个状态字段有关联、更新逻辑较集中或需要 action 语义的场景
    - reducer 必须是纯函数: 相同 state + action 得到相同新 state，不直接修改原对象
    - dispatch(action) 描述“发生了什么”，reducer 决定“状态如何变化”
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · useReducer</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useReducer } = React;

    const initialState = {
      count: 0,
      history: []
    };

    function counterReducer(state, action) {
      switch (action.type) {
        case "increment":
          return {
            count: state.count + action.payload,
            history: state.history.concat("+" + action.payload)
          };
        case "decrement":
          return {
            count: state.count - 1,
            history: state.history.concat("-1")
          };
        case "reset":
          return initialState;
        default:
          throw new Error("未知 action: " + action.type);
      }
    }

    function Counter() {
      const [state, dispatch] = useReducer(counterReducer, initialState);

      return (
        <section>
          <h1>useReducer</h1>
          <p>count: {state.count}</p>
          <button onClick={() => dispatch({ type: "increment", payload: 1 })}>+1</button>
          <button onClick={() => dispatch({ type: "increment", payload: 5 })}>+5</button>
          <button onClick={() => dispatch({ type: "decrement" })}>-1</button>
          <button onClick={() => dispatch({ type: "reset" })}>reset</button>
          <p>history: {state.history.join(" / ")}</p>
          <p>面试回答: useState 适合简单状态，useReducer 适合复杂状态转移和 action 语义更清晰的场景。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Counter />);
  </script>
