<!--
  分类: vue2 / 01-基础语法
  主题: 事件修饰符 @event.modifier
  要点:
    - .prevent ≡ e.preventDefault()；.stop ≡ e.stopPropagation()
    - .once 只触发一次；.capture 用捕获模式；.self 仅当 target 是元素自身时触发
    - 链式可叠加：@click.stop.prevent；按键修饰符如 @keyup.enter 同理
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>事件修饰符 @click.prevent / .stop / …</title>
    <script src="../../libs/vue.js"></script>
    <style>
        .outer { padding: 20px; background: #eee; }
        .inner { padding: 20px; background: #ccc; }
    </style>
</head>
<body>

<div id="app">
    <h3>.prevent — 阻止表单默认提交</h3>
    <form v-on:submit.prevent="onSubmit">
        <button type="submit">提交（不会刷新页面）</button>
    </form>

    <h3>.stop — 阻止冒泡</h3>
    <div class="outer" @click="log('outer 冒泡')">
        <div class="inner" @click.stop="log('inner .stop')">点我（只触发 inner）</div>
    </div>

    <h3>.self — 仅 target 为自身时触发</h3>
    <div class="outer" @click.self="log('outer .self')">
        <div class="inner">点空白处才触发 outer.self</div>
    </div>

    <h3>.once — 只触发一次</h3>
    <button @click.once="log('once 按钮')">只能点一次</button>

    <h3>.capture — 捕获阶段</h3>
    <div class="outer" @click.capture="log('outer capture')">
        <div class="inner" @click="log('inner 冒泡')">capture 先于 inner</div>
    </div>

    <h3>.stop.prevent 链式</h3>
    <a href="https://vuejs.org" @click.stop.prevent="log('链接 .stop.prevent')">链接（不跳转）</a>

    <h3>@keyup.enter — 按键修饰符</h3>
    <input @keyup.enter="log('按下 Enter: ' + enterText)" v-model="enterText" placeholder="回车试试">

    <pre>{{ logs.join('\n') }}</pre>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            enterText: '',
            logs: []
        },
        methods: {
            onSubmit: function (e) {
                this.log('表单 submit（.prevent 已阻止默认行为）');
            },
            log: function (msg) {
                this.logs.unshift(msg);
            }
        }
    });
</script>
