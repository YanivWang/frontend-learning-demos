<!--
  分类: javascript / 04-ES6+ / 异步 / generator与async
  主题: async 错误重试机制
  要点:
    - try/catch 包 await，可捕获 reject 的 Promise，避免后续中断
    - 失败后重置中间结果数组，循环重试 N 次
    - 注意外层 count 与 syncFun 内的 count 是不同作用域的变量，避免命名混淆
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>async 错误重试机制</title>
</head>
<body>

<script>
    let count = 0;

    function syncFun(initParam) {
        console.log(initParam);

        count++;
        console.log("call...:" + count);
        return new Promise(function (resolve, reject) {
            setTimeout(function () {
                let rand = parseInt(Math.random() * 2);
                if (rand > 0) {
                    resolve(rand);
                } else {
                    reject("save err");
                }
            }, 1000)
        });
    }

    //实现错误多次重复尝试
    let errCount = 0;
    async function setData(methodArray, paramArray) {
        console.log("参数长度：" + arguments.length);

        let count = 20;
        let dataArray = [];
        for (let i = 0; i < count; i++) {
            try {
                dataArray = [];
                //try里面实际上是同步的代码
                let res = 0;
                for (let j = 0; j < methodArray.length; j++) {
                    if (paramArray && paramArray[j]) {
                        res = await methodArray[j](paramArray[j]);//await语句如果失败，会立即终止执行
                        dataArray.push(res);
                    }
                }
                console.log("success");
                break;
            } catch (e) {
                console.log("err:" + (++errCount));
            }
        }

        return dataArray;
    }

    let methodArray = [];
    methodArray.push(syncFun);
    methodArray.push(syncFun);
    methodArray.push(syncFun);

    let paramArray = [];
    paramArray.push("data1");
    paramArray.push("data2");
    paramArray.push("data3");

    setData(methodArray, paramArray).then(function (data) {
        console.log("final..." + data);
    }).catch(function () {
        console.log("failure...");
    })
</script>
