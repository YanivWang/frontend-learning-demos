<!--
  分类: css / 03-动画 / loading
  主题: 5 条竖条交错弹跳的加载动画
  要点:
    - 同一个 keyframes 配 animation-delay 错峰，制造波浪效果
    - 同时给出标准 @keyframes 与 -webkit- 私有前缀，兼容旧设备
    - nth-child 用 animation-delay 错峰，标准与 -webkit- 前缀成对声明
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loading - 五条竖条弹跳</title>

    <style>
        .loading {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #ddd;
        }

        .loading .loadWrap {
            position: relative;
            height: 70px;
            width: 100px;
            justify-content: space-around;
            align-items: center;
            display: flex;
        }


        .loadWrap span {
            display: inline-block;
            width: 8px;
            height: 100%;
            border-radius: 4px;
            background: lightgreen;
            animation: load 1s ease infinite;
            -webkit-animation: load 1s ease infinite;
        }

        @keyframes load {
            0%, 100% {
                height: 40px;
                background: lightgreen;
            }
            50% {
                height: 70px;
                margin: -15px 0;
                background: lightblue;
            }
        }

        @-webkit-keyframes load {
            0%, 100% {
                height: 40px;
                background: lightgreen;
            }
            50% {
                height: 70px;
                margin: -15px 0;
                background: lightblue;
            }
        }

        .loadWrap span:nth-child(2) {
            animation-delay: 0.2s;
            -webkit-animation-delay: 0.2s;
        }

        .loadWrap span:nth-child(3) {
            animation-delay: 0.4s;
            -webkit-animation-delay: 0.4s;
        }

        .loadWrap span:nth-child(4) {
            animation-delay: 0.6s;
            -webkit-animation-delay: 0.6s;
        }

        .loadWrap span:nth-child(5) {
            animation-delay: 0.8s;
            -webkit-animation-delay: 0.8s;
        }
    </style>
</head>
<body>

<div class="loading">
    <div class="loadWrap">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>
