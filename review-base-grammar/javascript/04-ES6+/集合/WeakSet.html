<body>
  <script>
    const ws = new WeakSet();

   // ws.add(1)//Uncaught TypeError: Invalid value used in weak set

   //1.弱集合中的值只能是Object类型或者其子类型
   //2.弱集合中的值是非正式的引用不会阻止垃圾回收
   //3.下面这个代码，添加一个对象字面量作为值，没有任何引用指向这个对象字面量，则代码执行完毕后，
   //该值就会被当做垃圾回收
   ws.add({})

   //弱集合没有迭代方法，因为其值随时会被垃圾回收
  // ws.forEach
  </script>
</body>
