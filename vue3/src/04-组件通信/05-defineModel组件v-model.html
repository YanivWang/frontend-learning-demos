<!--
  分类: vue3 / 04-组件通信
  主题: defineModel（Vue 3.4+）
  要点:
    - defineModel 是 <script setup> 编译宏，简化组件 v-model 双向绑定
    - 编译后等价于 modelValue prop + update:modelValue emit 的 computed 读写
    - 全局构建无 SFC 编译器，本页用可运行等价写法 + SFC 片段对照
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · defineModel 组件 v-model</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      input { padding: 6px 10px; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 820px; }
      .grid { display: grid; gap: 12px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>defineModel（Vue 3.4+）</h1>
      <div class="box grid">
        <model-input v-model="title"></model-input>
        <named-model-input v-model:title="subtitle"></named-model-input>
        <p>父组件 title：{{ title }}</p>
        <p>父组件 subtitle：{{ subtitle }}</p>
        <pre>{{ sfcSnippet }}</pre>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li><code>defineModel()</code> 是编译宏，只在 <code>&lt;script setup&gt;</code> + 构建工具中生效，浏览器直接运行会警告。</li>
        <li>默认模型名是 <code>modelValue</code>；命名模型写 <code>defineModel('title')</code>，对应 <code>v-model:title</code>。</li>
        <li>本质仍是 props + emit，只是少写样板代码；理解编译产物有助于排查 v-model 不更新问题。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      // defineModel() 编译后的等价运行时写法
      function useVModel(props, emit, key = "modelValue") {
        const event = key === "modelValue" ? "update:modelValue" : `update:${key}`;
        return computed({
          get: () => props[key],
          set: (value) => emit(event, value),
        });
      }

      const ModelInput = {
        props: { modelValue: String },
        emits: ["update:modelValue"],
        setup(props, { emit }) {
          const model = useVModel(props, emit);
          return { model };
        },
        template: `
          <label>
            默认 defineModel 等价：
            <input v-model="model" />
          </label>
        `,
      };

      const NamedModelInput = {
        props: { title: String },
        emits: ["update:title"],
        setup(props, { emit }) {
          const model = useVModel(props, emit, "title");
          return { model };
        },
        template: `
          <label>
            命名 defineModel('title') 等价：
            <input v-model="model" />
          </label>
        `,
      };

      createApp({
        components: { ModelInput, NamedModelInput },
        setup() {
          const title = ref("Vue 3.4 defineModel");
          const subtitle = ref("命名 v-model:title");
          const sfcSnippet = [
            "<!-- 默认模型 -->",
            "&lt;script setup&gt;",
            "const model = defineModel()",
            "&lt;/script&gt;",
            '<input v-model="model" />',
            "",
            "<!-- 命名模型 -->",
            "&lt;script setup&gt;",
            "const title = defineModel('title')",
            "&lt;/script&gt;",
            '<input v-model="title" />',
          ].join("\n");
          return { title, subtitle, sfcSnippet };
        },
      }).mount("#app");
    </script>
  </body>
</html>
