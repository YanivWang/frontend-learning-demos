<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/vue.js"></script>
    <script src="../../lib/vue-router.js"></script>
</head>
<body>

<div id="app">
    <!--使用router-view同级展示多个视图：可以在一个见面中拥有多个单独命名的视图，而不是只有一个单独的出口-->
    <!--通过 name属性为视图容router-view命名-->
    <router-view class="view one"></router-view>
    <router-view class="view two" name="a"></router-view>
    <router-view class="view three" name="b"></router-view>
</div>

<script>
    //一个视图需要一个组件来渲染，一个页面上可以同时有多个view(视图)
    const Home = {
        template: `<div>首页</div>`
    };

    const Course = {
        template: `<div>课程</div>`
    };

    const Bottom = {
        template: `<div>底部</div>`
    };

    const router = new VueRouter({
        routes:[
            {
                path:'/',
                //component: Home,//注意和下面的区别
                components:{//一个路径匹配多个组件(每个组件在不同的router-view视图组件中进行渲染)
                    default: Home,
                    a: Course,
                    b: Bottom
                }
            }
        ]
    });

    new Vue({
        el: '#app',
        router
    })
</script>

</body>
</html>
