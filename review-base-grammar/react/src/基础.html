<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello React!</title>

    <!--    <script src="https://cdn.staticfile.org/react/16.4.0/umd/react.development.js"></script>-->
    <!--    <script src="https://cdn.staticfile.org/react-dom/16.4.0/umd/react-dom.development.js"></script>-->
    <!--    <script src="https://cdn.staticfile.org/babel-standalone/6.26.0/babel.min.js"></script>-->

    <!-- 安装react
     1. React 的核心库
     2. 提供React 操作Dom相关的功能
     -->
    <script src="../../jsLibrary/react.development.js"></script>
    <script src="../../jsLibrary/react-dom.development.js"></script>
    <script src="https://cdn.staticfile.org/react/16.4.0/umd/react.development.js"></script>

    <!-- 安装Babel:
      1.用于将ES6+语法转换为es5语法，以便于能直接在浏览器中运行
      2.用来转换 jsx 语法(babel内嵌了对jsx的支持) -->
    <script src="../../jsLibrary/babel.js"></script>
  </head>
  <body>
    <div id="example"></div>

    <!--
        要在script脚本中使用jsx，要把<script>的type类型写成 text/babel， 这样浏览器不会直接执行
        script中的内容，而是先由babel来编译这个script中的内容，然后再执行
    -->
    <script type="text/babel">

      console.log("1111111111");
      let abc = "12345";
      function fun() {
        console.log("234");
        return "八八八";
      }

      //1.元素: 一段jsx赋值给一个变量，这个变量就称作react的一个元素
      //2. 元素是一种轻量级的js对象,描述了要渲染的UI结构
      const element = (
        <h1 id="wx" className="jb">
          <span>
            <i>我是111元素</i>
            <span>我是span111</span>
            {console.log("在jsx中运行js表达式")}
            {abc}
            {fun}
          </span>
          <span>
            <i>我是222元素</i>
            <span>我是span222</span>
          </span>
        </h1>
      );
      console.log("222222222222222222");

      //3.ReactDOM的render方法会按照下列顺序执行
      //3.1 虚拟dom构建: 会根据传入的React元素(js对象)递归构建虚拟dom树,虚拟dom是对真实dom的抽象表示
      //它以 JavaScript 对象的形式存在，比真实 DOM 更轻量级，操作起来也更快。

      //3.2 diff算法: diff算法会比对新旧虚拟dom,找出变更集合
      //3.3 真实dom渲染,根据diff算法找出的变更集合,React会将变更集合转换为真实的dom
      //3.4 事件绑定,创建真实dom时,react会为这些dom绑定事件
      ReactDOM.render(element, document.getElementById("example"));
    </script>
  </body>
</html>
