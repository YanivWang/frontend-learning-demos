<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        #parent{
            margin: auto;
            margin-top: 150px;
            width: 200px;
            height: 200px;
            border:1px solid #999;
        }

        #son{
            margin: auto;
            width: 150px;
            height: 150px;
            border:1px solid #999;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<!--
summary: 1.mouseenter mouseleave穿过一次元素，只会触发一次
         2.mouseover mouseout穿过一次元素，可能会触发一次，具体触发几次，要看其
         子元素的数量
-->

<div id="parent"
     onmouseenter="parentMoEnter()"
     onmouseleave="parentMoLeave()"
     onmouseover="parentMoOver()"
     onmouseout="parentMoOut()"
     >
    <div id="son">
    </div>
</div>

<script>
    function parentMoEnter() {
        console.log("Enter");
    }

    function parentMoLeave() {
        console.log("Leave");
    }

    function parentMoOver() {
        console.log("Over");
    }

    function parentMoOut() {
        console.log("Out");
    }

</script>


</body>
</html>
