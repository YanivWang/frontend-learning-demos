<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const person = {
        name: 'John',
      };

      function sayHello(age, gender, type) {
        console.log('==============type==============', type);
        console.log('this:', this);
        console.log('Hello, ' + this.name);
        console.log('age:', age);
        console.log('gender:', gender);
      }

      //方式一(默认绑定)
      sayHello(); //Hello,

      //方式二(显式绑定)
      //1.1 (使用call方法)
      sayHello.call(person); //Hello, John
      sayHello.call(person, 18, 'male'); //Hello, John

      //1.2 (使用apply方法) apply 只有apply参数是数组
      sayHello.apply(person, [19, 'male']); //Hello, John

      //1.3 (使用bind方法)
      // bind 不会立即调用，而是返回一个新函数
      const sayHelloBound = sayHello.bind(person, 20, 'male');
      //sayHelloBound(); //Hello, John

      //最精准的类型判断方案
      //为什么，不直接调用各个类型的 toString 方法，因为各个类型基本上都重写的 toString 方法，导致
      //拿不到类型
      console.log(Number(1).toString()); // '1'
      console.log([1, 2].toString()); // '1,2'

      console.log(Object.prototype.toString.call(1)); //[object Number]
      console.log(Object.prototype.toString.call('1')); //[object String]
      console.log(Object.prototype.toString.call(true)); //[object Boolean]
      console.log(Object.prototype.toString.call(undefined)); //[object Undefined]
      console.log(Object.prototype.toString.call(null)); //[object Null]
      console.log(Object.prototype.toString.call(function () {})); //[object Function]
      console.log(Object.prototype.toString.call({})); //[object Object]
      console.log(Object.prototype.toString.call([])); //[object Array]
      console.log(Object.prototype.toString.call(new Date())); //[object Date]

      //Object.prototype.toString.call(1) 的原理
      /*
        // 伪代码，实际是引擎底层实现
        Object.prototype.toString = function() {
          const tag = getInternalClass(this); // 读取 this 的隐藏标签
          return `[object ${tag}]`;
        }
      */
    </script>
  </body>
</html>
