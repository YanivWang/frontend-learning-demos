<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    "use strict";//只能出现在脚本的开头

    //var x = 010;//严格模式不能使用8进制

    var x = "i am \"history\" ant";
    console.log(x);

    var y = 0x10;//可以使用16进制
    console.log(y);


    var a = 456;
    var b;

    var a = 234;

    //delete a;//严格模式下，不能删除变量和对象，以及函数

    var person = {
        name: "fighting!",
        age: 20
    };

    delete person.name;
    console.log(person);

    //fun1();

    /* function fun1(a, a) {//严格模式，函数的形参，不允许重名
         console.log("haha");
     }*/

    console.log(a);

    if (a == b) {
        console.log("a==b");

        this.a = "124";

        //c = 123;//严格模式下，不能使用未申明的变量
        // console.log(c);
    }

    //严格模式下，当this指向全局变量的时候，值为 undefined
    fa();

    function fa() {
        "use strict";

        return !this;
    }

    //js 函数定义的几种方式

    //通过关键字function来定义
    //1.声明方式
    //通过函数名称来调用
    function f1() {

    } //这里不能有分号，因为它不是一个语句

    //2.函数表达式方式
    //函数表达式可以存储在一个变量中
    //通过变量来调用
    var f2 = function () {
    };//这里可以有分号，因为是语句

    //通过内置的javascript函数构造器来定义
    var f3 = new Function("a", "b", "return a * b");

    //函数自己调用自己(不需要别人调用，自己调用自己)
    (function () {
        console.log("我是自己调用的函数");
    })();

    (function f4() {
        console.log("我是自己调用的函数 f4");
    })();

    var f5 = function () {
        console.log("我是自己调用的函数 f5");
    }();
    console.log("f5:" + f5);

    console.log(typeof [1, 2, 3]);
    console.log(typeof null);
    console.log(typeof {});

    //函数
    //1.函数定义作为对象的属性，称之为对象的方法
    //2.函数用来创建新的对象，称作对象的构造函数

    var param = [1, 2, 3, 4];
    var f6 = function (bin) {
        for (var i = 0; i < bin.length; i++) {
            console.log(bin[i]);
        }
        return bin;
    }(param);
    //这里的f6用来接收函数表达式立即执行后的返回结果

    var buffer;

    var a = buffer ? function () {
        console.log("a");
    } : function () {
        console.log("b");
    };

    a();
</script>
</body>
</html>
