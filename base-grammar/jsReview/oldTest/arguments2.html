<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    function fun1() {
        console.log(arguments);
        //arguments是一个类数组的对象，使用typeOf arguments得到object，但是同时它有数组的
        //一些特性，length，下标的方式访问等,但是它却没有数组的方法比如 slice sort...

        console.log("数组方式：访问arguments");
        for (var i = 0; i < arguments.length; i++) {
            console.log(arguments[i]);
        }

        var keySet1 = Object.keys(arguments);
        console.log("keySet1: " + keySet1);
    }

    fun1();

    //数组值引用类型，是Object的实例
    var array = ["name", "age", "address"];
    var keySet2 = Object.keys(array);
    console.log("keySet2: " + keySet2);

    function Fun2() {
        var name = "funName";
        var age = "funAge";

        this.add = "address";
    }

    Fun2.prototype.wc = "1234";

    var keySet3 = Object.keys(Fun2);
    console.log("keySet3" + keySet3);

    console.log("--- 遍历对象 ---");
    for (var key in Fun2) {
        console.log(key);
    }

    console.log("prototype:\n" + Object.prototype);
</script>

</body>
</html>
