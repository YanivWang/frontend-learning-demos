<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="../../lib/vue.js"></script>
    <!--引入element组件库：样式和组件-->
    <link rel="stylesheet" href="../../lib/element/index.css">
    <script src="../../lib/element/index.js"></script>

    <style>
        .el-row {
            margin-bottom: 20px;
        }

        .el-col{
            background-color: #ddd;
        }

        .el-col > div{
            border-radius: 4px;
            background-color: #6a6a6a;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="main">
        <el-row type="flex">
            <el-col :xs="8" :sm="6" :md="4" :lg="3" :span="24">
                <div>1111</div>
            </el-col>
        </el-row>

        <el-row>
            <el-col :xs="8" :sm="6" :md="4" :lg="3" :span="10" :offset="7">
                <div>1111</div>
            </el-col>
        </el-row>

        <!--这里的justify是指的容器的对齐方式，不是容器的内容-->
        <el-row type="flex" justify="start" :gutter="20">
            <el-col :xs="8" :sm="6" :md="4" :lg="3" :span="12">
                <div>1111</div>
            </el-col>
            <el-col :span="12">
                <div>2222</div>
            </el-col>
        </el-row>

        <el-row type="flex" justify="center" :gutter="30">
            <el-col :span="8">
                <div>1111</div>
            </el-col>
            <el-col :span="8">
                <div>2222</div>
            </el-col>
            <el-col :span="8">
                <div>3333</div>
            </el-col>
        </el-row>
    </div>
</div>

<script>

    let comp = {
        data() {
            return {
                inputValue: "init value",
                visible: false
            }
        },
        methods: {}
    };

    let Ctor = Vue.extend(comp);
    new Ctor().$mount("#app");
</script>

</body>
</html>
