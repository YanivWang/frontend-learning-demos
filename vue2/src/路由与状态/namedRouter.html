<!--
  分类: vue2 / 路由与状态
  主题: 命名路由（router-link :to="{ name: 'xxx' }"）
  要点:
    - 给 route 加 name 后，可用 { name } 跳转，无需硬编码 path
    - 同样适用于编程式：router.push({ name: 'user', params: { id: 1 } })
    - 顺带演示 js-cookie 读取浏览器 Cookie
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 命名路由</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
    <script src="../../libs/js.cookie.min.js"></script>
</head>
<body>

<div id="app">
    <p>
        <router-link v-bind:to="{ name: 'user', params: { id: 'foo' } }">User (foo)</router-link>
        <router-link v-bind:to="{ name: 'user', params: { id: 'bar' } }">User (bar)</router-link>
        <router-link v-bind:to="{ name: 'about' }">About</router-link>
        <button @click="goUserByCode">编程式 push({ name: 'user', params: { id: 'code' } })</button>
    </p>
    <p>Cookie name: {{ cookieName || '(未设置，可在控制台 Cookies.set("name","xxx") 试试)' }}</p>
    <router-view></router-view>
</div>

<script>
    var name = Cookies.get("name");
    console.log("Cookies.get('name'):", name);

    const User = {
        template: `<div>
                      <div>User</div>
                      <div>params.id: {{ $route.params.id }}</div>
                   </div>`
    };

    const About = {
        template: `<div>About</div>`
    };

    const routes = [
        {
            name: "user",
            path: "/user/:id",
            component: User
        },
        {
            name: "about",
            path: "/about",
            component: About
        }
    ];

    const router = new VueRouter({ routes });

    new Vue({
        router,
        data: {
            cookieName: name
        },
        methods: {
            goUserByCode: function () {
                this.$router.push({ name: 'user', params: { id: 'code' } });
            }
        }
    }).$mount('#app');
</script>

</body>
</html>
