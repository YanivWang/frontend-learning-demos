<!--
  分类: javascript / 01-基础
  主题: 变量声明、提升、null vs undefined、constructor
  要点:
    - var 有声明提升，可重复声明；let/const 在块作用域内，禁重复声明
    - null vs undefined：== 相等，=== 不等；typeof null 是 'object'
    - 原始类型 7 种：number/string/boolean/null/undefined/symbol/bigint
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>变量</title>
  </head>
  <body>
    <script>
      //重复的var声明会被忽略
      var userName = "123";
      var userName;
      console.log("userName", userName);//123

      function outputNumbers(count) {
        for (var i = 3; i < count; i++) {
          console.log(i);
        }
        var i; //重新声明变量
        console.log(i); //5 (var 无块级作用域，for 循环里的 i 在循环外仍可访问)
      }
      outputNumbers(5)


      //声明提升导致的奇怪的现象，变量在其声明语句之前就可以访问
      console.log("userAge", userAge);//undefined
      var userAge;

      let age = 123;

      //let age;//Cannot redeclare block-scoped variable 'age'.

      //使用const声明的变量必须初始化
      //const a;//'const' declarations must be initialized.


      // ====== 隐式声明：不加 var/let/const 直接赋值 ======
      // 非严格模式下相当于创建全局变量（很坑！）；严格模式下会报 ReferenceError
      // testStr = "abc";  // ⚠️ 不推荐
      // console.log(window.testStr); // 'abc'（会污染全局对象）


      // ====== null vs undefined：JS 里两种"空值"的核心区别 ======
      console.log("typeof undefined:", typeof undefined); // 'undefined'
      console.log("typeof null:     ", typeof null);      // 'object'  ← 历史遗留 bug

      console.log("null == undefined :", null == undefined);  // true（值相等）
      console.log("null === undefined:", null === undefined); // false（类型不等）

      // 语义区别：
      //   undefined：变量已声明但还没赋值（系统自动设置）
      //   null     ：开发者主动表示"这里什么都没有"（人为设置）
      let willAssign;          // 系统默认 undefined
      let cleared = null;      // 主动清空一个引用
      console.log("willAssign:", willAssign);
      console.log("cleared:   ", cleared);


      // ====== constructor：返回创建该变量的构造函数 ======
      console.log("'abc'.constructor:", "abc".constructor); // ƒ String()
      console.log("(123).constructor:", (123).constructor); // ƒ Number()
      console.log("true.constructor :", true.constructor);  // ƒ Boolean()
      console.log("[1,2].constructor:", [1, 2].constructor); // ƒ Array()
      // null 和 undefined 没有 constructor，访问会抛错
      // console.log(null.constructor);      // ❌ TypeError
      // console.log(undefined.constructor); // ❌ TypeError


      // ====== JS 的 7 种基础类型 ======
      // 原始类型 (7)：number / string / boolean / null / undefined / symbol（ES6）/ bigint（ES2020）
      // 引用类型 (1)：object（数组、函数、Date、RegExp 等都属于 object）
      console.log("typeof of {}:    ", typeof {});       // 'object'
      console.log("typeof of []:    ", typeof []);       // 'object'
      console.log("typeof of fn:    ", typeof function(){}); // 'function' ← 特例
      console.log("typeof of Symbol:", typeof Symbol());   // 'symbol'
      console.log("typeof of 1n:    ", typeof 1n);         // 'bigint'
    </script>
