<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>leakSuccess</div>
    <script>
      function outer() {
        const bigData = new Array(5000000).fill("11111"); // 创建一个大数组（约 500,000 元素）

        return function () {
          console.log("Closure is alive", bigData.length);
        };
      }
      let inner = outer();
      // console.log("I am inner,", inner);

      setTimeout(()=>{
        console.log("手动解除闭包引用!");
        inner = null;
      },15000)
    </script>
  </body>
</html>
