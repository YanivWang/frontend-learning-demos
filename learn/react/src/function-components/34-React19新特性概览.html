  主题: React 19 新特性概览
  要点:
    - React 19：Actions（useTransition 内 async）、useActionState、useOptimistic
    - use() 读取 Promise / Context，可在条件分支中调用（规则变化）
    - ref 作为 prop 传递，不再需要 forwardRef（逐步迁移）
    - 本仓库主运行时仍为 React 18.3.1；本页以 API 说明与 polyfill 思路为主
-->

  <pre>// React 19 示例（需 React 19 运行时）
const [error, submitAction, isPending] = useActionState(async (prev, formData) => {
  const res = await save(formData);
  return res.ok ? null : '失败';
}, null);

// use() 读取 Promise
const data = use(fetchUser(id));</pre>

  <script type="text/babel">
    const { useState, useTransition } = React;
    const { createRoot } = ReactDOM;

    function Demo() {
      const [pending, startTransition] = useTransition();
      const [result, setResult] = useState("idle");

      const runAction = () => {
        startTransition(async () => {
          setResult("loading…");
          await new Promise((r) => setTimeout(r, 600));
          setResult("done @ " + new Date().toLocaleTimeString());
        });
      };

      return (
        <div className="box">
          <h2>React 18 中的 Action 思路（useTransition + async）</h2>
          <p>React 19 的 <code>useActionState</code> 将此类模式标准化；此处用 18 API 模拟异步 Action。</p>
          <button type="button" onClick={runAction} disabled={pending}>
            {pending ? "提交中…" : "模拟 Action 提交"}
          </button>
          <p>状态：{result}</p>
        </div>
      );
    }

    createRoot(document.getElementById("root")).render(<Demo />);
  </script>
