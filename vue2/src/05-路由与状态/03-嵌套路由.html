<!--
  分类: vue2 / 05-路由与状态
  主题: 嵌套路由 + 默认子路由 + 编程式导航 push / replace
  要点:
    - 嵌套路由：父组件内部放 <router-view>，children 配置子路由
    - path: '' 表示父路由的默认子路由，访问 /user/:id 时渲染默认内容
    - $router.push 入栈历史；$router.replace 替换当前条目，不入栈（勿在同一函数里连续调用两者）
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 嵌套路由 + 编程式导航</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <div>
        <button @click="pushTo('/user/foo')">push /user/foo</button>
        <button @click="pushTo('/user/foo/profile')">push profile</button>
        <button @click="replaceTo('/user/foo/course')">replace course</button>
    </div>
    <p>
        <router-link to="/user/foo">/user/foo</router-link>
        <router-link to="/user/foo/profile">/user/foo/profile</router-link>
        <router-link to="/user/foo/course">/user/foo/course</router-link>
    </p>

    <router-view></router-view>
</div>

<script>
    const User = {
        template: `<div>
                      <div>user — id: {{ $route.params.id }}</div>
                      <router-view></router-view>
                   </div>`
    };

    const UserProfile = {
        template: `<div>用户简介</div>`
    };

    const Course = {
        template: `<div>课程</div>`
    };

    const routes = [
        {
            path: "/",
            component: {
                template: `<div>根目录 <router-view></router-view></div>`
            },
            redirect: "/dashboard",
            children: [
                {
                    path: '/dashboard',
                    component: {
                        template: '<div>dashboard 嵌套页</div>'
                    }
                }
            ]
        },
        {
            path: "/user/:id",
            component: User,
            children: [
                {
                    path: '',
                    component: {
                        template: '<div>Hello 我是 userHome（默认子路由 path: ""）</div>'
                    }
                },
                { path: 'profile', component: UserProfile },
                { path: 'course', component: Course }
            ]
        }
    ];

    const router = new VueRouter({ routes });

    new Vue({
        router,
        methods: {
            pushTo: function (param) {
                this.$router.push(param);
            },
            replaceTo: function (param) {
                this.$router.replace(param);
            }
        }
    }).$mount('#app');

    // 同一路由不同 params（/user/foo → /user/bar）会复用 User 组件，需 watch $route
</script>

</body>
</html>
