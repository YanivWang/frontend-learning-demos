<!--
  分类: javascript / 01-基础 / 正则
  主题: 用正则识别 URL 与图片格式
  要点:
    - URL 正则要兼顾 http/https + 域名 + 路径 + query
    - 图片扩展名匹配前 toUpperCase 可不分大小写
    - 易错点：大量 query 参数容易让贪婪量词回溯爆炸，按需收紧字符集
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正则 - URL 与图片格式</title>
</head>
<body>

<script>
    let src = "https://preview.redd.it/auxxzvikl0p31.jpg?width=640&crop=smart&auto=webp&s=dfd4acbecca8da105f7adcaa4a3f540454aa2d17";

    // URL 正则：协议 + 域名（至少包含一个 .）+ 可选路径 / 查询参数
    let regUrl = /(http|https):\/\/[\w\-_]+(\.[\w\-_]+)+([\w\-\.,@?^=%&:/~\+#]*[\w\-\@?^=%&/~\+#])?/;
    if (regUrl.test(src)){
        console.log("是链接");
    }

    // 把后缀转大写后用大写字母匹配，避免分别写 jpg|JPG|Jpg
    let regImg = /.*(\.(BMP|JPG|JPEG|PNG|GIF)).*/;
    if (regUrl.test(src) && regImg.test(src.toUpperCase())) {
        console.log("成功!");
    } else {
        console.log("失败!");
    }
</script>
