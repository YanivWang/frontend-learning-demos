<!doctype html>
<html lang="en" style="font-family: 'Courier New', Courier, monospace">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>安全区</title>

    <!-- 全局变量 -->
    <link rel="stylesheet" href="css/root.css" />

    <!-- 品牌样式 -->
    <link rel="stylesheet" href="css/brand.css" />

    <!-- 通用基础样式 -->
    <link rel="stylesheet" href="css/base.css" />

    <!-- 应用样式 -->
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="app">
      <header>header</header>
      <main>
        <h1>main</h1>
        <button onclick="switchBrand('green')">切换主题 green</button>
        <button onclick="switchBrand('red')">切换主题 red</button>
      </main>
      <footer>
        <div class="footer-content">footer</div>
        <div class="footer-placeholder">占位</div>
      </footer>
    </div>

    <script>
      // 切换主题的方式: 通过js修改html的data-brand属性
      // 然后在brand.css 中通过html属性选择器覆盖主题色(覆盖全局变量)
      function switchBrand(brand) {
        document.documentElement.style.removeProperty('--color-primary');
        document.documentElement.setAttribute('data-brand', brand);
      }
    </script>

    <!-- <script>
      const button = document.querySelector('button');
      button.addEventListener('click', () => {
        // 方案一: 通过设置html的style属性来设置css变量，覆盖:root中声明的全局css变量
        // 直接用 JS 写行内变量，优先级高于 :root stylesheet
        // 主题定义散落在 JS 里, 不如 brand.css 集中管理
        // document.documentElement.style.setProperty('--color-primary', '#3cc469');

        // 方案二: 通过设置html的data-brand属性来切换品牌主题(通过html的属性选择器，实现对:root中声明的全局css变量的覆盖)
        // 若此前用 style.setProperty 写过同名变量，须先移除行内覆盖，否则行内样式优先级更高，brand.css 不会生效
        document.documentElement.style.removeProperty('--color-primary');
        document.documentElement.setAttribute('data-brand', 'green');
      });
    </script> -->

    <script>
      //style: 读取 html 元素的行内样式
      console.log('======================= style =========================');
      const htmlStyle = document.documentElement.style;
      const fontFamily = htmlStyle.getPropertyValue('font-family'); //"Courier New", Courier, monospace
      console.log('fontFamily \n', fontFamily);

      //读取到 style 块中设置的css属性
      const colorPrimary = htmlStyle.getPropertyValue('--color-primary'); //#409eff
      console.log('color-primary \n', colorPrimary);

      //getComputedStyle: 读取 html 元素的计算样式  可以读到（css文件，style标签，style属性<内联样式>)
      console.log('======================= getComputedStyle =========================');
      const computedStyle = getComputedStyle(document.documentElement);

      const colorPrimary1 = computedStyle.getPropertyValue('--color-primary');
      console.log('colorPrimary1 \n', colorPrimary1);

      const headerBackgroundColor = computedStyle.getPropertyValue('--header-background-color');
      console.log('headerBackgroundColor \n', headerBackgroundColor);

      const fontSizeLarge = computedStyle.getPropertyValue('--font-size-large');
      console.log('fontSizeLarge \n', fontSizeLarge);

      const fontFamily2 = computedStyle.getPropertyValue('font-family');
      console.log('fontFamily2 \n', fontFamily2); //"Courier New", Courier, monospace

      // 通过 js 动态修改 css 变量（写入行内 style，优先级高于 stylesheet）
      // 演示：1s 后 header 会变灰；若之后点「切换主题」，需 removeProperty 才能让 data-brand 规则生效
      setTimeout(() => {
        document.documentElement.style.setProperty('--color-primary', '#dddddd');
        console.log(
          'color-primary \n',
          document.documentElement.style.getPropertyValue('--color-primary'),
        );
      }, 1000);

      //读取安全区
      setTimeout(() => {
        const safeTop = computedStyle.getPropertyValue('--safe-top');
        console.log('safeTop \n', safeTop);

        const safeBottom = computedStyle.getPropertyValue('--safe-bottom');
        console.log('safeBottom \n', safeBottom);

        document.querySelector('header').innerText = `safeTop: ${safeTop}`;
        document.querySelector('footer .footer-content').innerText = `safeBottom: ${safeBottom}`;
      }, 1000);
    </script>
  </body>
</html>
