<!DOCTYPE html>
<html lang="en">
<style>
</style>
<head>
    <meta charset="UTF-8">
    <title>演示文档</title>
    <script type="text/javascript" src="../testRecord/recordDemo/jquery-3.3.1.min.js"></script>
    <style type="text/css">
        div {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background: orange;
            position: absolute;
        }

    </style>
</head>
<body>


<div id="div1"></div>

<script>
    $(function(){
        $("#div1").mousedown(function () {

            //注意这里必须监听文档的mousemove和mouseup事件
            $(document).mousemove(function(e){
                $('#div1').offset({
                    left:e.pageX,
                    top:e.pageY
                })
            });
            $(document).mouseup(function(){
                $(document).off('mousemove')
            })
        });
    })
</script>

</body>
</html>
