<!--
  分类: javascript / 04-ES6+ / 异步 / Promise
  主题: 三种 Promise 串行写法对比
  要点:
    - new Promise(resolve=>resolve()).then(f1).then(f2)：起步显式
    - Promise.resolve().then(f1).then(f2)：最简洁，推荐
    - new Promise(f1).then(f2)：把 f1 当 executor，f1 必须遵循 (resolve, reject) 签名
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Promise 串行三种写法</title>
</head>
<body>

<script>
    const delay = 300;

    function f1() {
        return new Promise((resolve) => {
            setTimeout(() => {
                console.log("p1");
                resolve("one");
            }, delay);
        });
    }

    function f2() {
        return new Promise((resolve) => {
            setTimeout(() => {
                console.log("p2");
                resolve("two");
            }, delay);
        });
    }

    function f3() {
        return new Promise((resolve) => {
            setTimeout(() => {
                console.log("p3");
                resolve("three");
            }, delay);
        });
    }

    // 1. 显式 new Promise 起步再链式 then
    function serialStyle1() {
        return new Promise((resolve) => {
            resolve();
        }).then(f1).then(f2).then(f3);
    }

    // 2. Promise.resolve() 起步（推荐）
    function serialStyle2() {
        return Promise.resolve().then(f1).then(f2).then(f3);
    }

    // 3. 把函数当作 executor 传入 new Promise（必须接收 resolve/reject）
    function serialStyle3() {
        function executor(resolve) {
            setTimeout(() => {
                console.log("p1 (executor)");
                resolve();
            }, delay);
        }
        return new Promise(executor).then(f2).then(f3);
    }

    // 默认演示写法 2；取消注释可对比另外两种
    console.log("--- 写法 2: Promise.resolve().then(...) ---");
    serialStyle2();

    // serialStyle1();
    // serialStyle3();
</script>

</body>
</html>
