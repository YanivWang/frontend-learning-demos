<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Class</title>
  </head>
  <body>
    <script>
      class Person {
        //静态类属性
        static userType = "whitePerson";
        static #userTypeName = "wp";

        //公有实例属性
        userAge = 18;
        #userAgeName = 18;

        constructor(userName, weight) {
          //没有父类的，不能在构造器中调用super
          // super(userName); //Uncaught SyntaxError: 'super' keyword unexpected here

          //普通属性可以通过赋值创建
          this.userName = userName; //构造函数中创建 类 实例 的属性并初始化赋值

          //私有字段只能在字段声明中预先声明。它们不像普通属性那样可以通过赋值创建
          //this.#weight = weight;//Private field '#weight' must be declared in an enclosing class
        }

        //类的实例方法存储在实例的 prototype 中，供所有实例共用，而不是每个实例各自拥有一份
        eat() {
          console.log("p1.#userAgeName", p1.#userAgeName); //类的私有属性，只能在内的内部访问
          console.log("I am eatting!");
        }
      }

      console.log("================= Person =================")

      console.log(typeof Person);//function

      const p1 = new Person();
      p1.eat();

      console.log(typeof p1);//object

      console.log("类的prototype属性和类实例的__proto__,都是指向其类的原型对象", Person.prototype === p1.__proto__);

      class WhitePerson extends Person {
        skinColor= "white"

        constructor(userName){
          // console.log(11111111);

          //Must call super constructor in derived class before accessing 'this'
          // console.log("this.skinColor", this.skinColor);
          super(userName)//必须在派生类中的constructor中调用super
        }
      }

      console.log("================= WhitePerson =================")
      const whitePerson1 = new WhitePerson("特朗普");
      whitePerson1.eat();
      console.log(whitePerson1.userName);
    </script>
  </body>
</html>
