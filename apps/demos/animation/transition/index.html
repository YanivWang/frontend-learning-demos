<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1>Transition</h1>
    <!--
    功能: transition 主要是做从状态1 切到状态2的过渡动画？
    1.必须有触发事件(hover, active, focus, etc. 或 JS 加减 class) transition 自己不会主动运行,导致属性值改变才会执行
    2.必须有起始状态和结束状态（只能定义两种状态),中间过程由浏览器自动插值
    3.必须有过渡效果 transition 属性值变化才会执行

    (1)如果你想控制超过两种状态的过渡动画 A → B → C ，可以使用 animation 来实现
    (2)自动循环播放
    (3)控制中间某帧的具体样式（控制超过两种状态）
    @keyframes + animation，而不是 transition
    -->

    <div class="card hover-me">hover me</div>

    <div class="card active-me">click me</div>

    <div class="card focus-me">
      <input type="text" placeholder="focus me" />
    </div>

    <div class="hover-zone1 hover-zone">
      <div class="card display-none">display none 瞬间消失</div>
    </div>

    <div class="hover-zone2 hover-zone">
      <div class="card display-none">display none离散动画</div>
    </div>
  </body>
</html>
