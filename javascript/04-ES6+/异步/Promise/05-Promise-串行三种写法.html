<!--
  分类: javascript / 04-ES6+ / 异步 / Promise
  主题: 三种 Promise 串行写法对比
  要点:
    - new Promise(resolve=>resolve()).then(f1).then(f2)：起步显式
    - Promise.resolve().then(f1).then(f2)：最简洁，推荐
    - new Promise(f1).then(f2)：把 f1 当 executor，f1 必须遵循 (resolve, reject) 签名
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Promise 串行三种写法</title>
</head>
<body>

<script>
    function f1() {
        return new Promise((resolve, reject) => {
            setTimeout(function (param) {
                resolve(param);

                console.log("p1");
            }, 5000, 'one', 'one222');
        });
    }

    function f2() {
        return new Promise((resolve, reject) => {
            setTimeout(function (param) {
                resolve(param);

                console.log("p2");
            }, 4000, "two");
        });
    }

    function f3() {
        return new Promise((resolve, reject) => {
            setTimeout(function (param) {
                resolve(param);

                console.log("p3");
            }, 7000, "three");
        });
    }

    //1.串行执行
    /*
    new Promise((resolve, reject)=>{
        resolve();
    }).then(f1).then(f2).then(f3);
    */
    //2.串行执行
    //Promise.resolve().then(f1).then(f2).then(f3);

    //3.串行执行
    //new Promise(f1).then(f2).then(f3);
</script>

</body>
</html>
