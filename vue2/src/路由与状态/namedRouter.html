<!--
  分类: vue2 / 路由与状态
  主题: 命名路由（router-link :to="{ name: 'xxx' }"）
  要点:
    - 给 route 加 name 后，可用 { name } 跳转，无需硬编码 path
    - 同样适用于编程式：router.push({ name: 'user', params: { id: 1 } })
    - 顺带演示 js-cookie 读取浏览器 Cookie；离线访问可能因 CDN 不可达失败
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 命名路由</title>
    <script src="../../libs/vue2.js"></script>
    <script src="../../libs/vue-router.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/js-cookie@2/src/js.cookie.min.js"></script>
</head>
<body>

<div id="app">
    <p>
        <router-link v-bind:to="{name:'user'}">User</router-link>
        <router-link v-bind:to="{name:'about'}">About</router-link>
    </p>
    <router-view></router-view>
</div>

<script>
    console.log(111);

    var name = Cookies.get("name");

    console.log("name:" + name);


    //1.定义路由组件
    const User = {
        template: `<div>
                      <div>User</div>
                      <div>{{$route.params.id}}</div>
                      <router-view></router-view>
                   </div>`
    };

    const About = {
        template: `<div>About</div>`
    };

    //2.定义路由
    const routes = [
        {
            name: "user",
            path: "/user",
            component: User
        },
        {
            name: "about",
            path: "/about",
            component: About
        }
    ];

    //3.创建router实例，然后传入"router"配置
    const router = new VueRouter({
        routes
    });

    //4.创建和挂在根实例
    //通过为根实例注入路由器：我们可以在任何组件内通过this.$router访问路由器  this.$route访问当前的路由
    var wm = new Vue({
        router
    }).$mount('#app');

</script>

</body>
</html>
