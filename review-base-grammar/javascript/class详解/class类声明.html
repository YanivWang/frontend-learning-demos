<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Class</title>
  </head>
  <body>
    <script>
      //1.类声明不会提升(函数声明会提升)
      //Uncaught ReferenceError: Cannot access 'Person' before initialization
      //const p = new Person(); 

      //使用Class关键字声明一个Person类
      //类声明不会提升
      //类的主体部分需要被{}包裹
      //类的主体会在严格模式下执行
      //空的类声明也是有效的
      class Person {

      }


      //class 声明和let非常类似，不具有提升，有暂时性死区
      class WhitePerson {
        //{} 包裹的是类声明的主体，在严格模式下运行

        static userType = "whitePerson"//类的静态属性，类初始化的时候会执行

        //使用类字段(类的静态属性,类的实例属性)声明语法，定义一个类字段
        userAge = 18;//类的实例属性，类初始化的时候，不会执行

        //类字段和对象属性相似，不属于变量，不需要使用const一类的关键字去声明它们
        userHeight;

        //私有属性使用 #+类字段名称
        #privateField;
        #privateId = 10001;

        //类的构造器，构造函数，用于构造类实例并初始化类实例
        constructor(userName){
          super()//使用super访问父类构造函数
          this.userName = userName;//构造函数中创建 类 实例 的属性并初始化赋值
        }
      }

      WhitePerson = "new Class";

      console.log(1111111111);

      //Uncaught SyntaxError: Identifier 'WhitePerson' has already been declared
      //const WhitePerson = 123;

    </script>
  </body>
</html>
