<!--
  分类: react / 函数组件
  主题: 函数组件 + props 传值（计数器示例）
  要点:
    - 函数组件唯一参数是 props 对象；从父级传入的所有 attribute 都被打包进 props
    - props 是只读的；要更新视图需重新调用 render（或者使用 state / hooks）
  修正:
    - 清理多个空 @Description 注释；标题改为可读
    - ReactDOM.render 已废弃；改为复用一次性创建的 createRoot
-->
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>React · 函数组件与 props</title>
  <!-- react核心库 -->
  <script src="../libs/react18.js"></script>
  <!-- react用来操作dom的库 -->
  <script src="../libs/react-dom18.js"></script>

  <!-- Don't use this in production: -->
  <!-- 引入 babel 是用来编译jsx的 -->
  <script src="../libs/babel.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const container = document.getElementById("root");
    // 修正：React 18 推荐 createRoot；root 只创建一次后复用
    const root = ReactDOM.createRoot(container);

    //返回一个更新后得组件，组件内容可以通过这个props对象，访问从父组件传递过来得属性
    function Counter(props) {
      const element = <div>{props.count}</div>;
      return element;
    }

    //执行组件渲染逻辑
    let count = 0;
    function tick() {
      count++;
      // 给 render 方法传入的第一个参数组件，所有传递的属性最终会被封装成 props 对象
      root.render(<Counter count={count} />);
    }

    //没隔一秒创建一个新元素，并将其传入到ReactDOM.render方法中，实现界面得更新
    setInterval(tick, 1000)
  </script>

</body>

</html>
