<!--
  分类: vue3 / 08-原理与性能面试
  主题: Proxy 响应式原理
  要点:
    - Vue3 用 Proxy 拦截对象读取和修改
    - 读取时 track 收集依赖，修改时 trigger 触发更新
    - 相比 Vue2 defineProperty，Proxy 对新增属性、删除属性、数组索引更自然
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · Proxy 响应式原理</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { margin-right: 8px; padding: 6px 12px; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; max-height: 260px; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 860px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Proxy 响应式原理</h1>
      <div class="box">
        <button @click="state.count++">count +1</button>
        <button @click="state.extra = '新增属性也能触发'">新增属性</button>
        <pre>{{ logs.join("\n") }}</pre>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li>Vue3 响应式核心可以简化理解为：<code>get</code> 时收集依赖，<code>set</code> 时通知依赖重新执行。</li>
        <li><code>reactive</code> 返回的是代理对象，原对象本身不是响应式入口。</li>
        <li>Vue3 对新增属性、删除属性、数组索引变化的处理比 Vue2 更自然，不再需要 <code>Vue.set</code>。</li>
      </ul>
    </div>

    <script>
      const { createApp, reactive, watchEffect, ref } = Vue;

      createApp({
        setup() {
          const state = reactive({ count: 0 });
          const logs = ref([]);

          watchEffect(() => {
            logs.value.push(`effect 重新执行：count=${state.count} extra=${state.extra || ""}`);
          });

          return { state, logs };
        },
      }).mount("#app");
    </script>
  </body>
</html>
