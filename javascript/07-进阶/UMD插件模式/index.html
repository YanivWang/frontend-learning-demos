<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>UMD 插件模式</title>
  <script src="lib/plugin.js"></script>
</head>
<body>
  <h1>UMD（Universal Module Definition）插件模式</h1>
  <p>同一份代码自动适配 AMD / CommonJS / 浏览器全局三种模块系统，是早期 jQuery、lodash 等老牌库的标配。</p>
  <p>查看控制台输出。</p>

  <script>
    // 1) 默认配置
    console.log("默认 settings:", JSON.stringify(Record.settings));

    // 2) 链式调用：configure → start
    Record.configure({ min: 999, max: 999, speed: 999 }).start();
    console.log("新 settings:", JSON.stringify(Record.settings));

    // 3) 异步停止
    setTimeout(() => Record.stop(), 1500);

    // ===== 顺带演示一个常见陷阱：a = b = {...} =====
    // 等价于 a = (b = {...})，b、a 引用同一个对象
    let a, b;
    a = b = { speed: 50, time: 10 };
    a.speed = 30;
    console.log("a 和 b 是同一个对象:", a === b);
    console.log("b.speed 也变了:", b.speed); // 30
  </script>
</body>
</html>
