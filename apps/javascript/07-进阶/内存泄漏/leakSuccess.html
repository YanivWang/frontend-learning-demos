<!--
  分类: javascript / 07-进阶 / 内存泄漏
  主题: 通过手动置 null 释放闭包引用
  要点:
    - inner 持有 outer 的局部变量 bigData，会阻止其回收
    - 把 inner 置为 null 后，闭包链断裂，GC 可回收
    - 用 DevTools 在置 null 前后做 Heap snapshot 对比可直观看到差异
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内存泄漏 - 闭包置 null 释放</title>
  </head>
  <body>
    <div>leakSuccess</div>
    <script>
      function outer() {
        const bigData = new Array(5000000).fill("11111"); // 创建一个大数组（约 5,000,000 元素）

        return function () {
          console.log("Closure is alive", bigData.length);
        };
      }
      let inner = outer();
      // console.log("I am inner,", inner);

      setTimeout(()=>{
        console.log("手动解除闭包引用!");
        inner = null;
      },15000)
    </script>
