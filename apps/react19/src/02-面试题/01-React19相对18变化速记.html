<!--
  分类: react19 / 02-面试题
  主题: React 19 相对 18 变化速记
  要点:
    - 新 Hooks：useActionState、useOptimistic、use（及 useFormStatus 在 react-dom）
    - Actions：表单 action、transition 内异步更新标准化
    - ref 可作为 prop；官方移除 UMD，推荐 ESM CDN 或构建工具
    - 文档元数据、资源预加载等 API；RSC 在框架层（Next.js 等）落地
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>面试 · React 19 vs 18</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 820px; line-height: 1.55; }
    table { border-collapse: collapse; width: 100%; font-size: 0.92rem; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.65rem; text-align: left; vertical-align: top; }
    th { background: #f6f8fa; }
    .tag { display: inline-block; background: #ddf4ff; color: #0969da; padding: 0.1rem 0.45rem; border-radius: 4px; font-size: 0.8rem; margin-right: 0.25rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const rows = [
      ["表单异步状态", "useState + 手写 pending", "useActionState + form action"],
      ["乐观 UI", "手动临时 state", "useOptimistic"],
      ["读 Promise / Context", "useEffect + useContext", "use() + Suspense"],
      ["ref 传给函数组件", "forwardRef 包裹", "ref 作为普通 prop"],
      ["script 标签引入", "官方 UMD 包", "ESM（esm.sh）或 umd-react 社区包"],
      ["服务端组件", "无官方 RSC", "react-server 包 + 框架集成"],
    ];

    function CheatSheet() {
      return (
        <section>
          <h1>React 19 相对 18 — 面试速记</h1>
          <p>
            当前运行时：<strong>React {React.version}</strong>（本模块 umd-react）
          </p>
          <table>
            <thead>
              <tr>
                <th>主题</th>
                <th>React 18</th>
                <th>React 19</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(([topic, r18, r19]) => (
                <tr key={topic}>
                  <td>{topic}</td>
                  <td>{r18}</td>
                  <td>{r19}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <h2>高频追问</h2>
          <ul>
            <li><span className="tag">Actions</span>为何要把异步提交放进 transition？— 保持 UI 可响应，pending 状态可追踪。</li>
            <li><span className="tag">use()</span>为何能在 if 里调用？— 由编译器/运行时与 Suspense 协同，不同于传统 Hook 链表规则。</li>
            <li><span className="tag">升级</span>18→19 先跑 codemod，检查 defaultProps on function components、字符串 ref 等废弃用法。</li>
          </ul>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CheatSheet />);
  </script>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">

    .demo-nav a { color: #0969da; text-decoration: none; }
    .demo-nav a:hover { text-decoration: underline; }
    .demo-output { margin-top: 1rem; padding: 0.75rem 1rem; background: #f6f8fa; border-radius: 8px; font-family: ui-monospace, monospace; font-size: 0.8125rem; white-space: pre-wrap; max-height: 240px; overflow: auto; }
    .demo-output:empty { display: none; }
  </style>
  <a href="/" data-demo-catalog data-file-catalog="../../../index.html">目录</a>
  <a href="../01-%E5%9F%BA%E7%A1%80%E8%AF%AD%E6%B3%95/06-ref%E4%BD%9C%E4%B8%BAprop%E4%BC%A0%E9%80%92.html">← ref作为prop传递</a>
  <a href="./02-%E8%A1%A8%E5%8D%95Action%E4%B8%8EuseFormStatus.html">表单Action与useFormStatus →</a>
  <script>
    (function () {
      var a = document.querySelector("[data-demo-catalog]");
      if (a && location.protocol === "file:" && a.dataset.fileCatalog) {
        a.setAttribute("href", a.dataset.fileCatalog);
      }
    })();
  </script>
</footer>

</body>
</html>
