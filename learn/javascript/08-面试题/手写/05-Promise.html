<!--
  分类: javascript / 08-面试题 / 手写
  主题: 面试简化版 Promise
  要点:
    - Promise 有 pending / fulfilled / rejected 三种状态，状态一旦改变不可逆
    - then 返回新 Promise，以支持链式调用
    - 回调异步执行；这里用 queueMicrotask 模拟微任务入队
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>手写 Promise</title>
</head>
<body>
  <h1>面试简化版 Promise</h1>
  <p>打开控制台查看断言结果。</p>

  <script>
    const PENDING = "pending";
    const FULFILLED = "fulfilled";
    const REJECTED = "rejected";

    class MyPromise {
      constructor(executor) {
        this.status = PENDING;
        this.value = undefined;
        this.reason = undefined;
        this.onFulfilledCallbacks = [];
        this.onRejectedCallbacks = [];

        const resolve = value => {
          if (this.status !== PENDING) return;
          queueMicrotask(() => {
            if (this.status !== PENDING) return;
            this.status = FULFILLED;
            this.value = value;
            this.onFulfilledCallbacks.forEach(fn => fn());
          });
        };

        const reject = reason => {
          if (this.status !== PENDING) return;
          queueMicrotask(() => {
            if (this.status !== PENDING) return;
            this.status = REJECTED;
            this.reason = reason;
            this.onRejectedCallbacks.forEach(fn => fn());
          });
        };

        try {
          executor(resolve, reject);
        } catch (error) {
          reject(error);
        }
      }

      then(onFulfilled, onRejected) {
        const realOnFulfilled = typeof onFulfilled === "function" ? onFulfilled : value => value;
        const realOnRejected = typeof onRejected === "function" ? onRejected : reason => { throw reason; };

        return new MyPromise((resolve, reject) => {
          const fulfilledTask = () => {
            queueMicrotask(() => {
              try {
                const result = realOnFulfilled(this.value);
                resolvePromise(result, resolve, reject);
              } catch (error) {
                reject(error);
              }
            });
          };

          const rejectedTask = () => {
            queueMicrotask(() => {
              try {
                const result = realOnRejected(this.reason);
                resolvePromise(result, resolve, reject);
              } catch (error) {
                reject(error);
              }
            });
          };

          if (this.status === FULFILLED) {
            fulfilledTask();
          } else if (this.status === REJECTED) {
            rejectedTask();
          } else {
            this.onFulfilledCallbacks.push(fulfilledTask);
            this.onRejectedCallbacks.push(rejectedTask);
          }
        });
      }

      catch(onRejected) {
        return this.then(null, onRejected);
      }

      finally(callback) {
        return this.then(
          value => MyPromise.resolve(callback()).then(() => value),
          reason => MyPromise.resolve(callback()).then(() => { throw reason; })
        );
      }

      static resolve(value) {
        if (value instanceof MyPromise) return value;
        return new MyPromise(resolve => resolve(value));
      }

      static reject(reason) {
        return new MyPromise((resolve, reject) => reject(reason));
      }
    }

    function resolvePromise(result, resolve, reject) {
      if (result instanceof MyPromise) {
        result.then(resolve, reject);
      } else {
        resolve(result);
      }
    }

    MyPromise.resolve(1)
      .then(value => value + 1)
      .then(value => {
        console.assert(value === 2, "then chain passes value");
        return new MyPromise(resolve => setTimeout(() => resolve(value + 1), 20));
      })
      .then(value => {
        console.assert(value === 3, "then unwraps MyPromise result");
        console.log("chain result:", value);
      });

    MyPromise.reject("fail")
      .catch(reason => {
        console.assert(reason === "fail", "catch receives rejection");
        return "recovered";
      })
      .finally(() => console.log("finally called"))
      .then(value => console.log("catch result:", value));
  </script>
</body>
</html>
