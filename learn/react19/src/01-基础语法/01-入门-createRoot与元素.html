<!--
  分类: react19 / 01-基础语法
  主题: React 19 元素与 createRoot 渲染
  要点:
    - JSX 经 Babel 转译为 React.createElement，得到 React 元素（普通对象）
    - ReactDOM.createRoot(container).render(element) 为唯一推荐挂载方式
    - React 19 仍基于元素不可变：更新界面需 render 新元素树
    - 本模块使用 React 19 运行时（umd-react），与 learn/react18 的 18.3.1 分离
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 19 · 元素与 createRoot</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; line-height: 1.6; }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: 1rem 1.25rem; margin: 1rem 0; }
    code { background: #f6f8fa; padding: 0.1em 0.35em; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const element = React.createElement(
      "p",
      { className: "hint" },
      "createElement 返回的就是 React 元素对象"
    );

    function Greeting({ name }) {
      return (
        <div className="box">
          <h1>你好，{name}</h1>
          {element}
          <p>当前 React 版本标识：{React.version}</p>
        </div>
      );
    }

    function App() {
      const [name, setName] = useState("React 19");
      return (
        <section>
          <Greeting name={name} />
          <button type="button" onClick={() => setName("学习者")}>
            改名（重新 render 新 props）
          </button>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">
  <style>
    .demo-nav { margin: 2.5rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e3e3e3; font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; }
    .demo-nav a { color: #0969da; text-decoration: none; }
  </style>
  <a href="/">目录</a>
</footer>
<!-- DEMO_NAV_END -->
</body>
</html>
