<!--
  分类: vue2 / 05-路由与状态
  主题: 嵌套路由与默认子路由（path: ''）
  要点:
    - 嵌套路由：父路由组件中放 <router-view>，并通过 children 配置子路由
    - path: '' 表示「父路由的默认子路由」，匹配 /user/:id 时直接显示默认内容
    - 同路径多路由按定义顺序匹配，先到先得
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue-router · 嵌套路由与默认子路由</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <p>
        <router-link to="/user/foo">/user/foo（显示默认子路由 Hello）</router-link>
        <router-link to="/user/foo/profile">/user/foo/profile</router-link>
        <router-link to="/user/foo/course">/user/foo/course</router-link>
    </p>
    <router-view></router-view>
</div>

<script>
    const User = {
        template: `<div>
            <div>user — id: {{ $route.params.id }}</div>
            <router-view></router-view>
        </div>`
    };

    const UserProfile = { template: `<div>用户简介</div>` };
    const Course = { template: `<div>课程</div>` };

    const routes = [
        {
            path: "/user/:id",
            component: User,
            children: [
                {
                    path: '',
                    component: { template: '<div>Hello（默认子路由 path: ""）</div>' }
                },
                { path: 'profile', component: UserProfile },
                { path: 'course', component: Course }
            ]
        }
    ];

    const router = new VueRouter({ routes });

    new Vue({ router }).$mount('#app');

    // 同一路由不同 params（/user/foo → /user/bar）会复用 User 组件
</script>
