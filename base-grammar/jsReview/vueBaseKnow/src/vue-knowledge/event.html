<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>
<body>

<div id="content">
    <!--v-on接受一个调用方法的名称，或者是直接调用方法-->
    <div v-on:click="clickHandle1">点击1</div>

    <div v-on:click="clickHandle2('say')">点击2</div>

    <div v-on:click="clickHandle3('say', $event)">点击3</div>

    <!--所有的绑定表达式都是一个js表达式-->
    <div v-on:click="count = count + 1">计数： {{count}}</div>
</div>

<script>
    var vm = new Vue({
        el: "#content",
        data: {
            count: 0
        },
        methods: {
            clickHandle1: function (e) {
                //这里的e是原生的dom事件
                console.log(e);
            },
            clickHandle2: function (msg) {
                //传递的参数
                console.log(msg);
            },
            clickHandle3: function (msg, e) {
                //这里的e是原生的dom事件
                console.log(msg + "=" + e);
            }
        }
    });
</script>


</body>
</html>
