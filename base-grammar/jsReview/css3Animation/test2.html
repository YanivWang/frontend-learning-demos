<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .testDiv {
            width: 50px;
            height: 50px;
            background-color: red;
            animation: spinnerAni 2s linear infinite;
        }

        @keyframes spinnerAni {
            0% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(180deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="testDiv">

</div>


</body>
</html>
