<!--
  分类: css / 01-基础 / 单位与函数
  主题: px、em、rem、百分比、vw/vh、calc、clamp、CSS 变量
  要点:
    - em 参考自身或父级字体大小，rem 参考 html 根字体大小
    - 百分比通常参考包含块，vw/vh 参考视口
    - calc() 做混合计算，clamp(min, preferred, max) 常用于响应式字号和宽度
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS 单位与函数</title>
  <style>
    :root {
      --brand: #2f80ed;
      --gap: 16px;
      font-size: 16px;
    }
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
    h1 { font-size: clamp(1.25rem, 2vw + 1rem, 2rem); }
    .parent {
      font-size: 20px;
      width: min(720px, 90vw);
      padding: var(--gap);
      border: 1px solid #ddd;
    }
    .cards { display: flex; gap: var(--gap); flex-wrap: wrap; }
    .card {
      width: calc(50% - var(--gap) / 2);
      min-width: 220px;
      padding: 1rem;
      color: #fff;
      background: var(--brand);
      box-sizing: border-box;
    }
    .em { font-size: 1.5em; }
    .rem { font-size: 1.5rem; }
    .viewport { width: 50vw; height: 12vh; background: #e5f6df; margin-top: 16px; padding: 8px; }
  </style>
</head>
<body>
  <h1>单位与现代 CSS 函数</h1>
  <div class="parent">
    <p>父级字体是 20px。</p>
    <p class="em">1.5em = 30px，跟父级走。</p>
    <p class="rem">1.5rem = 24px，跟 html 根字号走。</p>
    <div class="cards">
      <div class="card">calc() 计算两列宽度</div>
      <div class="card">var() 复用主题色和间距</div>
    </div>
    <div class="viewport">50vw 宽，12vh 高，跟视口走。</div>
  </div>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">

    .demo-nav { margin: 2.5rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e3e3e3; font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; }
    .demo-nav a { color: #0969da; text-decoration: none; }
    .demo-nav a:hover { text-decoration: underline; }
    .demo-output { margin-top: 1rem; padding: 0.75rem 1rem; background: #f6f8fa; border-radius: 8px; font-family: ui-monospace, monospace; font-size: 0.8125rem; white-space: pre-wrap; max-height: 240px; overflow: auto; }
    .demo-output:empty { display: none; }
  </style>
  <a href="/" data-demo-catalog data-file-catalog="../../../index.html">目录</a>
  <a href="../../index.html">← index</a>
  <a href="../%E7%9B%92%E6%A8%A1%E5%9E%8B/index.html">index →</a>
  <script>
    (function () {
      var a = document.querySelector("[data-demo-catalog]");
      if (a && location.protocol === "file:" && a.dataset.fileCatalog) {
        a.setAttribute("href", a.dataset.fileCatalog);
      }
    })();
  </script>
</footer>
<!-- DEMO_NAV_END -->
</body>
</html>
