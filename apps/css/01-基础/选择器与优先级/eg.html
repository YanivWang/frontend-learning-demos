<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #eeeeee;
      }
      /*
        p, h1 是元素名，也叫标签名
        <p> 开始标签
        </p>   结束标签
        <p>Hello</p> 才是元素本身
      */

      /*
        一.标签名(元素名)选择器
        选中所有 p 和 div 元素
      */
      p,
      div {
        border: 2px dotted rgb(157, 157, 16);
      }

      /*
        二.类选择器
        选中所有 class="class-box" 的元素
      */
      .class-box {
        font-weight: bold;
        font-style: italic;
      }

      /*
        三.ID选择器
        选中所有 id="id-box" 的元素
        ID 在一个页面里应该唯一，所以通常只命中一个元素
      */
      #id-box {
        background-color: #ddd;
      }

      /*
        四.通配选择器
        选中页面所有元素（所有元素都会应用样式）
      */
      * {
        text-decoration: underline;
        text-decoration-color: blue;
        padding: 5px;
      }

      /*
        五.属性选择器
      */
    </style>
  </head>
  <body>
    <!-- 标签名(元素名)选择器 -->
    <p>标签选择器-p</p>
    <div>标签选择器-div</div>

    <!-- 类选择器 -->
    <p class="class-box">类选择器-p</p>
    <div class="class-box">类选择器-div</div>

    <!-- ID选择器 -->
    <p id="id-box">id选择器-p</p>
    <div id="id-box">id选择器-div</div>

    <!-- 通配符选择器 -->
    <p>通配符选择器-p</p>
    <div>通配符选择器-div</div>

    <!-- 属性选择器 -->
    <p>属性选择器-p</p>
    <div>属性选择器-div</div>
  </body>
</html>
