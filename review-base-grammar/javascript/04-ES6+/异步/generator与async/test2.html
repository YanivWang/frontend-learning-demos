<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //async 函数是generate函数的语法糖
    function timeout(ms) {
        return new Promise(function (resolve, reject) {
            setTimeout(resolve,ms)
        })
    }

    async function asyncPrint(value,ms) {
        await timeout(ms);
        console.log(value);
    }

    //async函数，本身也是返回Promise
    asyncPrint("print", 3000)
</script>

</body>
</html>
