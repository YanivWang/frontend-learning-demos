<!--
  分类: react / hooks
  主题: useLayoutEffect 与 useEffect 对比
  要点:
    - useEffect 在浏览器绘制后异步执行，不阻塞视觉更新
    - useLayoutEffect 在 DOM 变更后、浏览器绘制前同步执行
    - 需要同步读/写 DOM 布局（测量尺寸、避免闪烁）时用 useLayoutEffect
    - 大多数数据请求、订阅等副作用用 useEffect 即可
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · useLayoutEffect 对比</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useLayoutEffect, useRef, useState } = React;

    function Tooltip({ text }) {
      const boxRef = useRef(null);
      const [top, setTop] = useState(0);

      // 绘制前调整位置，避免 tooltip 先出现在错误位置再跳动
      useLayoutEffect(() => {
        if (!boxRef.current) return;
        const rect = boxRef.current.getBoundingClientRect();
        if (rect.bottom > window.innerHeight - 40) {
          setTop(-48);
        } else {
          setTop(24);
        }
      }, [text]);

      useEffect(() => {
        console.log("useEffect: 绘制完成后执行，适合请求/订阅");
      }, [text]);

      return (
        <div style={{ position: "relative", marginTop: 120 }}>
          <button>悬停目标</button>
          <div
            ref={boxRef}
            style={{
              position: "absolute",
              top,
              left: 0,
              background: "#333",
              color: "#fff",
              padding: "4px 8px",
              borderRadius: 4
            }}
          >
            {text}
          </div>
        </div>
      );
    }

    function App() {
      const [text, setText] = useState("短提示");

      return (
        <section>
          <h1>useLayoutEffect 与 useEffect</h1>
          <button onClick={() => setText(text === "短提示" ? "这是一段更长的提示文字" : "短提示")}>
            切换 tooltip 文案
          </button>
          <Tooltip text={text} />
          <p>面试回答: useLayoutEffect 同步阻塞绘制，仅用于 DOM 测量/同步布局；其余用 useEffect。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
