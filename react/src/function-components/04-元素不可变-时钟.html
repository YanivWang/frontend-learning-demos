<!--
  分类: react / 入门
  主题: React 元素的「不可变」特性
  要点:
    - React 元素是不可变 JS 对象：要更新视图，只能重新创建并重新 render
    - React 内部用 diff 找出真实 DOM 的最小差异，只更新需要变化的节点
    - createRoot 在外面创建一次，每次 tick 复用同一个 root 调用 render（勿每次 tick 重新 createRoot）
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>React · 元素不可变（时钟）</title>
    <script src="../../libs/react.development.js"></script>
    <script src="../../libs/react-dom.development.js"></script>
    <script src="../../libs/babel.min.js"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    /*
    1.下面的 element 叫做“元素”,元素是react应用的最小单位，它用于描述屏幕上输出的内容
    2.这个“元素”不同于浏览器中的DOM元素，这个“元素”只是“普通的js对象”
      (React DOM 确保浏览器DOM元素的数据内容 和 React元素的数据内容一致)
      这个所谓的元素其实就是虚拟DOM(vnode)

    3.要想把元素渲染到页面的DOM容器中，需要调用 root.render(element)
    3.1 这个方法负责将元素解析为DOM节点
    3.2 然后插入到DOM树中
    */

    // root 只创建一次，每次 tick 复用同一个 root 调用 render
    const root = ReactDOM.createRoot(document.getElementById('root'));

    function tick() {
        const element =
            <div>
                <h1>当前的时间:</h1>
                <h2>{new Date().toLocaleTimeString()}</h2>
            </div>
            ;

        root.render(element);
    }

    /*
    4. React元素都是不可变的，当元素被创建之后，你是无法改变其内容和属性的
    更新界面的唯一方式，就是创建一个新的元素，然后把它传入 root.render()
    */
    setInterval(tick,1000)
</script>

</body>
</html>
