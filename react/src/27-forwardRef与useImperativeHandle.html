<!--
  分类: react / ref
  主题: forwardRef 与 useImperativeHandle
  要点:
    - 普通函数组件不能直接接收 ref，需要 forwardRef 转发
    - useImperativeHandle 可以限制父组件能调用的实例方法
    - 这类命令式调用应少用，优先使用 props/state 的声明式数据流
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · forwardRef</title>
  <script src="../libs/react.development.js"></script>
  <script src="../libs/react-dom.development.js"></script>
  <script src="../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { forwardRef, useImperativeHandle, useRef, useState } = React;

    const SearchInput = forwardRef(function SearchInput(props, ref) {
      const inputRef = useRef(null);
      const [value, setValue] = useState("");

      useImperativeHandle(ref, () => ({
        focus() {
          inputRef.current.focus();
        },
        clear() {
          setValue("");
          inputRef.current.focus();
        }
      }));

      return (
        <input
          ref={inputRef}
          value={value}
          onChange={e => setValue(e.target.value)}
          placeholder="输入关键词"
        />
      );
    });

    function App() {
      const searchRef = useRef(null);

      return (
        <section>
          <h1>forwardRef 与 useImperativeHandle</h1>
          <SearchInput ref={searchRef} />
          <button onClick={() => searchRef.current.focus()}>聚焦</button>
          <button onClick={() => searchRef.current.clear()}>清空</button>
          <p>面试回答: forwardRef 负责转发 ref，useImperativeHandle 负责暴露受控的命令式 API。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
