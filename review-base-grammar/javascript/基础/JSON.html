<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let book = {
        title: "Professional JavaScript",
        authors: ["Nicholas C. Zakas", "Matt Frisbie"],
        edition: 4,
        year: 2017,
      };

      let jsonText111 = JSON.stringify(
        book,
        (key, value) => {
          switch (key) {
            case "authors":
              return value.join(",");
            case "year":
              return 5000;
            case "edition":
              return undefined;
            default:
              return value;
          }
        },
        4
      );

      let jsonText222 = JSON.stringify(book);
      console.log("jsonText111 \n>>>", jsonText111);
      console.log("jsonText222 \n>>>", jsonText222);

      let jsObj = {
        sum: (a, b) => a + b,
        name: "calcutor",
        wc: undefined,
        address: "",
        date: new Date(),
        reg: new RegExp("abc", "g"),
        symbol: Symbol(),
        nan: NaN,
        infinity: Infinity
      };

      let jsonText333 = JSON.stringify(jsObj,null, 3);
      console.log("jsonText333 \n>>>", jsonText333);
    </script>
  </body>
</html>
