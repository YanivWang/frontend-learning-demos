<!--
  分类: vue2 / 原理与性能
  主题: Vue2 常见性能优化
  要点:
    - 列表渲染使用稳定 key，避免 index key 导致错误复用
    - 大列表可分页、虚拟滚动，或先在非响应式临时变量中处理后整体赋值
    - computed 适合有缓存的派生数据，methods 每次渲染都会重新执行
    - keep-alive 可缓存频繁切换的组件，但缓存过多也会占内存
    - 路由组件可懒加载，减少首屏加载体积
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Vue2 常见性能优化</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <button @click="createListBad">逐个 push 1000 条</button>
    <button @click="createListGood">临时数组处理后整体赋值</button>
    <button @click="toggle = !toggle">触发一次重新渲染</button>

    <p>visibleTotal(computed): {{ visibleTotal }}</p>
    <p>visibleTotalByMethod(methods): {{ visibleTotalByMethod() }}</p>
    <p>toggle: {{ toggle }}</p>
    <ul>
        <li v-for="item in list.slice(0, 5)" :key="item.id">{{ item.text }}</li>
    </ul>
    <pre>{{ logs.join('\n') }}</pre>
</div>

<script>
    new Vue({
        el: "#app",
        data() {
            return {
                list: [],
                toggle: false,
                logs: []
            };
        },
        computed: {
            visibleTotal() {
                console.count("computed visibleTotal");
                return this.list.length;
            }
        },
        methods: {
            createListBad() {
                this.list = [];
                for (let i = 0; i < 1000; i++) {
                    this.list.push({ id: i, text: "item-" + i });
                }
                this.logs.push("逐个 push 会触发大量响应式通知，真实项目大数据量要谨慎");
            },
            createListGood() {
                const next = [];
                for (let i = 0; i < 1000; i++) {
                    next.push({ id: i, text: "item-" + i });
                }
                this.list = next;
                this.logs.push("先在普通数组中处理，再整体赋值，更新成本更可控");
            },
            visibleTotalByMethod() {
                console.count("methods visibleTotalByMethod");
                return this.list.length;
            }
        }
    });
</script>

</body>
</html>
