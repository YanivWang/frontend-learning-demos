<!--
  分类: react19 / 01-基础语法
  主题: Actions 与 useActionState
  要点:
    - Action：可在 transition 中执行的异步函数；表单 action 与之配合
    - useActionState(action, initialState) 返回 [state, formAction, isPending]
    - action 签名 (previousState, formData) => nextState | Promise<nextState>
    - 提交时 isPending 为 true，适合禁用按钮与展示错误信息
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 19 · useActionState</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 640px; line-height: 1.6; }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: 1rem 1.25rem; }
    .err { color: #cf222e; }
    input { padding: 0.4rem 0.6rem; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useActionState } = React;

    async function saveName(previousError, formData) {
      const name = String(formData.get("name") || "").trim();
      await new Promise((r) => setTimeout(r, 700));
      if (!name) return "请输入名称";
      if (name.length < 2) return "名称至少 2 个字符";
      return null;
    }

    function NameForm() {
      const [error, submitAction, isPending] = useActionState(saveName, null);

      return (
        <form className="box" action={submitAction}>
          <h2>useActionState + 表单 action</h2>
          <label>
            名称：
            <input name="name" placeholder="例如：小明" disabled={isPending} />
          </label>
          <button type="submit" disabled={isPending}>
            {isPending ? "保存中…" : "保存"}
          </button>
          {error ? <p className="err">{error}</p> : <p>校验通过时 error 为 null</p>}
        </form>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<NameForm />);
  </script>
