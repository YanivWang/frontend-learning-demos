<!--
  分类: css / 01-布局 / flex
  主题: Flex 一维布局
  要点:
    - flex 是一维布局，主轴由 flex-direction 决定
    - justify-content 管主轴，align-items 管交叉轴
    - flex: grow shrink basis 是项目放大、收缩、基础尺寸的简写
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex 布局</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1rem; margin-top: 2rem; }
    .demo {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      min-height: 120px;
      padding: 12px;
      border: 1px solid #ddd;
      background: #f8f8f8;
    }
    .item { padding: 12px; color: #fff; background: #2f80ed; text-align: center; }
    .grow .item:nth-child(1) { flex: 0 0 120px; }
    .grow .item:nth-child(2) { flex: 1 1 120px; background: #27ae60; }
    .grow .item:nth-child(3) { flex: 2 1 120px; background: #eb5757; }
    .center {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 120px;
      background: #ffe3d1;
      border: 1px solid #f2a36d;
    }
  </style>
</head>
<body>
  <h1>Flex 布局核心</h1>

  <h2>主轴和交叉轴</h2>
  <div class="demo">
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
  </div>

  <h2>flex: grow shrink basis</h2>
  <div class="demo grow">
    <div class="item">固定 120px</div>
    <div class="item">剩余空间 1 份</div>
    <div class="item">剩余空间 2 份</div>
  </div>

  <h2>水平垂直居中</h2>
  <div class="center">align-items + justify-content</div>
</body>
</html>
