<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="base.css" />
  </head>
  <body>
    <h1>Keyframes</h1>
    <!--
    功能: transition 主要是做从状态1 切到状态2的过渡动画？
    1.必须有触发事件(hover, active, focus, etc. 或 JS 加减 class) transition 自己不会主动运行,导致属性值改变才会执行
    2.必须有起始状态和结束状态（只能定义两种状态),中间过程由浏览器自动插值
    3.必须有过渡效果 transition 属性值变化才会执行

    重点: transition 主要是做从状态1 切到状态2的过渡动画, 想更复杂一些的动画，必须上keyframes
    (1)如果你想控制超过两种状态的过渡动画 A → B → C ，可以使用 animation 来实现
    (2)自动循环播放
    (3)控制中间某帧的具体样式（控制超过两种状态）
    @keyframes + animation，而不是 transition

    @keyframes 通过在动画序列中定义关键帧的样式，来控制css动画序列中的中间步骤，
    和transition不同的是，keyframes可以控制动画的中间步骤，而transition只能控制开始和结束状态
  -->
    <div class="card move-card"></div>
  </body>
</html>
