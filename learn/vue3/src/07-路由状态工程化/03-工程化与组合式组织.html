<!--
  分类: vue3 / 07-路由状态工程化
  主题: 工程化与组合式组织
  要点:
    - Vue3 工程常见结构：views / components / composables / stores / router
    - 组合式函数按业务能力拆分，而不是按生命周期拆分
    - 工程化面试关注可维护性、类型、构建、性能和规范
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · 工程化与组合式组织</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 860px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>工程化与组合式组织</h1>
      <div class="box">
        <pre>{{ tree }}</pre>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li>页面组件放 <code>views</code>，可复用 UI 放 <code>components</code>，可复用状态逻辑放 <code>composables</code>。</li>
        <li>组合式函数要按业务能力命名，例如 <code>useUser</code>、<code>useUpload</code>，不要只按 <code>mounted</code>、<code>watch</code> 拆。</li>
        <li>大型项目要关注路由懒加载、组件按需加载、状态边界、错误处理、接口类型、代码规范和构建产物体积。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const tree = ref([
            "src/",
            "  router/          路由表与守卫",
            "  stores/          Pinia store",
            "  composables/     useXxx 组合式函数",
            "  components/      可复用组件",
            "  views/           路由页面",
            "  services/        API 请求封装",
            "  utils/           纯工具函数",
          ].join("\n"));
          return { tree };
        },
      }).mount("#app");
    </script>
