<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //箭头函数只能是匿名函数表达式
      //箭头函数
      const ArrowFunc = (x,y) => {
        //console.log(arguments);//Uncaught ReferenceError: arguments is not defined

        console.log(x,y);

        console.log(this);//箭头函数内部的this，是由其最近的紧包裹的那层this指向决定的
      };

      ArrowFunc(1,2);//可以传递参数

      console.log(ArrowFunc.prototype); //undefined 箭头函数作为函数没有原型对象prototype

     // console.log(ArrowFunc.prototype.constructor);//没有构造器

      const af1 = new ArrowFunc()//ArrowFunc is not a constructor



     

      //普通函数
      function Person() {}
      console.log(Person.prototype);

      console.log(Person.prototype.constructor === Person);

      //Person 作为函数实例
      console.log(Person.constructor === Person.__proto__.constructor);

      console.log(Person.constructor === Function);
    </script>
  </body>
</html>
