<!--
  分类: react / hooks
  主题: useEffect 副作用、依赖数组与清理函数
  要点:
    - useEffect 用于处理渲染后的副作用，比如请求、订阅、定时器、手动 DOM 操作
    - 不传依赖数组: 每次渲染后执行
    - 传 []: 首次挂载后执行一次，卸载时执行清理
    - 传 [deps]: 首次挂载和 deps 变化后执行；下一次执行前先清理上一次副作用
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · useEffect 副作用</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function Timer({ step }) {
      const [seconds, setSeconds] = useState(0);

      useEffect(() => {
        console.log("effect 建立定时器，step =", step);

        const timer = setInterval(() => {
          setSeconds(prev => prev + step);
        }, 1000);

        // 清理函数非常关键：清定时器、解绑事件、取消订阅都在这里做。
        return () => {
          console.log("cleanup 清理上一次定时器，step =", step);
          clearInterval(timer);
        };
      }, [step]);

      return <p>秒数: {seconds}，当前步长: {step}</p>;
    }

    function App() {
      const [step, setStep] = useState(1);
      const [visible, setVisible] = useState(true);

      useEffect(() => {
        document.title = "step: " + step;
      }, [step]);

      return (
        <section>
          <h1>useEffect 副作用</h1>
          <button onClick={() => setStep(step === 1 ? 2 : 1)}>切换 step</button>
          <button onClick={() => setVisible(!visible)}>挂载/卸载 Timer</button>
          {visible && <Timer step={step} />}
          <p>
            面试回答: effect 不是生命周期的一比一替代，它表达的是“这个渲染结果需要同步哪些外部副作用”。
          </p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
