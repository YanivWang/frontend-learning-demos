<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        /*css选择器的优先级


        */

        /*3.id选择器*/
        #box {
            width: 200px;
        }

        /*4.类选择器*/
        .box {
            width: 100px;
            height: 100px;
            margin: auto;

            /*1.属性后面加上!important会覆盖页面上任何位置的样式*/
            background-color: yellow !important;
        }

        /*5.伪类选择器：伪类以冒号为前缀，添加到一个选择器末尾的关键字，目的是希望该样式在元素呈现指定状态下，才生效*/
        .box:hover {
            cursor: pointer;
        }

        /*6.属性选择器：
        凡是被一对[]括起来的选择器都是属于属性选择器
        a[href]: 选择所有带有href属性的a标签
        a[href="https://www.baidu.com"]: 选择所有带有href属性的a标签，且href属性的值等于https://www.baidu.com
        a[href*="baidu"]: 存在href属性且其属性值中包含baidu字符的a标签
        p[class~="important"]: 选择属性值包含 important的元素
        a[href$=".org"]: 存在href属性且其属性值是以.org结尾
        a[attr^="www"]: 存在href属性且其属性值是以www开头
        a[href|="son"]: 存在href属性且其属性值等于son或者是以son-开头的值
        */

        /*7.标签选择器*/
        div {
            border: 1px solid #ddd;
        }

        /*8.通配符选择器*/
        * {
            margin: 0;
            padding: 0;
        }

        /*总之: 1.选择器越精确，权重越高 2.当两个选择器权重相同，样式重叠时，后面的哪一个的权重高*/
    </style>
</head>
<body>

<!--2.style 内联样式属性style-->
<div id="box" class="box" style="background-color: red"></div>
<a href="https://www.baidu.com"></a>

<p class="import value"></p>
</body>
</html>
