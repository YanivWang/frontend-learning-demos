<!--
  分类: vue2 / 01-基础语法
  主题: v-on 事件三种形态（直接方法名 / 调用方法 / 表达式）
  要点:
    - @click="fn" 不带括号时，Vue 会自动把 $event 作为第一参传入
    - @click="fn('msg')" 带括号要拿事件对象，必须显式写 $event
    - @click="count++" 直接写表达式也合法（小逻辑可用，复杂逻辑请放 methods）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>v-on 事件三种形态</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="content">
    <!--v-on接受一个调用方法的名称，或者是直接调用方法-->
    <div v-on:click="clickHandle1">点击1</div>

    <div v-on:click="clickHandle2('say')">点击2</div>

    <div v-on:click="clickHandle3('say', $event)">点击3</div>

    <!--所有的绑定表达式都是一个js表达式-->
    <div v-on:click="count = count + 1">计数： {{count}}</div>
</div>

<script>
    var vm = new Vue({
        el: "#content",
        data: {
            count: 0
        },
        methods: {
            clickHandle1: function (e) {
                //这里的e是原生的dom事件
                console.log(e);
            },
            clickHandle2: function (msg) {
                //传递的参数
                console.log(msg);
            },
            clickHandle3: function (msg, e) {
                //这里的e是原生的dom事件
                console.log(msg + "=" + e);
            }
        }
    });
</script>
