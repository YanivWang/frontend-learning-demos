<!--
  分类: javascript / 03-对象与原型
  主题: 访问器属性 get/set
  要点:
    - 字面量语法：get/set 直接写在对象里；可读可写、可拦截
    - Object.defineProperty 动态加访问器，第三个参数是描述符
    - 易错点：getter/setter 内部访问同名属性会无限递归，需用 _name 等私有键
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访问器属性</title>
  </head>
  <body>
    <script>
      console.log("AAAAAAAAAAAAAAAAAAAAA");
      const objSetGet = {
        _value: "wife",
        get value() {
          return this._value;
        },
        set value(val) {
          this._value = val;
        },
      };
      console.log("objSetGet", objSetGet);

      console.log("BBBBBBBBBBBBBBBBBBBBB");
      const book = {
        _name: "平行宇宙"
      }

      //给 book 对象定义一个伪属性 name
      Object.defineProperty(book, "name", {
        get(){
          console.log("11111", this._name);
          return this._name
        },
        set(val){
          this._name = val
        }
      })
      console.log("book", book);
      console.log("book", book.name);


      console.log("CCCCCCCCCCCCCCCCCCCC");

      /*
      Object.defineProperty 给目标对象添加新属性的时候，如何新属性的名称和
      就得属性一样，get函数不能访问 this.新属性名

      const dog = {
        pipe: "平行宇宙"
      }

      //给 book 对象定义一个伪属性 name
      Object.defineProperty(dog, "pipe", {
        get(){
          console.log("11111", this._name);
          return this.pipe
        },
        set(val){
          this.pipe = val
        }
      })
      console.log("dog", dog);
      console.log("dog", dog.pipe);
      */
    </script>
  </body>
</html>
