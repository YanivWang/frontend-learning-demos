<!--
  分类: javascript / 06-浏览器API / WebWorker / 01-基础
  主题: Worker 基础与子脚本
  要点:
    - new Worker(path) 启动独立线程；主线程通过 postMessage/onmessage 通信
    - 数据采用结构化克隆传递，函数 / DOM 节点不可传
    - 用 worker.terminate() 主动结束；子线程内部用 self.close()
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker 基础与子脚本</title>
</head>
<body>

<button onclick="press()">Press</button>

<script>
    function press(){
        console.log("press start...");
        let sum = 0;
        for(let i = 0 ; i < 1000; i++){
            sum = sum + i;
        }
        console.log("press end..." + sum);
    }

    //worker.js 就是Worker线程要执行的任务
    //创建一个worker线程对象，用于供主线程操作worker线程
    let worker = new Worker('worker.js');
    worker.postMessage("hello worker!!!");//通过结构化克隆传递；函数、DOM 节点等不可克隆

    //listen worker message
    //指定监听函数
    //event.data 获取子线程的传输的数据
    worker.onmessage = function (event) {
        console.log("received message: " + event.data);

        doSomThing();
    };

    //主线程负责打开和关闭子线程
    function doSomThing() {
        console.log("do something!!!");

        //主线程中关闭worker
        worker.terminate();
    }

    worker.onerror = function (event) {
        worker.terminate();
        console.log("子线程发生错误： " + event.message);
    }
</script>
