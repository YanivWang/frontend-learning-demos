<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue first</title>
    <script src="../../libs/vue2.js"></script>
</head>
<body>

<div id="app1">
    <div :bind:title="msg">{{msg}}</div>

    <div @click="onClick">点我</div>
</div>


<script>
    var vm = new Vue({
        el: '#app1',
        data: {
            msg: '点击下边按钮'
        },
        methods: {
            onClick: function () {
                this.msg = "12444";
                console.log("onClick");
            }
        }
    });

</script>

</body>
</html>
