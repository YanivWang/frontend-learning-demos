<!--
  分类: react / hooks
  主题: useRef 保存 DOM 与可变值
  要点:
    - useRef 返回稳定对象 { current: ... }
    - ref.current 改变不会触发组件重新渲染
    - 常见用途: 访问 DOM、保存定时器 ID、保存不会驱动视图的可变值
    - useRef 与 useState 的核心区别: state 参与渲染，ref 不参与渲染
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · useRef 与 DOM</title>
  <script src="../libs/react.development.js"></script>
  <script src="../libs/react-dom.development.js"></script>
  <script src="../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState } = React;

    function FocusBox() {
      const inputRef = useRef(null);
      const clickCountRef = useRef(0);
      const [renderCount, setRenderCount] = useState(0);

      function focusInput() {
        inputRef.current.focus();
      }

      function addRefCount() {
        clickCountRef.current += 1;
        console.log("ref 中的点击次数:", clickCountRef.current);
        // 这里只改 ref，不会触发 render，所以页面上的 renderCount 不会变化。
      }

      return (
        <section>
          <h1>useRef 与 DOM</h1>
          <input ref={inputRef} placeholder="点击按钮聚焦到这里" />
          <button onClick={focusInput}>聚焦 input</button>
          <button onClick={addRefCount}>只改 ref</button>
          <button onClick={() => setRenderCount(renderCount + 1)}>触发渲染</button>
          <p>renderCount: {renderCount}</p>
          <p>ref 点击次数只在控制台实时变化，下一次渲染后页面才会读到: {clickCountRef.current}</p>
          <p>面试回答: useRef 适合保存跨渲染但不需要驱动 UI 的数据。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FocusBox />);
  </script>
</body>
</html>
