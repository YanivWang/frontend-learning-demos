<!--
  分类: javascript / 04-ES6+ / class详解
  主题: 用静态私有标志位模拟「私有构造函数」
  要点:
    - JS 没有真正的 private constructor，借助静态私有字段 + 工厂方法模拟
    - 直接 new PrivateConstructor() 会抛错；只能通过 PrivateConstructor.create()
    - 私有静态字段不能在类外部访问
-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>私有构造函数</title>
  </head>
  <body>
    <script>
      class PrivateConstructor {
        static #isInternalConstructing = false;

        constructor() {
          if (!PrivateConstructor.#isInternalConstructing) {
            throw new TypeError("PrivateConstructor is not constructable");
          }
          PrivateConstructor.#isInternalConstructing = false;
          // 这里继续做实例初始化

          console.log("使用内部构造器，构造成功!");
        }

        // 工厂方法：唯一的合法构造入口
        static create() {
          PrivateConstructor.#isInternalConstructing = true;
          const instance = new PrivateConstructor();
          console.log("使用工厂方法构造成功!");
          return instance;
        }
      }

      // 合法：走工厂方法
      PrivateConstructor.create();

      // 反面教材 / 易错点：直接 new 会抛 TypeError，这里注释掉避免页面报错中断后续脚本
      // new PrivateConstructor();

      // 类外部不能访问私有静态字段
      // console.log(PrivateConstructor.#isInternalConstructing);
    </script>
  </body>
</html>
