<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div class="box">
</div>

<script>
    let domDox = document.getElementsByClassName("box");

    var io = new IntersectionObserver(function () {
       console.log("目标可见");
    },{});

    //start
    io.observe(domDox);

    //stop
    io.unobserve(domDox);

    //close
    io.disconnect();
</script>

</body>
</html>
