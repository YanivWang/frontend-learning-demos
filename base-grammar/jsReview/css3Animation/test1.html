<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../jsLibrary/jquery-3.1.0.min.js"></script>

    <style>
        .box {
            width: 600px;
            height: 500px;
            border: 1px solid #0d1424;
            position: relative;
        }

        /*css animation start*/
        .box .slider1 {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 0px;
            top: 0px;
            background-color: indianred;
            border-radius: 5px;
        }

        .box .slider1:hover {
            animation: sliderAni 3s;
        }

        @keyframes sliderAni {
            0% {
                left: 0;
                transform: rotate(0deg);
            }

            50% {
                left: 400px;
                transform: rotate(90deg);
            }

            100% {
                left: 0;
                transform: rotate(0deg);
            }
        }

        /*css animation start*/


        /*jquery animation start*/
        .box .slider2 {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 0px;
            top: 200px;
            background-color: green;
            border-radius: 5px;
        }

        /*jquery animation end*/
    </style>
</head>
<body>

<script>
    $(function () {
       $('.startBtn2').unbind().click(function () {
          $('.slider2').animate();
       });
    });
</script>

<div class="box">
    <div class="slider1"></div>

    <div class="slider2"></div>

    <button class="startBtn2">start slider2</button>
</div>


</body>
</html>
