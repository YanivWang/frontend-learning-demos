<!--
  分类: css / 03-视觉效果 / 文本与图片处理
  主题: 文本省略、vertical-align、object-fit、aspect-ratio
  要点:
    - 单行省略: white-space + overflow + text-overflow
    - 多行省略: -webkit-line-clamp 仍是常见实战方案
    - object-fit 控制替换元素内容如何填充盒子，aspect-ratio 控制盒子比例
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文本与图片处理</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1rem; margin-top: 2rem; }
    .box { width: 320px; border: 1px solid #ddd; padding: 12px; }
    .single {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .multi {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }
    .baseline img {
      width: 48px;
      height: 48px;
      background: #2f80ed;
      vertical-align: middle;
    }
    .photo {
      width: 240px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: linear-gradient(135deg, #2f80ed 0 35%, #27ae60 35% 70%, #eb5757 70%);
      display: block;
    }
  </style>
</head>
<body>
  <h1>文本与图片处理</h1>

  <h2>单行省略</h2>
  <div class="box single">这是一段很长很长的标题，超出容器后应该显示省略号。</div>

  <h2>多行省略</h2>
  <div class="box multi">这是一段多行内容。面试常问多行省略怎么实现，工程里常用 -webkit-line-clamp，但要知道它不是纯标准的所有浏览器通用方案。</div>

  <h2>图片基线空隙</h2>
  <p class="baseline"><img alt="" /> 图片默认按基线对齐，常用 vertical-align: middle 或 display:block 处理底部空隙。</p>

  <h2>object-fit 与 aspect-ratio</h2>
  <div class="photo" role="img" aria-label="用渐变模拟图片内容"></div>
</body>
</html>
