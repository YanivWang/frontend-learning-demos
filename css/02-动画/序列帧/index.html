<!--
  分类: css / 02-动画 / 序列帧
  主题: 用 background-position + steps() 播放精灵图
  要点:
    - 精灵图（sprite）横向拼接多帧，background-size 设为完整长度
    - steps(1, end) 每周期仅 1 步：大部分时间停在首帧，周期末跳至末帧；实战 5 帧精灵图常用 steps(5, end)
    - animation-play-state: paused/running 实现暂停/播放控制
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>背景图序列帧动画</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; text-align: center; }

    /* steps(1, end)：每周期 1 步离散跳变；keyframes 中 20%–80% 定义中间帧位置，但本例只展示单步跳变 */
    @keyframes labaRun {
      0%   { background-position: 0 0; }
      20%  { background-position: -500px 0; }
      40%  { background-position: -1000px 0; }
      60%  { background-position: -1500px 0; }
      80%  { background-position: -2000px 0; }
      100% { background-position: 0 0; }
    }

    .laba {
      width: 500px;
      height: 180px;
      margin: 0 auto;
      /* 2500×180 五帧精灵图占位：用 CSS linear-gradient 模拟横向拼接 */
      background-image:
        linear-gradient(90deg,
          #ffadad 0 500px,
          #ffd6a5 500px 1000px,
          #fdffb6 1000px 1500px,
          #caffbf 1500px 2000px,
          #9bf6ff 2000px 2500px);
      background-repeat: no-repeat;
      background-size: 2500px 180px;
      animation: labaRun 1.5s steps(1, end) infinite;
      border-radius: 8px;
      animation-play-state: paused;
    }
    .laba.run  { animation-play-state: running; }
    .laba.stop { animation-play-state: paused; }
    button { margin: 1rem 6px 0; padding: 6px 14px; }
  </style>
</head>
<body>
  <h1>序列帧动画（精灵图）</h1>
  <p>实战中常用：把多帧合成一张大图，用 <code>background-position</code> + <code>steps()</code> 跳变播放，比 GIF 可控性强、比 JS 性能好。</p>

  <div class="laba" id="laba"></div>

  <div>
    <button id="play">播放</button>
    <button id="pause">暂停</button>
  </div>

  <script>
    const laba = document.getElementById("laba");
    document.getElementById("play").onclick  = () => { laba.classList.add("run"); laba.classList.remove("stop"); };
    document.getElementById("pause").onclick = () => { laba.classList.add("stop"); laba.classList.remove("run"); };
  </script>
</body>
</html>
