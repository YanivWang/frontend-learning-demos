<!--
  分类: javascript / 05-元编程
  主题: Proxy 的局限性
  要点:
    - Proxy 对依赖「内部槽位」的方法不透明，例如 Date.getDate 调用会丢失内部 this
    - 解决：在 get 拦截中显式 bind 原对象，或对方法做手动转发
    - instanceof 判断不一定可靠：Date 的内部检测会失败
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxy 的局限</title>
  </head>
  <body>
    <script>
      const target = new Date();

      //使用Proxy代理一个date类型的实例
      const proxy = new Proxy(target, {});
      console.log(proxy instanceof Date); // true


      target.getDate();

      proxy.getDate(); // TypeError: 'this' is not a Date object
    </script>
  </body>
</html>
