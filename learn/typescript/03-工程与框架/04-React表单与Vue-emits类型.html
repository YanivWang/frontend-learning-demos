<!--
  分类: typescript / 03-工程与框架
  主题: React 表单事件与 Vue defineEmits 类型
  要点:
    - React：ChangeEvent&lt;HTMLInputElement&gt;、FormEvent 泛型参数
    - Vue3：defineEmits&lt;{ submit: [payload: FormData] }&gt;() 元组写法
    - 表单 value 类型与 DOM 元素类型对应
    - 面试：事件处理器类型比 any 更安全
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React / Vue 表单与 emits 类型</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 780px; line-height: 1.65; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; font-size: 0.82rem; overflow: auto; }
    input { padding: 8px; width: 100%; max-width: 320px; box-sizing: border-box; }
    #log { margin-top: 1rem; background: #f6f8fa; padding: 12px; border-radius: 8px; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <h1>框架表单类型片段</h1>

  <pre>// React
function onChange(e: React.ChangeEvent&lt;HTMLInputElement&gt;) {
  const value: string = e.target.value;
}

// Vue 3 script setup
const emit = defineEmits&lt;{
  submit: [email: string];
  cancel: [];
}&gt;();
emit('submit', email.value);</pre>

  <h2>原生表单演示（等价逻辑）</h2>
  <label>邮箱 <input type="email" id="email" value="demo@ex.com" /></label>
  <button type="button" id="submit">submit emit</button>
  <div id="log"></div>

  <script>
    document.getElementById("submit").onclick = () => {
      const email = document.getElementById("email").value;
      document.getElementById("log").textContent =
        "emit('submit', '" + email + "') — 类型为 string，与 ChangeEvent&lt;HTMLInputElement&gt;.target.value 一致";
    };
  </script>
