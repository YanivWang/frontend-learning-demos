<!--
  分类: javascript / 04-ES6+ / 异步 / Promise
  主题: Promise 的执行函数（executor）与状态机
  要点:
    - new Promise(executor) 会立即同步执行 executor
    - executor 内通过 resolve/reject 把 Promise 从 pending → fulfilled/rejected
    - 一旦状态确定不可再改，后续 resolve/reject 都会被忽略
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise 执行函数与状态机</title>
</head>
<body>

<script>
    //所谓异步任务就是会在将来的某个时间点，调用一个函数
    //构建一个promise的执行函数
    function test(resolve, reject) {
        let ret = 0;
        setTimeout(() => {
            ret = Math.random() * 10;

            if (ret > 5) {
                resolve(ret);
            } else {
                reject("fail");
            }
        }, 2000);
    }

    let p1 = new Promise(test);
    p1.then((flag) => {
        console.log(flag);
    }).catch((err) => {
        console.log(err);
    })

</script>
