<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    setTimeout(() => {
        console.log(0);
    }, 0);

    async function async1() {
       console.log("a");

       await async2();

       console.log("b");
    }

    async function async2() {
       console.log("c");
    }

    async1();

    //一个promise对象新建后，其回调函数会立即执行，但是可能不会立即返回结果(如果在promise中执行了一个异步操作)
    //1.resolve
    //2.reject

    //使用then指定promise对象状态为resolve时的回调函数
    //使用catch指定promise对象状态为reject时的回调函数
    let p1 = new Promise(function (resolve, reject) {
        console.log("1");
        let flag = true;
        if (flag) {
            resolve("ok");

            console.log("2");
        } else {
            reject("failure");
        }
    }).then(function () {
        console.log(4);
    }).catch(function () {
        console.log(5);
    });

    console.log(3);
</script>

</body>
</html>
