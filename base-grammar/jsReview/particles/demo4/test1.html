<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="./lib/html2canvas.js"></script>

    <style>
        body {
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
        }

        button {
            min-width: 135px;
            max-width: 200px;
            min-height: 50px;
            border: 0;
            outline: 0;
            color: white;
            /* pink to orange */
            background: #ee0979;
            background: linear-gradient(to right, #ee0979, #ff6a00);
            vertical-align: top;
        }
    </style>
</head>
<body>
<script>
    /*
    * essentially: 实质上
    * handy 方便的
    * //html相关视图属性详解
    * 1.clientX clientY 鼠标事件发生时，点击位置，相对于浏览器的有效区域(可见区域)的横纵坐标
    * 2.screenX screenY 鼠标事件发生时，点击位置，相对于屏幕本身的横纵坐标
    * 3.offsetX offsetY 鼠标事件发生时，相对于事件源的横纵坐标
    * 4.e.currentTarget.offsetLeft e.currentTarget.offsetTop 元素本身相对于父定位元素的距离
    * */
</script>

<div class="container">
    <button style="position: relative">Button</button>
</div>

<script>
    console.log("draw canvas...");

    let container = document.querySelector(".container");
    let btn = document.querySelector("button");

    let ctx;
    //1.获取canvas版本的元素
    html2canvas(btn).then(function (canvas) {
        ctx = canvas.getContext("2d");
        //btn.addEventListener("click", getColorAtPoint);
        btn.addEventListener("click", getBtnAllColorPoints);
    });

    //2.1 获取元素被点击位置的像素的信息,以及点击的位置信息，来创建一个粒子
    function getColorAtPoint(e) {
        //offsetX offsetY 相对于事件源的横纵坐标点位置
        let x = e.offsetX;
        let y = e.offsetY;

        //复制画布上指定矩形的像素数据(x,y,1,1)代表获取x,y位置的那一个像素的信息
        let rgbaArr = ctx.getImageData(x, y, 1, 1).data;

        //获取元素的大小以及其相对于视口的位置 bcr.left(按钮相对于视口的左边距离) bcr.top(按钮相对于视口的上边距离)
        let bcr = btn.getBoundingClientRect();
        //目的是得到，当前鼠标点击位置相对于浏览器可视区域左上边界的距离
        let globalX = bcr.left + x;
        let globalY = bcr.top + y;

        //在鼠标的点击位置创建一个粒子
        createParticleAtPoint(globalX, globalY, rgbaArr);
    }

    //2.2 更改上述的点击函数，以便于出现爆炸的效果
    //核心思想
    let reductionFactor = 37;

    function getBtnAllColorPoints() {
        // Get the color data for our button
        let width = btn.offsetWidth;
        let height = btn.offsetHeight;
        let colorData = ctx.getImageData(0, 0, width, height).data;

        // Keep track of how many times we've iterated (in order to reduce
        // the total number of particles create)
        let count = 0;
        // Go through every location of our button and create a particle
        for (let localY = 0; localY < height; localY++) {
            for (let localX = 0; localX < width; localX++) {
                if (count % reductionFactor === 0) {
                    let index = (localY * width + localX) * 4;
                    let rgbaColorArr = colorData.slice(index, index + 4);
                    let bcr = btn.getBoundingClientRect();
                    let globalX = bcr.left + localX;
                    let globalY = bcr.top + localY;
                    createParticleAtPoint(globalX, globalY, rgbaColorArr);
                }
                count++;
            }
        }
    }

    //3.动态创建一个canvas
    let particleCanvas, particleCtx;

    function createParticleCanvas() {
        particleCanvas = document.createElement("canvas");
        particleCtx = particleCanvas.getContext("2d");
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;
        particleCanvas.style.position = "absolute";
        particleCanvas.style.left = "0";
        particleCanvas.style.top = "0";

        //设置canvas在其它元素的上面
        particleCanvas.style.zIndex = "1001";
        //设置canvas下面的元素时可点击的
        particleCanvas.style.pointerEvents = "none";

        document.body.appendChild(particleCanvas);
    }

    createParticleCanvas();

    //4.创建一个基本粒子类(构造函数)
    let Particle = function () {
        //设置粒子动画时长
        this.animationDuration = 1000;

        //设置粒子的速度(动画是二维的，所以粒子的速度应该是包含水平速度和垂直速度)
        //速度的正负值，其实也就代表了粒子的运动轨迹。
        this.speed = {
            x: -5 + Math.random() * 10,
            y: -5 + Math.random() * 10
        };

        //设置粒子的大小
        this.radius = 5 + Math.random() * 5;

        //为粒子设定一个最大的生存时间
        this.life = 30 + Math.random() * 10;
        this.remainingLife = this.life;

        //粒子自己绘制自己的方法(在外部调用方法，通过传递参数的方式，传递canvas的ctx)
        this.draw = ctx => {
            let that = this;
            //当粒子的剩余生命时长大于0，且粒子的半径也大于0
            if (this.remainingLife > 0 && this.radius > 0) {
                //在当前位置绘制一个粒子，beginPath非常的重要，会销毁当前的路径，开启一个新路径，这样才能保证当前的绘图是你想要绘制的
                //在那个地方绘制，绘制什么样的粒子，由外部决定
                ctx.beginPath();
                ctx.arc(that.startX, that.startY, that.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(" + this.rgbArray[0] + ',' + this.rgbArray[1] + ',' + this.rgbArray[2] + ',' + this.rgbArray[3] + ")";
                ctx.fill();

                //更新粒子的位置和生命
                that.remainingLife--;//每绘制一次，粒子的生命周期变短一点
                that.radius -= 0.25;//每绘制一次，粒子的半径减少一点
                //更改其位置
                that.startX += that.speed.x;
                that.startY += that.speed.y;
            }
        }
    };

    //5.创建粒子工厂(在指定的位置创建一个粒子)
    let particleArray = [];

    function createParticleAtPoint(x, y, colorData) {
        let particle = new Particle();//对象实际上就是一组数据和方法的集合
        //设置粒子初始化参数：圆心坐标，粒子的背景色，该粒子的创建时间
        particle.startX = x;
        particle.startY = y;
        particle.rgbArray = colorData;
        particle.startTime = Date.now();//返回当前的时间戳(从1970.1.1日到现在的毫秒数)
        particleArray.push(particle);
    }

    //6.添加动画逻辑
    function update() {
        //清除旧的粒子
        if (typeof particleCtx !== 'undefined') {
            particleCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        }

        //在新的位置绘制所有的粒子
        for (let i = 0; i < particleArray.length; i++) {
            particleArray[i].draw(particleCtx);

            //如果最后一个粒子完成动画，清除所有的旧的粒子
            if (i === particleArray.length - 1) {
                let percent = (Date.now() - particleArray[i].startTime) / particleArray[i].animationDuration;
                if (percent > 1) {
                    particleArray = [];
                }
            }
        }
        window.requestAnimationFrame(update);
    }

    window.requestAnimationFrame(update);
</script>

</body>
</html>
