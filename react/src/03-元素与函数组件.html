<!--
  分类: react / 入门
  主题: React 元素与 JSX 中嵌入表达式
  要点:
    - JSX 中 {expression} 内只能写「表达式」，函数引用 {fn} 不会执行，需写 {fn()}
    - ReactDOM 渲染流程：构建虚拟 DOM → diff → 真实 DOM 渲染 → 事件绑定
    - React 18 起统一用 createRoot(container).render(element)
    - {fun} 只是函数引用不会执行，需写 {fun()} 才能得到返回值字符串
-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>React · JSX 中嵌入表达式</title>

    <!-- 引入依赖
     1. react.development.js — React 核心库（createElement、组件等）
     2. react-dom.development.js — 操作 DOM、提供 createRoot / render
     -->
    <script src="../libs/react.development.js"></script>
    <script src="../libs/react-dom.development.js"></script>

    <!-- 安装Babel:
      1.用于将ES6+语法转换为es5语法，以便于能直接在浏览器中运行
      2.用来转换 jsx 语法(babel内嵌了对jsx的支持) -->
    <script src="../libs/babel.min.js"></script>
  </head>
  <body>
    <div id="example"></div>

    <!--
        要在script脚本中使用jsx，要把<script>的type类型写成 text/babel， 这样浏览器不会直接执行
        script中的内容，而是先由babel来编译这个script中的内容，然后再执行
    -->
    <script type="text/babel">

      console.log("1111111111");
      let abc = "12345";
      function fun() {
        console.log("234");
        return "八八八";
      }

      //1.元素: 一段jsx赋值给一个变量，这个变量就称作react的一个元素
      //2. 元素是一种轻量级的js对象,描述了要渲染的UI结构
      const element = (
        <h1 id="wx" className="jb">
          <span>
            <i>我是111元素</i>
            <span>我是span111</span>
            {console.log("在jsx中运行js表达式")}
            {abc}
            {/* {fun} 是函数引用，React 无法渲染；{fun()} 执行后才得到字符串 */}
            {fun()}
          </span>
          <span>
            <i>我是222元素</i>
            <span>我是span222</span>
          </span>
        </h1>
      );
      console.log("222222222222222222");

      //3.createRoot(...).render() 会按照下列顺序执行
      //3.1 虚拟dom构建: 会根据传入的React元素(js对象)递归构建虚拟dom树,虚拟dom是对真实dom的抽象表示
      //它以 JavaScript 对象的形式存在，比真实 DOM 更轻量级，操作起来也更快。

      //3.2 diff算法: diff算法会比对新旧虚拟dom,找出变更集合
      //3.3 真实dom渲染,根据diff算法找出的变更集合,React会将变更集合转换为真实的dom
      //3.4 事件绑定,创建真实dom时,react会为这些dom绑定事件
      // React 18 使用 createRoot 渲染
      ReactDOM.createRoot(document.getElementById("example")).render(element);
    </script>
  </body>
</html>
