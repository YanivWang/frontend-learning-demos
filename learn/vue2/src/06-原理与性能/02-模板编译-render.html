<!--
  分类: vue2 / 06-原理与性能
  主题: template 编译到 render 函数
  要点:
    - Vue2 完整版运行时包含模板编译器，能把 template 编译成 render 函数
    - 编译大致流程：template -> AST -> render code -> render function
    - 运行时只负责执行 render 得到 vnode，再通过 patch 更新真实 DOM
    - 使用 vue-loader / 构建工具时，单文件组件模板通常在构建阶段预编译
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>template 编译到 render 函数</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <h3>{{ title }}</h3>
    <p>这个页面演示 template 和 render 的等价关系。</p>

    <template-demo :message="message"></template-demo>
    <render-demo :message="message"></render-demo>

    <button @click="message = message + '!'">更新 message</button>
    <pre>{{ answer }}</pre>
</div>

<script>
    Vue.component("template-demo", {
        props: ["message"],
        template: `<p>template 写法: {{ message }}</p>`
    });

    Vue.component("render-demo", {
        props: ["message"],
        render(h) {
            return h("p", ["render 写法: ", this.message]);
        }
    });

    new Vue({
        el: "#app",
        data() {
            return {
                title: "template -> render -> vnode -> patch",
                message: "Vue2",
                answer:
                    "面试答法: template 不是直接变成真实 DOM。\n" +
                    "Vue 会先把模板编译成 render 函数，render 执行后返回 vnode。\n" +
                    "响应式数据变化会触发 watcher，重新执行 render，生成新 vnode，再和旧 vnode patch。"
            };
        }
    });
</script>
