<!--
  分类: javascript / 08-面试题 / 作用域
  主题: 经典题 - this 指向与作用域链
  要点:
    - this.val 在非严格模式独立调用中是 window.val（var 顶层声明会挂 window）
    - 函数体内变量查找走作用域链；this 走调用方
    - bar() 内 this 仍是 window，所以 this.val === 1，test() 同样取到 1
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试题 - this 与作用域链</title>
</head>
<body>

<script>
    var val = 1;
    function test() {
        console.log(val);
    }
    function bar() {
        var val = 2;
        console.log(this.val);
        test();
    }
    console.log(window.val);//1
    bar();//1
</script>
