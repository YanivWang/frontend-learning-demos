<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 引入 react 和 react-dom，这两个是react核心包 -->
    <script src="./jsLibrary/react18.js"></script>
    <script src="./jsLibrary/react-dom18.js"></script>

    <script src="./jsLibrary/babel.js"></script>
  </head>
  <body>
    <!-- 这个dom节点被称作React应用根节点，因为该节点内所有内容都是由ReactDOM管理
     ReactDOM负责更新dom，确保react元素和dom保持一致 -->
    <div id="root"></div>

    <script type="text/babel">
      //请记住React元素是不可变的，一旦被创建就不可更改(无法更改它的子元素或者属性)，
      //一个元素就像电影中一帧画面，它代码某个时刻的UI
      //要想刷新界面，必须重新创建一个react元素,然后将其传入render

      //这是一段jsx代码，也被称作是react元素
      const elementOld = <h1 className="greeting">Hello, world!</h1>;

      //Babel 会把 JSX 转译成一个名为 React.createElement() 函数调用
      //上述表达式经过转义后
      const elementNew = React.createElement("h1", { className: "greeting" }, "Hello, world!");

      //React.createElement方法调用后，会生成一个js对象,如下，这个对象就是被称作 "React元素"
      // 注意：这是简化过的结构
      const element = {
        type: "h1",
        props: {
          className: "greeting",
          children: "Hello, world!",
        },
      };

      //ReactDOM负责更新DOM和React元素保持一致
      const domContainer = document.getElementById("root");
      const appRoot = ReactDOM.createRoot(domContainer);
      appRoot.render(elementNew);
    </script>
  </body>
</html>
