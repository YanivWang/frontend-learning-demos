<!--
  分类: javascript / 09-Canvas / 基础
  主题: Canvas 2D 基础绘图
  要点:
    - 流程：getContext('2d') → 设置样式 → 路径 / 形状 → fill / stroke
    - 同一条 path 内的所有线段会一起 fill/stroke；使用 beginPath 隔离不同路径
    - 渐变、文字、圆角矩形等都基于同一套 ctx API
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas 2D · 基础绘图</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; }
    canvas { border: 1px solid #ddd; display: block; margin-top: 0.5rem; }
    p { color: #666; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>Canvas 2D 基础</h1>
  <p>获取上下文 → 设置样式 → 绘制路径 / 图形 → fill / stroke</p>

  <canvas id="canvasId" width="480" height="280">
    当前浏览器不支持 Canvas
  </canvas>

  <script>
    // 1. 获取 canvas 引用
    const canvas = document.getElementById("canvasId");

    // 2. 获取 2D 绘图上下文
    const ctx = canvas.getContext("2d");

    // 3. 矩形：fillRect / strokeRect
    ctx.fillStyle = "#667eea";
    ctx.fillRect(20, 20, 100, 60);
    ctx.strokeStyle = "#333";
    ctx.strokeRect(20, 20, 100, 60);

    // 4. 路径：直线
    ctx.beginPath();
    ctx.moveTo(160, 50);
    ctx.lineTo(280, 50);
    ctx.lineTo(220, 100);
    ctx.closePath();
    ctx.fillStyle = "rgba(240, 147, 251, 0.8)";
    ctx.fill();
    ctx.stroke();

    // 5. 圆弧 / 圆
    ctx.beginPath();
    ctx.arc(360, 70, 40, 0, Math.PI * 2);
    ctx.fillStyle = "#43e97b";
    ctx.fill();
    ctx.strokeStyle = "#2d8a5e";
    ctx.stroke();

    // 6. 文字
    ctx.font = "16px system-ui, sans-serif";
    ctx.fillStyle = "#333";
    ctx.fillText("Hello Canvas", 20, 140);

    // 7. 渐变
    const gradient = ctx.createLinearGradient(20, 170, 200, 250);
    gradient.addColorStop(0, "#4facfe");
    gradient.addColorStop(1, "#00f2fe");
    ctx.fillStyle = gradient;
    ctx.fillRect(20, 170, 180, 80);

    // 8. 圆角矩形（手动 path）
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
    roundRect(240, 170, 160, 80, 12);
    ctx.fillStyle = "#fa709a";
    ctx.fill();
  </script>
