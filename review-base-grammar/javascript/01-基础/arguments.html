<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>arguments 详解</title>
</head>
<body>
  <h1>arguments 类数组对象</h1>
  <p>每个普通函数（非箭头函数）内部都隐式存在 <code>arguments</code>，存储调用时的所有实参。</p>
  <script>
    function f1(x, y) {
      // 1) 形参 x, y 与 arguments 的关系：实参可以多/少于形参，arguments 永远是真实传入的实参集合
      console.log("形参 x, y:", x, y);
      console.log("arguments:", arguments);
      console.log("arguments.length:", arguments.length);

      // 2) arguments 是「类数组对象」：有 length、可用下标访问，但没有数组方法
      console.log("typeof arguments:", typeof arguments); // 'object'
      // arguments.slice(0); // ❌ TypeError: arguments.slice is not a function

      // 3) 把 arguments 转成真数组的三种方式
      const arr1 = Array.prototype.slice.call(arguments);
      const arr2 = Array.from(arguments);
      const arr3 = [...arguments];
      console.log("Array.prototype.slice.call:", arr1);
      console.log("Array.from:", arr2);
      console.log("[...arguments]:", arr3);

      // 4) arguments.callee 指向函数自身（严格模式下被禁用，不推荐）
      // console.log(arguments.callee);

      // 5) Object.keys 也能拿到 arguments 的下标
      console.log("Object.keys:", Object.keys(arguments));
    }
    f1(1, 2, 3, 4);

    // ===== 现代写法：用剩余参数 ...rest 代替 arguments =====
    function f2(first, ...rest) {
      console.log("first:", first);
      console.log("rest 是真数组:", Array.isArray(rest), rest);
    }
    f2(10, 20, 30, 40);

    // ===== 箭头函数没有 arguments，会向外层找 =====
    function outer() {
      const arrow = () => {
        console.log("箭头函数中的 arguments 来自 outer:", arguments);
      };
      arrow();
    }
    outer("a", "b");
  </script>
</body>
</html>
