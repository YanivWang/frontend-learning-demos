<!--
  分类: vue2 / 组件
  主题: props 传值 + 自定义事件 + 动态组件
  要点:
    - DOM 模板里事件名会全部小写，必须用 kebab-case：@blow-event 对应 $emit('blow-event')
    - @click.native 是 Vue2 专属修饰符：监听组件根元素的原生事件
    - <component :is="..."> 切换不同组件，注意被切换组件需提前注册
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>props + 自定义事件 + 动态组件</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <div>
        <div>{{title}}</div>
        <div>{{content}}</div>
    </div>

    <!--父组件可以通过子组件的属性，为其传入值，v-bind 来动态传递 prop-->
    <!--v-on事件监听器在DOM模板中会被自动转换为全小写-->
    <!--原生事件会有事件对象，自定义事件没有事件对象-->
    <my-comp1 :title="title" :content="content" @click.native="compClickHandle"  @blow-event="blowEventHandle"></my-comp1>
    <div>
        切换子组件
    </div>
    <button @click="switchNextComp">next</button>

    <component v-bind:is="currentComp"></component>
</div>

<script>
    console.log("111");

    Vue.component("my-comp1", {
        data: function () {
            return {
                msg: "我是msg"
            }
        },
        props: ["title", "content"],//props对于子组件来说，就是data属性一样
        template: `
        <div>
           <div>组件一</div>
           <div>{{msg}}</div>
           <div>{{title}}</div>
           <div>{{content}}</div>

           <button @click="triggleEvent">发送消息</button>
        </div>
        `,
        methods:{
            triggleEvent:function () {
               //利用Vue的自定义事件系统，由子组件，触发一个事件，然后由父组件捕获这个事件，达到子组件向父组件发送消息的
               this.$emit("blow-event","msg I am you");
            }
        }
    });

    Vue.component("my-comp2", {
        template: `<div>组件二</div>`
    });

    var MyComp3 = {
        template: `<div>组件三</div>`
    };


    new Vue({
        data: {
            title: "我是title",
            content: "我是content",
            index: 0,
            tabNames: ["my-comp1", "my-comp2", "MyComp3"],
            currentComp: "my-comp1"
        },
        components: {
            MyComp3
        },
        methods: {
            switchNextComp() {
                this.index++;
                if (this.index >= 3) {
                    this.index = this.index % 3;
                }
                this.currentComp = this.tabNames[this.index];
            },
            //监听子组件的事件
            blowEventHandle: function (payload) {
               console.log("事件被触发", payload);
            },
            compClickHandle: function (e) {
                console.log(e);
            }
        }
    }).$mount("#app");


</script>

</body>
</html>
