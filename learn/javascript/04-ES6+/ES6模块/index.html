<!--
  分类: javascript / 04-ES6+ / ES6模块
  主题: ES Module import/export 静态导入与动态导入
  要点:
    - script type="module" 自动启用严格模式，import 必须是顶层语句
    - 静态导入 import {...} from '...'，动态导入 import('...').then(...)
    - 模块在浏览器中需要通过 http(s) 协议加载（直接 file:// 不行）
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ES6 模块</title>
  </head>
  <body>
    <!-- type="module" 声明此脚本为模块(模块脚本)
     模块自动使用严格模式 
    -->
    <script type="module">
      console.log("Before importing moduleA");
      import { ageVar, sayHello } from "./moduleA.js";
      console.log("After importing moduleA"); // 
      console.log("ageVar", ageVar);
      sayHello(); // 控制台输出 "nameVar" 标签及其值
    </script>

    <!-- 动态导入的优点是它们始终可用，即使在脚本环境中也是如此 -->
    <script>
      // console.log("Before importing moduleA");

      // import("./moduleA.js").then((moduleA) => {
      //   console.log("moduleA", moduleA);
      // });
      // console.log("Before importing moduleA");
    </script>
