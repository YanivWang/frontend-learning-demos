<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let timeStamp = Math.round(Date.parse(new Date) / 1000);
    console.log("timeStamp:" + timeStamp);

    function timeOut() {
        return new Promise(function (resolve) {
            setTimeout(resolve, 1000)
        });
    }

    async function getData() {
        await timeOut();
        console.log(111);
        if (true) {
            await timeOut();

            console.log(222);

            return "444";
        } else {
            return "333";
        }
    }

    async function setData() {
        let data = await getData();
        console.log(data);

        await timeOut();
        console.log(555);
        if (true) {
            await timeOut();

            console.log(666);

            return "777";
        } else {
            return "888";
        }
    }

    setData();
</script>

</body>
</html>
