<!--
  分类: javascript / 04-ES6+ / class详解
  主题: class 声明的关键特性
  要点:
    - 类声明不提升，存在暂时性死区；class 主体默认严格模式
    - 静态字段在类初始化时执行，实例字段仅在 new 时初始化
    - 易错点：无 extends 的构造器不能调用 super()；class 名标识符不能重新声明
-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>class 类声明</title>
  </head>
  <body>
    <script>
      // 1.类声明不会提升（函数声明会提升）
      // Uncaught ReferenceError: Cannot access 'Person' before initialization
      // const p = new Person();

      // 空的类声明也是有效的
      class Person {

      }

      // class 声明的语义和 let 类似：不具有提升，有暂时性死区
      class WhitePerson {
        // 静态字段：类初始化时即执行
        static userType = "whitePerson";

        // 实例字段：每个 new 出来的实例各有一份
        userAge = 18;

        // 类字段是属性，无需 const/let
        userHeight;

        // 私有字段：必须在类声明体中预先声明
        #privateField;
        #privateId = 10001;

        constructor(userName){
          // 易错点：没有 extends 的类不能调用 super()
          //   SyntaxError: 'super' keyword unexpected here
          // super();
          this.userName = userName;
        }
      }

      // 类名标识符不可重新声明（Uncaught SyntaxError: Identifier 'WhitePerson' has already been declared）
      // const WhitePerson = 123;
      //
      // 类名绑定不可重新赋值（与 const 相同，会抛 TypeError: Assignment to constant variable）
      // WhitePerson = "new value"; // 不要这样做

      const wp = new WhitePerson("trump");
      console.log(wp);
      console.log(WhitePerson.userType);
    </script>
  </body>
</html>
