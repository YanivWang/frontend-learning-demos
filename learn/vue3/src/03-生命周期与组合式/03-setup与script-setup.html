<!--
  分类: vue3 / 03-生命周期与组合式
  主题: setup / script setup
  要点:
    - setup 是 Composition API 的入口
    - script setup 是编译时语法糖，顶层变量自动暴露给模板
    - defineProps / defineEmits 是编译宏，不需要从 Vue 导入
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · setup 与 script setup</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 820px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>{{ title }}</h1>
      <div class="box">
        <p>这个仓库用浏览器全局构建演示，所以这里使用普通 <code>setup()</code>。</p>
        <pre>{{ snippet }}</pre>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li><code>setup(props, context)</code> 中不能使用组件实例 <code>this</code>。</li>
        <li><code>&lt;script setup&gt;</code> 是 SFC 编译时语法糖，不是浏览器原生直接运行的脚本类型。</li>
        <li><code>defineProps</code>、<code>defineEmits</code>、<code>defineExpose</code> 是编译宏，常用于 Vue3 工程项目。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const title = ref("setup 与 script setup");
          const snippet = [
            "&lt;script setup&gt;",
            "const props = defineProps({ title: String })",
            "const emit = defineEmits(['change'])",
            "const count = ref(0)",
            "&lt;/script&gt;"
          ].join("\n");
          return { title, snippet };
        },
      }).mount("#app");
    </script>
  <!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">
