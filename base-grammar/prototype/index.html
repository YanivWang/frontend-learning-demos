<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    function Person(name) {
        this.name = name;
    }
    Person.prototype.sayName = "你好";

    function Child(name) {
        //这一步骤实现子类继承父类的实例方法和属性(注意无论什么时候，子类无法继承父类的静态属性)
        Person.call(this, name);
    }

    //这两步骤只能实现子类继承父类的原型上的属性和方法
    Child.prototype = Object.create(Person.prototype);
    Child.prototype.constructor = Child;

    Child.prototype.run = function () {
        console.log("跑得快");
    }
</script>

</body>
</html>
