<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div>ぎ</div>
<div>ぎ</div>

<textarea></textarea>

<button onclick="submitHandle()">提交</button>

<script>
    var code1 = "ぎ";

    var code2 = "ぎ";

    if (code1 === code2) {
        console.log("相等...");
    }

    function submitHandle() {
        var textarea = document.getElementsByTagName("textarea")[0];
        var value = textarea.value;

        value = value.trim();
        var reg = /\s+/g;
        value = value.replace(reg, " ");

        var array = value.split(reg);
        if (array[0] === array[1]) {
            console.log("相等...");
        }
    }


</script>

</body>
</html>
