<!--
  分类: demos / svg
  主题: SVG 基础元素（矩形 / 圆形 / 文本）
  要点:
    - <svg> 是 XML 命名空间根元素，必须带 xmlns="http://www.w3.org/2000/svg"
    - 子元素 <rect> <circle> <text> 都用「绝对坐标」定位，与 CSS 盒模型无关
    - text-anchor="middle" 控制文本水平对齐基准；fill 是「填充色」（CSS 用 background）
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG 基础元素</title>
  </head>
  <body>
    <!-- svg 是根元素 -->
    <svg version="1.1" baseProfile="full" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
      <rect width="100%" height="100%" fill="red" />

      <circle cx="80" cy="80" r="80" fill="green" />

      <text x="80" y="80" font-size="60" text-anchor="middle" fill="white">SVG1</text>
    </svg>
  <!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">

    .demo-output:empty { display: none; }

</html>
