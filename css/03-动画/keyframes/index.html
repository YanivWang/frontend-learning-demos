<!--
  分类: css / 03-动画 / keyframes
  主题: @keyframes 基础旋转动画
  要点:
    - @keyframes name { 0% {...} 50% {...} 100% {...} } 定义多段关键帧
    - animation: name duration timing-function iteration-count
    - linear 等速；infinite 无限循环；transform 用 GPU 加速性能好
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>@keyframes 旋转动画</title>

    <style>
        .testDiv {
            width: 50px;
            height: 50px;
            background-color: red;
            animation: spinnerAni 2s linear infinite;
        }

        @keyframes spinnerAni {
            0% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(180deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="testDiv">

</div>


</body>
</html>
