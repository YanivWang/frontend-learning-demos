<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Hello World</title>
  <!-- react核心库 -->
  <script src="../../jsLibrary/react.development.js"></script>
  <!-- react用来操作dom的库 -->
  <script src="../../jsLibrary/react-dom.development.js"></script>

  <!-- Don't use this in production: -->
  <!-- 引入 babel 是用来编译jsx的 -->
  <script src="../../jsLibrary/babel.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const container = document.getElementById("root");

    //返回一个更新后得组件，组件内容可以通过这个props对象，访问从父组件传递过来得属性
    //注意永class定义组件时候，定义得class类必须继承 React.Component 组件类，并且类的
    //内部必须有一个渲染函数，函数内容得返回一个元素
    //类得内部要访问属性，必须使用 ths.props.xxx
    class Counter extends React.Component {
      render() {
        return <div>{this.props.count}</div>;
      }
    }

    //执行组件渲染逻辑
    let count = 0;
    function tick() {
      count++;
      //给render方法传入得第一个参数组件，给该组件传递得所有属性，最终会被封装成一个props对象
      ReactDOM.render(<Counter count={count} />, container);
    }

    //没隔一秒创建一个新元素，并将其传入到ReactDOM.render方法中，实现界面得更新
    setInterval(tick, 1000)
  </script>

</body>

</html>
