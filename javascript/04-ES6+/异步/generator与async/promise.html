<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    console.log("promise test!!!");

    //Promise 对象一旦被new之后，就会立即执行
    let promise = new Promise(function (resolve, reject) {
        setTimeout(function () {
            let random = Math.floor(Math.random() * 10);//[0.9)
            if (random > 5) {
                resolve();
            } else {
                reject("error: rand is less than 5" + random);
            }
        }, 5000);
    });

    promise.then(function (ret) {
        console.log("ret: " + ret);
    }).catch(function (err) {
        console.log("err: " + err);
    });
</script>

</body>
</html>
