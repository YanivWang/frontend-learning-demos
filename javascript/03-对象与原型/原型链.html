<!--
  分类: javascript / 03-对象与原型
  主题: 原型链与组合继承
  要点:
    - 组合继承：子构造函数中 Parent.call(this, ...) 借实例属性 + 原型链接 Object.create(Parent.prototype)
    - 修正 constructor 指针：Child.prototype.constructor = Child
    - 注意：父类静态属性不会通过原型链继承
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原型链</title>
</head>
<body>
  <h1>原型链 / 组合继承</h1>
  <p>每个对象都通过内部 <code>[[Prototype]]</code>（即 <code>__proto__</code>）指向其构造函数的 <code>prototype</code>，逐级向上形成原型链。</p>
  <script>
    // ① 父构造函数
    function Person(name) {
      this.name = name;
    }
    Person.prototype.sayName = function () {
      console.log("hi, I'm " + this.name);
    };

    // ② 子构造函数 —— 组合继承：构造函数借用 + 原型链接
    function Child(name, age) {
      // 1) 借父构造函数 → 继承实例属性（注意：父类的静态属性不会被继承）
      Person.call(this, name);
      this.age = age;
    }
    // 2) 让子原型链接到父原型 → 继承父原型方法
    Child.prototype = Object.create(Person.prototype);
    // 3) 修正 constructor 指针
    Child.prototype.constructor = Child;

    Child.prototype.run = function () {
      console.log(this.name + " 跑得快");
    };

    const c = new Child("小白", 3);
    c.sayName();
    c.run();

    // ===== 原型相关 API =====
    // __proto__ 与 Object.getPrototypeOf 等价
    console.log(c.__proto__ === Child.prototype);
    console.log(Object.getPrototypeOf(c) === Child.prototype);

    // hasOwnProperty 仅检测自身属性，会忽略原型链上的属性/方法
    console.log(c.hasOwnProperty("name"));     // true（构造时挂在实例上）
    console.log(c.hasOwnProperty("sayName"));  // false（在原型上）
    console.log("sayName" in c);                // true（in 会沿原型链查找）

    // 同一构造函数创建的不同实例，原型方法是同一份引用
    const c2 = new Child("小黑", 5);
    console.log(c.sayName === c2.sayName); // true

    // 静态属性 vs 原型属性
    Person.staticFlag = "I'm static";
    console.log(Child.staticFlag); // undefined —— call/Object.create 都无法继承父类静态属性

    // instanceof 沿原型链查找
    console.log(c instanceof Child);  // true
    console.log(c instanceof Person); // true
    console.log(c instanceof Object); // true
  </script>
</body>
</html>
