<!DOCTYPE html>

    <script type="text/javascript" src="https://res.wx.qq.com/open/js/jweixin-1.3.2.js"></script>

    <style>
        .navBar {
            position: fixed;
            top: 0px;
            left: 0px;
            right: 0px;
            text-align: left;
            z-index: 999;
            font-size: 18px;
            background-color: white;
            border-bottom: 1px solid #f2f9f7;
            max-height: 76px;
        }

        .navBar > .navBarInner {
            width: 40vw;
            height: 100%;
        }

        .navBar > .navBarInner > div {
            float: left;
        }

        .navBar > .navBarInner > div:first-child {
            position: relative;
        }

        .navBar > .navBarInner > div:last-child {
            position: relative;
            top: 2px;
        }

        .navBar > .navBarInner > div img.backBtn {
            width: 3vw;
            height: 5.1vw;
            margin-left: 12px;
            position: relative;
            max-height: 24px;
            max-width: 15px;
            top: 0px;
        }

        .navBar > .navBarInner div.backText {
            margin-left: 12px;
            font-size: 4.6vw;
        }
    </style>
</head>
<body>

<script>
    window.onload = init;

    function navBackHandle() {
        wx.miniProgram.navigateBack({
            delta: 3
        });
    }

    function init() {
        var navBar = document.getElementById("navBar");
        var backBtnWrap = document.getElementById("backBtnWrap");
        var backText = document.getElementById("backText");
        var backBtn = document.getElementById("backBtn");

        var bi = 750 / 100;
        if (is_IOS()) {
            navBar.style.height = 130 / bi + "vw";
            backBtnWrap.style.top = 65 / bi + "vw";
            backText.style.top = 59 / bi + "vw";
            backBtn.style.top = "0px";
        } else {
            navBar.style.height = 152 / bi + "vw";
            backBtnWrap.style.top = 76 / bi + "vw";
            backText.style.top = 79 / bi + "vw";
            backBtn.style.top = 5 / bi + "vw";
        }
    }

    function is_IOS() {
        var ua = navigator.userAgent.toLowerCase();
        if (/iphone|ipad|ipod/.test(ua)) {
            return true;
        }
        return false;
    }


</script>
