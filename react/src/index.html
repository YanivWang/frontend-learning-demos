<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Hello World</title>
  <!-- react核心库 -->
  <script src="../libs/react18.js"></script>
  <!-- react用来操作dom的库 -->
  <script src="../libs/react-dom18.js"></script>

  <!-- Don't use this in production: -->
  <!-- 引入 babel 是用来编译jsx的 -->
  <script src="../libs/babel.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const element = <div>我是一个按钮</div>;

    //一个元素就是一个普通的js对象(其结构类似于虚拟dom)
    console.log("element", element);

    //react元素都是不可变的，当元素被创建之后，你是无法改变其内容或者属性的
    //要想更新界面，你需要创建一个新的元素并将其传入到 ReactDOM.render(element, container)
    // element.props.children = "爸爸";//Cannot assign to read only property 'children' of object '#<Object>'

    //render方法，将一个元素渲染到 root dom容器中
    const container = document.getElementById("root");
    ReactDOM.render(element, container);

    //手动创建一个新元素，并传入到 ReactDom的render方法中是更新一个元素的唯一方法，但是这样太不智能化了，
    //如果我这个元素，就其中某一个很小的点，需要变动，就得再次手动创建一个新元素(此新元素只比原来元素变化了一点东西)
    const newElement = <div>我是一个新元素</div>;
    setTimeout(() => {
      ReactDOM.render(newElement, container)
    }, 3000);
  </script>

</body>

</html>
