<!--
  分类: css / 03-动画 / 光标闪烁
  主题: CSS 实现终端式闪烁光标
  要点:
    - steps(1, start) 阶梯函数：让 background-color 跳变而非渐变
    - 通过 @keyframes 在 50% 切换 transparent，形成「闪烁」
    - 比 visibility/opacity 渐变更接近真实命令行视觉
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光标闪烁 · @keyframes</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    .row { display: flex; align-items: center; font-size: 28px; }
    /* steps(1, start) —— 阶梯函数：跳变而非渐变，模拟终端光标 */
    .cursor {
      width: 2px;
      height: 30px;
      background-color: #000;
      animation: blink 1s infinite steps(1, start);
      margin-left: 2px;
    }
    @keyframes blink {
      0%, 100% { background-color: #000; }
      50%      { background-color: transparent; }
    }
  </style>
</head>
<body>
  <h1>命令行式闪烁光标</h1>
  <div class="row">$ npm run dev<span class="cursor"></span></div>
  <p>核心：用 <code>steps(1, start)</code> 让背景色"跳变"而不是渐变，模拟终端光标。</p>
