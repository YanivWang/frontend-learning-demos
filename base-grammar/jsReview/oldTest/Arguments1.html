<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    f1(1, 2, 3, 4);

    function f1(x, y) {//x,y显示参数，没有类型的规定
        //函数的内置对象 arguments
        console.log(arguments);
    }

    //函数中的this总是指向调用它的那个对象

    //当函数没有被自身的对象调用时 this 的值就会变成全局对象
    //函数作为全局对象调用，会使 this 的值成为全局对象。
    function f2() {//声明一个全局函数f2,f2此时是window对象的属性函数
        this.x = 1;
        console.log("f2:" + this);
    }

    f2();//this 在函数调用的时候，生成，代表的是调用函数的那个对象
    window.f2();


    //函数作为对象方法调用，会使得 this 的值成为对象本身
    var person = {
        name: "王晨",
        age: 18,
        eat: function () {
            console.log("person:" + this);

            console.log(this);
        },
        sleep: function () {
        }
    };

    //使用构造函数调用函数
    var myFunction = function (a) {
        console.log("myFunction:" + this);
        this.x = a;
    };
    var tempM = new myFunction("a");
    console.log(tempM.x);


    //作为函数方法调用函数


    //随着函数使用场合的不同，this 的值会发生变化。但是有一个总的原则，那就是this指的是，调用函数的那个对象。

    //switch 中的 比较符号采用的是 === (不仅比较类型还比较数值)
    var x = "10";
    switch (x) {
        case "10":
            alert("相等");
            break;
        default:
            alert("不相等");
    }

    //浮点数据使用区别
    var a = 0.1;
    var b = 0.2;
    var c = a + b;
    //javaScript的数值数据采用64位浮点型数据存储
    //任何变成语言
    if (c === 0.3) {
        console.log("等");
    } else {
        console.log("不等");
    }

    
    var xx =
        "";

    var yy = "你好 \
    ";
</script>

</body>
</html>
