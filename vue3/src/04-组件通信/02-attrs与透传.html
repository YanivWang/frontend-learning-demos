<!--
  分类: vue3 / 04-组件通信
  主题: attrs / 属性透传
  要点:
    - 未声明为 props 的属性会进入 attrs
    - 单根组件默认会把 attrs 透传到根元素
    - inheritAttrs: false 可以关闭自动透传
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · attrs 与透传</title>
    <script src="../../libs/vue3.5.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { padding: 6px 12px; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .primary { color: #fff; background: #1a73e8; border: 0; border-radius: 6px; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>attrs 与属性透传</h1>
      <div class="box">
        <base-button class="primary" data-id="save" @click="message = '已点击保存'">保存</base-button>
        <p>{{ message }}</p>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li><code>attrs</code> 适合做二次封装组件，比如按钮、输入框、表格组件。</li>
        <li>Vue3 中 <code>class</code>、<code>style</code>、普通属性和事件监听都可作为透传属性处理。</li>
        <li>多根组件不会自动决定透传到哪里，需要显式 <code>v-bind="$attrs"</code>。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      const BaseButton = {
        inheritAttrs: false,
        template: `<button v-bind="$attrs"><slot></slot></button>`,
      };

      createApp({
        components: { BaseButton },
        setup() {
          const message = ref("等待点击");
          return { message };
        },
      }).mount("#app");
    </script>
  </body>
</html>
