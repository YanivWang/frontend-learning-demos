<!--
  分类: javascript / 01-基础
  主题: 类型检测三板斧 - typeof / instanceof / toString
  要点:
    - typeof 粗粒度，typeof null === 'object' 是历史遗留 bug
    - instanceof 基于原型链，无法跨 iframe，且对原始值无效
    - Object.prototype.toString.call 万能精准，可识别所有内置类型
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>typeof / 精准类型检测</title>
</head>
<body>
<h1>类型检测三板斧</h1>
<script>
    // ============ 1. typeof：粗粒度，只区分原始类型与对象/函数 ============
    console.log(typeof undefined); // 'undefined'
    console.log(typeof null);      // 'object'  ⚠️ 历史遗留 bug
    console.log(typeof 0);         // 'number'
    console.log(typeof NaN);       // 'number'
    console.log(typeof "abc");     // 'string'
    console.log(typeof true);      // 'boolean'
    console.log(typeof Symbol());  // 'symbol'
    console.log(typeof 1n);        // 'bigint'
    console.log(typeof []);        // 'object'  数组也是 object
    console.log(typeof {});        // 'object'
    console.log(typeof /a/);       // 'object'
    console.log(typeof function () {}); // 'function'

    // ============ 2. instanceof：基于原型链，不能跨 iframe ============
    console.log([] instanceof Array);     // true
    console.log([] instanceof Object);    // true（数组也是对象）
    console.log("abc" instanceof String); // false（字面量不是 String 实例）

    // ============ 3. Object.prototype.toString.call —— 万能精准检测 ============
    const getType = Object.prototype.toString;
    console.log(getType.call("aaa"));        // '[object String]'
    console.log(getType.call(111));          // '[object Number]'
    console.log(getType.call(true));         // '[object Boolean]'
    console.log(getType.call([]));           // '[object Array]'
    console.log(getType.call({}));           // '[object Object]'
    console.log(getType.call(null));         // '[object Null]'
    console.log(getType.call(undefined));    // '[object Undefined]'
    console.log(getType.call(function () {})); // '[object Function]'
    console.log(getType.call(new Date()));   // '[object Date]'
    console.log(getType.call(/a/));          // '[object RegExp]'

    // 工具函数：返回类型字符串小写
    function type(value) {
      return Object.prototype.toString.call(value).slice(8, -1).toLowerCase();
    }
    console.log(type([])); // 'array'
    console.log(type(/a/)); // 'regexp'
    console.log(type(null)); // 'null'
</script>
