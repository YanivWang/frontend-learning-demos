<!--
  分类: javascript / 01-基础
  主题: Unicode 编码差异导致字符串看似相同实则不等
  要点:
    - 多字节字符可能存在多种合法 Unicode 表示（NFC vs NFD 组合形）
    - 直接用 === 比较会因为底层码点序列不同而返回 false
    - 解决：先 .normalize('NFC') 统一规范化形式再比较
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unicode 编码差异</title>
</head>
<body>

<script>
    // 两个看上去一模一样的「郵便番号」，可能由不同 Unicode 序列构成
    var foo = '郵便番号',
        bar = '郵便番号';

    if (foo === bar) {
        console.log('they are the same');
    } else {
        console.log('看起来一样实际不等，normalize 后:', foo.normalize('NFC') === bar.normalize('NFC'));
    }
</script>

</body>
</html>
