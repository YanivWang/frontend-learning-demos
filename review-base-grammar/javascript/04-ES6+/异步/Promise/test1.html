<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //new Promise 传入的函数会立即执行
    //resolve and reject 是两个回调函数(resolve表示异步操作执行成功的回调，reject表示异步操作执行失败的回调)
    let p1 = new Promise((resolve, reject) => {
        setTimeout(function (param) {
            resolve(param);

            console.log("p1");
        }, 5000, 'one', 'one222');
    });
    let p2 = new Promise((resolve, reject) => {
        setTimeout(function (param) {
            resolve(param);

            console.log("p2");
        }, 4000, "two");
    });
    let p3 = new Promise((resolve, reject) => {
        setTimeout(function (param) {
            resolve(param);

            console.log("p3");
        }, 7000, "three");
    });
    let p4 = new Promise((resolve, reject) => {
        setTimeout(function (param) {
            resolve(param);

            console.log("p4");
        }, 4000, "four");
    });
    let p5 = new Promise((resolve, reject) => {
        reject('reject');//该方法返回一个带有拒绝reason参数的Promise对象
    });

    //一: 并发执行
    //(并行执行异步异步任务)这些异步操作中，只要有一个返回失败，则全部失败
    //并发执行异步函数，总时长是用户最常的异步函数的时长
    /*
    console.log("start...");
    Promise.all([p1, p2, p3, p4]).then(values => {
        console.log("values: " + values);

        console.log("finish...");
    }).catch(reason => {
        console.log("reason: " + reason);

        console.log("ending...");
    });
    */

    //二: 顺序执行
    new Promise((resolve, reject) => {
        console.log("start promise...");

        resolve();
    }).then(p1).then(p2);

    console.log("end promise...");

</script>

</body>
</html>
