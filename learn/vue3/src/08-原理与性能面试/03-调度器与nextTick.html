<!--
  分类: vue3 / 08-原理与性能面试
  主题: 调度器 / nextTick
  要点:
    - Vue 会批量合并同一轮状态更新
    - DOM 更新被放入异步刷新队列
    - nextTick 等待这轮刷新完成
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · 调度器与 nextTick</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { margin-right: 8px; padding: 6px 12px; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>调度器与 nextTick</h1>
      <div class="box">
        <p ref="countEl">count：{{ count }}</p>
        <button @click="batchUpdate">连续改 3 次</button>
        <pre>{{ logs.join("\n") }}</pre>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li>Vue 不会每次状态变化都立即同步改 DOM，而是把更新任务放入队列。</li>
        <li>同一轮事件循环中的多次状态变化会被合并，减少重复渲染。</li>
        <li><code>nextTick</code> 返回一个 Promise，表示等待 DOM 刷新队列完成。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref, nextTick } = Vue;

      createApp({
        setup() {
          const count = ref(0);
          const countEl = ref(null);
          const logs = ref([]);

          async function batchUpdate() {
            count.value++;
            count.value++;
            count.value++;
            logs.value.push(`同步阶段 DOM：${countEl.value.textContent}`);
            await nextTick();
            logs.value.push(`nextTick 后 DOM：${countEl.value.textContent}`);
          }

          return { count, countEl, logs, batchUpdate };
        },
      }).mount("#app");
    </script>
