<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>展开折叠 · height transition</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    /* 用 height 过渡：必须给定明确像素高度，"height: auto" 不能被过渡 */
    .panel {
      background-color: rosybrown;
      color: #fff;
      height: 0;
      overflow: hidden;
      transition: height 0.4s ease;
    }
    .panel.open {
      height: 140px;
    }
    .panel > div { padding: 4px 12px; }
    .actions { margin-bottom: 12px; }
    button { padding: 6px 14px; margin-right: 6px; }
  </style>
</head>
<body>
  <h1>height 过渡 · 展开折叠</h1>

  <div class="actions">
    <button id="show">展开</button>
    <button id="hide">折叠</button>
    <button id="toggle">切换</button>
  </div>

  <div class="panel" id="panel">
    <div>列表项 1</div>
    <div>列表项 2</div>
    <div>列表项 3</div>
    <div>列表项 4</div>
    <div>列表项 5</div>
  </div>

  <p style="margin-top:1rem;color:#666;">
    高度未知时的两种现代做法：
    <br/>① 用 <code>max-height</code> 过渡到一个足够大的值（缺点：动画速度不均匀）。
    <br/>② 用 <code>grid-template-rows: 0fr → 1fr</code> + <code>min-height: 0</code>（推荐）。
  </p>

  <script>
    const panel = document.getElementById("panel");
    document.getElementById("show").onclick   = () => panel.classList.add("open");
    document.getElementById("hide").onclick   = () => panel.classList.remove("open");
    document.getElementById("toggle").onclick = () => panel.classList.toggle("open");
  </script>
</body>
</html>
