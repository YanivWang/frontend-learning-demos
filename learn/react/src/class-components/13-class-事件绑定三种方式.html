<!--
  分类: react / class 组件
  主题: class 组件事件 this 绑定的三种方式
  要点:
    - 方式一: constructor 中 this.handle = this.handle.bind(this)
    - 方式二: JSX 箭头函数 onClick={(e) => this.handle(e)}（每次 render 新建函数）
    - 方式三: 类字段箭头函数 handle = (e) => {}（推荐，this 自动绑定）
    - 直接 onClick={this.handle} 会导致 this 为 undefined（非严格模式下可能是 window）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · class 事件绑定三种方式</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class Demo extends React.Component {
      constructor(props) {
        super(props);
        this.state = { count: 0 };
        this.handleBind = this.handleBind.bind(this);
      }

      handleBind() {
        this.setState({ count: this.state.count + 1 });
        console.log("bind 方式 this:", this.constructor.name);
      }

      handleArrowInJsx = () => {
        // 仅演示：实际在 render 里写箭头函数
      };

      handleClassField = () => {
        this.setState({ count: this.state.count + 1 });
        console.log("类字段箭头 this:", this.constructor.name);
      };

      handleWrong() {
        // 未绑定：React 调用时 this 不是组件实例
        console.log("未绑定 this:", this);
        try {
          this.setState({ count: this.state.count + 1 });
        } catch (err) {
          alert("未绑定: " + err.message);
        }
      }

      render() {
        return (
          <section>
            <h1>事件 this 绑定三种方式</h1>
            <p>count: {this.state.count}</p>
            <button onClick={this.handleBind}>1. constructor bind</button>
            <button onClick={(e) => {
              this.setState({ count: this.state.count + 1 });
              console.log("JSX 箭头 this:", this.constructor.name);
            }}>
              2. JSX 内箭头函数
            </button>
            <button onClick={this.handleClassField}>3. 类字段箭头（推荐）</button>
            <button onClick={this.handleWrong}>反例: 未绑定（会报错）</button>
            <p>面试回答: React 合成事件调用 handler 时不保证 this；bind / 类字段箭头最常用。</p>
          </section>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
