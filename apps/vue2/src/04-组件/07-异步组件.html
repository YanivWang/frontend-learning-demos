<!--
  分类: vue2 / 04-组件
  主题: 同步组件 vs 异步组件（工厂函数形式）
  要点:
    - Vue.component(name, options) 注册同步组件，立即可用
    - Vue.component(name, fn) 注册异步组件：fn(resolve, reject)，按需触发解析
    - 异步组件解析结果会被 Vue 缓存，下一次渲染直接复用
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同步组件 vs 异步组件</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <p>同步组件（立即可见）：</p>
    <asyn-com></asyn-com>
    <p>异步组件（约 2 秒后加载）：</p>
    <async-com></async-com>
</div>

<script>
    //1.定义同步组件（组件名 asyn-com 易与 async 混淆，此处为同步注册）
    //参数：组件名称 组件选项对象
    Vue.component('asyn-com', {
        template: `<div>同步组件</div>`
    });

    //参数：组件名称 一个工厂函数
    //这个工厂函数会异步的解析你的组件定义。Vue只有在这个组件需要被渲染的时候才会触发该工厂函数，且会把结果缓存起来
    //供未来重新渲染
    Vue.component('async-com', function (resolve, reject) {
        setTimeout(function () {
            //向'resolve'回调传递组件定义(组件选项对象)
            //这个回调函数，会在你从服务器得到组件定义的时候被调用
            //使用reject(reason)来表示加载失败。
            resolve({
                template: `<div>I am async!</div>`
            })
        }, 2000)
    });

    new Vue({ el: '#app' });
</script>
