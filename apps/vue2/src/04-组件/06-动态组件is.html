<!--
  分类: vue2 / 04-组件
  主题: 动态组件 <component :is="...">
  要点:
    - :is 绑定到「组件名」字符串或组件选项对象，运行时切换
    - 配合 <keep-alive> 可让被切换走的组件保留状态，不必重新渲染
    - 常见用法：tab 页签切换、不同步骤的表单页
  说明:
    - 原文件为空壳，这里补一个最小可运行的 tab 切换示例
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动态组件 + keep-alive</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <button v-for="(tab, idx) in tabs" :key="idx" @click="currentTab = tab">
        {{ tab }}
    </button>

    <keep-alive>
        <component :is="currentTab"></component>
    </keep-alive>
</div>

<script>
    Vue.component('Home',  { template: '<div>Home 页：counter <input/></div>' });
    Vue.component('About', { template: '<div>About 页：counter <input/></div>' });
    Vue.component('User',  { template: '<div>User 页：counter <input/></div>' });

    new Vue({
        el: '#app',
        data: { tabs: ['Home', 'About', 'User'], currentTab: 'Home' }
    });
</script>
