<!--
  分类: vue2 / 01-基础语法
  主题: :style 三种写法（行内对象 / 对象变量 / 数组）
  要点:
    - 行内对象写法可直接引用 data 字段：{color: activeColor}
    - 数组写法可同时合并多个样式对象（后者覆盖前者）
    - CSS 属性名既能用驼峰 fontSize，也能用串 'font-size'，但同 key 不要混写
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>v-bind:style 三种写法</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<!-- 绑定的这个元素就是一个对象{color: activeColor, fontSize: fontSize}，只是这个对象，不需要预定义  -->
<div id="app1">
    <div v-bind:style="{color: activeColor, fontSize: fontSize}">
        测试文本
    </div>
</div>

<!--直接绑定一个样式对象-->
<div id="app2">
    <div v-bind:style="styleObject">
        测试文本
    </div>
</div>


<!--使用数组语法，绑定多个样式对象-->
<div id="app3">
    <div v-bind:style="[styleObject1,styleObject2]">
        测试文本
    </div>
</div>


<script>
    var vm1 = new Vue({
        el: "#app1",
        data: {
            activeColor: "red",
            fontSize: '13px'
        },
        methods: {}
    });

    // 注意 CSS 属性 key 使用驼峰命名法或短横线连接（kebab-case）
    var vm2 = new Vue({
        el: "#app2",
        data: {
            styleObject: {
                color: "red",
                'font-Size': '23px',
                'fontSize': '33px'
            }
        },
        methods: {}
    });


    var vm3 = new Vue({
        el: "#app3",
        data: {
            styleObject1: {
                color: "#ffffff",
                'font-Size': '23px',
                'fontSize': '33px'
            },
            styleObject2: {
                background: "red",
                'font-Size': '23px',
                'fontSize': '33px'
            }
        },
        methods: {}
    });
</script>
