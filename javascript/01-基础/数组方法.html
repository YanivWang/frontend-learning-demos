<!--
  分类: javascript / 01-基础
  主题: 数组方法、是否改变原数组与常见手写
  要点:
    - map/filter/reduce/some/every 等迭代方法不会直接修改原数组
    - push/pop/shift/unshift/splice/sort/reverse 会修改原数组
    - 去重、扁平化、分组统计是数组面试常见题
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>数组方法</title>
</head>
<body>
  <h1>数组方法与常见面试题</h1>
  <p>打开控制台查看输出。</p>

  <script>
    const nums = [1, 2, 3, 4, 5];

    // ============ 1. 常见迭代 ============
    console.log("map:", nums.map(n => n * 2));
    console.log("filter:", nums.filter(n => n % 2 === 0));
    console.log("reduce sum:", nums.reduce((sum, n) => sum + n, 0));
    console.log("some > 3:", nums.some(n => n > 3));
    console.log("every > 0:", nums.every(n => n > 0));
    nums.forEach((n, index) => {
      if (index < 2) console.log("forEach:", index, n);
    });

    // ============ 2. 查找类 ============
    const users = [
      { id: 1, name: "A" },
      { id: 2, name: "B" }
    ];
    console.log("find:", users.find(user => user.id === 2));
    console.log("findIndex:", users.findIndex(user => user.id === 2));
    console.log("includes NaN:", [1, NaN].includes(NaN)); // true
    console.log("indexOf NaN:", [1, NaN].indexOf(NaN)); // -1

    // ============ 3. 会改变原数组的方法 ============
    const changed = [3, 10, 2];
    changed.sort(); // 默认按字符串字典序排序
    console.log("sort default:", changed); // [10, 2, 3]
    changed.sort((a, b) => a - b);
    console.log("sort number:", changed); // [2, 3, 10]
    changed.reverse();
    console.log("reverse mutates:", changed);
    changed.splice(1, 1, 99);
    console.log("splice mutates:", changed);

    // ============ 4. 不改变原数组的方法 ============
    const source = [1, 2, 3];
    console.log("slice:", source.slice(0, 2), "source:", source);
    console.log("concat:", source.concat([4, 5]), "source:", source);

    // ============ 5. 去重 ============
    const repeated = [1, 2, 2, 3, 3, 3];
    const uniqueBySet = [...new Set(repeated)];
    const uniqueByFilter = repeated.filter((item, index, arr) => arr.indexOf(item) === index);
    console.log("unique Set:", uniqueBySet);
    console.log("unique filter:", uniqueByFilter);

    // ============ 6. 扁平化 ============
    const nested = [1, [2, [3, [4]]]];
    function flatten(arr) {
      return arr.reduce((result, item) => {
        return result.concat(Array.isArray(item) ? flatten(item) : item);
      }, []);
    }
    console.log("flatten recursive:", flatten(nested));
    console.log("flat Infinity:", nested.flat(Infinity));

    // ============ 7. reduce 分组统计 ============
    const orders = [
      { type: "book", price: 20 },
      { type: "food", price: 10 },
      { type: "book", price: 15 }
    ];
    const group = orders.reduce((acc, item) => {
      acc[item.type] = (acc[item.type] || 0) + item.price;
      return acc;
    }, {});
    console.log("group by type:", group);
  </script>
</body>
</html>
