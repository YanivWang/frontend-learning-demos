<!--
  分类: vue2 / 路由与状态
  主题: 命名视图（同级多个 router-view）
  要点:
    - 给 <router-view name="x"> 命名后，路由配置用 components: { default, x, y } 同时填充
    - 默认 router-view 对应 components.default；无名视图就是 default
    - 一个路径可以一次性把不同组件投到不同 outlet，做布局拼装很方便
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 命名视图</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <!--使用 router-view 同级展示多个视图：可以在一个界面中拥有多个单独命名的视图，而不是只有一个单独的出口-->
    <!--通过 name 属性为视图容器 router-view 命名-->
    <router-view class="view one"></router-view>
    <router-view class="view two" name="a"></router-view>
    <router-view class="view three" name="b"></router-view>
</div>

<script>
    //一个视图需要一个组件来渲染，一个页面上可以同时有多个view(视图)
    const Home = {
        template: `<div>首页</div>`
    };

    const Course = {
        template: `<div>课程</div>`
    };

    const Bottom = {
        template: `<div>底部</div>`
    };

    const router = new VueRouter({
        routes:[
            {
                path:'/',
                //component: Home,//注意和下面的区别
                components:{//一个路径匹配多个组件(每个组件在不同的router-view视图组件中进行渲染)
                    default: Home,
                    a: Course,
                    b: Bottom
                }
            }
        ]
    });

    new Vue({
        el: '#app',
        router
    })
</script>

</body>
</html>
