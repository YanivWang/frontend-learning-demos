<!--
  分类: javascript / 04-ES6+ / 集合
  主题: Set 值的集合
  要点:
    - 值唯一（用严格相等判断），保留插入顺序
    - [...new Set(arr)] 是数组去重经典写法
    - 添加对象字面量时按引用判断：两个 {} 视为不同
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set</title>
  </head>
  <body>
    <script>
      //Set是值的集合，且每个值只能出现一次
      //Set 可以包含任何 JavaScript 数据类型作为值
      //基本上相当于使用 SameValueZero 算法来检查值的匹配性
      //Set会维护插入的值的顺序
      const set = new Set([1, 2, 3, 4, 6, "wang"]);

      const entries = set.entries();
      console.log("entries", entries);

      const values = set.values();
      console.log("values", values);

      const keys = set.keys();
      console.log("keys", keys);

      for (let item of entries) {
        console.log(item);
        console.log(item[0] + ":" + item[1]);
      }

      const array = [...set]
      console.log(array);


      //数组去重
      const arrayDub = [1,2,2,1,3,3,3]

      console.log([...new Set(arrayDub)]);



      const set1 = new Set();
      console.log(  set.has(undefined));

      set1.add({})
      set1.add({})

      console.log(set1.size);
    </script>
