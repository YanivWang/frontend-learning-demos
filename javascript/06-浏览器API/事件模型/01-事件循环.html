<!--
  分类: javascript / 06-浏览器API / 事件模型
  主题: 事件循环综合（同步 + Promise + async/await + setTimeout）
  要点:
    - 同步任务先执行；微任务（Promise.then、await 之后）优先于宏任务
    - await 之后的代码相当于 .then 回调，属于微任务
    - setTimeout 回调是宏任务，会在当前微任务批次执行完后才运行
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>事件模型 - 综合</title>
</head>
<body>

<script>
    async function async1() {
        console.log('async1 start');
        await async2();
        console.log('async1 end')
    }

    async function async2() {
        console.log('async2')
    }

    console.log('script start');

    setTimeout(function () {
        console.log('setTimeOut')
    }, 0);

    async1();

    new Promise(function (resolve) {
        console.log('promise1');
        resolve()
    }).then(function () {
        console.log('promise2')
    });

    console.log('script end')

    /*
    预期输出顺序（微任务优先于宏任务）：
      script start
      async1 start
      async2
      promise1
      script end
      async1 end
      promise2
      setTimeOut
    */

</script>

</body>
</html>
