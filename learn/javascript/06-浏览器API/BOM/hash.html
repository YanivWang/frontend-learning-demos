<!--
  分类: javascript / 06-浏览器API / BOM
  主题: hash 路由的基本演示
  要点:
    - location.hash 修改不会触发整页刷新，是 hash 路由的基础
    - 监听 hashchange 即可在 SPA 中实现「自定义导航」
    - location.replace 会替换当前历史栈条目，不会留下「后退」记录
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOM hash 路由</title>
  </head>
  <body>
    <div>
      <button onclick="jumpToPageA()">修改hash 导航到A页面</button>
      <button onclick="jumpToPageB()">修改hash 导航到B页面</button>
    </div>
    <script>
      function jumpToPageA() {
        let stateObject = {
          name: "wangcheng",
        };
        let title = "我是A页面";
        let url = "page-aaa";

        window.location.hash = "#/page-aaa";//直接给location对象的hash属性赋值，实现导航
      }

      function jumpToPageB() {
        let stateObject = {
          name: "gaojie",
        };
        let title = "我是B页面";
        let url = "page-bbb";
        window.location.replace("#/page-bbb")
      }

      // popstate 仅在 pushState/replaceState 导航时触发；纯 hash 变化请监听 hashchange
      window.addEventListener("popstate", (event) => {
        console.log("popstate event", event);
      });

      //监听 window 对象上的 hashchange 事件
      window.addEventListener("hashchange", (event) => {
        console.log("hashchange event", event);
      });
    </script>
