<!--
  分类: react18 / 函数组件
  主题: 函数组件 state 与 props 综合
  要点:
    - props 由父组件传入，只读；state 由组件自身 useState 管理
    - 父改 props 会触发子组件重渲染；子改 state 只影响自身
    - 受控于父的展示用 props，交互产生的局部状态用 state
    - 对比 class 02：函数组件用 useState 替代 this.state / this.setState
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · 函数组件 state 与 props</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function Child({ title, onNotify }) {
      const [localCount, setLocalCount] = useState(0);

      return (
        <div style={{ border: "1px solid #ccc", padding: 12, marginTop: 8 }}>
          <p>来自父的 props.title: {title}</p>
          <p>子组件本地 state: {localCount}</p>
          <button onClick={() => setLocalCount(prev => prev + 1)}>本地 +1</button>
          <button onClick={() => onNotify("子组件点了通知")}>通知父组件</button>
        </div>
      );
    }

    function App() {
      const [parentTitle, setParentTitle] = useState("React 学习");
      const [message, setMessage] = useState("");

      return (
        <section>
          <h1>函数组件 state 与 props</h1>
          <label>
            父级 title（props）:
            <input value={parentTitle} onChange={(e) => setParentTitle(e.target.value)} />
          </label>
          <Child title={parentTitle} onNotify={setMessage} />
          <p>父组件收到的消息: {message || "暂无"}</p>
          <p>面试回答: props 描述外部输入，state 描述组件内部可变数据；二者变化都会触发重渲染。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
