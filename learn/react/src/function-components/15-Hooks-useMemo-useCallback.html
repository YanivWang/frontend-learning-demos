<!--
  分类: react / hooks / 性能
  主题: useMemo 与 useCallback
  要点:
    - useMemo 缓存计算结果，适合昂贵计算或保持对象引用稳定
    - useCallback 缓存函数引用，本质上等价于 useMemo(() => fn, deps)
    - 它们不是“越多越好”，只有遇到昂贵计算或子组件引用比较时才有价值
    - 依赖数组必须写全，否则容易产生旧闭包
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · useMemo 与 useCallback</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { memo, useCallback, useMemo, useState } = React;

    const PRODUCTS = [
      { id: 1, name: "Book", price: 40 },
      { id: 2, name: "Pen", price: 6 },
      { id: 3, name: "Bag", price: 120 }
    ];

    const Toolbar = memo(function Toolbar({ total, onReset }) {
      console.log("Toolbar render");
      return (
        <div>
          <strong>总价: {total}</strong>
          <button onClick={onReset}>清空数量</button>
        </div>
      );
    });

    function App() {
      const [count, setCount] = useState(1);
      const [keyword, setKeyword] = useState("");

      const filteredProducts = useMemo(() => {
        console.log("重新过滤商品");
        return PRODUCTS.filter(item => item.name.toLowerCase().includes(keyword.toLowerCase()));
      }, [keyword]);

      const total = useMemo(() => {
        console.log("重新计算总价");
        return filteredProducts.reduce((sum, item) => sum + item.price * count, 0);
      }, [filteredProducts, count]);

      const resetCount = useCallback(() => {
        setCount(0);
      }, []);

      return (
        <section>
          <h1>useMemo 与 useCallback</h1>
          <input value={keyword} onChange={e => setKeyword(e.target.value)} placeholder="搜索商品" />
          <button onClick={() => setCount(count + 1)}>数量 +1: {count}</button>
          <Toolbar total={total} onReset={resetCount} />
          <ul>
            {filteredProducts.map(item => <li key={item.id}>{item.name}: {item.price}</li>)}
          </ul>
          <p>面试回答: useMemo 缓存值，useCallback 缓存函数；主要目的是减少不必要计算或稳定传给子组件的引用。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
