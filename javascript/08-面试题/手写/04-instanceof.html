<!--
  分类: javascript / 08-面试题 / 手写
  主题: 手写 instanceof
  要点:
    - instanceof 沿对象原型链查找 Constructor.prototype
    - 原始值、null、undefined 不是对象，直接返回 false
    - 使用 Object.getPrototypeOf 比直接读 __proto__ 更推荐
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>手写 instanceof</title>
</head>
<body>
  <h1>手写 instanceof</h1>
  <p>打开控制台查看断言结果。</p>

  <script>
    function myInstanceof(value, Constructor) {
      if (value === null || value === undefined) return false;
      if (typeof value !== "object" && typeof value !== "function") return false;
      if (typeof Constructor !== "function") {
        throw new TypeError("Right-hand side of instanceof is not callable");
      }

      const targetPrototype = Constructor.prototype;
      let current = Object.getPrototypeOf(value);

      while (current) {
        if (current === targetPrototype) return true;
        current = Object.getPrototypeOf(current);
      }
      return false;
    }

    function Person() {}
    const p = new Person();

    console.assert(myInstanceof(p, Person) === true, "p is Person");
    console.assert(myInstanceof(p, Object) === true, "p is Object");
    console.assert(myInstanceof([], Array) === true, "array is Array");
    console.assert(myInstanceof("abc", String) === false, "primitive string is not String instance");
    console.assert(myInstanceof(null, Object) === false, "null returns false");

    console.log("p -> Person:", myInstanceof(p, Person));
    console.log("[] -> Object:", myInstanceof([], Object));
  </script>
</body>
</html>
