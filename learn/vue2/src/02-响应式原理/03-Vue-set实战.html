<!--
  分类: vue2 / 02-响应式原理
  主题: Vue.$set 与 Object.assign 实战
  要点:
    - Vue2 不能检测「新增属性」与「数组下标赋值」，需要 Vue.set / this.$set 触发响应
    - Object.assign(target, source) 原地合并到已有响应式对象（如 this.person）仍保持响应式
    - 对需要整体替换的模型（如 this.dog），用 Object.assign({}, target, source) 生成新对象再赋值
    - 演示 defineProperty 访问器：每次访问 deerObj.weight 都会触发 set/get
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue.$set 与 Object.assign</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <div>{{msg}}</div>
    <button @click="onClick()">Click</button>

    <div class="person">
        <div>{{person.name}}</div>
        <div>{{person.age}}</div>
        <div>Extend attr:</div>
        <div>
            {{person.height}}
        </div>
        <div>
            {{person.weight}}
        </div>
        <div v-if="person.address">
            <div>
                {{person.address.city}}
            </div>
            <div>
                {{person.address.province}}
            </div>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            msg: 'response',
            person: {
                name: "wc"
            },
            dog: {
                name: "laifu"
            }
        },
        mounted: function () {
            this._refreshPage();
        },
        methods: {
            _refreshPage: function () {
                let deerObj = {
                    name: "deer"
                };
                //存储描述符: 一对set get 构成
                Object.defineProperty(deerObj, "weight", {
                    set: function () {
                        console.log("set deerObj...");
                    },
                    get: function () {
                        console.log("get deerObj...");
                    }
                });

                console.log(deerObj.weight);
                deerObj.weight = 40;
                console.log(deerObj.weight);
            },

            onClick: function () {
                console.log("onClick...");

                //this.person.age = 18;
                this.$set(this.person, "age", 18);

                //Object.assign 方法只会从源对象中拷贝其自身的并且是可枚举的属性
                //Object.assign 拷贝不会跳过值为null或者undefined
                //let target = Object.assign(target, ...source);
                let newObj = Object.assign(this.person, {
                    "height": 172, "weight": "50kg", address: {
                        "city": "beijing",
                        "province": "hubei"
                    }
                });
                console.log(JSON.stringify(this.person));

                //将需要添加属性的模型和新增的属性对象，一起合并成一个新的对象，并且返回这个对象
                this.dog = Object.assign({}, this.dog, {
                    "city": "beijing",
                    "province": "hubei"
                })
            }
        }
    });
</script>
