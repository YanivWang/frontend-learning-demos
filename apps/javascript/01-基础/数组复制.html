<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
  </head>
  <body>
    <script>
      window.lodash = window._;

      const arr = [1, 2, 3, 4];

      //一.Array.from(arr)
      const arr2 = Array.from(arr);
      console.log(arr2); //[1, 2, 3, 4]

      //二.展开运算符
      const arr3 = [...arr];
      console.log(arr3); //[1, 2, 3, 4]

      //三.JSON.parse(JSON.stringify(arr))
      const arr4 = JSON.parse(JSON.stringify(arr));
      console.log(arr4); //[1, 2, 3, 4]

      //四.structuredClone(arr)
      const arr5 = structuredClone(arr);
      console.log(arr5); //[1, 2, 3, 4]

      //五.lodash.cloneDeep(arr)
      const arr6 = lodash.cloneDeep(arr);
      console.log(arr6); //[1, 2, 3, 4]

      //六.Array.prototype.slice()
      const arr7 = arr.slice();
      console.log(arr7); //[1, 2, 3, 4]

      //七.Array.prototype.concat()
      const arr8 = arr.concat();
      console.log(arr8); //[1, 2, 3, 4]

      //八.Array.prototype.map()
      const arr9 = arr.map((item) => item);
      console.log(arr9); //[1, 2, 3, 4]

      //九.Array.prototype.filter()
      const arr10 = arr.filter((item) => item);
      console.log(arr10); //[1, 2, 3, 4]
    </script>
  </body>
</html>
