<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // ##### flat #####
      const arr = [1, 2, 3, [4, 5, 6, [7, 8, 9]]];

      console.log(arr.flat()); // [1,2,3,4,5,6,[7,8,9]]
      console.log(arr.flat(2)); // [1,2,3,4,5,6,7,8,9]

      //Infinity会递归地将一个任意深度的嵌套数组完全展平成一维数组
      const arr2 = [1, 2, 3, [4, 5, 6, [7, 8, 9, [1, 2, [6, 7, 8], 3]]]];
      console.log(arr2.flat(Infinity)); // [1,2,3,4,5,6,7,8,9,1,2,6,7,8,3]
    </script>
  </body>
</html>
