<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <ul id="list">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
      </ul>
    </div>
    <script>
      //从可迭代或者类数组对象，创建一个新的浅拷贝数组实例
      let str = 'abcd'; //字符串
      let arr = [1, 2, 3, 4]; //数组
      let set = new Set([5, 6, 7, 8]); //集合
      let map = new Map([
        ['name', '张三'],
        ['age', 18],
      ]); //映射
      let args = (function () {
        return arguments;
      })(10, 11, 12, 13); //类数组

      console.log(Array.from(str)); //  ['a', 'b', 'c', 'd']
      console.log(Array.from(arr)); // [1, 2, 3, 4]
      console.log(Array.from(set)); // [5, 6, 7, 8]
      console.log(Array.from(map)); // 从map就会创建一个二维数组 [['name', '张三'], ['age', 18]]

      console.log('--------------------------------');
      //类数组对象也实现了 Symbol(Symbol.iterator) 迭代协议
      console.log('args,', args); // [10, 11, 12, 13]
      console.log(Array.from(args)); // [10, 11, 12, 13]
      console.log('--------------------------------');

      //document.querySelectorAll() 返回值是 NodeList 类数组对象，也实现了 Symbol(Symbol.iterator) 迭代协议
      //静态（快照）
      //任意 Node
      const listDom = document.querySelectorAll('li'); //这个才是 NodeList
      console.log('listDom', Array.from(listDom)); // [li, li, li, li]

      //document.getElementsByTagName() 返回值
      //动态（实时）
      const cc = document.getElementsByTagName('li');
      console.log('cc', Array.from(cc)); // [li, li, li, li]

      const str1 = String('abcd');
      console.log('str1', Array.from(str1)); // ['a', 'b', 'c', 'd']

      const args1 = [...listDom];
      console.log('args1', args1); // [li, li, li, li]
    </script>
  </body>
</html>
