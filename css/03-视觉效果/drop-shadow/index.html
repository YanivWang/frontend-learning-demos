<!--
  分类: css / 03-视觉效果 / drop-shadow
  主题: box-shadow vs filter: drop-shadow 对比
  要点:
    - box-shadow 沿元素矩形外边产生阴影，无视虚线/不透明像素
    - filter: drop-shadow 沿非透明像素轮廓产生阴影，对 PNG/SVG 描边更友好
    - drop-shadow 使用 GPU 合成，但对触发位图层的元素会增大显存
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>box-shadow vs drop-shadow</title>
    <style type="text/css">
        * {
            padding: 0;
            margin: 0;
        }

        .dash1 {
            width: 50px;
            height: 50px;
            margin: 0 auto;
            border: dashed 10px #beceeb;
            box-shadow: 5px 5px 10px black;
        }

        .dash2 {
            width: 50px;
            height: 50px;
            margin: 50px auto;
            border: dashed 10px #beceeb;
            filter: drop-shadow(100px 10px 0px yellow);
        }
    </style>
</head>
<body>
<div class="dash1"></div>
<div class="dash2"></div>
</body>
</html>
