<!--
  分类: react19 / 01-基础语法
  主题: use() 读取 Promise 与 Context
  要点:
    - use(usable)：在 render 中读取 Promise 或 Context（React 19 新 Hook）
    - 读取 Promise 时组件会挂起，需外层 Suspense 提供 fallback
    - 可在条件分支中调用 use()（与 useState 等 Hook 规则不同）
    - 读取 Context 时可直接 use(Context)，等价于 useContext
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 19 · use()</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; line-height: 1.6; }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: 1rem; margin: 1rem 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Suspense, use, useState } = React;

    const ThemeContext = React.createContext("light");

    function fetchMessage() {
      return new Promise((resolve) => {
        setTimeout(() => resolve("来自 Promise 的数据 @ " + new Date().toLocaleTimeString()), 600);
      });
    }

    function DataPanel({ messagePromise }) {
      const message = use(messagePromise);
      return <p>Promise 结果：{message}</p>;
    }

    function ThemePanel() {
      const theme = use(ThemeContext);
      return <p>Context 主题：{theme}</p>;
    }

    function App() {
      const [promise, setPromise] = useState(null);
      const [theme, setTheme] = useState("light");

      return (
        <section>
          <h1>use() 两种用法</h1>
          <div className="box">
            <ThemeContext.Provider value={theme}>
              <ThemePanel />
              <button type="button" onClick={() => setTheme((t) => (t === "light" ? "dark" : "light"))}>
                切换主题
              </button>
            </ThemeContext.Provider>
          </div>
          <div className="box">
            <button type="button" onClick={() => setPromise(fetchMessage())}>
              加载 Promise
            </button>
            {promise && (
              <Suspense fallback={<p>Promise 挂起中…</p>}>
                <DataPanel messagePromise={promise} />
              </Suspense>
            )}
          </div>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">
  <style>
    .demo-nav { margin: 2.5rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e3e3e3; font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; }
    .demo-nav a { color: #0969da; text-decoration: none; }
  </style>
  <a href="/">目录</a>
</footer>
<!-- DEMO_NAV_END -->
</body>
</html>
