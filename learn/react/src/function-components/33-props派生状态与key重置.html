<!--
  分类: react / hooks
  主题: props 派生状态与 key 重置
  要点:
    - 避免 props 变化时用 useEffect 同步到 state（多余且易出 bug）
    - 能直接算的值在 render 里派生；需要重置整块 UI 时用 key
    - 对比 class 09 getDerivedStateFromProps：函数组件优先「派生计算」或 key 重置
    - 必须保留本地编辑态时，才在 props 变化时有选择地重置 state
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · props 派生状态与 key</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function Editor({ userId, initialName }) {
      const [draft, setDraft] = useState(initialName);
      const displayLabel = "用户 " + userId + " 的草稿";

      return (
        <div style={{ border: "1px solid #ccc", padding: 12, marginTop: 8 }}>
          <p>{displayLabel}</p>
          <input value={draft} onChange={(e) => setDraft(e.target.value)} />
          <p>当前草稿: {draft}</p>
        </div>
      );
    }

    function App() {
      const [userId, setUserId] = useState(1);
      const users = {
        1: "Alice",
        2: "Bob",
        3: "Carol"
      };

      return (
        <section>
          <h1>props 派生状态与 key 重置</h1>
          <button onClick={() => setUserId(prev => (prev % 3) + 1)}>切换用户 (id={userId})</button>
          {/* key 变化会卸载旧 Editor、挂载新实例，draft 自动重置为新的 initialName */}
          <Editor key={userId} userId={userId} initialName={users[userId]} />
          <p>面试回答: 不要 mirror props 到 state；可派生就算，需重置整块状态用 key。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
