<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Class</title>
  </head>
  <body>
    <script>
      //类表达式
      //1.可以是匿名的类
      const Dog = class {
        //类的构造方法用于创建和初始化类的对象实例
        //一个类只有拥有一个constructor方法(是类的构造函数)
        constructor(name) {
          this.name = name;
        }
      };
      const dog1 = new Dog("dog111");
      console.log("我是dog1", dog1.name);

      //2.也可以是具名的类
      const Cat = class Cat1 {
        constructor(name) {
          //1.super方法只能在类的constructor方法中调用
          // super(name);
          this.name = name;
        }
      };
    </script>
  </body>
</html>
