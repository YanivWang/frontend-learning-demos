<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello Class</title>
  </head>
  <body>
    <script>
      class PrivateConstructor {
        static #isInternalConstructing = false;

        constructor() {
          if (!PrivateConstructor.#isInternalConstructing) {
            throw new TypeError("PrivateConstructor is not constructable");
          }
          PrivateConstructor.#isInternalConstructing = false;
          // 添加更多的初始化逻辑

          console.log("使用内部构造器，构造成功!");
        }

        static create() {
          PrivateConstructor.#isInternalConstructing = true;
          const instance = new PrivateConstructor();
          console.log("使用构造函数构造成功!");
          return instance;
        }
      }

    //  new PrivateConstructor(); // TypeError: PrivateConstructor is not constructable
      PrivateConstructor.create(); // PrivateConstructor {}

      new PrivateConstructor(); 

      //Property '#isInternalConstructing' is not accessible outside class 'PrivateConstructor' because it has a private identifier.
      //类的私有属性，不能在类的外部访问
      //console.log(PrivateConstructor.#isInternalConstructing);


    </script>
  </body>
</html>
