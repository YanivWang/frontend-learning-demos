<!--
  分类: javascript / 03-对象与原型
  主题: 构造函数最基本用法
  要点:
    - 在构造函数体内通过 this.xxx 添加实例属性
    - 把方法写在原型上避免每个实例独有副本（这里仅作最小演示）
    - p1 instanceof Person、p1.constructor === Person 都可用于类型判断
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>构造函数</title>
</head>
<body>

<script>
    function Person(name, age) {
        this.name = name;
        this.age = age;
        this.sayHello = function () {
            alert('Hello!');
        }
    }

    let p1 = new Person("wangcheng", 25);
    let p2 = new Person("yuelong", 30);

    console.log(typeof p1);
    console.log(typeof p2);

    console.log(p1 instanceof Person);
    console.log(p2 instanceof Person);

    console.log(p1.constructor === p2.constructor);
</script>


</body>
</html>
