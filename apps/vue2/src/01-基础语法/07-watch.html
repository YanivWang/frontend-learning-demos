<!--
  分类: vue2 / 01-基础语法
  主题: watch 与 computed 的取舍
  要点:
    - computed：声明式派生数据，自动响应依赖；推荐用于「值的派生」
    - watch：命令式监听变化，可执行异步/复杂副作用；推荐用于「触发动作」
    - 计算属性也可写 get/set 对象形式，支持双向绑定（如 fullName 拆分赋值）
  说明:
    - 依赖 packages/shared/libs 中的 axios 与 lodash
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>watch vs computed</title>
    <script src="../../libs/vue.js"></script>

    <script src="../../../../packages/shared/libs/axios.min.js"></script>
    <script src="../../../../packages/shared/libs/lodash.min.js"></script>
</head>
<body>


<div>监听：</div>
<div id="app1">
    <!--使用watch来监听某个属性的变化-->
    <div>name: {{fullName}}</div>
    <input v-model="firstName">
    <input v-model="lastName">
</div>


<div>计算属性：</div>
<div id="app2">
    <!--使用 computed 派生 fullName（由 firstName、lastName 计算得出）-->
    <div>name: {{fullName}}</div>

    <input v-model="firstName">
    <input v-model="lastName">
</div>


<div>计算属性的set和get：</div>
<div id="app3">
    <!--使用 computed 的 get/set 对象形式（可拆分赋值 fullName）-->
    <div>name: {{fullName}}</div>

    <input v-model="firstName">
    <input v-model="lastName">
</div>

<div id="app4">
    <div>当需要在数据变化时，执行异步或者开销较大的操作时，使用 watch 才是有效选择</div>

    ask a question and get answer from server!!!
    <input v-model="question">
    <p>{{answer}}</p>
</div>

<script>
    //使用watch进行数据变化引起的异步操作
    var vm4 = new Vue({
        el: '#app4',
        data: {
            question: "问我一个问题?",
            answer: ""
        },
        watch: {
            question: function (newValue, oldValue) {
                this.answer = "Waiting for you to stop typing...";

                this.debouncedGetAnswer();
            }
        },
        //生命周期钩子函数
        created: function () {
            //_.debounce 限制函数被调用的频率
            this.debouncedGetAnswer = _.debounce(this.getAnswer, 500);
        },

        methods: {
            //go to server to get answer
            getAnswer: function () {
                if (this.question.indexOf('?') === -1) {
                    this.answer = "一个问题，通常包含一个结束标志符号'?'";
                    return;
                }

                console.log("aaaaaaaaaa");

                this.answer = 'Thinking...';

                var that = this;
                axios.get('https://yesno.wtf/api')
                    .then(function (response) {
                        that.answer = _.capitalize(response.data.answer);
                    })
                    .catch(function (error) {
                        that.answer = 'Error ' + error;
                    })

            }
        }
    });


    var vm1 = new Vue({
        el: '#app1',
        data: {
            firstName: "cheng",
            lastName: "wang",
            fullName: "cheng wang"
        },
        watch: {
            firstName: function (newValue, oldValue) {
                this.fullName = newValue + this.lastName;
            },
            lastName: function (newValue, oldValue) {
                this.fullName = this.firstName + newValue
            }
        }
    });


    var vm2 = new Vue({
        el: '#app2',
        data: {
            firstName: "cheng",
            lastName: "wang"
        },
        computed: {
            //计算属性的结尾语句必须是return，因为计算属性的值，是定义值提供的函数的计算结果
            //getter
            fullName: function () {
                return this.firstName + this.lastName;
            },
        }
    });

    var vm3 = new Vue({
        el: '#app3',
        data: {
            firstName: "cheng",
            lastName: "wang"
        },
        computed: {
            //计算属性的结尾语句必须是return，因为计算属性的值，是定义值提供的函数的计算结果
            //getter
            fullName: {
                get: function () {
                    return this.firstName + this.lastName;
                },
                //setter
                set: function (newVal) {
                    console.log("set函数被调用");
                    var reg = /\s+/;
                    var nameArray = newVal.split(reg);

                    this.firstName = nameArray[0];
                    this.lastName = nameArray[1];
                }
            }
        }
    });

    vm3.fullName = "xiao  guang";
</script>
