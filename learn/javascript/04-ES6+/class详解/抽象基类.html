<!--
  分类: javascript / 04-ES6+ / class详解
  主题: 用 new.target 实现抽象基类
  要点:
    - new.target 指向直接被 new 的构造器；直接 new 抽象类时等于其本身
    - 通过 if (new.target === Animal) throw 阻止直接实例化抽象基类
    - 派生类 constructor 必须先调用 super() 才能使用 this
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抽象基类</title>
  </head>
  <body>
    <script>
      class Animal {
        constructor() {
          console.log(new.target === Animal);
          if(new.target === Animal){  
            throw Error("Animal类是抽象基类，不能被实例化")
          }

          console.log("this>>>", this);//Dog {}
        }
      }

      // const a1 = new Animal();

      class Dog extends Animal {
        //子类如果有显式声明一个constructor函数，在必须在该函数内部调用super()，就是调用父类构造函数
        constructor(name) {
          const dd = super();
          console.log("dd", dd);//Dog {}
          this.name = name;
        }
      }

      const d1 = new Dog();
    </script>
