<!--
  分类: vue2 / 01-基础语法
  主题: mouseenter / leave vs mouseover / out 差异
  要点:
    - mouseenter / mouseleave 不会冒泡，进出整体一次只触发一次
    - mouseover / mouseout 会冒泡，跨过任意子元素都可能触发
    - 实战中如果要做「整体悬停」，推荐用 mouseenter / mouseleave 配 hover 类切换
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鼠标事件 enter/leave vs over/out</title>

    <style>
        #parent{
            margin: auto;
            margin-top: 150px;
            width: 200px;
            height: 200px;
            border:1px solid #999;
        }

        #son{
            margin: auto;
            width: 150px;
            height: 150px;
            border:1px solid #999;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<!--
summary: 1.mouseenter mouseleave穿过一次元素，只会触发一次
         2.mouseover mouseout穿过一次元素，可能会触发一次，具体触发几次，要看其
         子元素的数量
-->

<div id="parent"
     onmouseenter="parentMoEnter()"
     onmouseleave="parentMoLeave()"
     onmouseover="parentMoOver()"
     onmouseout="parentMoOut()"
     >
    <div id="son">
    </div>
</div>

<script>
    function parentMoEnter() {
        console.log("Enter");
    }

    function parentMoLeave() {
        console.log("Leave");
    }

    function parentMoOver() {
        console.log("Over");
    }

    function parentMoOut() {
        console.log("Out");
    }

</script>
