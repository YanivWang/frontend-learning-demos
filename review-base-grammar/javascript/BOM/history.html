<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <button onclick="jumpToPageA()">pushState 导航到A页面</button>
      <button onclick="jumpToPageB()">replaceState 导航到B页面</button>
    </div>
    <script>
      function jumpToPageA() {
        let stateObject = {
          name: "wangcheng"
        }
        let title = "我是A页面"
        let url = "page-aaa"

        history.pushState(stateObject, title, url) 
      }

      function jumpToPageB() {
        let stateObject = {
          name: "gaojie"
        }
        let title = "我是B页面"
        let url = "page-bbb"
        history.replaceState(stateObject, title, url) 
      }
      
      //监听 window 对象上的 popstate
      window.addEventListener("popstate", (event)=>{
         console.log("event", event);
      })
    </script>
  </body>
</html>
