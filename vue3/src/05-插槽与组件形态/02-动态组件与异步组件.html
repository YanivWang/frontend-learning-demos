<!--
  分类: vue3 / 05-插槽与组件形态
  主题: 动态组件 / 异步组件
  要点:
    - component :is 可动态切换组件
    - defineAsyncComponent 用于异步加载组件
    - keep-alive 常和动态组件配合缓存状态
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · 动态组件与异步组件</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { margin-right: 8px; padding: 6px 12px; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>动态组件与异步组件</h1>
      <div class="box">
        <button @click="current = 'ProfilePanel'">资料</button>
        <button @click="current = 'SettingPanel'">设置</button>
        <button @click="current = 'AsyncPanel'">异步面板</button>
        <p>异步加载状态：{{ asyncStatus }}</p>
        <keep-alive>
          <component :is="current"></component>
        </keep-alive>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li><code>&lt;component :is="xxx"&gt;</code> 可以根据状态切换组件类型。</li>
        <li><code>defineAsyncComponent</code> 用来延迟加载组件，工程里常和路由懒加载一起降低首屏体积。</li>
        <li>如果希望切走后保留组件内部状态，可以配合 <code>&lt;KeepAlive&gt;</code>。</li>
      </ul>
      <pre>{{ asyncSnippet }}</pre>
    </div>

    <script>
      const { createApp, ref, watch, defineAsyncComponent } = Vue;

      const ProfilePanel = {
        setup() {
          const visits = ref(0);
          return { visits };
        },
        template: `
          <p>资料面板 visits：{{ visits }}
            <button @click="visits++">+1</button>
            （切走后 KeepAlive 会保留 count）
          </p>
        `,
      };

      const SettingPanel = {
        setup() {
          const theme = ref("light");
          return { theme };
        },
        template: `
          <p>设置面板 theme：{{ theme }}
            <button @click="theme = theme === 'light' ? 'dark' : 'light'">切换</button>
          </p>
        `,
      };

      const AsyncPanel = defineAsyncComponent({
        loader: () =>
          new Promise((resolve) => {
            setTimeout(() => {
              resolve({
                setup() {
                  const loadedAt = ref(new Date().toLocaleTimeString());
                  return { loadedAt };
                },
                template: `<p>异步组件已加载，时间 {{ loadedAt }}</p>`,
              });
            }, 800);
          }),
        loadingComponent: {
          template: `<p>异步组件加载中...</p>`,
        },
      });

      createApp({
        components: { ProfilePanel, SettingPanel, AsyncPanel },
        setup() {
          const current = ref("ProfilePanel");
          const asyncStatus = ref("未请求");
          const asyncSnippet =
            "const AsyncComp = defineAsyncComponent(() => import('./HeavyComp.vue'))";

          watch(current, (value) => {
            if (value === "AsyncPanel") asyncStatus.value = "已触发 defineAsyncComponent";
          });

          return { current, asyncStatus, asyncSnippet };
        },
      }).mount("#app");
    </script>
  </body>
</html>
