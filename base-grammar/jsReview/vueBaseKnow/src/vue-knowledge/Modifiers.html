<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue first</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>
<body>

<div id="app1">
    <!--这里的修饰符类似于在 onSubmit中调用e.preventDefault();-->
    <form v-on:submit.prevent="onSubmit">
        <button type="submit">提交</button>
    </form>
</div>


<script>
    var vm = new Vue({
        el: '#app1',
        data: {

        },
        methods: {
            onSubmit: function (e) {
                //e.preventDefault();

                console.log(e);
                console.log("表达提交");
            }
        }
    });

</script>

</body>
</html>
