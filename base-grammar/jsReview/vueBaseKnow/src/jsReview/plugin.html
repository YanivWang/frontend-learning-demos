<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //所有不属于其它对象的属性和函数，都被当做是global对象的属性和函数
    //不存在所谓的全局变量和全局函数
    //在浏览器环境下，global对象被当做是window对象的一部分进行实现
    //eval(): javascript解释器发现代码中有eval()方法，则将eval方法的传入参数
    //当做是一个正常的javascript表达式，来运行
    //window.eval('alert("tell me the father!")');

    let global = function () {
        return this;
    }();

    console.log(global);
    //this(浏览器中this的用法)

    let a = Math.max(10,8,37);
    console.log("a: " + a);

    let array = [5,7,1,3,5,8];
    var max = Math.max.apply(Math,array);
    console.log("max: " + max);

    console.log(window.max);


    var reg1 = /wc$/;
    let res1 = typeof reg1;
    console.log(res1);

    var reg2 = new RegExp('wc$');
    let res2 = typeof reg2;
    console.log(res2);

</script>

</body>
</html>
