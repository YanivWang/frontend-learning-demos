<!--
  分类: javascript / 06-浏览器API
  主题: Performance API 计时与导航指标
  难度: 进阶
  前置: 浏览器渲染与性能
  要点:
    - performance.now() 高精度单调时钟
    - performance.mark / measure 自定义性能标记
    - performance.getEntriesByType('navigation') 读取页面加载指标
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance API</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; }
    button { padding: 8px 12px; cursor: pointer; }
    #log { margin-top: 1rem; padding: 12px; background: #f6f8fa; border-radius: 8px; font-family: ui-monospace, monospace; font-size: 0.8125rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Performance API</h1>
  <button type="button" id="run">运行 mark / measure 示例</button>
  <div id="log" aria-live="polite"></div>
  <script>
    const log = document.getElementById("log");
    const lines = [];
    const nav = performance.getEntriesByType("navigation")[0];
    if (nav) {
      lines.push("DOMContentLoaded: " + Math.round(nav.domContentLoadedEventEnd) + " ms");
      lines.push("Load event: " + Math.round(nav.loadEventEnd) + " ms");
    }
    document.getElementById("run").onclick = async () => {
      performance.mark("task-start");
      await new Promise((r) => setTimeout(r, 120));
      performance.mark("task-end");
      performance.measure("task", "task-start", "task-end");
      const m = performance.getEntriesByName("task").pop();
      lines.push("measure task: " + Math.round(m.duration) + " ms");
      log.textContent = lines.join("\n");
    };
    log.textContent = lines.join("\n") || "点击按钮运行 measure 示例";
  </script>
<!-- DEMO_NAV_START -->

    .demo-output:empty { display: none; }

</footer>

</body>
</html>
