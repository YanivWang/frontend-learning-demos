<!--
  分类: javascript / 03-对象与原型
  主题: 原型对象（prototype）与共享属性
  要点:
    - 构造函数自带 prototype 对象，挂在其上的属性/方法被所有实例共享
    - 实例的 __proto__ 指向构造函数的 prototype
    - prototype.constructor 反向指回构造函数，形成循环引用
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原型对象</title>
</head>
<body>
  <script>
    function Person(userId){
      this.userId = userId;//构造函数中通过给this.xx赋值，为实例动态添加属性，这些属性是实例自身特有的 
    }

    //每个构造函数(或者普通函数)都有一个prototype属性，是一个对象，称作原型对象，原型对象发明出来的作用就是为了
    //变量和方法共享的，被构造函数的实例共享

    //通过原型模式定义的属性和方法是所有实例共享的
    Person.prototype.userName = "姓名"
    Person.prototype.userAge = "年龄"
    Person.prototype.skinColor = "肤色"
    Person.prototype.sayHello = function(){
      console.log("你好呀!");
    }

    const p1 = new Person();
    console.log(p1.skinColor);

    const p2 = new Person();
    console.log(p2.skinColor);
    
    //一旦一个函数被创建，那么它自动会被添加一个prototype属性指向原型对象，原型对象中一定会包含一个
    //constructor属性，执行该构造函数本身
    console.log(Person.prototype.constructor === p1.__proto__.constructor);

    //循环引用
    console.log(Person.prototype.constructor === Person); // true

  </script>
  
</body>
</html>
