<!--
  分类: javascript / 05-元编程
  主题: defineProperty 访问器属性 get/set
  要点:
    - 访问器属性不存储值，只在读/写时触发 get/set
    - get/set 的实参列表 (a, b, c) 中，b/c 在标准里是 undefined（这里仅展示）
    - 易错点：set/get 内部访问同名属性会触发自身递归，需用 firstName/lastName 内部字段
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>defineProperty 访问器属性</title>
  </head>
  <body>
    <script>
      let person = {
        firstName: "Yaniv",
        lastName: "Wang",
      };

      //定义一个访问器属性，该属性不存储Value值，当你访问这个访问器属性的时候，它可以返回某个对象的内部属性
      //或者对某些属性进行组合处理，返回一个新值
      Object.defineProperty(person, "fullName", {
        configurable: true,
        enumerable: true,
        set(a, b, c) {
          console.log("set", a, b, c);

          this.firstName = a.split(" ")[0]
          this.lastName = a.split(" ")[1]
        },
        get(a, b, c) {
          console.log("get", a, b, c);
          console.log("this", this); //谁调用，指向谁 {firstName: 'Yaniv', lastName: 'Wang'}

          return this.firstName + this.lastName
        },
      });

      console.log(person.fullName);

      person.fullName = "Gao Jie"

      console.log(person.fullName);
    </script>
  </body>
</html>
