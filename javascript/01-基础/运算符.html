<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>运算符 · 逻辑 / 短路</title>
</head>
<body>
  <h1>|| && ?? 等逻辑运算符的真实返回值</h1>
  <p>核心：JS 的 <code>||</code> <code>&&</code> 不一定返回布尔值，而是返回参与运算的"原始操作数"，这也是短路求值。</p>
  <script>
    // ============ || ：从左到右找第一个"真值"并返回，否则返回最后一个 ============
    console.log(true || false);     // true
    console.log(0 || "hi");         // 'hi'    —— 0 是假值，跳过
    console.log(null || undefined); // undefined
    console.log({} || []);          // {}      —— 空对象也是真值

    // 经典写法：兜底默认值（注意 0/'' 也会被跳过）
    var b;
    b = b || {};
    console.log(b); // {}

    // ============ && ：从左到右找第一个"假值"并返回，否则返回最后一个 ============
    console.log(true && "yes");  // 'yes'
    console.log(0 && "yes");     // 0
    console.log({} && []);       // []        —— 都是真值，返回最后一个

    // ============ ?? ：仅在左侧是 null/undefined 时返回右侧 ============
    console.log(0 ?? "default");         // 0       —— 0 不是 nullish
    console.log("" ?? "default");        // ''      —— 空串也不是 nullish
    console.log(null ?? "default");      // 'default'
    console.log(undefined ?? "default"); // 'default'

    // ============ 短路用法 ============
    // 1) 条件执行
    const shouldRun = true;
    shouldRun && console.log("会执行");
    // 2) 安全访问（可选链 ?. 更现代）
    const obj = null;
    const name = obj && obj.name; // null，不会报 TypeError
    console.log("name:", name);

    // ============ 位运算 | 与逻辑 || 区别 ============
    console.log(true | false); // 1   —— | 是按位或，返回数字
    console.log(true || false); // true —— || 是逻辑或，返回布尔/原值
  </script>
</body>
</html>
