<!--
  分类: javascript / 06-浏览器API
  主题: requestAnimationFrame 与递归调用对比
  要点:
    - 直接递归调用同步函数会爆栈；requestAnimationFrame 把下次调用挂到下一帧
    - rAF 与浏览器刷新率同步（一般 60Hz），适合做动画
    - 想要停止：保存返回的 id 并 cancelAnimationFrame(id)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>requestAnimationFrame</title>
</head>
<body>

<script>
    let requestAnimation = window.requestAnimationFrame;

    //递归调用必须有一个明确的结束条件，否则会到导致堆栈溢出
    function animation1() {
        console.log("动画...");
        animation1();
    }

    //animation1(); //错误

    function animation2() {
        requestAnimation(animation2);
        console.log("动画...");
    }
    animation2();
</script>
