<!--
  分类: typescript / 02-进阶
  主题: 映射类型、索引访问与模板字面量类型
  要点:
    - 映射类型遍历 keyof T，可以批量改变属性可选、只读或值类型
    - 索引访问 T[K] 可根据字段名取得字段类型，是 Pick、Record 等工具的基础
    - 模板字面量类型可拼接字符串字面量，适合事件名、接口路径、CSS 变量名
    - as 重映射键名可把对象字段转换成 onXxx / getXxx 这类 API
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript · 映射类型与模板字面量</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; line-height: 1.6; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 8px; overflow: auto; font-size: 0.86rem; }
    #out { background: #f6f8fa; color: #222; }
  </style>
</head>
<body>
  <h1>映射类型与模板字面量类型</h1>
  <pre>type User = { id: number; name: string; active: boolean };

type FieldGetter&lt;T&gt; = {
  [K in keyof T as `get${Capitalize&lt;string & K&gt;}`]: () =&gt; T[K]
};

type UserEvent = `${keyof User & string}Changed`;
type NameType = User["name"];  // 索引访问：string</pre>

  <pre id="out"></pre>

  <script>
    const user = { id: 1, name: "Lin", active: true };
    const getters = {
      getId: () => user.id,
      getName: () => user.name,
      getActive: () => user.active,
    };
    const events = ["idChanged", "nameChanged", "activeChanged"];

    document.getElementById("out").textContent = [
      `映射类型生成 getter: getName() = ${getters.getName()}`,
      `模板字面量类型约束事件名: ${events.join(", ")}`,
      "面试重点：keyof 取键，T[K] 取值类型，模板字面量类型拼接字符串类型。",
    ].join("\n");
  </script>
</body>
</html>
