<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .testDiv {
            background-color: red;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>


<embed src="svgFile/circle.svg" type="image/svg+xml"/>

<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <rect width="300" height="100" style="fill: rgb(0,0,255);stroke-width: 1;stroke:rgb(0,0,0)"></rect>
</svg>

<div class="testDiv">
</div>

<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <rect x="50" y="20" width="150" height="150"
          style="fill:blue;stroke:pink;stroke-width:5;fill-opacity:0.1;stroke-opacity:0.9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <rect rx="20" ry="20" width="150" height="150"
          style="fill:red;stroke:black;stroke-width:5;opacity:0.5"/>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <line x1="20" y1="20" x2="100" y2="100" style="stroke: rgb(255,0,0);stroke-width: 2"></line>
</svg>


<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <polygon points="0,0 100,100 0,100" style="fill: yellowgreen;stroke: blue;stroke-width: 1"></polygon>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <polygon viewBox="50 50 50 50"  points="100,10 40,180 190,60 10,60 160,180"
             style="fill:lime;stroke:purple;stroke-width:5;fill-rule:nonzero;" />
</svg>


<svg xmlns="http://www.w3.org/2000/svg" version="1.1">
    <text x="0" y="15" fill="red" transform="rotate(30 20 40)">I love SVG</text>
</svg>


</body>
</html>
