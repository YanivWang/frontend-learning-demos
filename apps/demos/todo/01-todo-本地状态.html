<head>
  <meta charset="UTF-8" />

  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; }
    .app { max-width: 420px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { margin: 0 0 16px; font-size: 1.25rem; }
    form { display: flex; gap: 8px; margin-bottom: 16px; }
    input { flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 12px; border: none; border-radius: 6px; background: #4f46e5; color: #fff; cursor: pointer; }
    ul { list-style: none; margin: 0; padding: 0; }
    li { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
    li.done span { text-decoration: line-through; color: #999; }
    .del { background: #fee2e2; color: #b91c1c; font-size: 0.75rem; }
  </style>
    <link rel="stylesheet" href="../../../packages/shared/demo-notes.css" />

<body>
  <div class="app">
    <h1>Todo</h1>
<section class="demo-notes" aria-label="复习与面试要点">
    <h2>知识点要点</h2>
    <ul>
      <li>用数组 + 渲染函数维护列表状态。</li>
      <li>新增 / 切换完成 / 删除三种基本操作。</li>
      <li>无框架，适合理解单向数据流雏形。</li>
    </ul>
    <h2>面试考点</h2>
    <ul>
      <li><strong>用数组 + 渲染函数维护列表状态？</strong> 用数组 + 渲染函数维护列表状态</li>
      <li><strong>新增 / 切换完成 / 删除三种基本操作？</strong> 新增 / 切换完成 / 删除三种基本操作</li>
      <li><strong>Todo 本地状态管理的核心概念是什么？</strong> 用数组 + 渲染函数维护列表状态；新增 / 切换完成 / 删除三种基本操作</li>
    </ul>
  </section>

    <form id="form"><input id="input" placeholder="新任务…" autocomplete="off" /><button type="submit">添加</button></form>
    <ul id="list"></ul>
  </div>
  <script>
    let todos = [{ id: 1, text: "学习 manifest 驱动导航", done: true }, { id: 2, text: "写一个 Todo demo", done: false }];
    let nextId = 3;
    const list = document.getElementById("list");
    function render() {
      list.innerHTML = todos.map((t) => `
        <li class="${t.done ? "done" : ""}">
          <input type="checkbox" data-id="${t.id}" ${t.done ? "checked" : ""} aria-label="完成 ${t.text}" />
          <span>${t.text}</span>
          <button type="button" class="del" data-del="${t.id}">删除</button>
        </li>`).join("");
    }
    list.addEventListener("click", (e) => {
      const id = Number(e.target.dataset.id || e.target.dataset.del);
      if (e.target.dataset.id) todos = todos.map((t) => t.id === id ? { ...t, done: !t.done } : t);
      if (e.target.dataset.del) todos = todos.filter((t) => t.id !== id);
      render();
    });
    document.getElementById("form").onsubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;
      todos = [...todos, { id: nextId++, text, done: false }];
      input.value = "";
      render();
    };
    render();
  </script>
