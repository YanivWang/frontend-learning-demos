<!--
  分类: react18 / class 组件
  主题: setState 异步合并（同步触发多次只会更新一次）
  要点:
    - setState 是异步的；连续多次同步调用，React 会做「合并优化」最终一次更新
    - 因此 for(0~9) 内每次都基于「当前 state.count」自增，结果只会得到 1，不是 10
    - 想要逐次叠加，需要用函数式 setState(prev => ({ count: prev.count + 1 }))
    - React 18 使用 createRoot 渲染，ReactDOM.render 已废弃
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React · setState 异步合并</title>

    <script src="../../libs/react.development.js"></script>
    <script src="../../libs/react-dom.development.js"></script>
    <script src="../../libs/babel.min.js"></script>
</head>
<body>

<div id="app"></div>

<script type="text/babel">
    //react class方式的组件
    class Person extends React.Component {
        //组件的属性会在构造函数中被传递过来
        constructor(props) {
            super(props);//调用super关键字来调用父类的构造函数，并将props传递到父类的构造器

            //构造函数是唯一可以给 this.state 直接赋值的地方
            //state的更新是异步的
            //出于性能考虑，react会把多个setState()调用合并成一个调用
            this.state = {
                count: 0,
            }
        }

        componentDidMount() {
            for (let i = 0; i < 10; i++) {
                this.setState({
                    count: this.state.count + 1
                });
                console.log(this.state.count);//10个0
            }

            setTimeout(()=>{
                console.log("2s后",this.state.count);//1
            },2000)
        }

        render() {
            //页面上展示的是1
            return (
                <div>{this.state.count}</div>
            )
        }
    }

    // React 18 使用 createRoot 渲染
    ReactDOM.createRoot(document.getElementById("app")).render(<Person/>);
</script>
