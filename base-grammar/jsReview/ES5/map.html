<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    let a = ["1", "2", "3"].map(parseInt);
    console.log(a);

    //1.test1
    //长度为0的数据，map不会执行指定的函数
    let arr = ["1", "2", "3"].map(function (currentVlaue, index, arr) {
        console.log("currentVlaue: " + currentVlaue);
        console.log("index: " + index);
        console.log("arr: " + arr);
    });
    console.log(arr);

    //2.test2
    let array5 = ["1", "2", "3"];
    let newArray5 = array5.map(parseInt);//需要传入一个函数对象
    console.log("newArray5: " + newArray5);

    //3.改变数组长度
    let arrayTest = ["one","two","three"];
    arrayTest.length = 1;
    console.log(arrayTest);
</script>

</body>
</html>
