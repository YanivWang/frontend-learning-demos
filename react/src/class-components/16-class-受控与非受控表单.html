<!--
  分类: react / class 组件
  主题: class 组件中的受控与非受控表单
  要点:
    - 受控: value 绑定 state，onChange 更新 state，React 为唯一数据源
    - 非受控: defaultValue + ref 在提交时读取 DOM
    - 业务表单、校验、联动优先受控；简单一次性读取可用非受控
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · class 受控与非受控表单</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class App extends React.Component {
      constructor(props) {
        super(props);
        this.noteRef = React.createRef();
        this.state = {
          username: "",
          role: "user"
        };
      }

      handleUsernameChange = (e) => {
        this.setState({ username: e.target.value });
      };

      handleRoleChange = (e) => {
        this.setState({ role: e.target.value });
      };

      submitForm = (e) => {
        e.preventDefault();
        alert(JSON.stringify({
          username: this.state.username,
          role: this.state.role,
          note: this.noteRef.current.value
        }, null, 2));
      };

      render() {
        return (
          <section>
            <h1>class 受控与非受控表单</h1>
            <form onSubmit={this.submitForm}>
              <div>
                <label>
                  用户名（受控）:
                  <input
                    value={this.state.username}
                    onChange={this.handleUsernameChange}
                  />
                </label>
              </div>
              <div>
                <label>
                  角色（受控）:
                  <select value={this.state.role} onChange={this.handleRoleChange}>
                    <option value="user">普通用户</option>
                    <option value="admin">管理员</option>
                  </select>
                </label>
              </div>
              <div>
                <label>
                  备注（非受控）:
                  <input ref={this.noteRef} defaultValue="DOM 自己保存这个值" />
                </label>
              </div>
              <button type="submit">提交</button>
            </form>
            <p>当前受控值: {this.state.username || "空"} / {this.state.role}</p>
            <p>面试回答: 受控让 state 成为表单唯一数据源；非受控用 ref 按需读取 DOM。</p>
          </section>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
