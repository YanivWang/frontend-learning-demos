<!--
  分类: javascript / 04-ES6+ / 异步 / generator与async
  主题: async 函数的多种声明形式与异常综合
  要点:
    - 函数声明 / 函数表达式 / 对象方法简写都支持 async
    - 内部 await 的 Promise 提前在 .catch 中处理时，外层 try/catch 接不到
    - try/catch 抓不到的异常会向外 reject，外层 .catch 兜底
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>async 声明形式与异常</title>
</head>
<body>


<script>
    //函数声明
    async function f1() {

    }

    //匿名函数表达式
    const foo = async function () {

    };

    //函数属性
    let obj = {
        name: "wc",
        age: 18,
        async foo() {
        }
    };

    obj.foo().then();


    //异常处理
    //正常情况下：await后面是一个Promise对象，返回该对象的结果(Promise对象自执行能力)
    //如果 Promise 对象变为 reject 状态，reject 参数会被 async 函数返回的 Promise 上 .catch() 回调接收到
    //任何一个await语句后面的Promise对象如果变成reject，那么整个async函数都立刻中断执行
    async function handleError() {
        await Promise.reject("出错");
        console.log("111");
        return "执行完毕";
    }

    handleError().then(function (data) {
        console.log("data:" + data);
    }).catch(function (err) {
        console.log("err:" + err);
    });


    //异常处理
    async function handleException() {
        try {
            await Promise.reject("出错").catch(function () {
                console.log("AAA");
            });

            await Promise.reject("出错了啊");
        } catch (e) {
            console.log(e + "BBB");
        }
        console.log("CCC");
        return "执行完毕";
    }

    handleException().then(function (data) {
        console.log("DDD:" + data);
    }).catch(function (err) {
        console.log("EEE:" + err);
    });



</script>

</body>
</html>
