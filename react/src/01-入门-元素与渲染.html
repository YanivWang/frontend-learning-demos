<!--
  分类: react / 入门
  主题: React 元素与渲染（React 18 createRoot）
  要点:
    - JSX 由 Babel 转译为 React.createElement(type, props, ...children)
    - createElement 返回一个普通对象（虚拟 DOM），由 ReactDOM 负责实际渲染
    - React 18 推荐用 ReactDOM.createRoot(container).render(...)，旧 ReactDOM.render 已废弃
  修正:
    - 原代码在 JSX 中用了 {ele1}，但 ele1 没有定义 → 运行时 ReferenceError，已改为已定义的 element
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React · 元素与渲染</title>

    <!-- 引入 react 和 react-dom，这两个是react核心包 -->
    <script src="../libs/react18.js"></script>
    <script src="../libs/react-dom18.js"></script>

    <script src="../libs/babel.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const elementOld = <h1 className="greeting">Hello, world!</h1>;

      //Babel 会把 JSX 转译成一个名为 React.createElement() 函数调用
      //上述表达式经过转义后
      const elementNew = React.createElement("h1", { className: "greeting" }, "Hello, world!");
      //React.createElement方法调用后，会生成一个js对象,如下，这个对象就是被称作 "React元素"
      // 注意：这是简化过的结构
      const element = {
        type: "h1",
        props: {
          className: "greeting",
          children: "Hello, world!",
        },
      };

      //定义一个函数式组件
      //函数式组件的唯一参数就是props
      const App = (props, otherParams) => {
        console.log("props>>>", props);
        console.log("otherParams>>>", otherParams);

        //函数式组件，可以return jsx，也可以没有return语句
        //返回一个react元素(一段jsx就是一个react元素)
        // 修正：原代码使用 {ele1}，但页面没有任何 ele1 定义 → ReferenceError；
        //       改用上方已定义的 elementOld / elementNew / element 之一进行演示
        return (
          <div>
            <div>开始: 函数式组件</div>
            {elementOld}
            {1 + 3}

            {/* 反面教材：直接写 <ele1 /> 会被当作小写 DOM 标签，浏览器无法识别 */}
            {/* <ele1 /> */}
          </div>
        );
      };

      //1.先获取dom根节点
      const domContainer = document.getElementById("root");
      //2.根据dom根节点创建React应用的根节点
      const appRoot = ReactDOM.createRoot(domContainer);

      //3.将组件渲染到页面：调用react根节点的render方法，将react元素渲染到页面上
      //注意组件的使用方式: 类似于html标签的使用方式，使用一对 <> 包裹组件的名称

      //<App id="app01" /> 这个也是react元素，react元素也可以用户自定义组件
      appRoot.render(<App id="app01" />);
    </script>
  </body>
</html>
