<!--
  分类: vue2 / 基础语法
  主题: v-if / v-else / v-show / <template v-if>
  要点:
    - v-if 真值才会渲染节点，false 时连 DOM 都没有；切换有开销
    - v-show 始终在 DOM 中，仅切换 display；适合频繁切换
    - <template v-if> 用来「不增加额外包裹元素」批量条件渲染一组节点
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>v-if / v-show 条件渲染</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app1">
    <div v-if="showFlag">你能看见我 if语句</div>
    <div v-else>你能看见我， else语句</div>

    <button v-on:click="triggle">triggle</button>


    <!--在template元素上使用v-if 来渲染分组: template是一个不可见的包裹元素 -->
    <template v-if="showFlag">
        <ul>
            <li>111</li>
            <li>222</li>
            <li>333</li>
            <li>444</li>
            <li>555</li>
        </ul>
    </template>

    <!-- v-show始终会被渲染进入dom，并一直被保存，控制它的显示和隐藏仅通过css的display：none/block -->
    <h1 v-show="showFlag">Hello!</h1>
</div>

<script>
    var app1 = new Vue({
        el: "#app1",
        data: {
            msg: "show msg",
            showFlag: false
        },
        methods: {
            triggle: function () {
                if (this.showFlag) {
                    this.showFlag = false;
                } else {
                    this.showFlag = true;
                }
            }
        }
    });

</script>

</body>
</html>
