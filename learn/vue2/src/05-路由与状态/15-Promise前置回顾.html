<!--
  分类: vue2 / 05-路由与状态
  主题: Promise 基础（与本目录主题关系不强，仅作前置回顾）
  要点:
    - new Promise(executor) 中 executor 是「同步立即执行」
    - resolve/reject 一旦调用，状态就「不可逆地」转为 fulfilled / rejected
    - .then / .catch 都返回新的 Promise，便于链式
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise 基础回顾</title>
</head>
<body>

<script>
    //Promise对象: 承诺将来会执行的对象
    new Promise(function (resolve, reject) {
        console.log('start new Promise...');
        var timeOut = Math.random() * 2;
        console.log('set timeout to: ' + timeOut + ' seconds.');
        setTimeout(function () {
            if (timeOut < 1) {
                console.log('call resolve()...');
                resolve('200 OK');//请求成功，一定要调用 resolve，使 Promise 对象的状态置为 fulfilled
            }
            else {
                console.log('call reject()...');
                reject('timeout in ' + timeOut + ' seconds.');//请求失败，一定调用reject，使Promise对象的状态置为rejected
            }
        }, timeOut * 1000);
    }).then(function (r) {
        console.log('Done: ' + r);
    }).catch(function (reason) {
        console.log('Failed: ' + reason);
    });

    //直接new Promise()对象，传入的函数就是被执行


</script>
