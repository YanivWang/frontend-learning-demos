<!--
  分类: vue3 / 04-组件通信
  主题: props / emit
  要点:
    - props 负责父传子
    - emit 负责子通知父
    - 子组件不应直接修改 props
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · props 与 emit</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { margin-right: 8px; padding: 6px 12px; }
      code { background: #f6f8fa; padding: 2px 5px; border-radius: 6px; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 760px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>props 与 emit</h1>
      <div class="box">
        <p>父组件 count：{{ count }}</p>
        <counter-child :count="count" @increase="count++"></counter-child>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li>Vue 的常规数据流是单向的：父组件通过 props 传入，子组件通过 emit 发事件。</li>
        <li>props 是只读输入，子组件想修改应 emit 给父组件，由父组件更新源数据。</li>
        <li>工程里可以用 <code>defineProps</code> 和 <code>defineEmits</code> 获得更简洁的写法。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      const CounterChild = {
        props: {
          count: { type: Number, required: true },
        },
        emits: ["increase"],
        template: `
          <div>
            <p>子组件收到 count：{{ count }}</p>
            <button @click="$emit('increase')">通知父组件 +1</button>
          </div>
        `,
      };

      createApp({
        components: { CounterChild },
        setup() {
          const count = ref(0);
          return { count };
        },
      }).mount("#app");
    </script>
