<!--
  分类: javascript / 01-基础
  主题: parseInt 全面用法与经典坑
  要点:
    - 从左侧扫描，遇非数字字符即停，与 Number 整体解析不同
    - 强烈建议显式传 radix（[1,2,3].map(parseInt) → [1, NaN, NaN] 即此坑）
    - parseInt("") 是 NaN；Number("") 是 0
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>parseInt</title>
</head>
<body>
  <h1>parseInt(string, radix) 全面演示</h1>

  <script>
    // ============ 1. 基本用法：parseInt 从字符串左侧开始解析整数 ============
    //   规则：忽略前导空白 → 读取连续数字字符（含可选 + - 符号）→ 遇到非法字符停止
    console.log(parseInt("934"));      // 934
    console.log(parseInt("934vvv"));   // 934 —— 后面非法字符被丢弃
    console.log(parseInt("78vv67v"));  // 78  —— 只取最前面那段
    console.log(parseInt("vv67v"));    // NaN —— 第一个字符就是非法的
    console.log(parseInt(" 10 "));     // 10  —— 前导空白被自动 trim
    console.log(parseInt("010"));      // 10  —— 现代浏览器不再当成八进制
    console.log(parseInt("010abc"));   // 10

    // ============ 2. radix 参数：明确进制，强烈推荐总是显式传入 ============
    console.log(parseInt("10", 2));   // 2  —— 二进制
    console.log(parseInt("10", 8));   // 8  —— 八进制
    console.log(parseInt("10", 16));  // 16 —— 十六进制
    console.log(parseInt("0x10"));    // 16 —— 自动识别 0x 前缀
    console.log(parseInt("0x10", 16));// 16
    console.log(parseInt("0x10", 10));// 0  —— 强制十进制时，'x' 让解析停下来

    // ============ 3. 经典面试题：[1, 2, 3].map(parseInt) ============
    //   ⚠️ map(callback) 实际传给 callback 三个参数：(value, index, array)
    //   所以等价于：
    //     parseInt("1", 0, ...)  → radix=0 视为 10 → 1
    //     parseInt("2", 1, ...)  → radix=1 非法    → NaN
    //     parseInt("3", 2, ...)  → radix=2，'3' 不是合法二进制字符 → NaN
    console.log(["1", "2", "3"].map(parseInt)); // [1, NaN, NaN]

    // 正确写法：用箭头函数显式只传 1 个参数
    console.log(["1", "2", "3"].map((v) => parseInt(v, 10))); // [1, 2, 3]
    // 或直接 Number / 一元 +
    console.log(["1", "2", "3"].map(Number));                  // [1, 2, 3]

    // ============ 4. parseInt vs Number ============
    //   parseInt：从左开始扫描，遇非法就停 → "12abc" → 12
    //   Number  ：必须整体合法，否则 NaN    → "12abc" → NaN
    console.log(parseInt("12abc"), Number("12abc")); // 12, NaN
    console.log(parseInt(""), Number(""));            // NaN, 0
    console.log(parseInt(true), Number(true));        // NaN, 1
    console.log(parseInt(null), Number(null));        // NaN, 0
  </script>
</body>
</html>
