<!--
  分类: react / class 组件
  主题: class 组件中的 React 合成事件
  要点:
    - 事件对象是 SyntheticEvent，接口与原生事件类似
    - event.nativeEvent 可访问底层原生事件
    - 阻止默认行为用 preventDefault()；阻止冒泡用 stopPropagation()
    - React 17+ 事件委托绑定在 root 容器而非 document
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · class 合成事件机制</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class App extends React.Component {
      handleSubmit = (event) => {
        event.preventDefault();
        console.log("SyntheticEvent:", event);
        console.log("nativeEvent:", event.nativeEvent);
        alert("已阻止表单默认提交，请看控制台");
      };

      handleParentClick = () => {
        console.log("父元素 onClick");
      };

      handleChildClick = (event) => {
        event.stopPropagation();
        console.log("子元素 onClick，已阻止冒泡");
      };

      render() {
        return (
          <section>
            <h1>class 合成事件机制</h1>
            <form onSubmit={this.handleSubmit}>
              <button type="submit">提交表单</button>
            </form>
            <div
              onClick={this.handleParentClick}
              style={{ border: "1px solid #ccc", padding: 16, marginTop: 12 }}
            >
              父元素
              <button onClick={this.handleChildClick}>子按钮</button>
            </div>
            <p>面试回答: 合成事件统一跨浏览器接口；class 与函数组件事件机制相同。</p>
          </section>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
