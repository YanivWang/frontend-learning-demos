<!--
  分类: css / 04-视觉效果 / 按钮
  主题: 渐变 + 下边框 + box-shadow 的 3D 按钮
  要点:
    - 用 border-bottom 营造按钮下沿厚度
    - linear-gradient 上深下浅 → 立体感；:active 反转方向 + 缩阴影模拟按下
    - transition: 150ms ease 让点击反馈柔和
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 按钮（渐变 + 下沿）</title>

    <style>
        .btn-3d-sub {
            display: block;
            margin: 0 auto;
            width: 50%;
            height: 50px;
            border-bottom: 5px solid #173814;
            border-top: none;
            border-left: none;
            border-right: none;
            background: linear-gradient(#469e3f, #255b20);
            color: white;
            border-radius: 10px;
            box-shadow: 0px 2px 10px grey;
            transition: 150ms ease;
            text-align: center;
            line-height: 50px;
            font-weight: bold;
        }

        .btn-3d-sub:active {
            border: none;
            border-bottom: 2px solid steelblue;
            box-shadow: 0px 1px 5px grey;
            background: linear-gradient(#255b20, #469e3f);
            color: #FFF;
        }
    </style>
</head>
<body>

<div class="subscribe">

    <a href="#" class="btn-3d-sub"><span>submit</span></a><br/>

</div>
