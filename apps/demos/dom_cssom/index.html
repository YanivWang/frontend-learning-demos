<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* base dom */
      h1 {
        color: blue;
      }
      h3 {
        color: red;
      }

      /* flex */
      .flex-container {
        display: flex;
      }
      .flex-item {
        border: 1px solid #ddd;
        padding: 10px 5px;
      }

      /* layers */
      .layer-container {
        display: flex;
      }
      .layer-item {
        border: 1px solid #ddd;
        padding: 10px 5px;
      }
      /* 提升合成层 */
      .layer-item-1 {
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <!-- 基础cssom 和 dom -->
    <h1 style="font-weight: bolder">DOM</h1>
    <h3>DOM讲解</h3>
    <script>
      console.log('script开始执行');
    </script>

    <!-- 布局 -->
    <h1>flex布局</h1>
    <div class="flex-container">
      <div class="flex-item">flex item1</div>
      <div class="flex-item">flex item2</div>
      <div class="flex-item">flex item3</div>
    </div>

    <!-- 查看图层 -->
    <h1>查看图层</h1>
    <div class="layer-container">
      <div class="layer-item layer-item-1">layer item1</div>
      <div class="layer-item layer-item-2">layer item2</div>
      <div class="layer-item layer-item-3">layer item3</div>
    </div>
  </body>
</html>
