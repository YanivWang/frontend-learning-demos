<!--
  分类: javascript / 04-ES6+ / class详解
  主题: 静态初始化块在继承场景的特性
  要点:
    - 父类静态先初始化，子类静态后初始化
    - 子类静态块中可用 super.xxx 访问父类静态属性/方法
    - 静态方法在类本身上，需要通过类名调用
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class 静态初始化块 extends</title>
  </head>
  <body>
    <script>
      class Animal {
        static age = 30;
        static {}
      }
      
      //类的静态方法，静态属性是所有实例共享的
      class Pig extends Animal {
        //静态属性则适用于缓存、固定配置或其他不需要跨实例复制的数据
        static animalId = "10001";

        //静态方法通常是实用函数，如创建或克隆对象的函数
        //静态成员定义在类本身上
        static staticMethod() {
          console.log("1111111");
          console.log(this)//class Pig这里的this是class Pig类本身
          return "static method has been called.";
        }

        static {
          //static代码块中可以使用super关键字访问父类的静态属性
          console.log(super.age);
        }

       //类的静态方法，非常适合作为创建类实例的工厂方法
        static createPerson(){

        }
      }

      Pig.greeting = "我是类本身的成员"
      
      //类的静态方法，需要通过类名调用
      Pig.staticMethod();

    </script>
