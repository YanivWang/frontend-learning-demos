    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }

  <body>
  <h1>props / emit</h1>
  <p class="hint">在浏览器中操作下方交互演示；复习要点与面试答法见上方区块。</p>
<section class="demo-notes" aria-label="复习与面试要点">
    <h2>知识点要点</h2>
    <ul>
      <li>props 负责父传子。</li>
      <li>emit 负责子通知父。</li>
      <li>子组件不应直接修改 props。</li>
    </ul>
    <h2>面试考点</h2>
    <ul>
      <li><strong>props 负责父传子？</strong> props 负责父传子；子组件不应直接修改 props</li>
      <li><strong>emit 负责子通知父？</strong> emit 负责子通知父</li>
      <li><strong>子组件不应直接修改 props？</strong> 子组件不应直接修改 props</li>
    </ul>
  </section>


  <div id="app">
      <h1>props 与 emit</h1>

      <div class="box">
        <p>父组件 count：{{ count }}</p>
        <counter-child :count="count" @increase="count++"></counter-child>
      </div>

      
    </div>

    <script>
      const { createApp, ref } = Vue;

      const CounterChild = {
        props: {
          count: { type: Number, required: true },
        },
        emits: ["increase"],
        template: `
          <div>
            <p>子组件收到 count：{{ count }}</p>
            <button @click="$emit('increase')">通知父组件 +1</button>
          </div>
        `,
      };

      createApp({
        components: { CounterChild },
        setup() {
          const count = ref(0);
          return { count };
        },
      }).mount("#app");
    </script>
