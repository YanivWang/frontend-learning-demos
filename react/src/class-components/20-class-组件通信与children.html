<!--
  分类: react / class 组件
  主题: class 组件通信、状态提升与 children 组合
  要点:
    - 父传子: props；子传父: 父传回调，子组件调用
    - 兄弟通信: 状态提升到共同父组件
    - children / 具名插槽式 props（如 footer）实现组合，避免 props 爆炸
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · class 组件通信与 children</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class Panel extends React.Component {
      render() {
        return (
          <section style={{ border: "1px solid #ccc", padding: 12, marginBottom: 12 }}>
            <h2>{this.props.title}</h2>
            <div>{this.props.children}</div>
            <footer>{this.props.footer}</footer>
          </section>
        );
      }
    }

    class NameInput extends React.Component {
      handleChange = (e) => {
        this.props.onChangeName(e.target.value);
      };

      render() {
        return <input value={this.props.value} onChange={this.handleChange} />;
      }
    }

    class Preview extends React.Component {
      render() {
        return <p>预览: Hello, {this.props.name || "匿名用户"}</p>;
      }
    }

    class App extends React.Component {
      constructor(props) {
        super(props);
        this.state = { name: "React Class" };
      }

      handleNameChange = (name) => {
        this.setState({ name });
      };

      clearName = () => {
        this.setState({ name: "" });
      };

      render() {
        return (
          <main>
            <h1>class 组件通信与 children</h1>
            <Panel
              title="资料卡片"
              footer={<button onClick={this.clearName}>清空</button>}
            >
              <NameInput value={this.state.name} onChangeName={this.handleNameChange} />
              <Preview name={this.state.name} />
            </Panel>
            <p>面试回答: 单向数据流；子组件通过回调请求父组件更新；children 做组合扩展。</p>
          </main>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
