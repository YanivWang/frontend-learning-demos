<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //所谓异步任务就是会在将来的某个时间点，调用一个函数
    //构建一个promise的执行函数
    function test(resolve, reject) {
        let ret = 0;
        setTimeout(() => {
            ret = Math.random() * 10;

            if (ret > 5) {
                resolve(ret);
            } else {
                reject("fail");
            }
        }, 2000);
    }

    let p1 = new Promise(test);
    p1.then((flag) => {
        console.log(flag);
    }).catch((err) => {
        console.log(err);
    })

</script>

</body>
</html>
