<!--
  分类: javascript / 06-浏览器API
  主题: Import Maps 浏览器原生模块映射
  难度: 进阶
  要点:
    - <script type="importmap"> 将 bare specifier 映射到 URL
    - 配合 <script type="module"> 在零构建环境使用 npm 风格 import
    - 生产环境仍推荐 bundler；Import Maps 适合 demo / 渐进迁移
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Maps</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    #out { margin-top: 1rem; padding: 12px; background: #f6f8fa; border-radius: 8px; font-family: ui-monospace, monospace; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "utils/": "./lib/importmap-utils/"
    }
  }
  </script>
</head>
<body>
  <h1>Import Maps 模块映射</h1>
  <p>通过 import map 将 <code>utils/greet.js</code> 映射到本地 <code>lib/importmap-utils/greet.js</code>。</p>
  <div id="out" aria-live="polite"></div>
  <script type="module">
    import { greet } from "utils/greet.js";
    document.getElementById("out").textContent = greet("Import Maps");
  </script>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">
  <style>
    .demo-nav { margin: 2.5rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e3e3e3; font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; }
    .demo-nav a { color: #0969da; text-decoration: none; }
    .demo-nav a:hover { text-decoration: underline; }
    .demo-output { margin-top: 1rem; padding: 0.75rem 1rem; background: #f6f8fa; border-radius: 8px; font-family: ui-monospace, monospace; font-size: 0.8125rem; white-space: pre-wrap; max-height: 240px; overflow: auto; }
    .demo-output:empty { display: none; }
  </style>
  <a href="/" data-demo-catalog data-file-catalog="../../index.html">目录</a>
  <a href="./HTTP%E7%BC%93%E5%AD%98.html">← HTTP缓存</a>
  <a href="./IntersectionObserver.html">IntersectionObserver →</a>
  <script>
    (function () {
      var a = document.querySelector("[data-demo-catalog]");
      if (a && location.protocol === "file:" && a.dataset.fileCatalog) {
        a.setAttribute("href", a.dataset.fileCatalog);
      }
    })();
  </script>
</footer>
<!-- DEMO_NAV_END -->
</body>
</html>
