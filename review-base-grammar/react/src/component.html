<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Hello World</title>
  <!-- react核心库 -->
  <script src="../../jsLibrary/react.development.js"></script>
  <!-- react用来操作dom的库 -->
  <script src="../../jsLibrary/react-dom.development.js"></script>

  <!-- Don't use this in production: -->
  <!-- 引入 babel 是用来编译jsx的 -->
  <script src="../../jsLibrary/babel.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    let conut = 0;
    const container = document.getElementById("root");

    //更新元素渲染
    function tick() {
      conut++;
      const element = <div>{conut}</div>;

      ReactDOM.render(element, container);
    }

    //没隔一秒创建一个新元素，并将其传入到ReactDOM.render方法中，实现界面得更新
    setInterval(tick, 1000)
  </script>

</body>

</html>
