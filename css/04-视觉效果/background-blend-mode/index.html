<!--
  分类: css / 04-视觉效果 / background-blend-mode
  主题: 背景叠加颜色 / 渐变的混合演示
  要点:
    - 在一张底图上加同色 linear-gradient + background-blend-mode: lighten 可整体调色
    - mix-blend-mode 用于元素与下层背景混合，常用于深色背景上的反白文字
    - 注意：外链图片依赖 GitHub 图床；离线打开会显示空白
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>background-blend-mode</title>
    <link rel="stylesheet" href="blend.css">
</head>
<body>

<div class="g-flex">
    <div class="pic">原图</div>
    <div class="pic pic1">粉色</div>
    <div class="pic pic2">绿色</div>
    <div class="pic pic3">渐变</div>
</div>

<h2 class="mix-title">mix-blend-mode：元素与下层背景混合</h2>
<div class="mix-scene">
    <p class="mix-text">difference 反白文字</p>
    <p class="mix-text screen">screen 提亮混合</p>
</div>

</body>
</html>
