<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    function Person(name,age) {
        this.name = name;
        this.age = age;
    }

    var person1 = new Person("p1",21);
    console.log("person1:" + person1);

    //函数的prototype指针，指向它的原型对象
    Person.prototype.weight = 20;

    var person2 = new Person("p2",23);
    console.log("person2.weight:" + person2.weight);
    console.log("person2:" + person2);

    console.log("person1.weight:" + person1.weight);
    console.log("person1:" + person1);

</script>

</body>
</html>
