<!--
  分类: vue2 / 组件
  主题: 自定义组件上 v-bind:class 行为
  要点:
    - 在自定义组件上写 :class，最终会合并到「组件根节点」的 class 属性
    - 与父模板原有的 class 是合并而非覆盖，多个 class 都会出现
    - 多根节点组件（Vue3）的 class 透传规则不同，注意区分
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>组件上的 class 透传</title>
    <script src="../../libs/vue2.js"></script>

    <style>
        div.active {
            background-color: red;
        }
    </style>
</head>
<body>

<div>
    <div id="app1">
        <!--当在一个自定义的组件上使用class属性时，这个属性会被添加自定义组件的根节点上-->
        <load-comp v-bind:class="activeClass"></load-comp>
    </div>
</div>

<script>
    Vue.component("load-comp", {
        template: '<p class="foo deer"><span>我是新组件</span></p>'
    });
    var vm = new Vue({
        el: "#app1",
        data:{
            activeClass: "active"
        }
    });
</script>

</body>
</html>
