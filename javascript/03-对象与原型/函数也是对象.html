<!--
  分类: javascript / 03-对象与原型
  主题: 函数也是对象
  要点:
    - 所有函数都是 Function 类型的实例：fn.__proto__ === Function.prototype
    - Function.prototype 自己也是 Object 实例：Function.prototype.__proto__ === Object.prototype
    - 任何函数 instanceof Object/Function 都为 true
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>函数也是对象</title>
  </head>
  <body>
    <script>
      function Person() {}

      //函数属于对象的一种特殊类型，所有的函数都是Function类型的实例
      console.log(Person.__proto__ === Function.prototype);

      //它作为实例的时候，也有__proto__属性指向其原型对象，其原型对象也是Function类型实例
      console.log(typeof Person.__proto__);
      console.log(typeof Function.prototype);

      //而它原型的原型是Object类型的实例
      console.log(typeof Function.prototype.__proto__);

      console.log(Person instanceof Object);//true
      console.log(Person instanceof Function);//true
      console.log(Function instanceof Object);//true
    </script>
  </body>
</html>
