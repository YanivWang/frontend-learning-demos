<!--
  分类: javascript / 04-ES6+ / 异步 / generator与async
  主题: async 是 generator + 自动执行器的语法糖
  要点:
    - generator + 自写执行器即可模拟 async/await
    - await 等价于 yield 后跟一个 Promise；async 函数自带「驱动器」
    - 函数体内多个 await 串行执行；并发应该用 Promise.all
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>async 是 generator 语法糖</title>
</head>
<body>

<script>
    function timeOut(ms = 300) {
        return new Promise(function (resolve) {
            setTimeout(resolve, ms);
        });
    }

    // 简易执行器：把 yield 的值当作 Promise，resolve 后再 next
    function runGenerator(genFn) {
        const gen = genFn();
        function step(prev) {
            const { value, done } = gen.next(prev);
            if (done) return Promise.resolve(value);
            return Promise.resolve(value).then(function (result) {
                return step(result);
            });
        }
        return step();
    }

    function* flowGen() {
        yield timeOut();
        console.log("[generator] step1");
        yield timeOut();
        console.log("[generator] step2");
        return "done-gen";
    }

    async function flowAsync() {
        await timeOut();
        console.log("[async] step1");
        await timeOut();
        console.log("[async] step2");
        return "done-async";
    }

    console.log("--- generator + 执行器（等价于手写 co）---");
    runGenerator(flowGen).then(function (result) {
        console.log("[generator] return:", result);
        console.log("--- async/await（语言内置执行器）---");
        return flowAsync();
    }).then(function (result) {
        console.log("[async] return:", result);
    });
</script>
