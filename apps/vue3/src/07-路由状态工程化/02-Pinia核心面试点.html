<!--
  分类: vue3 / 07-路由状态工程化
  主题: Pinia 核心面试点
  要点:
    - Pinia 是 Vue3 推荐状态管理方案之一
    - 常问 state/getters/actions、组合式 store、持久化、和 Vuex 的区别
    - 可运行示例见 <code>06-Router与Pinia可运行示例.html</code>；本页保留面试代码片段
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · Pinia 面试点</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      code, pre { background: #f6f8fa; border-radius: 6px; }
      code { padding: 2px 5px; }
      pre { padding: 12px; overflow: auto; }
      .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 860px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Pinia 核心面试点</h1>
      <div class="box">
        <pre>{{ snippet }}</pre>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li>Pinia 没有 Vuex 那种强制 mutation 层，异步和同步修改通常都写在 actions 中。</li>
        <li>store 是全局共享状态，适合用户信息、权限、购物车、跨页面缓存，不适合所有局部状态。</li>
        <li>解构 store 时要注意响应式，常用 <code>storeToRefs(store)</code> 保留 state/getters 的响应式。</li>
        <li>持久化通常通过插件或手写订阅同步到 localStorage，但要注意敏感数据和过期策略。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const snippet = ref([
            "export const useUserStore = defineStore('user', {",
            "  state: () => ({ token: '', profile: null }),",
            "  getters: { isLogin: (state) => Boolean(state.token) },",
            "  actions: {",
            "    async login(payload) {",
            "      const user = await api.login(payload)",
            "      this.token = user.token",
            "      this.profile = user.profile",
            "    }",
            "  }",
            "})",
          ].join("\n"));
          return { snippet };
        },
      }).mount("#app");
    </script>
