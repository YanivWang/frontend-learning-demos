<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>fuck</title>
</head>
<body>

<script>
    let p1 = new Promise((resolve, reject) => {
        setTimeout(() => {
            resolve("p1 ok!");
        }, 1500)
    });

    let p2 = new Promise((resolve, reject) => {
        setTimeout(() => {
            resolve("p2 ok!");
        }, 2000)
    });

    let p3 = new Promise((resolve, reject) => {
        setTimeout(() => {
            resolve("p3 ok!");
        }, 2000)
    });

    //1.有一个失败就返回
    //2.全部成功才叫成功
    Promise.myAll = function (...args) {
        return new Promise((resolve, reject) => {
            //记录返回得结果
            let retArray = [];

            for (let index in args) {
                let tempPromise = args[index];
                tempPromise.then((res) => {
                    retArray[index] = res;

                    //全部得结果返回了才resolve
                    if (retArray.length >= args.length) {
                        resolve(retArray);
                    }
                }).catch(err => {
                    reject(err);
                })
            }
        })
    };


    Promise.myAll(p1, p2, p3).then(err => {
        console.log(err);
    }).catch(err => {
        console.log(err);
    })


</script>

</body>
</html>
