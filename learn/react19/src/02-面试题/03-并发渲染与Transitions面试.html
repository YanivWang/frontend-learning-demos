<!--
  分类: react19 / 02-面试题
  主题: 并发渲染与 Transitions 面试
  要点:
    - 并发：可中断渲染，优先响应用户输入（时间切片 + 优先级）
    - useTransition：isPending + startTransition 包裹低优先级更新
    - React 19 Actions 常在 startTransition 内执行，isPending 与 useActionState 的 pending 呼应
    - 面试区分：紧急更新（输入）vs 过渡更新（筛选、路由、提交反馈）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>面试 · 并发与 Transition</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; line-height: 1.6; }
    input { padding: 0.4rem; width: 100%; max-width: 320px; }
    .slow-list { margin-top: 1rem; max-height: 200px; overflow: auto; font-size: 0.9rem; }
    .pending { color: #0969da; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useMemo, useState, useTransition } = React;

    function slowFilter(text) {
      const items = [];
      for (let i = 0; i < 8000; i++) {
        if (String(i).includes(text)) items.push("item-" + i);
      }
      return items.slice(0, 40);
    }

    function App() {
      const [query, setQuery] = useState("");
      const [deferredQuery, setDeferredQuery] = useState("");
      const [isPending, startTransition] = useTransition();

      const list = useMemo(
        () => slowFilter(deferredQuery),
        [deferredQuery]
      );

      const onChange = (e) => {
        const value = e.target.value;
        setQuery(value);
        startTransition(() => {
          setDeferredQuery(value);
        });
      };

      return (
        <section>
          <h1>useTransition 保持输入流畅</h1>
          <p>输入框（紧急更新）与下方列表（过渡更新）分离。</p>
          <input value={query} onChange={onChange} placeholder="过滤数字，如 12" />
          {isPending && <p className="pending">列表更新中（isPending）…</p>}
          <ul className="slow-list">
            {list.map((item) => (
              <li key={item}>{item}</li>
            ))}
          </ul>
          <p><strong>面试答法：</strong>startTransition 标记低优先级；Actions 默认在 transition 中运行，避免阻塞输入。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
<!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">
  <style>
    .demo-nav { margin: 2.5rem 0 1rem; padding-top: 1rem; border-top: 1px solid #e3e3e3; font-size: 0.875rem; display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; }
    .demo-nav a { color: #0969da; text-decoration: none; }
  </style>
  <a href="/">目录</a>
</footer>
<!-- DEMO_NAV_END -->
</body>
</html>
