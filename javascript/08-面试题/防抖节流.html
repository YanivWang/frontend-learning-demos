<!--
  分类: javascript / 08-面试题
  主题: 防抖（debounce）与节流（throttle）
  要点:
    - debounce：每次触发都重置定时器，沉默超过 wait 才真正执行（场景：搜索建议）
    - throttle（时间戳版）：每 wait ms 最多执行一次（场景：scroll/mousemove）
    - throttle（定时器版）：trailing 调用，等到 wait 末尾再执行一次
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>防抖 / 节流</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; line-height: 1.6; }
    .box { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; min-height: 36px; }
    input { padding: 6px 8px; width: 240px; }
  </style>
</head>
<body>
  <h1>防抖（debounce）/ 节流（throttle）</h1>

  <h3>1. 防抖：触发 n 次只在最后一次后执行（适合：搜索建议、按钮防连点）</h3>
  <input id="searchInput" placeholder="输入关键词搜索..." />
  <div class="box" id="debounceBox">等待输入...</div>

  <h3>2. 节流：n 毫秒内最多执行一次（适合：scroll、resize、mousemove）</h3>
  <div class="box" id="throttleBox">移动鼠标试试...</div>

  <script>
    // ===== 防抖 =====
    // 关键点：每次触发都重置定时器；只有"沉默"超过 wait 才会真正执行
    function debounce(fn, wait) {
      let timer = null;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), wait);
      };
    }

    // ===== 节流（时间戳版）=====
    function throttle(fn, wait) {
      let last = 0;
      return function (...args) {
        const now = Date.now();
        if (now - last >= wait) {
          last = now;
          fn.apply(this, args);
        }
      };
    }

    // ===== 节流（定时器版，trailing 调用）=====
    function throttleTimer(fn, wait) {
      let timer = null;
      return function (...args) {
        if (timer) return;
        timer = setTimeout(() => {
          fn.apply(this, args);
          timer = null;
        }, wait);
      };
    }

    // ===== 测试：防抖 =====
    const debounceBox = document.getElementById("debounceBox");
    const handleSearch = debounce(function (e) {
      debounceBox.textContent = "搜索：" + e.target.value + "（" + new Date().toLocaleTimeString() + "）";
    }, 500);
    document.getElementById("searchInput").addEventListener("input", handleSearch);

    // ===== 测试：节流 =====
    const throttleBox = document.getElementById("throttleBox");
    const handleMove = throttle(function (e) {
      throttleBox.textContent = `(${e.clientX}, ${e.clientY}) at ${Date.now()}`;
    }, 300);
    document.addEventListener("mousemove", handleMove);
  </script>
</body>
</html>
