<!--
  分类: css / 01-基础 / display与文档流
  主题: block、inline、inline-block、none、visibility
  要点:
    - block 独占一行，可设置宽高；inline 不独占一行，宽高通常不生效
    - inline-block 不独占一行，但可以设置宽高，常用于文字旁的小块元素
    - display:none 不占位；visibility:hidden 占位但不可见
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>display 与文档流</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.7; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1rem; margin-top: 2rem; }
    .demo { border: 1px solid #ddd; padding: 12px; max-width: 680px; }
    .block { display: block; width: 180px; height: 44px; background: #dff0ff; }
    .inline { display: inline; width: 180px; height: 44px; background: #ffe3d1; }
    .inline-block { display: inline-block; width: 180px; height: 44px; background: #e5f6df; }
    .none { display: none; }
    .hidden { visibility: hidden; }
    .item { display: inline-block; width: 90px; padding: 10px; margin-right: 8px; background: #f1f1f1; text-align: center; }
  </style>
</head>
<body>
  <h1>display 与文档流</h1>

  <h2>block / inline / inline-block</h2>
  <div class="demo">
    前文
    <span class="block">block</span>
    中间
    <span class="inline">inline 设置宽高不明显</span>
    <span class="inline-block">inline-block 可设宽高</span>
    后文
  </div>

  <h2>display:none vs visibility:hidden</h2>
  <div class="demo">
    <span class="item">A</span>
    <span class="item none">B none</span>
    <span class="item">C</span>
  </div>
  <p>上面 B 使用 <code>display:none</code>，不占位置。</p>
  <div class="demo">
    <span class="item">A</span>
    <span class="item hidden">B hidden</span>
    <span class="item">C</span>
  </div>
  <p>上面 B 使用 <code>visibility:hidden</code>，仍然占位置。</p>
