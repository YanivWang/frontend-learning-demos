<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //函数声明
    function f1() {

    }

    //匿名函数表达式
    var var_f1 = (function (a, b) {
        return a + b;
    });

    //命名函数表达式, 并没有声明函数 f2
    var var_f2 = function f2() {
        console.log("var_f2");
    };

    //f2(); //调用f2会报错，f2未定义
    var_f2();


    //函数表达式，且会立即执行，必须使用变量接收
    var f3 = function a() {
        console.log("立即执行");
        return 6;
    }();
    console.log(f3);  //这个东西，是为了闭包，进行设计的，所以必须有一个接收
    //f3(); //调用 f3 报错 f3 is not a function,因为该函数已经执行了，就关闭了

    (function c() {
        return "a"
    })();

    function init() {
        return "123"
    }

    var a = init;//不带括号，代表使用的是函数的指针
    var b = init();
    console.log(a);
    console.log(b);

    //  ||  &&   只要有一个操作数，不是布尔值，则结果就不一定返回布尔值。
    // || && 可以应用于任何类型，不仅仅是布尔值
</script>


</body>
</html>
