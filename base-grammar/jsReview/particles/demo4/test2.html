<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .container {
            margin: auto;
            margin-top: 200px;
            background-color: #00b09b;
            width: 500px;
            height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvas"></canvas>
</div>

<script>
    console.log("draw pic... ");

    let canvas = document.querySelector("#canvas");
    canvas.width = 500;
    canvas.height = 400;

    let ctx = canvas.getContext("2d");

    let imgSrc = "./img/ball.png";
    const image = new Image();
    image.src = imgSrc;
    image.onload = function () {
        animation();
    };

    let x = 0;
    let y = 0;
    let width = 1;
    let height = 1;

    function animation() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(image, x, y, width, height);

        x++;
        y++;

        if (width < 30) {
            width++;
            height++;

            requestAnimationFrame(animation);
        }
    }

</script>

</body>
</html>
