<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    var str = "abcdefg";

    var result1 = str.substr(3,2);//从指定下标开始，截取指定数目的字符
    console.log(result1);


    var result11 = str.substr(-1,2);
    console.log(result11);

    var result111 = str.substr(-2,2);
    console.log(result111);

    var result1111 = str.substr(-3,2);
    console.log(result1111);

    var result111111 = str.substr(3,0);
    console.log(result111111);
    var result1111111 = str.substr(3,-1);
    console.log(result1111111);


    var result2 = str.slice(3,5);
    console.log(result2);



    //substring
    var result3 = str.substring(3,5);
    console.log(result3);

    var result4 = str.substring(5,3);//substring 会取 startIndex 和 endIndex中较小的作为startIndex
    console.log(result4);

    var result5 = str.substring(0,0);//substring 会取 startIndex 和 endIndex中较小的作为startIndex
    console.log(result5);

    var result6 = str.substring(-5,2);//substring 会取 startIndex 和 endIndex中较小的作为startIndex，任何一个参数为负数，该参数替换成0，然后将该参数作为startIndex
    console.log(result6);
</script>

</body>
</html>
