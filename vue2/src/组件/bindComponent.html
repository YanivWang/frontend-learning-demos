<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue first</title>
    <script src="../../libs/vue2.js"></script>

    <style>
        div.active {
            background-color: red;
        }
    </style>
</head>
<body>

<div>
    <div id="app1">
        <!--当在一个自定义的组件上使用class属性时，这个属性会被添加自定义组件的根节点上-->
        <load-comp v-bind:class="activeClass"></load-comp>
    </div>
</div>

<script>
    Vue.component("load-comp", {
        template: '<p class="foo deer"><span>我是新组建</span></p>'
    });
    var vm = new Vue({
        el: "#app1",
        data:{
            activeClass: "active"
        }
    });
</script>

</body>
</html>
