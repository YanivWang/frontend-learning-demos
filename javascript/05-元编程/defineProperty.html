<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let person = {
        age: 30
      };

      //动态给对象添加一个name属性，且它的值为 "wangcheng"
      //通过这种方式添加的数据属性，默认其它特性都是 false
      Object.defineProperty(person, "name", {
        value: "wangcheng",
      });

      console.log(person);

      //两个参数
      const descriptor1 = Object.getOwnPropertyDescriptor(person, "name");
      /*
      {
        "value": "wangcheng",
        "writable": false,
        "enumerable": false,
        "configurable": false
      }
      */
      console.log(JSON.stringify(descriptor1, null, 4));



      const descriptor2 = Object.getOwnPropertyDescriptor(person, "age");
      /*
      {
        "value": 30,
        "writable": true,
        "enumerable": true,
        "configurable": true
      }
      */
      console.log(JSON.stringify(descriptor2, null, 4));
    </script>
  </body>
</html>
