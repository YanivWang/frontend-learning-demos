<!--
  分类: react / class 组件
  主题: class 组件列表 key 与 diff
  要点:
    - key 帮助 React 识别同级列表节点身份，不参与 props 传递
    - 稳定唯一 id 优于 index；增删排序时用 index 可能导致内部 state 错位
    - class 与函数组件在 key 规则上完全一致
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · class 列表 key 与 diff</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    class TodoItem extends React.Component {
      constructor(props) {
        super(props);
        this.state = { checked: false };
      }

      toggle = () => {
        this.setState({ checked: !this.state.checked });
      };

      render() {
        return (
          <li>
            <label>
              <input type="checkbox" checked={this.state.checked} onChange={this.toggle} />
              {this.props.todo.text}（checked: {String(this.state.checked)}）
            </label>
          </li>
        );
      }
    }

    class App extends React.Component {
      constructor(props) {
        super(props);
        this.state = {
          todos: [
            { id: 1, text: "学习 class 组件" },
            { id: 2, text: "学习 setState" },
            { id: 3, text: "学习生命周期" }
          ]
        };
      }

      addAtHead = () => {
        const nextId = Date.now();
        this.setState({
          todos: [{ id: nextId, text: "新任务 " + nextId }, ...this.state.todos]
        });
      };

      render() {
        return (
          <section>
            <h1>class 列表 key 与 diff</h1>
            <button onClick={this.addAtHead}>从头部插入</button>
            <h2>正确: 稳定 id 作为 key</h2>
            <ul>
              {this.state.todos.map(todo => (
                <TodoItem key={todo.id} todo={todo} />
              ))}
            </ul>
            <h2>反例: index key 插入时 state 错位</h2>
            <ul>
              {this.state.todos.map((todo, index) => (
                <TodoItem key={index} todo={todo} />
              ))}
            </ul>
            <p>面试回答: key 是 diff 身份标识；列表会变动时不要用 index。</p>
          </section>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
