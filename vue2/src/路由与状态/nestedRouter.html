<!--
  分类: vue2 / 路由与状态
  主题: 嵌套路由 + 编程式导航 push / replace
  要点:
    - 父组件内部再放 <router-view> 即可渲染 children 子路由
    - $router.push 入栈历史；$router.replace 替换当前条目，不入栈
    - 易错点：注意按钮里 customerRouter 同时调用了 push 和 replace，实际后者会覆盖前者
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 嵌套路由 + 编程式导航</title>
    <script src="../../libs/vue2.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <div>
        <button @click="customerRouter('/user/foo')">/user/foo</button>
        <button @click="customerRouter('/user/foo/profile')">/user/foo/profile</button>
        <button @click="customerRouter('/user/foo/course')">/user/foo/course</button>
    </div>
    <p>
        <router-link to="/user/foo">/user/foo</router-link>
        <router-link to="/user/foo/profile">/user/foo/profile</router-link>
        <router-link to="/user/foo/course">/user/foo/course</router-link>
    </p>

    <!--这个router-view是最顶层的出口，渲染最高级路由匹配到的组件，同样的一个被匹配的组件
    再其内部也可以包含自己的<router-view>。
    -->
    <router-view></router-view>
</div>

<script>
    console.log(111);

    //1.定义路由组件
    //User本身是一个组件，在其内部在加上一个<router-view>,用于嵌套其它的组件
    //在嵌套的出口中，渲染其子组件
    const User = {
        template: `<div>
                      <div>user</div>
                      <div>{{$route.params.id}}</div>
                      <router-view></router-view>
                   </div>`
    };

    const UserProfile = {
        template: `<div>用户简介</div>`
    };

    const Course = {
        template: `<div>课程</div>`
    };

    //2.定义路由
    //component: 1.一个组件  2.Vue.extend()创建的组件构造器

    //有时候，同一个路径可以匹配到多个路由，此时，匹配的优先级就按照路由的定义顺序，谁先定义的，谁的优先级就最高
    //嵌套子路径被匹配，则其父路径一定被匹配，子路径匹配到的组件，会在父路径匹配到的组件的路由出口中，进行渲染
    const routes = [
        {
            path:"/",
            component: {//程序启动的时候默认访问/路径，根路径匹配到的组件，会被渲染到顶级出口中
                template:`<div>
                   我是根目录
                   <router-view></router-view>
                </div>`
            },
            redirect:"/dashboard",
            children:[
                {
                    path:'/dashboard',
                    component:{
                        template:'<div>我是根目录嵌套子目录</div>'
                    }
                }
            ]
        },
        {
            path: "/user/:id",
            component: User,
            //要在嵌套的出口中渲染组件，需要自VueRouter的参数中使用children配置：
            children: [//children的配置就和routes配置一样的路由配置数组，因此可以多层嵌套路由
                // 当用户访问 "/user/foo" 时，User 下的出口 (router-view) 中不会渲染子路由组件；
                // 使用 path 为 '' 的空路径子路由，可在未匹配到其它子路径时渲染默认内容
                {
                    path: '',
                    component: {//当未匹配到任何子路径时，user的出口中，会被渲染这个
                        template:'<div>Hello 我是 userHome</div>'
                    }
                },
                {
                    path: 'profile',
                    component: UserProfile
                },
                {
                    path: 'course',
                    component: Course
                }
            ]
        }
    ];

    //3.创建router实例，然后传入"router"配置
    const router = new VueRouter({
        routes
    });

    //4.创建和挂载根实例
    //通过为根实例注入路由器：我们可以在任何组件内通过this.$router访问路由器  this.$route访问当前的路由
    var wm = new Vue({
        router,
        methods:{
            //编程式的导航，通过编程的方法导航
            //借助router的实例方法：push(这个方法会想history栈添加一个新的记录，所以当用户点击浏览器后退按钮时，则回到之前的URL)
            customerRouter: function (param) {
                //将当前的路由添加到history历史栈中
                this.$router.push(param);

                //和push一样，但是不会将当前的路由添加到历史栈中
                this.$router.replace(param);
            }
        }
    }).$mount('#app');


    //5.注意：当使用的路由参数，从/user/wangcheng/post/123  /user/wangcheng/post/456 原来的组件会被复用

    console.log(wm);
</script>

</body>
</html>
