<!--
  分类: vue2 / 组件
  主题: 解构赋值（数组按位、对象按名）
  要点:
    - 数组解构按「位置」对应；对象解构按「key 名」对应
    - Vue 中典型场景：actions(context) 写成 actions({ commit, state })
    - 解构默认值：let { a = 1 } = obj 在 a 为 undefined 时生效
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>解构赋值复习</title>
</head>
<body>

<script>

   let arry1 = [1,2,3];

   let [a,b] = arry1;

   console.log(a);
   console.log(b);

   var obj1 = {
       commit: "commit",
       state:"state"
   };

   //对象的解构分配是按照名称作为key
   let {state,commit} = obj1;

   console.log(commit);





</script>

</body>
</html>
