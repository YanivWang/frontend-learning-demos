<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div class="imgDiv"></div>

<script>
    function loadImgSync(url) {
        return new Promise(function (resolve, reject) {
            //可以对图片进行预加载
            const img = new Image();
            img.onload = function () {
                resolve(img);
            };

            img.onerror = function (err) {
                console.log(err);
                reject(new Error("load img fail..."));
            };

            img.src = url;
        })
    }

    var url = "https://www.baidu.com/img/bd_logo1.png?qua=high";
    loadImgSync(url).then(function (img) {
        console.log(img);
        var imgDiv = document.getElementsByClassName("imgDiv");
        imgDiv[0].appendChild(img);
    }).catch(function (error) {
        console.log(error);
    });

</script>

</body>
</html>
