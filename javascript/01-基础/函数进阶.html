<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //只在特定的作用域中使用严格模式(且严格模式声明语句必须方法第一行)
    'use strict';

    //1.定义函数(函数声明)
    function sum(a, b) {
        return a + b;
    }

    //2.函数表达式
    let mins = function (a, b) {
        return a - b;
    };

    //3.使用函数构造器Function(函数本身也是对象，函数名只是指向函数对象的指针)
    let devide = new Function("num1", "num2", "return num1 * num2");
    console.log("old fn: " + devide(2, 3));

    //4.测试函数是对象，函数名是指针
    let devideNem = devide;
    console.log("new fn: " + devideNem(5, 6));

    //5.clear old fn
    devide = null;
    console.log("new fn2: " + devideNem(10, 10));

    //6.函数内部的特殊对象 arguments对象和this对象
    //6.1 arguments：是一个类数组对象，其用于存储传入该函数的所有参数
    //它有一个属相callee,指向包含该arguments对象的函数对象
    //6.2 函数中的另一个对象this,在函数定义的时候this的指向并不确定，this是动态绑定的，可能在函数
    //的执行过程中，不同时机执行不同的对象

    //7.函数的属性和方法：
    //7.1 length 表示函数期望接收到的命名参数的个数
    console.log(devideNem.length);

    //8.使用严格模式
    window.color = 'red';
    let fun1 = function () {
        //这里的this，指向undefined
        console.log(this.color);
    };
    fun1();
</script>

</body>
</html>
