<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        /*这里是闪烁光标*/
        .cursor.blink {
            width: 1px;
            height: 30px;
            background-color: #000;
            animation: blink 1s infinite steps(1, start);
        }

        /*这里设置动画blink*/
        @keyframes blink {
            0%, 100% {
                background-color: #000;
            }
            50% {
                background-color: #fff; /* not #aaa because it's seem there is Google Chrome bug */
            }
        }
    </style>
</head>
<body>

<div class="cursor blink">
    <div>

</body>
</html>
