<!--
  分类: javascript / 02-函数与作用域
  主题: 作用域链与变量查找
  要点:
    - 函数执行时形成「作用域链」：先找自己变量对象，找不到逐级向外
    - 内层函数能看到外层函数与全局作用域的变量，反之不行
    - debugger 在 DevTools 打开时能命中断点，便于查看 Scope 列表
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作用域链</title>
</head>
<body>
  <script>
    var outerColor = "red"

    function changeColor(){
      var innerColor = "white"

      var tempColor = outerColor;

      console.log(tempColor);

      function changeColorInner(){
          var innerColorChild = "blue"

          console.log(tempColor);

          console.log(innerColorChild);

          console.log(typeof changeColorInner);

          debugger
      }
      changeColorInner();
    }

    changeColor();

    console.log("执行完毕...");

  </script>
