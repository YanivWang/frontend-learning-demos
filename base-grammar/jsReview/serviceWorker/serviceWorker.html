<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    if ("serviceWorker" in navigator) {//使用in符号，可以检查当前对象或者其父对象是否包含此属性
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js', {scope: '/'})
                .then(function (registration) {
                    console.log("注册成功..." + registration.scope);
                }).catch(function (err) {
                console.log("注册失败..." + err);
            })
        })
    }
</script>

</body>
</html>
