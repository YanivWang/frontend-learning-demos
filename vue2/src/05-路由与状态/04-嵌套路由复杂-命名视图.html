<!--
  分类: vue2 / 05-路由与状态
  主题: 嵌套路由 + 命名视图组合（settings 综合页）
  要点:
    - 父路由 /settings 渲染 UserSetting，里面同时放两个 router-view（默认 + helper）
    - 子路由 profile 用 components: { default, helper } 同时填充两个 outlet
    - mode: 'history' 去掉 # 锚点（部署时需要后端兜底，本地直接打开不可用）
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vue-router · 嵌套路由 + 命名视图组合</title>
    <script src="../../libs/vue.js"></script>
    <script src="../../libs/vue-router.js"></script>
</head>
<body>

<div id="app">
    <h1>嵌套路由视图</h1>

    <!--顶级路由视图-->
    <router-view></router-view>
</div>

<script>
    //定义一个组件(实际上只是声明了一个组件选项对象)
    //组件名称采用驼峰式命名法
    //如果直接在dom中使用的话，必须采用a-b(字母全小写，中间用连字符号连接的写法)
    const UserSettingNav = {
        template: `
            <div class="us__nav">
                <router-link to="/settings/emails">emails</router-link>
                <br>
                <router-link to="/settings/profile">profile</router-link>
            </div>
            `
    };

    //在一个组件中使用其它的组件的方式 1.直接使用，在template中使用组件的名称(这个会静态的一致存在)  2.通过嵌套的router-view使用(需要配合指定的导航使用)
    const UserSetting = {
        template: `
            <div class="us">
              <h2>User Settings</h2>
              <UserSettingNav/>
              <router-view class ="us__content"/>
              <router-view name="helper" class="us__content us__content--helper"/>
            </div>
            `,
        components: {//局部声明的组件，要想使用它，需要在本组件的components属性中加入被使用的组件
            UserSettingNav
        }
    };

    const UserEmailsSubscriptions = {
        template: `
        <div>
            <h3>Email Subscriptions</h3>
        </div>
          `
    };

    const UserProfile = {
        template: `
        <div>
            <h3>Edit your profile</h3>
        </div>
          `
    };


    const UserProfilePreview = {
        template: `
        <div>
            <h3>Preview of your profile</h3>
        </div>
          `
    }

    //定义路由的配置选项
    const router = new VueRouter({
        mode: "history",
        routes: [
            {
                path: '/settings',//顶级路由的路径
                component: UserSetting,//顶级组件(页面级别的组件)
                children: [//嵌套视图
                    {
                        path: 'emails',//相对于根路径

                        //注意这里是component 不是components(本例中父组件的嵌套路由视图有两个，但是匹配的路由只有一个，此时会默认选择一个路由视图来渲染匹配的组件)
                        component: UserEmailsSubscriptions
                    },
                    {
                        path: 'profile',
                        components: {//使用命名视图来匹配多个视图组件(匹配的是顶级组件下的嵌套视图)
                            default: UserProfile,
                            helper: UserProfilePreview//一个视图对应一个组件
                        }
                    }
                ]
            }
        ]
    });

    router.push('/settings');

    //创建并挂载 vue 实例
    new Vue({
        router
    }).$mount("#app");

</script>

</body>
</html>
