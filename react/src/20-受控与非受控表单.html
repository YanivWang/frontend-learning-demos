<!--
  分类: react / 表单
  主题: 受控组件与非受控组件
  要点:
    - 受控组件: 表单值由 React state 控制，value + onChange 成对出现
    - 非受控组件: 表单值保存在 DOM 中，通过 ref 在需要时读取
    - 业务表单、校验、联动通常用受控组件；简单一次性读取可用非受控组件
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · 受控与非受控表单</title>
  <script src="../libs/react.development.js"></script>
  <script src="../libs/react-dom.development.js"></script>
  <script src="../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState } = React;

    function App() {
      const [username, setUsername] = useState("");
      const [role, setRole] = useState("user");
      const noteRef = useRef(null);

      function submitForm(event) {
        event.preventDefault();
        alert(JSON.stringify({
          username,
          role,
          note: noteRef.current.value
        }, null, 2));
      }

      return (
        <section>
          <h1>受控与非受控表单</h1>
          <form onSubmit={submitForm}>
            <div>
              <label>
                用户名（受控）:
                <input value={username} onChange={e => setUsername(e.target.value)} />
              </label>
            </div>
            <div>
              <label>
                角色（受控）:
                <select value={role} onChange={e => setRole(e.target.value)}>
                  <option value="user">普通用户</option>
                  <option value="admin">管理员</option>
                </select>
              </label>
            </div>
            <div>
              <label>
                备注（非受控）:
                <input ref={noteRef} defaultValue="DOM 自己保存这个值" />
              </label>
            </div>
            <button type="submit">提交</button>
          </form>
          <p>当前受控值: {username || "空"} / {role}</p>
          <p>面试回答: 受控组件让 React state 成为唯一数据源，更利于校验和联动。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
