<!--
  分类: vue3 / 01-基础语法
  主题: class / style 绑定
  要点:
    - :class 支持字符串、数组、对象
    - :style 支持对象和数组
    - 动态样式适合表达状态，不适合堆复杂业务规则
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · class 与 style 绑定</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { margin-right: 8px; padding: 6px 12px; }
      code { background: #f6f8fa; padding: 2px 5px; border-radius: 6px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 720px; transition: 0.2s ease; margin-bottom: 16px; }
      .panel h2 { margin-top: 0; font-size: 1.05rem; }
      .active { border-color: #1a73e8; background: #eef5ff; }
      .danger { color: #b3261e; }
      .highlight { box-shadow: 0 0 0 2px #1a73e8 inset; }
      .large-text { font-weight: 700; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>class 与 style 绑定</h1>

      <div class="panel">
        <h2>对象写法</h2>
        <div
          class="card"
          :class="{ active: selected, danger: count >= 3 }"
          :style="{ fontSize: fontSize + 'px' }"
        >
          <p>点击次数：{{ count }}</p>
          <p>选中状态：{{ selected }}</p>
          <button @click="selected = !selected">切换选中</button>
          <button @click="count++">次数 +1</button>
          <button @click="fontSize += 2">字号 +2</button>
        </div>
      </div>

      <div class="panel">
        <h2>数组写法</h2>
        <div
          class="card"
          :class="[baseClass, { highlight: useHighlight }]"
          :style="[baseStyle, emphasisStyle]"
        >
          <p>baseClass：{{ baseClass }}，useHighlight：{{ useHighlight }}</p>
          <button @click="useHighlight = !useHighlight">切换 highlight</button>
          <button @click="emphasisStyle.color = emphasisStyle.color ? '' : '#b3261e'">切换强调色</button>
        </div>
      </div>

      <h2>面试回答</h2>
      <ul>
        <li><code>:class</code> 和 <code>:style</code> 都是 <code>v-bind</code> 的常见场景。</li>
        <li>对象写法适合按布尔状态切换 class，数组写法适合组合多个 class 来源。</li>
        <li><code>:style</code> 数组写法可合并多个 style 对象，后者覆盖前者同名属性。</li>
        <li>复杂样式规则应尽量落到 CSS class，模板里只表达状态。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref, reactive } = Vue;

      createApp({
        setup() {
          const selected = ref(false);
          const count = ref(0);
          const fontSize = ref(16);
          const baseClass = ref("large-text");
          const useHighlight = ref(false);
          const baseStyle = reactive({ padding: "4px" });
          const emphasisStyle = reactive({ color: "" });

          return {
            selected, count, fontSize,
            baseClass, useHighlight, baseStyle, emphasisStyle,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
