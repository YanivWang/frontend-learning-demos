<!--
  分类: javascript / 02-函数与作用域 / this指向
  主题: 显式绑定 this：call / apply / bind
  要点:
    - call(thisArg, arg1, arg2, ...)；apply(thisArg, [args])
    - bind 返回一个绑定了 this 的新函数，不会立即执行
    - 易错点：apply 第三个参数会被忽略；apply(null) 严格模式下 this=null，非严格为 window
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>this · call/apply/bind</title>
</head>
<body>

<script>
    var a = {
        user: "wc",
        fn: function (num1, num2) {
            console.log("this: " + this);

            console.log("a的user： " + this.user);

            console.log(num1 + num2);
        }
    };

    //1.just exec a.fn
    a.fn();

    //2.assign to other var
    var b = a.fn;
    b();

    //3.使用call
    b.call(a);

    //4.使用call,传入额外的参数
    b.call(a, 10, 20);

    //5.使用apply,第一个参数是对象，第二个参数必须是数组
    b.apply(a, [100, 200], 400, "wc");

    b.apply(null);

    //使用bind
    let result = b.bind(a);//返回的是一个函数
    console.log("result: " + result);
    result(111, 222);

    console.log("name: " + window.name);

    //使用函数的call 和 apply方法的目的是在指定的作用域中的去调用该函数
    //还要记住一点函数是对象

    let p1 = {
        age: 1,
        name: "wc"
    };

    //让p1和p2都指向对象
    let p2 = p1;

    console.log(JSON.stringify(p1));
    console.log(JSON.stringify(p2));

    p1 = null;

    console.log(JSON.stringify(p1));
    console.log(JSON.stringify(p2));
</script>

</body>
</html>
