<!--
  分类: javascript / 04-ES6+ / 异步 / Promise
  主题: 用 Promise 把图片预加载封装成同步风格
  要点:
    - Image.onload / onerror 是基于事件回调的异步 API，包成 Promise 更易拼接
    - 必须先绑事件再赋 src，避免缓存图片错过 onload
    - 易错点：跨域 / 403 图会触发 onerror，需要 catch 兜底
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise 包装图片预加载</title>
</head>
<body>

<div class="imgDiv"></div>

<script>
    function loadImgSync(url) {
        return new Promise(function (resolve, reject) {
            //可以对图片进行预加载
            const img = new Image();
            img.onload = function () {
                resolve(img);
            };

            img.onerror = function (err) {
                console.log(err);
                reject(new Error("load img fail..."));
            };

            img.src = url;
        })
    }

    var url = "https://www.baidu.com/img/bd_logo1.png?qua=high";
    loadImgSync(url).then(function (img) {
        console.log(img);
        var imgDiv = document.getElementsByClassName("imgDiv");
        imgDiv[0].appendChild(img);
    }).catch(function (error) {
        console.log(error);
    });

</script>
