<!--
  分类: javascript / 01-基础
  主题: URI 编码 API（encodeURI / encodeURIComponent / decode）
  要点:
    - encodeURI：编码整个 URI，保留 : / ? # 等结构字符
    - encodeURIComponent：编码查询参数等片段，会编码 : / ? 等
    - decodeURI / decodeURIComponent：对应解码
    - 与 escape 不同：escape 已废弃，且编码规则不一致
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URI 编码</title>
</head>
<body>

<script>
    const path = "https://example.com/搜索/文档.html";
    const query = "name=王成&city=北京";

    // encodeURI：用于编码完整 URI，不破坏协议与路径分隔符
    const encodedPath = encodeURI(path);
    console.log("encodeURI:", encodedPath);
    console.log("decodeURI:", decodeURI(encodedPath));

    // encodeURIComponent：用于编码 URI 组件（查询串、参数值等）
    const encodedQuery = encodeURIComponent(query);
    console.log("encodeURIComponent:", encodedQuery);
    console.log("decodeURIComponent:", decodeURIComponent(encodedQuery));

    // 拼 URL 时常见写法
    const base = "https://example.com/api";
    const url = `${base}?q=${encodeURIComponent("hello world")}&lang=${encodeURIComponent("中文")}`;
    console.log("拼接 URL:", url);

    // 对比：encodeURI 不会编码 & =，encodeURIComponent 会
    console.log("encodeURI('&='):", encodeURI("&="));
    console.log("encodeURIComponent('&='):", encodeURIComponent("&="));
</script>
