<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Hello React!</title>
    <script src="../jsLibrary/react.development.js"></script>
    <script src="../jsLibrary/react-dom.development.js"></script>
    <script src="../jsLibrary/babel.js"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const arr = [];
    const element = (<div>
        {
            arr.length && (<div>我是京东物流</div>)
        }
        {
            undefined && (<div>我是京东物流</div>)
        }
        {
            null && (<div>我是京东物流</div>)
        }
        {
            false && (<div>我是京东物流</div>)
        }
    </div>)

    ReactDOM.render(
        element,
        document.getElementById('root')
    );
</script>

</body>
</html>
