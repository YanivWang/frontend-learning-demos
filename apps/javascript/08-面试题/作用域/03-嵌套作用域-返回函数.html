<!--
  分类: javascript / 08-面试题 / 作用域
  主题: 嵌套函数 - 返回内层函数引用
  要点:
    - 返回 f 让外部得到一个闭包：依旧记得定义时的 scope = "local"
    - 词法作用域：变量解析按代码书写位置，不随调用位置改变
    - 与上一题对比：返回 f vs 返回 f()，结果都是 'local'
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试题 - 嵌套作用域返回函数</title>
</head>
<body>

<script>
    //题目三
    var scope = "global";

    //作用域链条
    function checkscope() {
        var scope = "local";

        function f() {
            return scope;
        }

        return f;
    }

    console.log(checkscope()());//local
</script>
