<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //1.空Map: 手动添加键值对
      let map = new Map();
      map.set('name', '张三');
      map.set('age', 18);
      console.log(map);

      //2.使用一个二维数组来创建map
      //最常用的带初始值写法
      let map2 = new Map([
        ['name', '李四'],
        ['age', 20],
      ]);
      console.log(map2);

      //3.基于另一个map来创建
      let map3 = new Map(map2);
      console.log(map3);

      //4.Object 常用静态方法
      const person = { name: '王五', age: 22, address: '北京' };

      const values = Object.values(person);
      console.log('values', values); //['王五', 22, '北京']

      const keys = Object.keys(person);
      console.log('keys', keys); //['name', 'age', 'address']

      //Object.entries() 返回一个数组，数组中每个元素都是一个数组，数组中第一个元素是键，第二个元素是值
      //本质就是二维数组
      const entries = Object.entries(person);
      console.log('entries', entries); //[['name', '王五'], ['age', 22], ['address', '北京']]

      const map4 = new Map(entries);
      console.log('map4', map4); //Map(3) {'name' => '王五', 'age' => 22, 'address' => '北京'}

      //对比普通js 对象
      const obj = {};
      console.log('obj.name', obj.name);
      console.log('obj.toString', obj.toString()); //[object Object]

      const dd = obj.toString();

      console.log('obj.hasOwnProperty', obj.hasOwnProperty('name')); //hasOwnProperty 是对象的实例方法
      console.log('obj.constructor', obj.constructor); //ƒ Object() { [native code] }
      console.log('obj.__proto__', obj.__proto__); //指向其构造函数的原型对象
    </script>
  </body>
</html>
