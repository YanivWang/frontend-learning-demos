<!--
  分类: javascript / 06-浏览器API
  主题: Web Components 自定义元素与 Shadow DOM
  难度: 进阶
  要点:
    - customElements.define 注册自定义标签
    - attachShadow 创建样式隔离的 Shadow Root
    - 属性变化可通过 observedAttributes + attributeChangedCallback 响应
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Components</title>
  <style>body { font-family: system-ui, sans-serif; margin: 2rem; }</style>
</head>
<body>
  <h1>Web Components 自定义元素</h1>
  <user-card name="Alice" role="Engineer"></user-card>
  <user-card name="Bob" role="Designer"></user-card>
  <script>
    class UserCard extends HTMLElement {
      static get observedAttributes() { return ["name", "role"]; }
      constructor() {
        super();
        const root = this.attachShadow({ mode: "open" });
        root.innerHTML = `
          <style>
            .card { display:inline-block;margin:.5rem;padding:1rem;border-radius:8px;background:#eef2ff;border:1px solid #c7d2fe;font-family:system-ui,sans-serif; }
            .name { font-weight:700; }
            .role { color:#4338ca;font-size:.875rem; }
          </style>
          <div class="card"><div class="name"></div><div class="role"></div></div>`;
        this._nameEl = root.querySelector(".name");
        this._roleEl = root.querySelector(".role");
      }
      connectedCallback() { this._render(); }
      attributeChangedCallback() { this._render(); }
      _render() {
        this._nameEl.textContent = this.getAttribute("name") || "—";
        this._roleEl.textContent = this.getAttribute("role") || "—";
      }
    }
    customElements.define("user-card", UserCard);
  </script>
