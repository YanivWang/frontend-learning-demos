<!--
  分类: typescript / 03-工程与框架
  主题: tsconfig、strict、noImplicitAny 与常用工程配置
  要点:
    - tsconfig.json 决定 TS 如何检查和输出代码，是项目级 TS 的入口
    - strict 是一组严格检查开关，面试常问为什么建议新项目开启
    - noImplicitAny 禁止隐式 any，避免参数和回调类型悄悄失控
    - 前端项目常配 noEmit 或交给 Vite 构建，类型检查可单独跑 tsc --noEmit
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript · tsconfig strict 配置</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; line-height: 1.6; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 8px; overflow: auto; font-size: 0.86rem; }
    #out { background: #f6f8fa; color: #222; }
  </style>
</head>
<body>
  <h1>tsconfig 与 strict</h1>
  <pre>{
  "compilerOptions": {
    "target": "ES2022",
    "module": "ESNext",
    "moduleResolution": "Bundler",
    "strict": true,
    "noImplicitAny": true,
    "noUncheckedIndexedAccess": true,
    "noEmit": true
  },
  "include": ["src/**/*.ts", "src/**/*.tsx", "src/**/*.vue"]
}</pre>

  <pre id="out"></pre>

  <script>
    const flags = [
      ["strict", "开启一组严格检查"],
      ["noImplicitAny", "参数没有类型时直接报错"],
      ["noUncheckedIndexedAccess", "数组/对象索引读取时提醒可能是 undefined"],
      ["noEmit", "只做类型检查，构建交给 Vite 等工具"],
    ];

    document.getElementById("out").textContent = flags
      .map(([name, desc]) => `${name}: ${desc}`)
      .concat("面试重点：TS 的可靠性很大程度来自 tsconfig，而不只是写几个类型注解。")
      .join("\n");
  </script>
</body>
</html>
