<!--
  分类: demos / virtual-list
  主题: 固定高度虚拟列表
  难度: 进阶
  要点:
    - 只渲染视口可见的行 + 上下 buffer
    - 用 transform 偏移模拟完整列表高度
    - 滚动时根据 scrollTop 计算 startIndex
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟列表 · 固定行高</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    .viewport { height: 320px; overflow: auto; border: 1px solid #ddd; border-radius: 8px; position: relative; }
    .phantom { position: relative; }
    .rows { position: absolute; left: 0; right: 0; top: 0; }
    .row { height: 40px; line-height: 40px; padding: 0 12px; border-bottom: 1px solid #f0f0f0; }
    .row:nth-child(even) { background: #fafafa; }
  </style>
</head>
<body>
  <h1>虚拟列表（固定行高 40px）</h1>
  <p>共 10000 条，DOM 中仅保留可见行。</p>
  <div class="viewport" id="viewport">
    <div class="phantom" id="phantom"><div class="rows" id="rows"></div></div>
  </div>
  <script>
    const TOTAL = 10000;
    const ROW_H = 40;
    const BUFFER = 5;
    const data = Array.from({ length: TOTAL }, (_, i) => `Item #${i + 1}`);
    const viewport = document.getElementById("viewport");
    const phantom = document.getElementById("phantom");
    const rowsEl = document.getElementById("rows");
    phantom.style.height = TOTAL * ROW_H + "px";

    function render() {
      const scrollTop = viewport.scrollTop;
      const viewH = viewport.clientHeight;
      let start = Math.floor(scrollTop / ROW_H) - BUFFER;
      start = Math.max(0, start);
      let end = Math.ceil((scrollTop + viewH) / ROW_H) + BUFFER;
      end = Math.min(TOTAL, end);
      rowsEl.style.transform = `translateY(${start * ROW_H}px)`;
      rowsEl.innerHTML = data.slice(start, end).map((text, i) => `<div class="row">${text}</div>`).join("");
    }
    viewport.addEventListener("scroll", render, { passive: true });
    render();
  </script>
<!-- DEMO_NAV_START -->
