<!--
  分类: react / JSX
  主题: 条件渲染中的「短路求值」陷阱
  要点:
    - {falsyValue && <X/>} 只有当 falsyValue 为 false / null / undefined 时不渲染
    - 反面教材：{arr.length && <X/>} 当 arr.length === 0 时短路返回 0，会被渲染成「0」文本节点
    - 修正建议：{arr.length > 0 && <X/>} 或 {Boolean(arr.length) && <X/>}
  修正:
    - ReactDOM.render 在 React 18 已废弃，统一改为 createRoot(...).render(...)
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>React · JSX 短路渲染陷阱</title>
    <script src="../libs/react18.js"></script>
    <script src="../libs/react-dom18.js"></script>
    <script src="../libs/babel.js"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const arr = [];
    const element = (<div>
        {
            // 反面教材：arr.length 为 0 时，{0 && ...} 整体得 0，React 会把它当文本渲染出来
            arr.length && (<div>我是京东物流</div>)
        }
        {
            undefined && (<div>我是京东物流</div>)
        }
        {
            null && (<div>我是京东物流</div>)
        }
        {
            false && (<div>我是京东物流</div>)
        }

        {/* 推荐写法：用比较运算符把值显式转 boolean，避免 0 被渲染 */}
        { arr.length > 0 && (<div>正确写法：长度大于 0 才渲染</div>) }
    </div>)

    // 修正：React 18 推荐 createRoot 替代 ReactDOM.render
    ReactDOM.createRoot(document.getElementById('root')).render(element);
</script>

</body>
</html>
