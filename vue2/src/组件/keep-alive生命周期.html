<!--
  分类: vue2 / 组件
  主题: keep-alive 与 activated / deactivated
  要点:
    - <keep-alive> 会缓存动态组件实例，切走后不会销毁
    - 被缓存组件重新进入时触发 activated，离开时触发 deactivated
    - 常用于 tab 页、列表详情返回保留滚动位置、表单步骤缓存
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>keep-alive 生命周期</title>
    <script src="../../libs/vue.js"></script>
</head>
<body>

<div id="app">
    <button @click="current = 'TabA'">TabA</button>
    <button @click="current = 'TabB'">TabB</button>

    <keep-alive>
        <component :is="current"></component>
    </keep-alive>

    <pre>{{ logs.join('\n') }}</pre>
</div>

<script>
    const makeTab = function (name) {
        return {
            template: `
                <div style="border:1px solid #ddd;padding:8px;margin-top:8px;">
                    <p>${name} 输入框会被 keep-alive 缓存</p>
                    <input>
                </div>
            `,
            created() {
                this.$root.logs.push(name + " created");
            },
            mounted() {
                this.$root.logs.push(name + " mounted");
            },
            activated() {
                this.$root.logs.push(name + " activated");
            },
            deactivated() {
                this.$root.logs.push(name + " deactivated");
            },
            beforeDestroy() {
                this.$root.logs.push(name + " beforeDestroy");
            }
        };
    };

    Vue.component("TabA", makeTab("TabA"));
    Vue.component("TabB", makeTab("TabB"));

    new Vue({
        el: "#app",
        data() {
            return {
                current: "TabA",
                logs: []
            };
        }
    });
</script>

</body>
</html>
