<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-capable" content="yes">
    <title></title>

    <script type="text/javascript" src="./jquery-3.3.1.min.js"></script>
    <script type="text/javascript" src="./recorder.js"></script>
</head>
<body>

<button onclick="startRecording();">录音</button>
<button onclick="stopRecording();">停止</button>

<audio id="audioSave" controls autoplay></audio>

<script>
    let recorder = null;
    let audio = document.getElementById('audioSave');

    function startRecording() {
        if (recorder != null) {
            recorder.close();
        }
        Recorder.getRecorderManager(function (rec) {
            recorder = rec;
            recorder.start();
        });
    }

    function stopRecording() {
        /*
        recorder.stop(function (tempFilePath) {
            audio.src = tempFilePath;
        });*/

        recorder.stopAndSave(function (savedFilePath) {
            audio.src = recorder.getSavedFileTempFilePath(savedFilePath);
        });
    }
</script>

</body>
</html>
