<!--
  分类: vue3 / 响应式状态
  主题: ref / shallowRef / reactive 三种响应式 API 对比
  要点:
    - ref 返回 { value: ... } 包装；JS 中读写必须 .value，模板中自动解包
    - reactive 返回的是「Proxy 响应式对象」，访问字段无 .value，但解构会丢响应
    - shallowRef 只对 .value 的赋值「整体替换」做响应，内部嵌套字段不再追踪
    - 须从 Vue 解构 reactive；JS 中访问 ref 必须 .value（模板中自动解包）
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · ref / reactive / shallowRef</title>
    <script src="../libs/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="appContent">
        <!-- test ref -->
        <div>======================</div>

        <!-- 模板中 ref 会自动解包，无需写 .value -->
        <div>{{ message }}</div>
        <button @click="changeMsgFn">clickMe</button>
      </div>
    </div>

    <script>
      // 从 Vue 解构 createApp、ref、shallowRef、reactive 等 API
      const { createApp, ref, shallowRef, reactive, computed } = Vue;

      // createApp 函数创建一个新的 应用实例
      const app = createApp(
        // 参数是 “根组件选项对象”(或者 一个App组件)，每个应用都需要一个根组件，其它组件都是其子组件
        {
          setup() {
            //Ref 可以持有任何类型的值，嵌套对象或者数据具有深层响应性
            //非原始值会通过 reactive() 转换为响应式代理
            const objRef = ref({
              form: {
                name: "",
                age: 0,
                address: {}
              },
              array: [1,2,3,4]
            })
            console.log("objRef,", objRef);

            //返回一个带有 .value 属性的 RefImpl 对象
            const message = ref("Hello vue!");

            //创建一个浅层响应式，对 .value 的访问是响应式的
            const shallowObjRef = shallowRef({
              form: {
                name: "",
                age: 0,
                address: {}
              },
              array: [1,2,3,4]
            })
            console.log("shallowObjRef,", shallowObjRef);

            //使用 reactive 创建响应式对象
            const reactiveObj = reactive({
              form: {
                name: "",
                age: 0,
                address: {}
              },
              array: [1,2,3,4]
            })
            console.log("shallowObjRef,", shallowObjRef);


            // JS 代码中访问 ref 必须带 .value（模板中自动解包，无需 .value）
            const changeMsgFn = () => {
              message.value = "I am change to HI vue!";

              console.log("message,", message);
            };
            
            //setup 钩子中通过 return 语句，将响应式变量或事件处理函数暴露给组件模板
            return {
              message,

              changeMsgFn,
            };
          },
          //当组件没有设置 template 选项的时候，Vue 将自动使用容器的 innerHTML 作为模板
          // template: `<div class="appContentTemplate">1111</div>`
        }
      );

      //挂载应用到指定的dom节点
      app.mount("#app")
    </script>
  </body>
</html>
