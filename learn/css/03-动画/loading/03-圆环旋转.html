<!--
  分类: css / 03-动画 / loading
  主题: lds-ring 圆环旋转 loading
  要点:
    - 通过四个同心圆环 + 不同 animation-delay 形成「追逐」效果
    - border-color: c transparent transparent transparent 只保留顶部一段，旋转后看似一条弧
    - cubic-bezier(0.5,0,0.5,1) 是定制的缓动曲线
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loading - lds-ring 圆环</title>

    <style>
        .lds-ring {
            display: inline-block;
            position: relative;
            width: 64px;
            height: 64px;
        }

        .lds-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 51px;
            height: 51px;
            margin: 6px;
            border: 2px solid #FF6A00 ;
            border-radius: 50%;
            animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #FF6A00  transparent transparent transparent;
        }

        .lds-ring div:nth-child(1) {
            animation-delay: -0.45s;
        }

        .lds-ring div:nth-child(2) {
            animation-delay: -0.3s;
        }

        .lds-ring div:nth-child(3) {
            animation-delay: -0.15s;
        }

        @keyframes lds-ring {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

    </style>

</head>
<body>

<div class="lds-ring">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</div>
