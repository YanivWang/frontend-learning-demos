<!--
  分类: react19 / 01-基础语法
  主题: ref 作为 prop 传递（React 19）
  要点:
    - React 19 中函数组件可直接接收名为 ref 的 prop，无需 forwardRef 包裹
    - 父组件 useRef() 后把 ref 传给子组件，子组件绑定到原生 DOM
    - 类组件、第三方库迁移可逐步去掉 forwardRef 样板代码
    - 命令式 API 仍推荐优先声明式；ref 用于聚焦、滚动、测量等
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 19 · ref 作为 prop</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 640px; line-height: 1.6; }
    label { display: block; margin: 0.75rem 0; }
    input { padding: 0.45rem 0.6rem; width: 80%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useRef } = React;

    function TextField({ ref, label, placeholder }) {
      return (
        <label>
          {label}
          <input ref={ref} placeholder={placeholder} />
        </label>
      );
    }

    function App() {
      const nameRef = useRef(null);
      const emailRef = useRef(null);

      return (
        <section>
          <h2>ref 直接作为 prop（无 forwardRef）</h2>
          <TextField ref={nameRef} label="姓名" placeholder="focus 我" />
          <TextField ref={emailRef} label="邮箱" placeholder="user@example.com" />
          <button
            type="button"
            onClick={() => nameRef.current?.focus()}
          >
            聚焦姓名框
          </button>
          <button
            type="button"
            onClick={() => {
              emailRef.current?.select();
            }}
          >
            选中邮箱全文
          </button>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
