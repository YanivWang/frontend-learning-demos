<!--
  分类: javascript / 01-基础
  主题: 字符串方法大全（截取 / 拼接 / 替换 / 编码）
  要点:
    - substr(start,len) 已废弃；推荐 slice(start,end)，支持负数
    - substring 把负数视为 0，且 start > end 时自动交换，易踩坑
    - 原始字符串 vs new String() 包装对象：typeof 不同，=== 失败
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>字符串截取 · substr / slice / substring</title>
</head>
<body>
  <pre id="demo-output" class="demo-output" aria-live="polite"></pre>
  <h1>字符串截取三兄弟 + 常用方法</h1>
  <p>三者都不会修改原字符串，但参数语义差异很大，是高频面试坑点。</p>
    <script src="../../../packages/shared/demo-log.js"></script>
<script>
    const str = "abcdefg";

    // ============ 1. substr(start, length)：从 start 开始截取 length 个 ============
    //   ⚠️ 已被废弃，但还能用。负数 start 从末尾计；length < 0 当 0 处理
    console.log("substr(3,2):", str.substr(3, 2));    // 'de'
    console.log("substr(-1,2):", str.substr(-1, 2));  // 'g'
    console.log("substr(-2,2):", str.substr(-2, 2));  // 'fg'
    console.log("substr(-3,2):", str.substr(-3, 2));  // 'ef'
    console.log("substr(3,0):", str.substr(3, 0));    // ''
    console.log("substr(3,-1):", str.substr(3, -1));  // ''

    // ============ 2. slice(start, end)：[start, end)，支持负数 ============
    console.log("slice(3,5):", str.slice(3, 5));    // 'de'
    console.log("slice(-3,-1):", str.slice(-3, -1));// 'ef'
    console.log("slice(5,3):", str.slice(5, 3));    // '' —— end < start 直接空

    // ============ 3. substring(start, end)：[start, end)，但有"两个反常行为" ============
    //   ① 任何负数都当作 0
    //   ② start > end 时会自动交换
    console.log("substring(3,5):", str.substring(3, 5));   // 'de'
    console.log("substring(5,3):", str.substring(5, 3));   // 'de' —— 自动交换
    console.log("substring(-5,2):", str.substring(-5, 2)); // 'ab' —— -5 → 0

    // ============ 4. 其他常用方法 ============
    console.log("concat:", "abc".concat("def"));            // 'abcdef'
    console.log("repeat:", "ab".repeat(3));                 // 'ababab'
    console.log("trim:", "  hi  ".trim());                  // 'hi'
    console.log("trimStart:", "  hi  ".trimStart());        // 'hi  '
    console.log("padStart:", "5".padStart(3, "0"));         // '005'
    console.log("includes:", "abcdef".includes("cd"));      // true
    console.log("startsWith:", "abcdef".startsWith("abc")); // true
    console.log("at(-1):", "abcdef".at(-1));                // 'f'

    // ============ 5. 类数组访问 vs charAt ============
    console.log("str[2]:", str[2]);          // 'c'
    console.log("str.charAt(2):", str.charAt(2)); // 'c'
    console.log("str[100]:", str[100]);      // undefined
    console.log("str.charAt(100):", str.charAt(100)); // '' —— 越界返回空串

    // ============ 6. 字符编码 ============
    console.log("charCodeAt:", "A".charCodeAt(0)); // 65
    console.log("fromCharCode:", String.fromCharCode(65)); // 'A'
    console.log("codePointAt:", "😀".codePointAt(0)); // 128512 —— 支持 emoji / 4 字节字符

    // ============ 7. 排序：localeCompare 处理中英文混合 ============
    const arr = ["bd", "ab", "c", "aa", "be", "bf"];
    arr.sort((a, b) =>
      a.length === b.length ? a.localeCompare(b) : a.length - b.length
    );
    console.log("混合排序:", arr.toString());

    // ============ 8. 字符串原始值 vs new String() 包装对象 ============
    //   原始值 (primitive) 和包装对象不是同一种东西，==/=== 表现不同
    const str1 = "123qwe";              // 原始值
    const str2 = new String("123qwe");  // 包装对象
    console.log("typeof str1:", typeof str1); // 'string'
    console.log("typeof str2:", typeof str2); // 'object'
    console.log("str1 == str2 :", str1 == str2);  // true   —— 值相等（自动拆箱）
    console.log("str1 === str2:", str1 === str2); // false  —— 类型不同
    console.log("str1.constructor:", str1.constructor); // ƒ String() —— 临时包装
    console.log("str2.constructor:", str2.constructor); // ƒ String()
    // 👉 实践中几乎不用 new String()，因为它带来的全是麻烦（typeof 不对、严格相等不通过）

    // ============ 9. sort + Math.random 随机打乱 ============
    //   ⚠️ 不是均匀分布的"洗牌"，仅用于不严格场景；要均匀分布请用 Fisher-Yates
    const dice = [3, 7, 9, 8, 4];
    dice.sort(() => Math.random() - 0.5);
    console.log("随机打乱:", dice);

    // 严格做法：Fisher-Yates shuffle
    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    console.log("Fisher-Yates:", shuffle([1, 2, 3, 4, 5]));

    // ============ 10. replace / match / search 与正则联用 ============
    const text = "123A456A789A";

    // replace：默认只替换第一个；加 /g 全部替换
    console.log("replace 单个:", text.replace(/A/, "B"));   // '123B456A789A'
    console.log("replace 全局:", text.replace(/A/g, "B"));  // '123B456B789B'

    // 用回调函数动态替换（参数：匹配文本、捕获组... 、位置、原串）
    console.log("replace 回调:", text.replace(/(\d+)A/g, (_, n) => `[${n}]`));
    // '[123][456][789]'

    // match：返回所有匹配数组（带 /g）
    console.log("match .A.:", text.match(/.A./g)); // ['3A4', '6A7', '9A'] —— 注意贪婪和重叠

    // search：返回第一个匹配的下标，找不到返回 -1
    console.log("search A:", text.search(/A/));   // 3
    console.log("search Z:", text.search(/Z/));   // -1
    // 👉 indexOf 不能用正则，只能字符串；search 可以用正则
  </script>
