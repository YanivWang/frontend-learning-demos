<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //使用构造函数的方式：创建对象，构造函数是作用域安全的，其内部的this
    //永远指向新创建的对象本身
    function Person(name, age) {
        //使用this，定义构造函数的实例属性和方法
        this.name = name;
        this.age = age;
    }

    var p1 = new Person("a", 18);
    p1.weight = 30;
    //p1.prototype.salary = 40;//Cannot set property 'salary' of undefined
    //对象没有prototype属性

    //构造函数通过prototype来定义构造函数的，原型属性和方法
    Person.prototype.salary = 40;//prototype 是函数的一个属性，并且是函数的原型对象，引用它的必须是函数本身
    console.log(p1);

    //对象是没有prototype属性的
    console.log(p1.prototype);

    var a = p1.__proto__;//__proto__是每个对象拥有的属性，是一个指针，指向构造该对象的函数的原型对象
    //因此保证了实例，可以访问，在构造函数原型中定义的属性和方法
    //一个对象，通过其内部属性__proto__跟踪其原型对象

    //使用原型对象的好处是，可以让所有的对象实例，都包含原型对象的属性和方法

    var q1 = Object.getPrototypeOf(a);
    var q2 = a.__proto__;
    console.log(q1 === q2);
    console.log(a);

    var p2 = new Person("a", 18);
    p2.weight = 30;
    console.log(p2);

    //测试对象的原型对象
    console.log("测试原型对象的数据...");
    var person = new Person("wc", 20);
    var proto1 = person.__proto__;
    var proto2 = Object.getPrototypeOf(person);//使用Object的getPrototypeOf(xxx)，方法，来获取对象的原型

    console.log(proto1 === proto2);
</script>

</body>
</html>
