<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        body {
            margin: 0;
        }

        canvas {
            width: 100%;
            height: 100%
        }
    </style>
</head>
<body>
<script src="../lib/three.js"></script>
<script>
    //1.get scene
    var scene = new THREE.Scene();

    //2.get camera(移动相机的位置，默认情况下相机的位置在(0,0,0))
    var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    camera.position.set(0, 0, 5);

    //3.get renderer
    var renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    //4.draw object
    //4.1创建一个立方体对象，该对象中包含了一个立方体的所有的点和面
    var geometry = new THREE.BoxGeometry(1, 1, 1);
    //4.2创建一个材质对象，所有的材质都是一个将会被应用到立方体每个属性上对象，材质其实就是css style
    var material = new THREE.MeshBasicMaterial({color: 0x00ff00});
    //4.3创建一个网格对象，将几何体对象和应用到该几何体对象上的材质，结合到一起
    var cube = new THREE.Mesh(geometry, material);

    //5.将网格对象添加到scene中，默认情况下，物体会被添加小(0,0,0)的位置
    scene.add(cube);

    //6.渲染动画
    function animate() {
        requestAnimationFrame(animate);

        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;

        renderer.render(scene, camera);
    }

    animate();
</script>

</body>
</html>
