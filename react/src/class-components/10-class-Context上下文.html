<!--
  分类: react / class 组件
  主题: class 组件消费 Context
  要点:
    - static contextType = MyContext 后，this.context 读取最近 Provider 的 value
    - 也可使用 MyContext.Consumer 渲染 props 函数
    - Context 适合主题、语言等跨层共享；value 变化会触发所有消费组件 re-render
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · class Context</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const ThemeContext = React.createContext(null);

    class Toolbar extends React.Component {
      render() {
        return <ThemedButton />;
      }
    }

    class ThemedButton extends React.Component {
      static contextType = ThemeContext;

      render() {
        const theme = this.context;
        return (
          <button style={{ background: theme.background, color: theme.color }}>
            contextType 读取: {theme.name}
          </button>
        );
      }
    }

    class ThemedLabel extends React.Component {
      render() {
        return (
          <ThemeContext.Consumer>
            {(theme) => <span style={{ color: theme.color }}>Consumer 读取: {theme.name}</span>}
          </ThemeContext.Consumer>
        );
      }
    }

    class App extends React.Component {
      constructor(props) {
        super(props);
        this.state = { dark: false };
      }

      toggle = () => {
        this.setState({ dark: !this.state.dark });
      };

      render() {
        const theme = this.state.dark
          ? { name: "dark", background: "#222", color: "#fff" }
          : { name: "light", background: "#fff", color: "#222" };

        return (
          <ThemeContext.Provider value={theme}>
            <section>
              <h1>class 组件 Context</h1>
              <button onClick={this.toggle}>切换主题</button>
              <div style={{ marginTop: 12 }}>
                <Toolbar />
                {" · "}
                <ThemedLabel />
              </div>
              <p>面试回答: class 用 contextType 或 Consumer；函数组件用 useContext。</p>
            </section>
          </ThemeContext.Provider>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
