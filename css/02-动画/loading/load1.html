<!--
  分类: css / 02-动画 / loading
  主题: 5 条竖条横向并排呼吸 loading
  要点:
    - 每条竖条通过 animation-delay 错峰执行 loadAni
    - keyframes 中同时改 background-color + height + margin 形成「呼吸跳动」
    - from/to 是 0%/100% 的简写；多关键帧需用 0%/50%/100%
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <title>CSS Loading 动画 · 1（竖条呼吸）</title>

    <style>
        .loading {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #ddd;
        }

        .loading .loadWrap {
            position: relative;
            height: 70px;
            width: 100px;
            justify-content: space-around;
            align-items: center;
            display: flex;
        }

        .loading .loadWrap > div {
            width: 10px;
            background-color: #ddd;
            border-radius: 10px;
            height: 100%;
            animation: loadAni 1s infinite;
        }

        .loading .loadWrap > div.loadBtn2 {
            animation-delay: 0.2s;
        }

        .loading .loadWrap > div.loadBtn3 {
            animation-delay: 0.4s;
        }

        .loading .loadWrap > div.loadBtn4 {
            animation-delay: 0.6s;
        }

        .loading .loadWrap > div.loadBtn5 {
            animation-delay: 0.8s;
        }


        @keyframes loadAni {
            from {
                background-color: lightgreen;
                height: 40px;
            }

            to {
                background-color: lightblue;
                margin: -15px 0;
                height: 70px;
            }
        }
    </style>
</head>
<body>

<div class="loading">
    <div class="loadWrap">
        <div class="loadBtn1"></div>
        <div class="loadBtn2"></div>
        <div class="loadBtn3"></div>
        <div class="loadBtn4"></div>
        <div class="loadBtn5"></div>
    </div>
</div>


</body>
</html>
