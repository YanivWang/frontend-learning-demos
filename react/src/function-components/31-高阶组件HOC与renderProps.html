<!--
  分类: react / 函数组件
  主题: 高阶组件 HOC 与 render props
  要点:
    - HOC: 函数接收组件，返回增强后的新组件，不修改原组件
    - render props: 组件接收函数 prop，由父决定渲染什么
    - Hooks 时代很多 HOC/render props 场景可用自定义 Hook 替代
    - 对比 class 23：函数组件同样可写 HOC，但面试常问与 Hook 的取舍
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · HOC 与 render props</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function withLoading(WrappedComponent) {
      function WithLoading({ loading, ...rest }) {
        if (loading) return <p>加载中...</p>;
        return <WrappedComponent {...rest} />;
      }
      WithLoading.displayName = `WithLoading(${WrappedComponent.displayName || WrappedComponent.name || "Component"})`;
      return WithLoading;
    }

    function MouseTracker({ render }) {
      const [pos, setPos] = useState({ x: 0, y: 0 });

      useEffect(() => {
        function move(e) {
          setPos({ x: e.clientX, y: e.clientY });
        }
        window.addEventListener("mousemove", move);
        return () => window.removeEventListener("mousemove", move);
      }, []);

      return render(pos);
    }

    function useMousePosition() {
      const [pos, setPos] = useState({ x: 0, y: 0 });
      useEffect(() => {
        function move(e) {
          setPos({ x: e.clientX, y: e.clientY });
        }
        window.addEventListener("mousemove", move);
        return () => window.removeEventListener("mousemove", move);
      }, []);
      return pos;
    }

    function UserProfile({ user }) {
      return (
        <div>
          <strong>{user.name}</strong>
          <span> — {user.email}</span>
        </div>
      );
    }

    const EnhancedProfile = withLoading(UserProfile);

    function App() {
      const [loading, setLoading] = useState(true);
      const [user, setUser] = useState(null);
      const hookPos = useMousePosition();

      useEffect(() => {
        const timer = setTimeout(() => {
          setLoading(false);
          setUser({ name: "Alice", email: "alice@example.com" });
        }, 1200);
        return () => clearTimeout(timer);
      }, []);

      return (
        <section>
          <h1>HOC 与 render props</h1>
          <EnhancedProfile loading={loading} user={user} />
          <MouseTracker render={(pos) => (
            <p>render props 鼠标: x={pos.x}, y={pos.y}</p>
          )} />
          <p>自定义 Hook 鼠标: x={hookPos.x}, y={hookPos.y}</p>
          <p>面试回答: HOC/render props 是逻辑复用模式；新代码优先自定义 Hook，但需理解 HOC 原理。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
