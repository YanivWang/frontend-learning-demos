<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 引入 react 和 react-dom，这两个是react核心包 -->
    <script src="./jsLibrary/react18.js"></script>
    <script src="./jsLibrary/react-dom18.js"></script>

    <script src="./jsLibrary/babel.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const domContainer = document.getElementById("root");
      const appRoot = ReactDOM.createRoot(domContainer);

      function timer() {
        const dd = Math.random();

        //由于react元素是不可变的，要想更新界面，就的不断创建新的react元素，然后将其传递给
        //ReactDOM.render方法，重新调用该方法，来更新界面
        const element = (
          <h1 className="greeting">
            <div>我是header</div>
            <div> Hello, world! + {dd}</div>
            <div>{Date.now()}</div>
            <div>我是fotter</div>
          </h1>
        );
        
        //第一调用render方法，react会根据当前的state和props以及jsx模版，生成虚拟dom
        //第二次调用render方法，会根据当前的state和props以及jsx模版，生成新的虚拟dom
        //使用diff算法，比对新旧虚拟dom，找出最小变更集，然后一次性将变更更新到dom节点上
        appRoot.render(element);
      }

      setInterval(() => {
        timer();
      }, 1000);
    </script>
  </body>
</html>
