<!--
  分类: typescript / 01-基础
  主题: enum、const enum 与对象枚举
  要点:
    - enum 会生成运行时代码，数字 enum 还会生成反向映射
    - const enum 通常会在编译期内联，但受 isolatedModules 等配置限制
    - 前端项目更常用 as const 对象枚举，运行时直观且 tree-shaking 友好
    - 面试常问 enum 和联合字面量 / 对象枚举如何取舍
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript · enum 与对象枚举</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 820px; line-height: 1.6; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 8px; overflow: auto; font-size: 0.86rem; }
    #out { background: #f6f8fa; color: #222; }
  </style>
</head>
<body>
  <h1>enum 与对象枚举</h1>
  <pre>enum OrderStatus {
  Pending = "pending",
  Paid = "paid",
  Canceled = "canceled",
}

const enum Direction {
  Up,
  Down,
}

const UserRole = {
  Admin: "admin",
  Guest: "guest",
} as const;
type UserRole = typeof UserRole[keyof typeof UserRole];</pre>

  <pre id="out"></pre>

  <script>
    const OrderStatus = Object.freeze({
      Pending: "pending",
      Paid: "paid",
      Canceled: "canceled",
    });
    const UserRole = Object.freeze({
      Admin: "admin",
      Guest: "guest",
    });

    function canEdit(role) {
      return role === UserRole.Admin;
    }

    document.getElementById("out").textContent = [
      `字符串 enum 运行时值: ${OrderStatus.Paid}`,
      `对象枚举 UserRole.Admin: ${UserRole.Admin}`,
      `canEdit("guest") = ${canEdit(UserRole.Guest)}`,
      "面试重点：需要运行时对象时可用 enum；现代前端配置常用 as const 对象枚举 + 联合类型。",
    ].join("\n");
  </script>
</body>
</html>
