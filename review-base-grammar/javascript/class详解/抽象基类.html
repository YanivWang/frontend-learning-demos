<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      class Animal {
        constructor() {
          console.log(new.target === Animal);
          if(new.target === Animal){  
            throw Error("Animal类是抽象基类，不能被实例化")
          }

          console.log("this>>>", this);//Dog {}
        }
      }

      // const a1 = new Animal();

      class Dog extends Animal {
        //子类如果有显式声明一个constructor函数，在必须在该函数内部调用super()，就是调用父类构造函数
        constructor(name) {
          const dd = super();
          console.log("dd", dd);//Dog {}
          this.name = name;
        }
      }

      const d1 = new Dog();
    </script>
  </body>
</html>
