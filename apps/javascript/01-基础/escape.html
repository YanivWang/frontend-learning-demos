<!--
  分类: javascript / 01-基础
  主题: 字符串中反斜杠转义与 JSON 序列化
  要点:
    - JSON 字符串里的特殊字符需要被反斜杠转义；解析后会还原为单层字符
    - JSON.stringify 后再次序列化或写入到 HTML/属性中，需要再次转义反斜杠
    - 给 String.prototype 加方法会污染原型，仅作演示，正式项目慎用
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>转义字符与 JSON</title>
  <style>.hint { color: #666; font-size: 0.9rem; margin: 0.5rem 0 1rem; }</style>
</head>
<body>
  <h1>字符串中反斜杠转义与 JSON 序列化</h1>
  <p class="hint">下方为 <code>console.log</code> 同步输出；也可打开 DevTools Console 查看。</p>
  <pre id="demo-output" class="demo-output" aria-live="polite"></pre>

  <script src="../../../packages/shared/demo-log.js"></script>
<script>
    // 给原型加方法仅作演示，实际生产应避免污染原生原型
    String.prototype.escapeSpecialChars = function() {
        return this.replace(/\\n/g, "\\n")
            .replace(/\\'/g, "\\'")
            .replace(/\\"/g, '\\"')
            .replace(/\\&/g, "\\&")
            .replace(/\\r/g, "\\r")
            .replace(/\\t/g, "\\t")
            .replace(/\\b/g, "\\b")
            .replace(/\\f/g, "\\f");
    };

    let str = '{"hotRankNum":3,"index":1,"cgIndex":1,"pId":"67ac6749-4e44-4bb4-a81d-3f473e847948","title":"I feel like I just saw something I shouldn\'t have","type":"linkType","content":"<div><span class=\\"iconfont icon-link\\"></span><a href=\\"https://www.reddit.com\\">www.reddit.com</a></div>","cgName":"jp","upNum":2,"commentNum":1,"timeStamp":1570600685329,"uId":"uid1001","uName":"wangcheng","downNum":0}';
    console.log("str:" + str);

    let a = JSON.parse(str);
    console.log(a);

    let str2 = JSON.stringify(a);
    console.log("str2:" + str2);

    // 演示二次转义：当结果还要嵌入到另一段 JSON 字符串时，需要把 \" 再变成 \\\"
    let str3 = JSON.stringify(a);
    let reg = /\\"/g;
    if (reg.test(str3)) {
        str3 = str3.replace(reg, '\\\\"');
    }
    console.log("str3:" + str3);
</script>
