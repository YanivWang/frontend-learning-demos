<!--
  分类: css / 01-基础
  主题: 选择器种类与优先级（specificity）
  要点:
    - 优先级权重：内联 1000 / #id 0100 / .class·[attr]·:pseudo 0010 / tag·::ele 0001 / * 0000
    - !important 凌驾所有权重；同权重时「后写覆盖先写」
    - 属性选择器 ^= $= *= ~= |= 五种匹配方式各有用途
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS 选择器 · 优先级</title>
  <style>
    /* ============================================
       CSS 选择器优先级（specificity）：
         内联 style="..."                          → 1000
         #id                                       → 0100
         .class / [attr] / :hover / :nth-child(2)  → 0010
         tag / 伪元素 ::before                      → 0001
         *  >  +  ~                                → 0000
         !important 凌驾一切
       同权重时：后写覆盖先写
    ============================================ */

    /* ① id 选择器 → 权重 0100 */
    #box { width: 200px; }

    /* ② 类选择器 → 权重 0010；!important 直接置顶 */
    .box {
      width: 100px;
      height: 100px;
      margin: 24px auto;
      background-color: yellow !important;
    }

    /* ③ 伪类：hover/focus/active 等 */
    .box:hover { cursor: pointer; outline: 2px solid #0969da; }

    /* ④ 属性选择器 —— 见 demo 区注释 */
    a[href]            { color: green; }                    /* 有 href 即生效 */
    a[href="https://www.baidu.com"] { font-weight: 700; }   /* 等值 */
    a[href*="baidu"]   { font-style: italic; }              /* 包含 */
    a[href^="https"]   { text-decoration: underline; }      /* 开头 */
    a[href$=".com"]    { color: purple; }                   /* 结尾 */
    p[class~="important"] { color: red; }                    /* 空格分隔的 class 词列表 */
    a[lang|="zh"]      { background: #efe; }                /* zh 或 zh- 开头 */

    /* ⑤ 通配符 → 权重 0 */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ⑥ 结构性伪类示例 */
    li:first-child { color: tomato; }
    li:nth-child(2n) { background: #f8f8f8; }

    body { font-family: system-ui, sans-serif; padding: 1.5rem; }
  </style>
</head>
<body>
  <h1>选择器优先级与种类一览</h1>

  <!-- 内联 style 是 1000 权重，但 .box 用了 !important 仍然能盖过它 -->
  <div id="box" class="box" style="background-color: red;">box</div>

  <a href="https://www.baidu.com">百度（href + 等值 + 包含 + ^ + $）</a><br/>
  <a href="https://www.example.org" lang="zh-CN">example.org（前缀 lang）</a>

  <p class="important value">这段有 class 包含 important —— 红色</p>

  <ul>
    <li>第一项（tomato）</li>
    <li>第二项（偶数行背景）</li>
    <li>第三项</li>
    <li>第四项（偶数行背景）</li>
  </ul>

  <p style="color:#666;margin-top:1rem;">
    经验总结：<br/>
    1) 越精确权重越高；<br/>
    2) 同权重时后写覆盖先写；<br/>
    3) <code>!important</code> 慎用，调试地狱；<br/>
    4) 想覆盖第三方样式时优先考虑提高选择器权重，而非滥用 <code>!important</code>。
  </p>
