<!--
  分类: react / 原理
  主题: 虚拟 DOM、Fiber 与 React 18 自动批处理
  要点:
    - 虚拟 DOM 是描述 UI 的普通 JS 对象，React 用它计算真实 DOM 更新
    - Fiber 是 React 的内部节点结构，让渲染工作可拆分、可中断、可恢复
    - React 18 createRoot 下，事件、定时器、Promise 等异步回调中的状态更新也会自动批处理
    - 面试不必手写 Fiber，但要能说清楚它解决了大更新阻塞主线程的问题
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · 虚拟 DOM Fiber 批处理</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    function App() {
      const [a, setA] = useState(0);
      const [b, setB] = useState(0);
      const renderCount = useRef(0);
      renderCount.current += 1;

      useEffect(() => {
        console.log("render 次数:", renderCount.current, "a:", a, "b:", b);
      });

      function updateInTimeout() {
        setTimeout(() => {
          // React 18 createRoot 下，这两次更新会自动批处理成一次渲染。
          setA(value => value + 1);
          setB(value => value + 1);
        }, 500);
      }

      const virtualElement = React.createElement("h2", { className: "title" }, "虚拟 DOM 是普通对象");

      return (
        <section>
          <h1>虚拟 DOM、Fiber 与批处理</h1>
          {virtualElement}
          <p>a: {a} / b: {b}</p>
          <p>renderCount: {renderCount.current}</p>
          <button onClick={updateInTimeout}>定时器中同时更新 a 和 b</button>
          <p>面试回答: 虚拟 DOM 负责描述和 diff，Fiber 负责把渲染工作拆成可调度单元，批处理减少重复渲染。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
