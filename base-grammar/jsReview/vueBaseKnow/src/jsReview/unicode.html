    console.log(str16);

    let reg1 = /[\u3002|\uff1f|\uff01|\uff0c|\u3001|\uff1b|\uff1a|\u201c|\u201d|\u2018|\u2019|\uff08|\uff09|\u300a|\u300b|\u3008|\u3009|\u3010|\u3011|\u300e|\u300f|\u300c|\u300d|\ufe43|\ufe44|\u3014|\u3015|\u2026|\u2014|\uff5e|\ufe4f|\uffe5]$/g;
    let reg2 = /[\~|\`|\!|\@|\#|\$|\%|\^|\&|\*|\(|\)|\-|\_|\+|\=|\||\\|\[|\]|\{|\}|\;|\:|\"|\'|\,|\<|\.|\>|\/|\?]$/g;
    let reg3 = /[\¡|\¿|\!|\!!!|\《|\》|́ ]/g;

    //一.unicode 字符转字符串
    //1.1
    let str = "\u4e2d\u56fd";
    // str = "12345";
    str = "\u4e2d";

    let res1 = eval(str);
    console.log("res1: " + res1);

    //1.2
    let res2 = unescape(str.replace(/＼u/g, "%u"));
    console.log("res2: " + res2);

    //二.字符串转 unicode
    function charToUnicode(str) {
        let temp;
        let i = 0;
        let r = '';
        for (let val of str) {
            temp = val.codePointAt(0).toString(16);
            while (temp.length < 4)
                temp = '0' + temp;
            r += '\\u' + temp;
        }
        return r;
    }

    let a = charToUnicode(" ");
    console.log("a: " + a);

    //三.for 循环
    //1.for in 用于遍历对象，会遍历对象的所有的可枚举属性，以及原型属性和方法，如果不想遍历
    //原型属性，可以使用 hasOwnProperty

    Object.prototype.printPerson = function () {
        console.log(this);
    };
    Object.prototype.methodName = "printPerson";

    function createPerson(name, age) {
        let person = {};
        person.name = name;
        person.age = age;

        return person;
    }

    let person = createPerson("wc", 23);
    console.log("person:\n" + person);

    //hasOwnProperty 判断某属性是否该对象的实例属性
    for (let key in person) {
        if (person.hasOwnProperty(key)) {//判断当前对象person是否自己拥有该属性，而不是继承过来的
            console.log(key);
            console.log(person[key]);
        }
    }
    let keysArray = Object.keys(person);//该方法获取对象的实例属性的名称组成的数组，不包含原型属性和方法
    console.log("keysArray: " + keysArray);

    //2.for of 用于遍历数组(还有传统的for循环)
    console.log("for of 用于遍历数组");
    let array = ["b", "a", "e", "d"];
    for (let value of array) {
        console.log("value: " + value);
    }
</script>
