<!--
  分类: vue2 / 03-生命周期
  主题: Vue2 八个生命周期钩子速记
  要点:
    - 创建：beforeCreate → created（data / methods 已就绪）
    - 挂载：beforeMount → mounted（mounted 后可访问真实 DOM）
    - 更新 / 销毁：beforeUpdate / updated / beforeDestroy / destroyed
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue2 生命周期钩子速记</title>
    <script src="../../libs/vue.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; }
        pre { background: #f5f5f5; padding: 12px; max-height: 360px; overflow: auto; }
        button { margin-right: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div id="app">
    <p>msg: {{ msg }}（count: {{ count }}）</p>
    <button @click="count++">触发更新（beforeUpdate / updated）</button>
    <button @click="destroyVm">销毁实例（beforeDestroy / destroyed）</button>
    <h3>钩子执行顺序（最新在上）：</h3>
    <pre>{{ logs.join('\n') }}</pre>
</div>

<script>
    /*
    * beforeCreate：在 new 一个 vue 实例后，只有一些默认的生命周期钩子和默认事件，data 和 methods 都还没有初始化
    * created：data 和 methods 都已经被初始化好了；若要调用 methods 或操作 data，最早可以在这个阶段进行
    * beforeMount：执行到这个钩子的时候，在内存中已经编译好了模板，但是还没有挂载到页面中，此时页面还是旧的
    * mounted：执行到这个钩子的时候，就表示 Vue 实例已经初始化完成了。此时组件脱离了创建阶段，进入到了运行阶段。
      如果我们想要通过插件操作页面上的 DOM 节点，最早可以在和这个阶段中进行
    * beforeUpdate：当执行这个钩子时，页面中显示的数据还是旧的，data 中的数据是更新后的，页面还没有和最新的数据保持同步
    * updated：页面显示的数据和 data 中的数据已经保持同步了，都是最新的
    * beforeDestroy：Vue 实例从运行阶段进入到了销毁阶段，此时所有的 data 和 methods、指令、过滤器……都处于可用状态，还没有真正被销毁
    * destroyed：此时所有的 data 和 methods、指令、过滤器……都处于不可用状态，组件已经被销毁了
    * */

    var vm = new Vue({
        el: '#app',
        data: {
            msg: '生命周期演示',
            count: 0,
            logs: []
        },
        beforeCreate: function () {
            this._pushLog('beforeCreate — data/methods 尚未初始化，this.msg = ' + this.msg);
        },
        created: function () {
            this._pushLog('created — data/methods 已就绪，this.msg = ' + this.msg);
        },
        beforeMount: function () {
            this._pushLog('beforeMount — 模板已编译，尚未挂载到 DOM');
        },
        mounted: function () {
            this._pushLog('mounted — 已挂载，$el = ' + this.$el.tagName);
        },
        beforeUpdate: function () {
            this._pushLog('beforeUpdate — data 已变(count=' + this.count + ')，DOM 可能仍是旧值');
        },
        updated: function () {
            this._pushLog('updated — DOM 已与 data 同步(count=' + this.count + ')');
        },
        beforeDestroy: function () {
            this._pushLog('beforeDestroy — 实例即将销毁，data/methods 仍可用');
        },
        destroyed: function () {
            // 此时实例已从 DOM 移除，此处仅 console 记录（模板已不可更新）
            console.log('[destroyed] 实例已销毁');
        },
        methods: {
            _pushLog: function (text) {
                var line = new Date().toLocaleTimeString() + '  ' + text;
                this.logs.unshift(line);
            },
            destroyVm: function () {
                this._pushLog('调用 $destroy()…');
                this.$destroy();
            }
        }
    });
</script>
