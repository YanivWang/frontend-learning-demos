<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //Promise对象: 承诺将来会执行的对象
    new Promise(function (resolve, reject) {
        console.log('start new Promise...');
        var timeOut = Math.random() * 2;
        console.log('set timeout to: ' + timeOut + ' seconds.');
        setTimeout(function () {
            if (timeOut < 1) {
                console.log('call resolve()...');
                resolve('200 OK');//请求成功，一定要调用resolve，使Promise对象的状态置为fullfilled
            }
            else {
                console.log('call reject()...');
                reject('timeout in ' + timeOut + ' seconds.');//请求失败，一定调用reject，使Promise对象的状态置为rejected
            }
        }, timeOut * 1000);
    }).then(function (r) {
        console.log('Done: ' + r);
    }).catch(function (reason) {
        console.log('Failed: ' + reason);
    });

    //直接new Promise()对象，传入的函数就是被执行


</script>

</body>
</html>
