<!--
  分类: css / 04-视觉效果 / 按钮
  主题: 拟物 3D 按钮的按下动效
  要点:
    - 通过 box-shadow 偏移构造「立体感」，:active 时缩小阴影并下沉 top 实现按下
    - cursor: pointer + user-select: none 防止文字误选影响交互
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D 按钮按下动效</title>
    <style>
        .css-3d-btn {
            left: 100px;
            top: 100px;
            position: absolute;
            color: rgba(255, 255, 255, 1);
            background-color: #e1e1e1;
            padding: 14px 60px;
            border-radius: 50px;
            border-color: silver;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.5rem;
            box-shadow: 0px 4px 0px #c88d1f;
            text-align: center;
            user-select: none;
            cursor: pointer;
        }

        /* 按下时把 4px 的下阴影缩到 2px，并把 top 下移 2px，看起来就像被「按进去」了 */
        .css-3d-btn:active {
            box-shadow: 0px 2px 0px #78C800;
            top: 102px;
        }
    </style>
</head>
<body>

<div>
    <div class="css-3d-btn">点击</div>
</div>


</body>
</html>
