<!--
  分类: react18 / 组件通信
  主题: Context 跨层传递
  要点:
    - Context 适合主题、语言、当前登录用户等跨层共享数据
    - Provider 提供 value，useContext 读取最近的上层 Provider
    - Context 不是全局状态管理银弹；频繁变化的大状态可能导致较大范围重渲染
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · Context 跨层传递</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { createContext, useContext, useMemo, useState } = React;

    const ThemeContext = createContext(null);

    function Toolbar() {
      return <ThemeButton />;
    }

    function ThemeButton() {
      const theme = useContext(ThemeContext);
      return (
        <button style={{ background: theme.background, color: theme.color }}>
          当前主题: {theme.name}
        </button>
      );
    }

    function App() {
      const [dark, setDark] = useState(false);

      const themeValue = useMemo(() => {
        return dark
          ? { name: "dark", background: "#222", color: "#fff" }
          : { name: "light", background: "#fff", color: "#222" };
      }, [dark]);

      return (
        <ThemeContext.Provider value={themeValue}>
          <section>
            <h1>Context 跨层传递</h1>
            <button onClick={() => setDark(!dark)}>切换主题</button>
            <Toolbar />
            <p>面试回答: Context 解决跨层传 props 的问题，但高频变化状态仍要注意拆分 Provider 或使用状态库。</p>
          </section>
        </ThemeContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
