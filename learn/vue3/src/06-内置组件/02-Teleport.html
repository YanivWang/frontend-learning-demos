<!--
  分类: vue3 / 06-内置组件
  主题: Teleport
  要点:
    - Teleport 可以把组件模板的一部分渲染到 DOM 其他位置
    - 常用于弹窗、浮层、通知
    - 逻辑层级仍属于原组件，DOM 位置被移动
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · Teleport</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { padding: 6px 12px; }
      code { background: #f6f8fa; padding: 2px 5px; border-radius: 6px; }
      .modal { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,.25); }
      .dialog { background: #fff; border-radius: 8px; padding: 20px; min-width: 260px; box-shadow: 0 8px 30px rgba(0,0,0,.18); }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Teleport</h1>
      <button @click="open = true">打开弹窗</button>
      <teleport to="body">
        <div v-if="open" class="modal">
          <div class="dialog">
            <h2>弹窗内容</h2>
            <p>这块 DOM 被渲染到了 body 下。</p>
            <button @click="open = false">关闭</button>
          </div>
        </div>
      </teleport>

      <h2>面试回答</h2>
      <ul>
        <li><code>Teleport</code> 解决弹窗被父级 <code>overflow</code>、<code>z-index</code>、定位上下文影响的问题。</li>
        <li>它改变 DOM 挂载位置，但不改变组件的逻辑父子关系。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const open = ref(false);
          return { open };
        },
      }).mount("#app");
    </script>
  <!-- DEMO_NAV_START -->
<footer class="demo-nav" aria-label="Demo 导航">

    .demo-output:empty { display: none; }

</body>
</html>
