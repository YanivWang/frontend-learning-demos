<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../libs/vue2.js"></script>
    <script src="../../libs/vue-router.js"></script>
    <script src="../../libs/vuex.js"></script>

    <!--vuex依赖Promise。如果你支持的浏览器并没有实现Promise，那么你可以使用一个polyfill-->
    <script src="../../libs/es6-promise.auto.js"></script>
</head>
<body>

<div id="app">
</div>

<script>
    const store = new Vuex.Store({
        //该属性用于存储共享的状态
        state: {
            todos: [
                {id: 1, text: '...', done: true},
                {id: 2, text: '...', done: false}
            ]
        },
        mutations: {
            //mutation是直接改变state的状态，所以参数是state
            increment(state) {
                state.count++;
            },
            incrementA(state, n) {
                state.count += n;
            },
            incrementB(state, payload) {
                state.count += payload.count;
            }
        },
        actions: {
            //context对象和store实例具有相同的方法和属性
            //action函数不直接改变state的状态
            //而是提交一个mutation，其实就是在提交mutation前可以做一些其它的处理
            increment(context) {
                context.commit("increment");
            },
            incrementA({commit}) {//参数解构
                commit('increment', 10);
            },
            incrementAsync({commit}) {
                setTimeout(() => {
                    //异步分发执行完毕
                    console.log("异步分发执行完毕");
                    commit('increment');
                }, 5000)
            },
            checkout({ commit, state },products){//用于数组和对象类型的参数的解构
               return new Promise((resolve,reject)=>{
                   setTimeout(()=>{
                       commit('someMutation');
                       resolve();
                   },1000)
               })
            },
            checkoutPlus({dispatch,commit}){
                //在一个action内部可以dispatch其它的action
                return dispatch('checkout').then(()=>{
                    commit('incrementB');
                })
            }
        },
        getters: {}
    });

    //〇:store包含的属性： commit(提交mutation) dispatch(分发action) getters(提供的用来获取state的方法) strict(是否启用严格模式)  state(存储的状态)
    console.log(store.toString());

    //一：提交一个mutation
    store.commit('increment');

    //提交一个载荷(Payload),向store.commit传入额外的参数，即mutation的载荷
    //1.一个参数
    store.commit('incrementA', 10);
    //2.对象参数
    store.commit('incrementB', {
        count: 10
    });
    //3.对象方式
    store.commit({
        type: 'incrementB',
        count: 10
    });
    //mutation必须是同步函数
    //使用常亮替代mutation事件类型，并将常量放置到一个单独的文件中，便于合作者了解app的所有mutation类型
    //任何在回调函数中进行的状态的改变都是不可追踪的

    //二：分发Action
    //以载荷方式(载荷就是传递一个额外的参数)分发一个action，然后由action来提交mutation
    store.dispatch('incrementAsync', {
        amount: 10
    });
    store.dispatch({
        type: 'incrementAsync',
        amount: 10
    });

    //store.dispatch可以处理被触发的action的处理函数返回的Promise，并且store.dispatch()也返回一个Promise对象
    store.dispatch({
        type:'checkout',
        products:{

        }
    }).then(()=>{
       //to do
    });


    new Vue({
        data() {
            return {}
        },
        store,
        computed: {},
        template: `
            <div>
               <div>Home</div>
            </div>
        `,
        methods: {
            increment() {
                //在组件的内部，提交mutation
                this.$store.commit('increment');
            },
            //将this.increment()映射为this.$store.dispatch('increment')
            //
            ...Vuex.mapActions(['increment','incrementA','incrementAsync']),
            ...Vuex.mapActions({
                add: 'increment'//将this.add()映射为this.$store.dispatch('increment');
            })
        },
        components: {}
    }).$mount("#app");

</script>

</body>
</html>
