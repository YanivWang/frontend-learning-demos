<!--
  分类: react18 / 函数组件
  主题: 函数组件 + props 传值（计数器示例）
  要点:
    - 函数组件唯一参数是 props 对象；从父级传入的所有 attribute 都被打包进 props
    - props 是只读的；要更新视图需重新调用 render（或者使用 state / hooks）
    - createRoot 只创建一次后复用；ReactDOM.render 已废弃
-->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React · 函数组件与 props</title>
  <!-- react核心库 -->
  <script src="../../libs/react.development.js"></script>
  <!-- react用来操作dom的库 -->
  <script src="../../libs/react-dom.development.js"></script>

  <!-- Don't use this in production: -->
  <!-- 引入 babel 是用来编译jsx的 -->
  <script src="../../libs/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const container = document.getElementById("root");
    // createRoot 只创建一次，setInterval 内复用 root.render 更新视图
    const root = ReactDOM.createRoot(container);

    //返回一个更新后的组件，组件内容可以通过这个 props 对象，访问从父组件传递过来的属性
    function Counter(props) {
      const element = <div>{props.count}</div>;
      return element;
    }

    //执行组件渲染逻辑
    let count = 0;
    function tick() {
      count++;
      // 给 render 方法传入的第一个参数组件，所有传递的属性最终会被封装成 props 对象
      root.render(<Counter count={count} />);
    }

    //每隔一秒创建一个新元素，并将其传入 root.render()，实现界面的更新
    setInterval(tick, 1000)
  </script>
