<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>DOM 基础操作</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; line-height: 1.6; }
    #box { padding: 8px 12px; background: #fafafa; border: 1px solid #ddd; border-radius: 4px; margin: 8px 0; }
    .info { color: #888; font-size: 13px; }
  </style>
</head>
<body title="i am body">
  <h1>DOM 基础：选择 / 属性 / 数据集 / 内容</h1>

  <button id="btn">点击运行 DOM 操作</button>

  <div id="testA" class="testContent"
       data-name="王成"
       title="我是 tooltip"
       align="center"
       style="width:160px">
    我是一个 box
  </div>

  <textarea accesskey="f" placeholder="按 Alt+F (Mac: Ctrl+Alt+F) 聚焦"></textarea>
  <p class="info">accesskey 可用键盘快捷键聚焦元素；contenteditable 让 div 可编辑；dir 控制文字方向。</p>

  <div contenteditable="true" dir="rtl" id="editableBox" style="margin-top:8px;padding:6px;border:1px dashed #aaa;">我可以编辑（dir=rtl，从右往左）</div>

  <script>
    document.getElementById("btn").addEventListener("click", function () {
      // ① 选择器：单个 vs 集合
      const single = document.getElementById("testA");
      const list = document.getElementsByClassName("testContent"); // 实时 HTMLCollection
      const list2 = document.querySelectorAll(".testContent");     // 静态 NodeList
      console.log("单个:", single);
      console.log("HTMLCollection:", list);
      console.log("NodeList:", list2);

      // ② 内容修改
      list[0].innerHTML = "<b>已被修改</b>";

      // ③ 内联样式 .style.xxx
      single.style.backgroundColor = "#ffe5b4";

      // ④ 属性 getAttribute / setAttribute
      const dataName = single.getAttribute("data-name");
      console.log("data-name =", dataName);
      single.setAttribute("age", "20");

      // ⑤ 数据集 dataset —— 更现代的 data-* 访问方式
      console.log("dataset:", single.dataset);
      single.dataset.role = "demo";
      console.log("dataset.role:", single.dataset.role);

      // ⑥ 类操作
      single.classList.add("active");
      single.classList.toggle("active");

      // ⑦ 直接挂自定义 JS 属性（不会反映到 HTML）
      single.foo = "bar";
      console.log("自定义 JS 属性:", single.foo);
    });
  </script>
</body>
</html>
