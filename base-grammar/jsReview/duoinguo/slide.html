<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <script src="https://zuixjs.github.io/zuix/js/zuix.min.js"></script>
    <script src="https://unpkg.com/jquery@3.4.1/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="slide.css">
</head>
<body>

<div class="slideArea" data-ui-context="my-view-pager" data-ui-load="@lib/controllers/view_pager"
     data-o-paging="true">
    <div class="slide">
        <div class="active">LEARNING TIPS</div>
    </div>
    <div class="slide">
        <div>LESSON1</div>
    </div>
    <div class="slide">
        <div>LESSON2</div>
    </div>
    <div class="slide">
        <div>LESSON3</div>
    </div>
    <div class="slide">
        <div>STORY</div>
    </div>
</div>

<script>
    console.log("1111111111");

    setTimeout(function () {
        $(".slideArea").css({display: "block"});

        var viewPager;
        zuix.context("my-view-pager", function () {
            viewPager = this;
            viewPager.on('page:change', function (e, pageInfo) {

                let prevChild = parseInt(pageInfo.out) + 1;
                console.log("prevChild: " + prevChild);
                $(".slide:nth-child(" + prevChild + ") > div").removeClass("active");

                let currentChild = parseInt(pageInfo.in) + 1;
                console.log("currentChild: " + currentChild);
                $(".slide:nth-child(" + currentChild + ") > div").addClass("active");

            }).on('page:tap', function (e, pageNumber) {

            });
        });
    }, 500)
</script>

</body>
</html>
