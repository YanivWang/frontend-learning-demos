<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<script>
    //javascript的继承机制：prototype是一种将所有对象连接起来的机制
    //js中没有父类和子类的概念，没有类和实例的概念，其继承是通过原型链的方式进行的
    //js里面所有的数据类型都是对象: 所有需要有一种机制，将对象联系起来
    //new命令用来从原型对象生成一个实例对象。

    function Dog(name, weight) {
        this.name = name;
        this.weight = weight;

        //species 属性不是共享的
        this.species = "DOG";

        //构造函数中this，关键字就指向新创建的实例
        console.log("this: " + this);
    }

    console.log(Dog.prototype);

    console.log(typeof Dog.prototype);

    let d1 = new Dog("wangcai", 100);//new命令后面直接跟构造函数，用于从原型对象对象，生成一个实例对象
    let d2 = new Dog("laifu", 200);

    console.log(d1.species);
    console.log(d2.species);

    d1.species = "CAT";//每个对象都生成了一个构造函数属性的副本，各自维护一个副本
    console.log(d1.species);
    console.log(d2.species);

    //prototype是构造函数才有的属性，该属性是一个对象，包含所有实例对象的需要共享的属性和方法，哪些不需要共享的属性和方法
    //则放在构造函数中
    Dog.prototype.eat = function () {
        console.log("I am eating!!!");
    };
    Dog.prototype.life = 25;

    console.log(d1.life);
    console.log(d2.life);

    Dog.prototype.age = 30;

    console.log("prototype:\n" + Dog.prototype);

    //实例对象一旦创建，就会自动引用prototype对象中的属性和方法
    //所有构造函数的实例共享：构造函数的prototype的属性指向对象的属性和方法
    //也就是说，所有的实例，都包含构造函数prototype的属性对象的一个引用
    //一旦prototype对象包含的属性和方法发生改变，则所有实例属性持有的引用指向的对象，也就改变
    //因为这就是同一个对象，所以从外面开看来，就像是，所有的实例独享继承了prototype对象的属性和方法
    //其实并不是继承，而是引用这个对象，看起来就像是实例对象的原型对象
    let d3 = new Dog("pp", 100);

</script>

</body>
</html>
