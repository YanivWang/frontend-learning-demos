<!--
  分类: react / 性能
  主题: React.memo 与不可变更新
  要点:
    - React.memo 会在 props 浅比较相等时跳过函数组件重渲染
    - 浅比较看引用，数组/对象直接原地修改会破坏 React 的更新判断
    - 性能优化前先定位问题，不要为了“看起来专业”滥用 memo
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React · memo 性能优化</title>
  <script src="../../libs/react.development.js"></script>
  <script src="../../libs/react-dom.development.js"></script>
  <script src="../../libs/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { memo, useState } = React;

    const UserCard = memo(function UserCard({ user }) {
      console.log("UserCard render:", user.name);
      return <li>{user.name} - {user.score}</li>;
    });

    function App() {
      const [users, setUsers] = useState([
        { id: 1, name: "Alice", score: 80 },
        { id: 2, name: "Bob", score: 90 }
      ]);
      const [theme, setTheme] = useState("light");

      function addScore(id) {
        setUsers(users.map(user => {
          if (user.id !== id) return user;
          // 返回新对象，保证 React 能看出这个用户变了。
          return { ...user, score: user.score + 1 };
        }));
      }

      return (
        <section>
          <h1>React.memo 性能优化</h1>
          <button onClick={() => setTheme(theme === "light" ? "dark" : "light")}>
            切换无关状态: {theme}
          </button>
          <button onClick={() => addScore(1)}>Alice +1</button>
          <ul>
            {users.map(user => <UserCard key={user.id} user={user} />)}
          </ul>
          <p>面试回答: memo 依赖 props 引用稳定；不可变更新是 React 状态管理和性能优化的基础。</p>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
