<!--
  分类: vue3 / 06-内置组件
  主题: Transition
  要点:
    - Transition 给条件渲染或动态组件添加进出场过渡
    - Vue 会自动添加 enter/leave 相关 class
    - 常见于弹窗、下拉、路由页面切换
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 · Transition</title>
    <script src="../../libs/vue.global.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; line-height: 1.7; padding: 24px; color: #202124; }
      button { padding: 6px 12px; }
      code { background: #f6f8fa; padding: 2px 5px; border-radius: 6px; }
      .panel { margin-top: 12px; border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 420px; }
      .fade-enter-active, .fade-leave-active { transition: opacity .25s ease, transform .25s ease; }
      .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(-6px); }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Transition</h1>
      <button @click="show = !show">切换</button>
      <transition name="fade">
        <div v-if="show" class="panel">这里有进出场动画。</div>
      </transition>

      <h2>面试回答</h2>
      <ul>
        <li><code>Transition</code> 只处理单元素或单组件的进入离开动画。</li>
        <li>列表动画使用 <code>TransitionGroup</code>。</li>
        <li>Vue 自动根据 <code>name</code> 拼出 class，例如 <code>fade-enter-active</code>。</li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const show = ref(true);
          return { show };
        },
      }).mount("#app");
    </script>
  </body>
</html>
