<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        .testDiv {
            background-color: rosybrown;
            height: 0px;
            transition: height 0.5s;
            overflow-y: hidden;
        }
    </style>
</head>
<body>

<script>
    window.onload = init;

    function init() {
        var testDiv = document.getElementsByClassName("testDiv").item(0);

        var showBtn = document.getElementById("showBtn");
        showBtn.addEventListener("click", function () {
            testDiv.style.height = "100px";
        }, false);

        var hideBtn = document.getElementById("hideBtn");
        hideBtn.addEventListener("click", function () {
            testDiv.style.height = "0px";
        }, false)
    }
</script>

<div class="testDiv">
    <div>1111111</div>
    <div>1111111</div>
    <div>1111111</div>
    <div>1111111</div>
    <div>1111111</div>
    <div>1111111</div>
    <div>1111111</div>
</div>

<button id="showBtn" class="showBtn">展开</button>
<button id="hideBtn" class="hideBtn">折叠</button>
</body>
</html>
