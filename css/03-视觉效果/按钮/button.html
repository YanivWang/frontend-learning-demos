<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .css-3d-btn {
            left: 100px;
            top: 100px;
            position: absolute;
            color: rgba(255, 255, 255, 1);
            background-color: #e1e1e1;
            padding: 14px 60px;
            border-radius: 50px;
            border-color: silver;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.5rem;
            box-shadow: 0px 4px 0px #c88d1f;
            text-align: center;
            user-select: none;
            cursor: pointer;
        }

        /* now if we make the box shadows smaller when the button is clicked, it'll look like the button has been "pushed" */
        .css-3d-btn:active {
            box-shadow: 0px 4px 0px #78C800;
            top: 102px;
        }
    </style>
</head>
<body>

<div>
    <div class="css-3d-btn">点击</div>
</div>


</body>
</html>
