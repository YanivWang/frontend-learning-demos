<!--
  分类: javascript / 08-面试题 / 手写
  主题: 手写 call / apply
  要点:
    - call/apply 都是立即调用函数，并显式指定 this
    - 核心做法：把函数临时挂到 thisArg 对象上，再调用并删除
    - null/undefined 的 thisArg 在非严格模式下指向 globalThis
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手写 call / apply</title>
</head>
<body>
  <h1>手写 call / apply</h1>
  <p>打开控制台查看断言结果。</p>

  <script>
    Function.prototype.myCall = function (thisArg, ...args) {
      if (typeof this !== "function") {
        throw new TypeError("myCall must be called on a function");
      }

      const context = thisArg == null ? globalThis : Object(thisArg);
      const key = Symbol("fn");
      context[key] = this;
      const result = context[key](...args);
      delete context[key];
      return result;
    };

    Function.prototype.myApply = function (thisArg, args) {
      if (typeof this !== "function") {
        throw new TypeError("myApply must be called on a function");
      }
      if (args != null && typeof args[Symbol.iterator] !== "function") {
        throw new TypeError("args must be array-like or iterable");
      }

      const context = thisArg == null ? globalThis : Object(thisArg);
      const key = Symbol("fn");
      context[key] = this;
      const result = args == null ? context[key]() : context[key](...args);
      delete context[key];
      return result;
    };

    function introduce(prefix, suffix) {
      return prefix + this.name + suffix;
    }

    const user = { name: "Ada" };
    console.assert(introduce.myCall(user, "Hi, ", "!") === "Hi, Ada!", "myCall supports args");
    console.assert(introduce.myApply(user, ["Hello, ", "."]) === "Hello, Ada.", "myApply supports array args");
    console.assert(Math.max.myApply(null, [1, 8, 3]) === 8, "myApply works with native functions");

    console.log("myCall:", introduce.myCall(user, "Hi, ", "!"));
    console.log("myApply:", introduce.myApply(user, ["Hello, ", "."]));
  </script>
